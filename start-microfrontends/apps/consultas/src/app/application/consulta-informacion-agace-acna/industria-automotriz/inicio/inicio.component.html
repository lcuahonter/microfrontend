<div class="page p-4">
  <div class="container bg-white shadow-sm p-4">
    
    <ng-titulo titulo="Búsqueda de Industria Automotriz"></ng-titulo>

    <section class="mb-5 mt-4">
      <div class="p-3 bg-light border rounded d-flex align-items-center justify-content-between">
        <form [formGroup]="form" (ngSubmit)="onBuscar()" class="d-flex align-items-center w-100">
          <div class="d-flex align-items-center me-auto">
            <label class="fw-bold mb-0 me-3" style="white-space: nowrap;">RFC Industria Automotriz:</label>
            <input 
              type="text" 
              class="form-control" 
              formControlName="rfcIndustriaAutomotriz" 
              style="width: 250px;" 
              maxlength="15"
            />
          </div>
          <button type="submit" class="btn btn-primary px-4 ms-3">
            Buscar
          </button>
        </form>
      </div>
    </section>

    <section class="mt-5">
      <ng-titulo titulo="Proveedores de la Industria Automotriz"></ng-titulo>
      
      <div class="mb-3 overflow-auto mt-4">
        <app-tabla-dinamica
          [configuracionTabla]="configuracionTabla"
          [datos]="datos"
        ></app-tabla-dinamica>
      </div>

      <div class="mt-3" *ngIf="totalItems > 0">
        <app-table-pagination
          [totalItems]="totalItems"
          [itemsPerPage]="itemsPerPage"
          (pageChange)="onPageChange($event)"
        ></app-table-pagination>
      </div>

      <div class="d-flex justify-content-end mt-4">
        <button type="button" class="btn btn-primary px-5 me-3" (click)="onLimpiar()">
          Limpiar
        </button>
        <button type="button" class="btn btn-primary px-5" (click)="onExportarInformacion()">
          Exportar Informacion
        </button>
      </div>
    </section>
  </div>

  <lib-notificaciones
    *ngIf="showNotificacion"
    [notificacionInput]="notificacionInput"
    (confirmacionModal)="cerrarNotificacion()"
  ></lib-notificaciones>
</div>
