<div class="card shadow-sm border-0">
  <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-2">
    <span class="fw-bold">Asignar Bloque/País</span>
    <button type="button" class="btn-close btn-close-white" (click)="onCancelar()"></button>
  </div>
  <div class="card-body bg-light p-4">
    <form [formGroup]="form" (ngSubmit)="onConsultar()">
      <div class="mb-3">
        <label for="filtro" class="form-label font-weight-bold">Bloque/País</label>
        <div class="d-flex gap-3">
          <input
            type="text"
            id="filtro"
            formControlName="filtro"
            class="form-control bg-white"
            placeholder=""
          />
          <button
            type="submit"
            class="btn btn-primary px-4"
            [disabled]="form.invalid"
          >
            Consultar
          </button>
        </div>
      </div>
    </form>

    <div class="mt-4" *ngIf="datos.length > 0">
      <app-tabla-dinamica
        [configuracionTabla]="configuracionTabla"
        [datos]="datos"
        [tipoSeleccionTabla]="TablaSeleccion.RADIO"
        (filaSeleccionada)="onFilaSeleccionada($event)"
      ></app-tabla-dinamica>
      
      <div class="mt-3">
        <app-table-pagination
          [totalItems]="totalItems"
          [itemsPerPage]="itemsPerPage"
          (pageChange)="onPageChange($event)"
        ></app-table-pagination>
      </div>
    </div>

    <div class="d-flex justify-content-center gap-3 mt-5">
      <button
        type="button"
        class="btn btn-primary px-5"
        [disabled]="!seleccionado"
        (click)="onAceptar()"
      >
        Aceptar
      </button>
      <button
        type="button"
        class="btn btn-primary px-5"
        (click)="onCancelar()"
      >
        Cancelar
      </button>
    </div>
  </div>
</div>
