<div class="card shadow-sm border-0">
  <div class="card-header bg-black text-white py-2">
    <h5 class="m-0 fw-bold">Registro y/o Modificación de Normas SGP</h5>
  </div>
  <div class="card-body bg-light p-4">
    <div class="mb-4">
      <h6 class="fw-bold border-bottom pb-1">Normas S G P</h6>
    </div>

    <form [formGroup]="form">
      <div class="row mb-3">
        <div class="col-md-12">
          <label class="fw-bold">Bloque/País:</label>
          <input type="text" formControlName="bloquePais" class="form-control bg-white" readonly />
        </div>
      </div>

      <div class="row mb-3 align-items-center">
        <div class="col-md-2">
          <label class="font-weight-bold">Literal:</label>
        </div>
        <div class="col-md-2">
          <input type="text" formControlName="literal" class="form-control" />
        </div>
      </div>

      <div class="row mb-3 align-items-center">
        <div class="col-md-2">
          <label class="fw-bold">Posición de Fracción:</label>
        </div>
        <div class="col-md-2">
          <input type="text" formControlName="posicionFraccion" class="form-control" />
        </div>
      </div>

      <div class="row mb-3 align-items-center">
        <div class="col-md-2">
          <label class="fw-bold">Posición de Valor:</label>
        </div>
        <div class="col-md-2">
          <input type="checkbox" formControlName="posicionValor" class="form-check-input ms-0" />
        </div>
      </div>

      <div class="row mb-3 align-items-center">
        <div class="col-md-2">
          <label class="fw-bold">Activo:</label>
        </div>
        <div class="col-md-2">
          <input type="checkbox" formControlName="activo" class="form-check-input ms-0" />
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-6">
          <input-fecha 
            [datos]="fechaInicioConfig" 
            [setFecha]="form.get('fechaInicioVigencia')?.value"
            (valorCambiado)="onFechaInicioChange($event)"
            [deshabilitarPasadas]="true"
          ></input-fecha>
        </div>
      </div>

      <div class="row mb-4">
        <div class="col-md-6">
          <input-fecha 
            [datos]="fechaFinConfig" 
            [setFecha]="form.get('fechaFinVigencia')?.value"
            (valorCambiado)="onFechaFinChange($event)"
            [deshabilitarPasadas]="true"
          ></input-fecha>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-3 mt-4">
        <button type="button" class="btn btn-primary px-5" [disabled]="form.invalid" (click)="onGuardar()">
          Guardar
        </button>
        <button type="button" class="btn btn-primary px-5" (click)="onCancelar()">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>
