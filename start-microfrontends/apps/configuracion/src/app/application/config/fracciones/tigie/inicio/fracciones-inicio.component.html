<div class="container">
  <div class="d-flex align-items-center mb-3">
    <a href="javascript:void(0)" class="text-primary text-decoration-none">Antecesor</a>
    <span class="text-muted mx-2">|</span>
    <span class="text-muted">Activo</span>
  </div>
  <ng-titulo [titulo]="'Administrador Fracción Arancelaria TIGIE'"></ng-titulo>
  <div class="menu-tree mt-4">
    <div class="menu-item">
      <a [routerLink]="['alta']" class="menu-link">Alta Fracción Arancelaria</a>
    </div>
    <div class="menu-item">
      <a routerLink="actualizar" class="menu-link">Actualizar Fracción Arancelaria</a>
    </div>
    <div class="menu-group">
      <div class="group-header" (click)="toggleCorrelacion()">
        <i class="bi bi-caret-right-fill toggle-icon" [class.rotated]="correlacionExpanded"></i>
        <span class="group-title">Correlación Fracción Arancelaria</span>
      </div>
      <div class="group-content" [class.expanded]="correlacionExpanded">
        <div class="menu-item">
          <a routerLink="correlacion/agregar" class="menu-link">Agregar Fracción Arancelaria</a>
        </div>
        <div class="menu-item">
          <a routerLink="correlacion/disgregar" class="menu-link">Disgregar Fracción Arancelaria</a>
        </div>
      </div>
    </div>
    <div class="menu-group">
      <div class="group-header" (click)="toggleConsulta()">
        <i class="bi bi-caret-right-fill toggle-icon" [class.rotated]="consultaExpanded"></i>
        <span class="group-title">Consulta Fracción Arancelaria</span>
      </div>
      <div class="group-content" [class.expanded]="consultaExpanded">
        <div class="menu-item">
          <a routerLink="consulta/especifica" class="menu-link">Consulta Específica Fracción Arancelaria</a>
        </div>
        <div class="menu-item">
          <a routerLink="consulta/historica" class="menu-link">Consulta Histórica Fracción Arancelaria</a>
        </div>
      </div>
    </div>
  </div>
</div>
