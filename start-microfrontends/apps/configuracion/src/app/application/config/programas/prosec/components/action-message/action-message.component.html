<div class="container-fluid">
  <div class="row mb-3">
    <p>{{ message }}</p>
  </div>
  <div class="row">
    <div class="col-md-12 d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-primary me-2" (click)="onConfirm()">
        {{ confirmText }}
      </button>
      @if (showCancelBtn) {
      <button type="button" class="btn btn-default" (click)="onCancel()">
        {{ cancelText }}
      </button>
      }
    </div>
  </div>
</div>
