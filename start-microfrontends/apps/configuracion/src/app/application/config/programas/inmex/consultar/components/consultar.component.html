@if(!tieneTramiteSeleccionado){
    <busqueda-tramite-inmex
    (tramiteSeleccionado)="onTramiteSeleccionado($event)"
    ></busqueda-tramite-inmex>
}

@if(tieneTramiteSeleccionado){
    <detalles-tramite-inmex
    [tramiteSeleccionado]="tramiteSeleccionado"
    (accionRegresar)="accionRegresar()"
    ></detalles-tramite-inmex>
}
