<app-error-messages [errors]="errors" [successMessage]="successMessage"></app-error-messages>

<div class="row">
  <div class="col-md-12 d-flex justify-content-end">
    <button type="button" class="btn btn-primary me-2" (click)="onSave()" [disabled]="saveButtonDisabled">Guardar</button>
    <button type="button" class="btn btn-default" (click)="onCancel()">Cancelar</button>
  </div>
</div>
