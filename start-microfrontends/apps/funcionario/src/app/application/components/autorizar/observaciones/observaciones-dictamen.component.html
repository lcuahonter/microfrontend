<div class="container mt-2">
  <form [formGroup]="dictamenForm">
    <div class="row">
      <div class="col-md-12">
        <h2 class="titulo mt-5 mb-5">Autorizar dictamen</h2>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12 mt-3 mb-3">
        <lib-encabezado-requerimiento
          [numFolioTramite]="'02309482934723832'"
          [tipoTramite]="'Registro de solicitud de servicios extraordinarios'"
        ></lib-encabezado-requerimiento>
      </div>
    </div>

    <div class="row mt-5">
        <div class="col-md-offset-2 col-md-6 alineacion text-center">
          <div class="d-flex gap-3 justify-content-center">
            <label class="control-label" for="lblsentidoDictamen">Sentido Dictamen:</label>
            <div class="border px-4 py-2 d-flex align-items-center radio-button">
              <input
                class="form-check-input me-3 seleccion-radio"
                type="radio"
                name="cumplimiento"
                id="sentidoDictamenAceptado"
                value="1"
                formControlName="cumplimiento"
              />
              <label class="control-label" for="sentidoDictamen">Aceptado</label>
            </div>
            <div class="border px-4 py-2 d-flex align-items-center radio-button">
              <input
                class="form-check-input me-3 seleccion-radio"
                type="radio"
                name="cumplimiento"
                value="2"
                id="sentidoDictamenRechazado"
                formControlName="cumplimiento"
              />
              <label class="control-label" for="sentidoDictamen">Rechazado</label>
            </div>
          </div>
        </div>
      </div>

    <div class="row mt-5">
      <div class="col-md-12">
        <label for="razonSocial" class="form-label texto_resaltado">
          * Justificación de la observación:
        </label>
        <textarea class="form-control" id="mensajeDictamen" formControlName="mensajeDictamen"></textarea>
      </div>
    </div>

    <div class="row mt-5 mb-5">
      <div class="col-md-12 d-flex justify-content-end">
        <button type="button" class="btn btn-primary" (click)="guardarObservaciones()">
            Generar observación
          </button>
        <button type="button" class="btn btn-default me-3" (click)="navegarAAutorizarDictamen()">
          Regresar
        </button>        
      </div>
    </div>
  </form>

  <div class="row mt-5" *ngIf="observaciones.length > 0">
    <div class="col-md-12">
      <h3>Observaciones al dictamen</h3>
        <app-tabla-dinamica
            [configuracionTabla]="configuracionTabla"
            [datos]="observaciones">
        </app-tabla-dinamica>
        <ul class="pagination d-flex justify-content-center">
            <li class="page-item"><a class="page-link" href="#">1</a></li>
        </ul>      
    </div>
  </div>
</div>
