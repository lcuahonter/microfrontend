<div class="page page-funcionario">
    <header class="text-center py-5">
        <h1 class="fw-bold text-primary">Bienvenido</h1>
        <p class="text-secondary text-primary">Lorem ipsum dolor sit amet consectetur. Fringilla egestas.</p>
    </header>
    <div class="container">
        <div class="bg-primary"></div>
        <div class="col-md-12">
            <div class="row">
                <h2 class="fw-bold my-5 titulo-tasks">Autorización masiva</h2>
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="col-md-12">
                <div class="d-flex justify-content-between align-items-center" (click)="mostrar_colapsable()">
                    <span></span>
                    <div class="col-md-12 text-end m-4">
                        <button class="btn btn-link text-decoration-none text-primary" data-bs-toggle="collapse"
                            aria-expanded="false">
                            Búsqueda @if(colapsable){<span class="bi bi-chevron-up"></span>}@if(!colapsable){<span
                                class="bi bi-chevron-down"></span>}
                        </button>
                        <div class="col-md-12">
                            <hr>
                        </div>
                    </div>
                </div>
            </div>
            @if(colapsable){
            <div class="panel-collapse collapse in mx-5" id="panel-01">
                <form [formGroup]="FormBusqueda">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="catalogoDependencia" class="form-label font-weight-titulo text-title">Catálogo
                                Dependencia:* </label>
                            <input type="text" name="catalogoDependencia" id="catalogoDependencia" formControlName="catalogoDependencia"
                                class="form-control font-weight-titulo text-title">
                        </div>
                        <div class="col-md-4">
                            <label for="servicio" class="form-label font-weight-titulo text-title">Servicio:* </label>
                            <input type="text" name="servicio" id="servicio" formControlName="servicio" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label for="subServicio" class="form-label font-weight-titulo text-title">Sub Servicio:*
                            </label>
                            <input type="text" name="subServicio" id="subServicio" formControlName="subServicio"
                                class="form-control font-weight-titulo text-title">
                        </div>
                        <div class="col-md-4">
                            <label for="modalidad" class="form-label font-weight-titulo text-title">Modalidad:* </label>
                            <input type="text" name="modalidad" id="modalidad" formControlName="modalidad"
                                class="form-control font-weight-titulo text-title">
                        </div>
                        <div class="col-md-4">
                            <label for="tarea" class="form-label font-weight-titulo text-title">Tarea:* </label>
                            <input type="text" name="tarea" id="tarea" formControlName="tarea"
                                class="form-control font-weight-titulo text-title">
                        </div>
                        <div class="col-md-4">
                        </div>
                        <div class="col-md-4">
                            <input-fecha class="font-weight-titulo text-title" [datos]="fechaInicioInput"
                                (valorCambiado)="cambioFechaInicio($event)"></input-fecha>
                        </div>
                        <div class="col-md-4">
                            <input-fecha class="font-weight-titulo text-title" [datos]="fechaFinalInput"
                                (valorCambiado)="cambioFechaFinal($event)"></input-fecha>
                        </div>
                        <div class="col-md-4">
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="observacion" formControlName="observacion">
                                <label class="form-check-label" for="observacion">
                                    Generar observación
                                </label>
                            </div>
                        </div>
                    </div>
                </form>
                <div class="d-flex justify-content-end m-lg-5">
                    <button type="button" class="btn btn-default ms-2 btn-size-1">Borrar</button>
                    <button class="btn  btn-primary ms-2 btn-size-1 color-back" type="button"
                        (click)="buscarPendiente()">Continuar</button>
                </div>
            </div>
            }
        </div>
        <div class="col-md-12">
            <div class="row">
                <h2 class="fw-bold my-5 titulo-tasks">Lista de tramites</h2>
            </div>
        </div>
        <div class="card shadow-sm table-responsive" style="max-height: 300px; overflow: auto;">
            <ng-table
            [commonTableHeader]="cargaMasivaTableHeaderData"
            [commonTableBody]="cargaMasivaTableBodyData">
          </ng-table>
        </div>
        <div class="d-flex justify-content-center">
            <app-table-pagination 
            [totalItems]="totalItems" 
            [itemsPerPage]="itemsPerPage" 
            [currentPage]="currentPage"
            (pageChange)="cambioDePagina($event)" 
            (itemsPerPageChange)="elementosPorCambioDePagina($event)">
            </app-table-pagination>
        </div>
    </div>
</div>
