<div class="container">
  <div class="row padding-top">
    <div class="row">
      <div class="col-12">
        <h2 class="fw-bold my-5 titulo-tasks">Requerimiento</h2>
        <hr class="red">
      </div>
    </div>
    <form [formGroup]="formRequerimiento">
      <div class="row">
        <div class="col-md-12">
          <div class="col-md-4">
            <div class="row">
              <app-catalogo-select [catalogo]="catTipoRequerimiento" formControlName="tipoRequerimiento"
                [label]="'Tipo requerimiento'" [required]="true" name="tipoRequerimiento"
                (change)="tipoRequerimientoSeleccionado(formRequerimiento,'tipoRequerimiento', 'settipoRequerimientoValue')"></app-catalogo-select>
            </div>
          </div>
        </div>
        <div class="col-md-12">
          <label for="justificacionRequerimiento" class="form-label">Justificación requerimiento :</label>
          <textarea name="justificacionRequerimiento" id="justificacionRequerimiento" class="form-control text-height"
            formControlName="justificacionRequerimiento"
            (change)="setValoresStore(formRequerimiento,'justificacionRequerimiento', 'setjustificacionRequerimientoValue')"></textarea>
        </div>
      </div>
      <div class="col-md-12">
        <p class="text-danger small">*Campos obligatorios</p>
      </div>
    </form>
  </div>
</div>
