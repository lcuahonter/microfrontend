<div class="container">
  <form [formGroup]="form">
    <div class="row">
      <div class="col-md-12">
        <label for="razonSocial" class="form-label">Nombre, denominación o razón social</label>
        <input type="text" class="form-control" formControlName="razonSocial" id="razonSocial">
      </div>
      <div class="col-md-6">
        <label for="solicitudPersonaRfc" class="form-label">RFC</label>
        <input type="text" class="form-control" formControlName="solicitudPersonaRfc" id="solicitudPersonaRfc">
      </div>
      <div class="col-md-6">
        <label for="fechahoraNotificacion" class="form-label">Fecha y hora de la notificación</label>
        <input type="text" class="form-control" formControlName="fechaHoraNotificacion" id="fechahoraNotificacion">
      </div>
    </div>
  </form>

  <div class="row mt-5 mb-5">
    <div class="col-md-12 d-flex justify-content-end">
      <button type="button" class="btn btn-default me-3"> Cancelar </button>
      <button type="button" class="btn btn-primary" (click)="continuar()"> Continuar </button>
    </div>
  </div>
</div>
