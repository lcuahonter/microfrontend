<div class="container">
  <ng-titulo titulo="Permiso renuncia de derechos"></ng-titulo>
  <form [formGroup]="renunciaDerechosForm">
    <div class="row">
      <div class="col-md-5">
        <div class="form-group">
          <label class="form-label" for="folioTramite">Folio trámite:</label>
          <input class="form-control" id="folioTramite" placeholder="" type="text" formControlName="folioTramite" />
        </div>
      </div>
      <div class="col-md-3">
        <div class="form-group">
          <label class="form-label" for="tipoSolicitud">Tipo de solicitud:</label>
          <input class="form-control" id="tipoSolicitud" placeholder="" type="text" formControlName="tipoSolicitud" />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label" for="regimen">Régimen:</label>
          <input class="form-control" id="regimen" placeholder="" type="text" formControlName="regimen" />
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-5">
        <div class="form-group">
          <label class="form-label" for="clasificacionRegimen">Clasificación del régimen:</label>
          <textarea class="background-color" rows="2" cols="44" formControlName="clasificacionRegimen" ></textarea>
        </div>
      </div>
      <div class="col-md-3">
        <div class="form-group">
          <label class="form-label" for="periodoVigencia">Periodo de vigencia:</label>
          <input class="form-control" id="periodoVigencia" placeholder="" type="text"
            formControlName="periodoVigencia" />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label" for="UnidadMedida">Unidad de medida::</label>
          <input class="form-control" id="UnidadMedida" placeholder="" type="text" formControlName="unidadMedida" />
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-5">
        <div class="form-group">
          <label class="form-label" for="fraccionArancelaria">Fracción arancelaria:</label>
          <input class="form-control" id="folioTramite" placeholder="" type="text"
            formControlName="fraccionArancelaria" />
        </div>
      </div>
      <div class="col-md-3">
        <div class="form-group">
          <label class="form-label" for="cantidadAutorizada">Cantidad autorizada:</label>
          <input class="form-control" id="cantidadAutorizada" placeholder="" type="text"
            formControlName="cantidadAutorizada" />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label" for="valorAutorizado">Valor autorizado:</label>
          <input class="form-control" id="valorAutorizado" placeholder="" type="text"
            formControlName="valorAutorizado"  />
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-2">
        <div class="form-group">
          <label class="form-label" for="nico">NICO:</label>
          <input class="form-control" id="nico" placeholder="" type="text" formControlName="nico" />
        </div>
      </div>
      <div class="col-md-5">
        <div class="form-group">
          <label class="form-label" for="descripcionNico:">Descripción NICO:</label>
          <textarea class="background-color" rows="2" cols="45" formControlName="descripcionNico"></textarea>
        </div>
      </div>
      <div class="col-md-5">
        <div class="form-group">
          <label class="form-label" for="Acotacion">Acotación:</label>
          <textarea class="background-color" rows="2" cols="44" formControlName="acotacion" ></textarea>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-5">
        <div class="form-group">
          <label class="form-label" for="permisoDesde:">Permiso válido desde:</label>
          <input class="form-control" id="permisoDesde" placeholder="" type="text" formControlName="permisoDesde" />
        </div>
      </div>
      <div class="col-md-7">
        <div class="form-group">
          <label class="form-label" for="permisoHasty">Permiso válido hasty:</label>
          <input class="form-control" id="permisoHasty" placeholder="" type="text" formControlName="permisoHasty" />
        </div>
      </div>
    </div>
    <ng-titulo titulo=""></ng-titulo>
    <div class="row">
      <div class="col-md-8">
        <div class="form-group">
          <label for="motivoSuspension" class="form-label">Motivo renuncia de derechos *:</label>
          <textarea rows="3" cols="80" id="motivoRenuncia" required="true" formControlName="motivoRenuncia"
            (change)="eventoDeCambioDeValor($event, 'motivoRenuncia')"></textarea>
        </div>
        @if(renunciaDerechosForm.controls['motivoRenuncia'].invalid &&
        renunciaDerechosForm.controls['motivoRenuncia'].touched) {
        <div class="d-grid">
          @if(renunciaDerechosForm.controls['motivoRenuncia'].errors?.['required']) {
          <span class="mensaje-error">Este campo es obligatorio</span>
          }
        </div>
        }
      </div>
    </div>
    <ng-titulo titulo="Manifiesto bajo protesta"></ng-titulo>
    <div class="row">
      <div class="alert alert-info">
        <label class="inline-box">
          <input type="checkbox" id="manifesto" formControlName="manifesto"
          (change)="eventoDeCambioDeValor($event, 'manifesto')"/>
          <span class="manifestoText">
            {{manifestoText.Texto}}</span>
        </label>
      </div>
    </div>
  </form>
</div>
