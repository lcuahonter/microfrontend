<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(1)">Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(2)">Desistimiento de solicitud de permiso</a>
        </li>
      </ul>
  
      <ng-container>
        @switch (indice) { @case (1) {
            <solicitante></solicitante>
        } 
        @case (2) {
           @if(esDatosRespuesta){
            <app-desistimiento-solicitud-permiso></app-desistimiento-solicitud-permiso>
           }    
        } 
    }
      </ng-container>
    </div>
  </div>
