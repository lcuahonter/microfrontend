<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-8">
        <h1>Solicitud de importación de hidrocarburos</h1>
      </div>
      @if(esFormaValido){
        <ng-alert
          [CONTENIDO]="MENSAJE_DE_ERROR"
          [CUSTOMECLASS]="infoAlert"
        ></ng-alert>
        }
      <app-wizard [listaPasos]="pasosSolicitar"></app-wizard>
    </div>
 
    <div class="row">
      @switch(indice){
      @case(1){
      <app-paso-uno #pasoUnoRef></app-paso-uno>
      }@case(2){
      <app-paso-dos></app-paso-dos>
      }@case(3){
      <app-paso-tres></app-paso-tres>
      }
      }
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>
    <div class="mt-5">
      @if (notificacionPrivacidad) {
        <section>
      <lib-notificaciones [notificacionInput]="notificacionPrivacidad"></lib-notificaciones>
      </section>
    }
    </div>
 
  </div>
