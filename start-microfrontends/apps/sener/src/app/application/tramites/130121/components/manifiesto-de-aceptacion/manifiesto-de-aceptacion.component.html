<form [formGroup]="manifestoForm">
  <div style="margin-top: 40px;">
    <ng-titulo titulo="Manifiesto de aceptación"></ng-titulo>
    <div class="row">
      <div class="alert alert-info">
        <label style="font-weight: normal">
          <input type="checkbox" id="manifesto" formControlName="manifesto"
            (change)="setValoresStore(manifestoForm, 'manifesto')" />
          {{manifestoText.Texto1}}
          <span style="display:block;" class="mt-3"> {{manifestoText.Texto2}}</span>
        </label>
      </div>
    </div>
  </div>
</form>
