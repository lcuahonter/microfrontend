<div class="container">
    <div class="row">
        <div class="col-md-7">
            <h3>Suspensión de permiso de importación o exportación de petrolíferos o hidrocarburos por facultad</h3>
        </div>
        <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        @if(!esValido) {
        <ng-alert [CONTENIDO]="ALERTA" [CUSTOMECLASS]="infoError"></ng-alert>
        }
    </div>
    <div class="row">
        @switch (indice) {
        @case (1) {
        <app-datos #datos></app-datos>
        } @case (2) {
        <app-paso-dos></app-paso-dos>
        } @case (3) {
        <app-paso-tres></app-paso-tres>
        }
        }
    </div>
    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)">
    </btn-continuar>
</div>
