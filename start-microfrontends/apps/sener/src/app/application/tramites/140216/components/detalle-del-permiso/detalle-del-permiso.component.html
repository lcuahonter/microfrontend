<div class="container">
    <form [formGroup]="detallePermisoForm">
        <!-- Detalle del permiso -->
        <div id="detalleFacultadPexim">
            <ng-titulo titulo="Detalle del permiso"></ng-titulo>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="folio">Número resolución:</label>
                    <input type="text" class="form-control" name="folio" id="folio" size="30" formControlName="folio"
                        (change)="setValoresStore(detallePermisoForm, 'folio', 'setFolio')" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="tipoSolicitud">Tipo de solicitud:</label>
                    <input type="text" class="form-control" name="tipoSolicitud" id="solicitudTipoSolicitud" size="30"
                        formControlName="tipoSolicitud"
                        (change)="setValoresStore(detallePermisoForm, 'tipoSolicitud', 'setTipoSolicitud')" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="regimen">Régimen:</label>
                    <input type="text" class="form-control" name="regimen" id="solicitudRegimenNombre" size="30"
                        formControlName="regimen"
                        (change)="setValoresStore(detallePermisoForm, 'regimen', 'setRegimen')" readonly>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="clasificacionRegimen">Clasificación del régimen:</label>
                    <input type="text" class="form-control" name="clasificacionRegimen"
                        formControlName="clasificacionRegimen" id="solicitudClasificacionRegimenNombre" size="30"
                        (change)="setValoresStore(detallePermisoForm, 'clasificacionRegimen', 'setClasificacionRegimen')"
                        readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="vigenciaPeriodo">Periodo de vigencia:</label>
                    <input type="text" class="form-control" name="vigenciaPeriodo" formControlName="vigenciaPeriodo"
                        (change)="setValoresStore(detallePermisoForm, 'vigenciaPeriodo', 'setVigenciaPeriodo')"
                        readonly>
                </div>
                <div class="col-md-4">
                    <div id="divUnidadMedidaUMT" style="display: block;">
                        <label class="form-label" for="unidadMedida">Unidad de medida de la tarifa (UMT):</label>
                    </div>
                    <input type="text" class="form-control" name="unidadMedida" id="solicitudUnidadMedida" size="30"
                        formControlName="unidadMedida"
                        (change)="setValoresStore(detallePermisoForm, 'unidadMedida', 'setUnidadMedida')" readonly>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="cantidad">Cantidad:</label>
                    <input type="text" class="form-control" name="cantidad" id="solicitudCantidad" size="30"
                        formControlName="cantidad"
                        (change)="setValoresStore(detallePermisoForm, 'cantidad', 'setCantidad')" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="valorFacturaUSD">Valor de factura USD:</label>
                    <input type="text" class="form-control" name="valorFacturaUSD"
                        id="solicitudMercanciaValorFacturaUSD" size="30" formControlName="valorFacturaUSD"
                        (change)="setValoresStore(detallePermisoForm, 'valorFacturaUSD', 'setValorFacturaUSD')"
                        readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="saldo">Saldo Disponible Aproximado:</label>
                    <input type="text" class="form-control" name="saldo" id="saldo" size="30" formControlName="saldo"
                        (change)="setValoresStore(detallePermisoForm, 'saldo', 'setSaldo')" readonly>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="fraccionArancelaria">Fracción arancelaria:</label>
                    <input type="text" class="form-control" name="fraccionArancelaria" id="solicitudFraccion" size="30"
                        formControlName="fraccionArancelaria"
                        (change)="setValoresStore(detallePermisoForm, 'fraccionArancelaria', 'setFraccionArancelaria')"
                        readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="idNicoDetalle">NICO:</label>
                    <input type="text" class="form-control" name="nico" id="idNicoDetalle" size="30"
                        formControlName="nico" (change)="setValoresStore(detallePermisoForm, 'nico', 'setNico')"
                        readonly>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="form-label" for="nicoDescripcion">Descripción NICO:</label>
                        <textarea class="form-control" cols="80" rows="5" id="idDescNicoDetalle"
                            formControlName="nicoDescripcion"
                            (change)="setValoresStore(detallePermisoForm, 'nicoDescripcion', 'setNicoDescripcion')"
                            readonly></textarea>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="form-label" for="acotacion">Acotación:</label>
                        <textarea class="form-control" cols="80" rows="5" id="idAcotacionDetalle"
                            formControlName="acotacion"
                            (change)="setValoresStore(detallePermisoForm, 'acotacion', 'setAcotacion')"
                            readonly></textarea>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-9">
                    <div class="form-group">
                        <label class="form-label" for="descripcionMercancia">Descripción de la mercancía:</label>
                        <textarea class="form-control" cols="80" rows="5" id="descripcionMercancia"
                            formControlName="descripcionMercancia"
                            (change)="setValoresStore(detallePermisoForm, 'descripcionMercancia', 'setDescripcionMercancia')"
                            readonly></textarea>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-9">
                    <div class="form-group">
                        <div id="divPaisBloque" style="display: block;">
                            <label class="form-label" for="paisProcedencia:">País(es) procedencia:</label>
                        </div>
                        <textarea class="form-control" cols="80" rows="5" id="listaPaises"
                            formControlName="paisProcedencia"
                            (change)="setValoresStore(detallePermisoForm, 'paisProcedencia', 'setPaisProcedencia')"
                            readonly></textarea>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
