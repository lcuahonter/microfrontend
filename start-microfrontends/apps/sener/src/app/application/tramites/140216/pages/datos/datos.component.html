<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
                    (keydown.space)="seleccionaTab(1)" role="button" tabindex="1">Busqueda Permisos</a>
            </li>
        </ul>

        <ng-container>
            @switch (indice) {
            @case (1) {
            @if (esDatosRespuesta) {
            <app-busqueda-permisos [tabindex]="1" #busquedaPermisosComponent></app-busqueda-permisos>
            }
            }
            }
        </ng-container>
    </div>
</div>
