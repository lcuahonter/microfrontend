<div class="page">
  <div class="container">
    <ng-titulo titulo="Selecci&oacute;n de tr&aacute;mite" />
    <div class="row">
      <table class="table table-responsive table-striped table-hover">
        <thead>
          <tr>
            <th> id</th>
            <th> departmento</th>
            <th>Tipo tr&aacute;mite</th>
            <th>URL</th>
          </tr>
        </thead>
        <tbody>
          @for(item of tramiteData; track item?.id) {
            @if(item?.linkDepartment) {
              <tr>
                <td> {{item?.id}}</td>
                <td> {{item?.department}}</td>
                <td> {{item?.tramite}}</td>
                <td> <a [routerLink]=item.linkDepartment>{{ ruta }}{{item.linkDepartment}}</a>
                </td>
              </tr>
            }
          }
          </tbody>
      </table>
      <div class="text-right fs-5">
        Version : INAH:{{ version }}
      </div>
    </div>
  </div>
</div>
