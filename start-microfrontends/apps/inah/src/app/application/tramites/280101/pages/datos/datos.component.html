<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="1" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="2" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Solicitud</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="3" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Monumentos o bienes muebles históricos</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="4" (keyup)="seleccionaTab(4)" (click)="seleccionaTab(4)">Destino</a>
            </li>
            <li [ngClass]="{ 'disabled': isTabDisabled(5) }">
                <a data-toggle="tab" tabindex="5" [attr.disabled]="isTabDisabled(5) ? true : null"  class="custom_li">Itinerario</a>
            </li>
            <li [ngClass]="{ 'disabled': isTabDisabled(6) }">
                <a data-toggle="tab" tabindex="6" [attr.disabled]="isTabDisabled(6) ? true : null" class="custom_li">Pago de derechos</a>
            </li>
        </ul>
        <ng-container>
            @switch (indice) {
            @case (1) {
                <solicitante #Solicitante></solicitante>
            }
            @case (2) {
              <app-solicitud [soloLectura]="esFormularioSoloLectura"></app-solicitud>  
            }
            @case (3) {
             <app-monumento [soloLectura]="esFormularioSoloLectura"></app-monumento>   
            }
            @case (4) {
             <app-destino [soloLectura]="esFormularioSoloLectura"></app-destino>   
            }
            }
        </ng-container>
    </div>
</div>
