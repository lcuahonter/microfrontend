<div class="container">
  <ng-titulo titulo="Destino"/>
  <form [formGroup]="destinoForm">
    <div class="row">
      <div class="col-md-4">
        <label class="form-label" for="pais"
          >País*:
        </label>
        <input
          type="text"
          class="form-control"
          id="pais"
          formControlName="pais"
          (change)="setValoresStore(destinoForm, 'pais', 'setPais')"
        />
      </div>

      <div class="col-md-4">
        <label class="form-label" for="codigo-postal"
          >Código Postal*:</label>
        <input
          type="text"
          class="form-control"
          id="codigo-postal"
          formControlName="codigoPostal"
          (change)="setValoresStore(destinoForm, 'codigoPostal', 'setCodigoPostal')"
        />
      </div>
      <div class="col-md-4">
          <label class="form-label" for="estado"
            >Estado:</label
          >
          <input
            type="text"
            class="form-control"
            id="estado"
            formControlName="estado"
            (change)="setValoresStore(destinoForm, 'estado', 'setEstado')"
          />
        </div>

      <div class="col-md-4">
        <label class="form-label" for="municipio-o-alcadia"
          >Municipio o alcaldía:</label
        >
        <input
          type="text"
          class="form-control"
          id="municipio-o-alcadia"
          formControlName="municipioOAlcadia"
          (change)="setValoresStore(destinoForm, 'municipioOAlcadia', 'setMunicipioOAlcadia')"
        />
      </div>

      <div class="col-md-4">
        <label class="form-label" for="localidad"
          >Localidad*:</label>
        <input
          type="text"
          class="form-control"
          id="localidad"
          formControlName="localidad"
          (change)="setValoresStore(destinoForm, 'localidad', 'setLocalidad')"
        />
      </div>
      <div class="col-md-4">
          <label class="form-label" for="colonia"
            >Colonia:</label
          >
          <input
            type="text"
            class="form-control"
            id="colonia"
            formControlName="colonia"
            (change)="setValoresStore(destinoForm, 'colonia', 'setColonia')"
          />
        </div>
         <div class="col-md-4">
          <label class="form-label" for="numero-exterior"
            >Número exterior*:</label
          >
          <input
            type="text"
            class="form-control"
            id="numero-exterior"
            formControlName="numeroExterior"
            (change)="setValoresStore(destinoForm, 'numeroExterior', 'setNumeroExterior')"
          />
        </div>  
        <div class="col-md-4">
          <label class="form-label" for="numero-interior"
            >Número interior:</label
          >
          <input
            type="text"
            class="form-control"
            id="numero-interior"
            formControlName="numeroInterior"
            (change)="setValoresStore(destinoForm, 'numeroInterior', 'setNumeroInterior')"

          />
        </div>
        <div class="col-md-8">
          <label class="form-label" for="calle"
            >Calle:</label
          >
          <input
            type="text"
            class="form-control"
            id="calle"
            formControlName="calle"
            (change)="setValoresStore(destinoForm, 'calle', 'setCalle')"
          />
        </div>         
    </div>
  </form>
</div>
