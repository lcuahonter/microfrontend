<div class="page">
  <div class="container">
    <div class="row mt-5">
      <div class="col-md-12">
        <h2 *ngIf="indice === 1">Certificado fitosanitario de <br /> reexportación</h2>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { 
        @case (1) {
          <paso-uno></paso-uno>
        }
        @case (2) {
          <paso-dos></paso-dos>
        } 
        @case (3) {
          <paso-tres></paso-tres>
        }
      }

      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>
    @if (indice === 1) {
      <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>  
    }
  </div>
</div>
