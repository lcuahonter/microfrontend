<div class="container form-container">
  <ng-titulo titulo="Pago de derechos" />
  <div>
    <form [formGroup]="FormSolicitud">
      <ng-container formGroupName="pagodeDerechos">
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="claveDeReferencia">Pago Clave Referencia*:</label>
              <input class="form-control" id="claveDeReferencia" formControlName="claveDeReferencia" type="text"
                [ngClass]="isValid(pagodeDerechos,'claveDeReferencia') ? 'required' : ''"
                (change)="setValoresStore(pagodeDerechos,'claveDeReferencia', 'setClaveDeReferencia')" />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="cadenaPagoDependencia">Pago Cadena Dependencia*:</label>
              <input class="form-control" id="cadenaPagoDependencia" formControlName="cadenaPagoDependencia" type="text"
                [ngClass]="isValid(pagodeDerechos,'cadenaPagoDependencia') ? 'required' : ''"
                (change)="setValoresStore(pagodeDerechos,'cadenaPagoDependencia', 'setCadenaPagoDependencia')"
                appUppercase />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <div class="form-group">
                <app-catalogo-select [catalogo]="bancoCatalogo.catalogos" formControlName="banco" [label]="'Banco'"
                  [required]="true" [isDisabled]="soloLectura"
                  (change)="setValoresStore(pagodeDerechos,'banco', 'setBanco');"></app-catalogo-select>
              </div>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="llaveDePago">Llave de pago*:</label>
              <input class="form-control" id="llaveDePago" formControlName="llaveDePago" type="text"
                [ngClass]="isValid(pagodeDerechos,'llaveDePago') ? 'required' : ''"
                (change)="setValoresStore(pagodeDerechos,'llaveDePago', 'setllaveDePago')" />
            </div>
          </div>

          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="fecPago">Fecha de pago*:</label>
              <input class="form-control" id="fecPago" formControlName="fecPago" type="date"
                [ngClass]="isValid(pagodeDerechos,'fecPago') ? 'required' : ''"
                (change)="setValoresStore(pagodeDerechos,'fecPago', 'setFecPago')" />
            </div>
          </div>

          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="impPago">Importe de pago*:</label>
              <input class="form-control" id="impPago" formControlName="impPago" type="text"
                [ngClass]="isValid(pagodeDerechos,'impPago') ? 'required' : ''"
                (change)="setValoresStore(pagodeDerechos,'impPago', 'setImpPago')" appUppercase />
            </div>
          </div>
        </div>
      </ng-container>
    </form>
  </div>
</div>
