<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h1>Autorización para la importación de plaguicidas, nutrientes vegetales, sustancias y materiales tóxicos o
        peligrosos</h1>
    </div>

    <app-wizard [listaPasos]="pasos"></app-wizard>

  </div>

  <div class="row">
    @switch (indice) {
    @case (1) {
    <app-paso-uno-cs></app-paso-uno-cs>
    }
    @case (2) {
    <app-paso-dos></app-paso-dos>
    }
    @case (3) {
    <app-paso-firmar-solicitud></app-paso-firmar-solicitud>
    }
    }
    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
  </div>
  @if(1 === indice) {
  <div class="mt-5">
    <div class="mt-5">
      <ng-alert [CONTENIDO]="TEXTOS.ADJUNTAR" [CUSTOMECLASS]="infoAlert"></ng-alert>
    </div>
  </div>
  }
</div>
