<div class="container mt-5">
    <form [formGroup]="composicionForm">
        <div class="row mt-4">
            <div class="col-md-6">
                <label class="form-label"><strong>*Componente del material</strong></label>
                <input type="text" class="form-control" formControlName="componenteMaterial" />
            </div>

            <div class="col-md-6">
                <label class="form-label"><strong>*Porcentaje de concentración</strong></label>
                <input type="number" class="form-control" formControlName="porcentajeConcentracion" />
            </div>
        </div>
        <div class="row mt-5">
            <div class="col-md-12">
                <div class="pull-right">
                    <button type="button" name="modificarMercancias" class="btn btn-default" (click)="cancelar()">
                        Cancelar
                    </button>
                    <button type="button" name="eliminarMercancias" class="btn btn-danger ms-2"
                        (click)="limpiarComposicion()">
                        Limpar
                    </button>
                    <button type="button" name="agregarcomposicion" class="btn btn-primary ms-2" 
                         (click)="agregar()">
                        Agregar
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>
