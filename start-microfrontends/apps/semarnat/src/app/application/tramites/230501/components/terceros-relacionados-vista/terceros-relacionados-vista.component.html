<div class="container">
    <div class="row mt-5"> <ng-titulo titulo="Destinatario (destino final)*"></ng-titulo></div>
    <div class="row mt-5">
        <app-tabla-dinamica [configuracionTabla]="configuracionTablaDestinatarioFinal"
            [datos]="destinatarioFinalTablaDatos" [tipoSeleccionTabla]="tipoSeleccionTabla"
            (listaDeFilaSeleccionada)="destinatarioFinalFilaSeleccionada = $event"></app-tabla-dinamica>
    </div>

    <div class="row mt-5">
        <div class="col-md-12">
            <div class="pull-right">
                <button type="button" name="modificarMercancias" class="btn btn-default"
                    [disabled]="!destinatarioFinalFilaSeleccionada.length" (click)="modificarDestinatario()">
                    Modificar
                </button>
                <button type="button" name="eliminarMercancias" class="btn btn-danger ms-2"
                    [disabled]="!destinatarioFinalFilaSeleccionada.length" (click)="eliminarDestinatarioFinal()">
                    Eliminar
                </button>

                <button type="button" name="agregarMercancias" class="btn btn-primary ms-2"  (click)="irAAcciones('../destinatario-final')">
                    Agregar
                </button>
            </div>
        </div>
    </div>

    <div>
        <ng-titulo titulo="Representante legal de la empresa importadora en destino*"></ng-titulo>
    </div>
    <div class="row mt-5">
        <app-tabla-dinamica [configuracionTabla]="configuracionTablaRepresentante" [datos]="representanteLegalTablaDatos"
            [tipoSeleccionTabla]="tipoSeleccionTabla"
            (listaDeFilaSeleccionada)="representanteFilaSeleccionada = $event"></app-tabla-dinamica>
    </div>

    <div class="row mt-5">
        <div class="col-md-12">
            <div class="pull-right">
                <button type="button" name="modificarMercancias" class="btn btn-default"
                    [disabled]="!representanteFilaSeleccionada.length" (click)="modificarRepresentanteLegal()">
                    Modificar
                </button>
                <button type="button" name="eliminarMercancias" class="btn btn-danger ms-2"
                    [disabled]="!representanteFilaSeleccionada.length" (click)="eliminarRepresentanteLegal()">
                    Eliminar
                </button>

                <button type="button" name="agregarMercancias" class="btn btn-primary ms-2" data-bs-toggle="modal"
                    data-bs-target="#modalAgregarMercancias" (click)="irAAcciones('../representante-legal')">
                    Agregar
                </button>
            </div>
        </div>
    </div>
    <div class="row mt-5"> <ng-titulo titulo="Usuario Final"></ng-titulo></div>
    <div class="row mt-5">
        <app-tabla-dinamica [configuracionTabla]="configuracionTablaFacturador" [datos]="usuarioTablaDatos"
            [tipoSeleccionTabla]="tipoSeleccionTabla"
            (listaDeFilaSeleccionada)="usoDeFilaSeleccionada = $event"></app-tabla-dinamica>
    </div>

    <div class="row mt-5">
        <div class="col-md-12">
            <div class="pull-right">
                <button type="button" name="modificarMercancias" class="btn btn-default"
                    [disabled]="!usoDeFilaSeleccionada.length" (click)="modificarUsuarioFinal()">
                    Modificar
                </button>
                <button type="button" name="eliminarMercancias" class="btn btn-danger ms-2"
                    [disabled]="!usoDeFilaSeleccionada.length" (click)="eliminarUsuarioFinal()">
                    Eliminar
                </button>

                <button type="button" name="agregarMercancias" class="btn btn-primary ms-2" data-bs-toggle="modal"
                    data-bs-target="#modalAgregarMercancias" (click)="irAAcciones('../uso-final')">
                    Agregar
                </button>
            </div>
        </div>
    </div>

</div>
