<div class="container-fluid px-0">
  <ng-titulo titulo="Destinatario" />
  <form [formGroup]="destinatarioForm">
    <div class="row">
      <app-catalogo-select [catalogo]="permisoCitesService.entidadFederativa" formControlName="entidadFederativa"
        class="col-md-4" [label]="'Entidad federativa'" [isDisabled]="esFormularioSoloLectura" (change)="onEntidadFederativaChange()"></app-catalogo-select>
    </div>
    <div class="">
        <label class="mt-5">Destinatarios*:</label>
      <div class="mt-4">
        <app-tabla-dinamica [configuracionTabla]="configuracionTabla" [datos]="tablaDatos" [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"
          [tipoSeleccionTabla]="TablaSeleccion" (listaDeFilaSeleccionada)="onFilaSeleccionada($event)"></app-tabla-dinamica>
      </div>
    </div>
    <div class="row text-end pb-3" *ngIf="tablaDatos.length > 0">
      <div>
        <button type="button" [disabled]="esFormularioSoloLectura" class="btn btn-default me-2" (click)="eliminarSeleccionados()">Eliminar Seleccionados</button>
        <button type="button" [disabled]="esFormularioSoloLectura" class="btn btn-danger me-2" (click)="eliminarNoSeleccionados()">Eliminar no seleccionados</button>
        <button type="button" [disabled]="esFormularioSoloLectura" class="btn btn-primary me-2" (click)="openPopup()">
          Modificar
        </button>
      </div>
    </div>

    <div
      class="row justify-content-end"
      style="padding-bottom: 20px; text-align: right"
      *ngIf="tablaDatos.length === 0"
    >
      <div class="col-md-6">
        <button type="button" class="btn btn-primary" [disabled]="esFormularioSoloLectura" (click)="generalOriginal()">Agregar</button>
      </div>
    </div>
  </form>
  @if(abrirGeneralOriginal){
    <app-modal>
      <div class="container">
        <ng-titulo titulo="Datos generales original" />
        <form [formGroup]="generalOriginalForm">
          <div class="row">
          <label class="mt-3">Nacionalidad</label>
            <app-input-radio
            [radioOptions]="radioPatentes"
            [layout]="'horizontal'"
            id="apoderadoPatente"
            [selectedValue]="radioPatentes[0].value"
          >
          </app-input-radio>
        </div>
        <div class="row">
          <div class="col-md-4">
            <label class="mt-3">Código postal o equivalente*:</label>
            <input class="form-control" id="codigoPostal" type="text" formControlName="codigoPostal" [required]="true" maxlength="15"
              [class.is-invalid]="generalOriginalForm.get('codigoPostal')?.touched && generalOriginalForm.get('codigoPostal')?.invalid"
              (change)="setValoresStore(generalOriginalForm,'codigoPostal')">
            <div *ngIf="generalOriginalForm.get('codigoPostal')?.touched && generalOriginalForm.get('codigoPostal')?.invalid" class="text-danger">
              <small *ngIf="generalOriginalForm.get('codigoPostal')?.errors?.['required']">Este campo es obligatorio.</small>
            </div>
          </div>
          <div class="col-md-3">
              <app-catalogo-select
              [catalogo]="this.permisoCitesService.pais"
              formControlName="pais"
              [label]="'País*'"
              [required]="true"
              name="pais"
              [isDisabled]="true"
              (change)="setValoresStore(generalOriginalForm,'pais')">
              </app-catalogo-select>
          </div>
          <div class="col-md-3">
            <app-catalogo-select
              [catalogo]="this.permisoCitesService.estado"
              formControlName="estado"
              [label]="'Estado*'"
              [required]="true"
              name="estado"
              [isDisabled]="esFormularioSoloLectura"
              (change)="setValoresStore(generalOriginalForm,'estado')">
            </app-catalogo-select>
          </div>
          </div>
          <div class="row">
            <div class="col-md-4">
              <label class="mt-3">Nombre/razón social y dirección*:</label>
              <textarea class="form-control" id="ciudad" rows="3" formControlName="nombre" placeholder=""
                (change)="setValoresStore(generalOriginalForm,'nombre')"></textarea>
              <div *ngIf="generalOriginalForm.get('nombre')?.touched && generalOriginalForm.get('nombre')?.invalid" class="text-danger">
                <small *ngIf="generalOriginalForm.get('nombre')?.errors?.['required']">Este campo es obligatorio.</small>
                <small *ngIf="generalOriginalForm.get('nombre')?.errors?.['maxlength']">Por favor, no escribas más de 1000 caracteres</small>
              </div>
            </div>
          </div>
        </form> 
        <div class="row my-5">
          <div class="col-md-4">
            <p>* Campos obligatorios</p>
          </div>
          <div class="col-md-6">
            <div class="pull-right mb-5">
              <button class="btn btn-default mt-4 mb-4" (click)="cancelar()">Cancelar</button>
              <button class="btn btn-primary mt-4 mb-4" (click)="anadirValores()">Guardar</button>
            </div>
          </div>
        </div>
      </div>
    </app-modal>
  }
</div>

<!-- Reusable lib-notificaciones component -->
<lib-notificaciones 
  *ngIf="popupAbierto"
  [notificacionInput]="nuevaNotificacion" 
  (confirmacionModal)="closePopup()">
</lib-notificaciones>

<lib-notificaciones 
  *ngIf="mostrarError"
  [notificacionInput]="nuevaNotificacionEliminar" 
  (confirmacionModal)="mostrarError = false">
</lib-notificaciones>

<lib-notificaciones 
  *ngIf="mostrarErrorModificar"
  [notificacionInput]="nuevaNotificacionModificar" 
  (confirmacionModal)="mostrarErrorModificar = false">
</lib-notificaciones>
