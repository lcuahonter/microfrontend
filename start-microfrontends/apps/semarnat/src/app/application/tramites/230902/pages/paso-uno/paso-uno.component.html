<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
            (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
            (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Datos de la solicitud</a>
        </li>
        <li [ngClass]="indice === 3 ? 'active' : ''" [class.disabled]="isTablDisabled">
          @if(isTablDisabled){
          <a data-toggle="tab" role="button" tabindex="4">Terceros</a>
          }@else {
          <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
            (keydown.space)="seleccionaTab(3)" role="button" tabindex="4">Terceros</a>
          }
        </li>
        <li [ngClass]="indice === 4 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)"
            (keydown.space)="seleccionaTab(4)" role="button" tabindex="6">Pago de derechos</a>
        </li>
      </ul>
  
      <ng-container>
        <solicitante #solicitante [hidden]="indice !== 1"></solicitante>
        @if(esDatosRespuesta){
        <app-datos-solicitud #datosSolicitud [hidden]="indice !== 2"></app-datos-solicitud>
        <app-terceros #terceros [hidden]="indice !== 3"></app-terceros>
        <app-pago-de-derechos #pagoDerechos [hidden]="indice !== 4"></app-pago-de-derechos>
        }
      </ng-container>
    </div>
</div>
