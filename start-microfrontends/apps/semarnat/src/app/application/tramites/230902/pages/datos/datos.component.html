<div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Permiso CITES o Certificado CITES de Importación, diversas Importaciones o Exportación, Reexportación de Ejemplares, Partes y Derivados de la Vida Silvestre </h1>
      </div>
    </div>
    @if(esFormaValido){
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
        }
    <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    <div>
      @switch (indice) {
      @case (1) {
      <app-paso-uno #pasoUno></app-paso-uno>
      }
      @case (2) {
        <app-paso-dos></app-paso-dos>

      }
      @case (3) {
        <app-paso-tres></app-paso-tres>
      }
    }
   
    </div> 
    <div class="container-fluid px-2">
     <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" [dePadre]="true"></btn-continuar>
     <ng-alert [CONTENIDO]="alert_message" [CUSTOMECLASS]="'alert-info'"></ng-alert>
    </div>
</div>
