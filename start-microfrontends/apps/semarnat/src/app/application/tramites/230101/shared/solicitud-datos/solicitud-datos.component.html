<div class="row mt-5">
  <div class="col-md-12">
    <div class="panel-group ficha-collapse" id="accordion">
      <div class="panel panel-default">
        <div class="panel-heading" (click)="mostrarColapsable()" 
        (keyup.enter)="mostrarColapsable()" 
        tabindex="0">
          <h4 class="panel-title">
            <a aria-label="Repeat"><i class="bi bi-copy" aria-hidden="true"></i>Opciones de pre-llenado de Solicitud</a>
          </h4>
          <button type="button" class="collpase-button {{(!colapsable) ? 'collapsed' : '' }}" 
          (keydown)="mostrarColapsable()"  
          [disabled]="esFormularioSoloLectura">
         </button>
        </div>
        @if(colapsable){
        <div class="panel-collapse collapse in" id="panel-01">
          <div class="panel-body">
            <ng-alert class="text-center" [CONTENIDO]="TEXTOS.TEXTOS_SOLICITUD"></ng-alert>
            <div class="col-md-12 mr-0">
              <label for="solicitud">Solicitud</label>
            </div>
            <div class="col-md-12">
              <table class="table table-responsive table-striped">
                <thead>
                  <tr>
                    @for (item of tablaHeadData; track $index) {
                    <th>{{ item }}</th>
                    }
                  </tr>
                </thead>
                <tbody>
                  @for (item of tablaFilaDatos; let i = $index; track i) {
                  <tr class="table-row"
                  (click)="enFilahacerClic()">
                    <td>{{ item.fechaCreacion }}</td>
                    <td>{{ item.mercancia }}</td>
                    <td>{{ item.cantidad }}</td>
                    <td>{{ item.proovedor }}</td>
                  </tr>
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
        }
      </div>
    </div>
  </div>
</div>
