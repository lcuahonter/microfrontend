<div class="container">
    <ng-titulo titulo="Certificado a desistir" />
    <form [formGroup]="formDesistimiento">
      <div class="form">
        <div class="row">
          <div class="col-md-12">
            <div class="form-group">
              <label class="form-label" for="folioAnterior">Folio:</label>
              <input class="form-control mb-4" id="folioAnterior" placeholder="" type="text" formControlName="folioAnterior">
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12">
            <div class="form-group my-4">
              <label class="form-label" for="tipoSolicitud">Tipo de solicitud:</label>
              <textarea class="form-control mb-4 ht" rows="6"  name="tipoSolicitud" id="tipoSolicitud"  placeholder="" formControlName="tipoSolicitud">
              </textarea>
            </div>
          </div>
        </div>
        <div class="row">
             <div class="col-md-12">
                <div class="form-group my-4" >
                    <label class="form-label" for="motivoDesistimiento">Motivo de desistimiento<span [ngClass]="{'text-danger': formDesistimiento.get('motivoDesistimiento')?.touched && formDesistimiento.get('motivoDesistimiento')?.errors?.['required']}">*</span>:</label>
                    <textarea 
                      rows="6" 
                      class="mb-4 ht" 
                      [ngStyle]="formDesistimiento.get('motivoDesistimiento')?.touched && formDesistimiento.get('motivoDesistimiento')?.errors?.['required'] ? {'border': '1px solid red'} : {}"
                      name="motivoDesistimiento"
                      id="motivoDesistimiento"
                      placeholder="" 
                      formControlName="motivoDesistimiento"
                      [maxlength]="1000">
                    </textarea>
                    <div *ngIf="formDesistimiento.get('motivoDesistimiento')?.touched && formDesistimiento.get('motivoDesistimiento')?.invalid">
                  <small *ngIf="formDesistimiento.get('motivoDesistimiento')?.errors?.['required']" class="text-danger espaciador-campo-pequeño">Este campo es obligatorio</small>
                </div>
                </div>
            </div>
        </div>
      </div>
    </form>
  </div>
