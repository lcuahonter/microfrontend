<div class="container">
    <div *ngIf="showTableDiv">
        <ng-titulo titulo="Certificados fitosanitarios de importación seleccionados" />
        <div class="datos-table">
            <div class="table-responsive mt-3">
                <ng-table [commonTableHeader]="tablaFitosanitoriosData" [commonTableBody]="tablaFitosanitoriosFilaDatos"></ng-table>
            </div>
        </div>
        <div class="col-md-12 mt-5 d-flex justify-content-end">
            <button type="button" class="btn btn-danger" [disabled]="esFormularioSoloLectura">Eliminar</button>
            <button type="button" class="btn btn-primary ms-3"
                (click)="cambiarCertificadosFitosanitarios()" [disabled]="esFormularioSoloLectura">Agregar</button>
        </div>

        <ng-titulo titulo="Permisos o certificados CITES o autorizaciones de vida silvestre" />
        <div class="datos-table">
            <div class="table-responsive mt-5">
                <ng-table [commonTableHeader]="tablaPermisoCertificadosData" [commonTableBody]="tablaPermisoCertificadosFilaDatos"></ng-table>
            </div>
        </div>

        <div class="col-md-12 mt-5 d-flex justify-content-end">
            <button type="button" class="btn btn-danger" [disabled]="esFormularioSoloLectura">Eliminar</button>
            <button type="button" class="btn btn-primary ms-3"
                (click)="cambiarCertificadosAutorizaciones()" [disabled]="esFormularioSoloLectura">Agregar</button>
        </div>
    </div>
</div>

<app-modal [active]="showFitosanitariosModal">
    <div class="datos-table">
        <ng-titulo titulo="Selección de certificados fitosanitarios de importación" />

        <div class="table-responsive mt-3">
            <ng-table [commonTableHeader]="tablaCertificadosData" [commonTableBody]="tablaCertificadosFilaDatos"></ng-table>
        </div>
        <div class="col-md-12 mt-5 d-flex justify-content-end">
            <button type="button" class="btn btn-default ms-3" id="limpiarDestinatarioBtn" >Cerrar</button>
            <button type="button" class="btn btn-primary ms-3" id="registroDestinatarioBtn" (click)="cambiarCertificadosFitosanitarios()">Agregar</button>
        </div>
    </div>
</app-modal>

<app-modal [active]="showAutorizacionesModal">
    <div class="datos-table"> 
        <ng-titulo titulo="Selección de permisos o certificados CITES o autorizaciones de vida silvestre" />

        <div class="table-responsive mt-5">
            <ng-table [commonTableHeader]="tablaCertificadosData" [commonTableBody]="tablaCertificadosFilaDatos"></ng-table>
        </div>
        <nav aria-label="Page navigation example">
            <ul class="pagination d-flex justify-content-center">
                <li class="page-item"><a class="page-link">1</a></li>
            </ul>
        </nav>
        <div class="col-md-12 mt-5 pb-5 d-flex justify-content-end">
            <button type="button" class="btn btn-default ms-3" id="limpiarDestinatarioBtn">Cerrar</button>
            <button type="button" class="btn btn-primary ms-3" id="registroDestinatarioBtn" (click)="cambiarCertificadosAutorizaciones()">Agregar</button>
        </div>
    </div>
</app-modal>
