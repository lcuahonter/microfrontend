<div class="container">
    <ng-titulo titulo="Tipo de movimiento" />
    <form [formGroup]="tipoMovimientoForm">
        <div class="radio-botons">
            <app-input-radio [radioOptions]="movimientoOpcionDeBotonDeRadio" [layout]="'horizontal'" id="tipoMovimiento" formControlName="tipoMovimiento" name="tipoMovimiento"></app-input-radio>
        </div>

        <ng-titulo titulo="Lugar de inspección" />

        <div class="col-md-4 dropdown-field">
            <div class="form-group">
                <app-catalogo-select [catalogo]="aduanaData" [label]="'Aduana'" [required]="true" for="" name="" id="aduana"
                    formControlName="tipoAduana" (change)="actualizarAduana()" [isDisabled]="esFormularioSoloLectura ? true : false"></app-catalogo-select>
            </div>
        </div>

        <div class="col-md-4 dropdown-field">
            <div class="form-group">
                <app-catalogo-select [catalogo]="inspectoriaData" [label]="'Inspectoría de PROFEPA'" [required]="true" for="" name="" id="aduana"
                    formControlName="tipoInspectoria" (change)="actualizarInspectoria()" [isDisabled]="esFormularioSoloLectura ? true : false"></app-catalogo-select>
            </div>
        </div>

        <div class="col-md-8 mt-3">
            <div class="form-group">
                <app-catalogo-select [catalogo]="municipioData" [label]="'Municipio o alcaldía de la PROFEPA en el estado de'" [required]="true" for="" [tooltipQuestionCircle]="true"
                    name="" id="aduana" formControlName="tipoMunicipio" (change)="actualizarMunicipio()" [isDisabled]="esFormularioSoloLectura ? true : false"></app-catalogo-select>
            </div>
        </div>
    </form>
</div>
