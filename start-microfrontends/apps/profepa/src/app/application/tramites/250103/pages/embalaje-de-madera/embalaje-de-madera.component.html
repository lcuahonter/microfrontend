<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Tarimas y embalaje de madera como soporte de mercancía</h1>
                <div class="mt-5">
                    <ng-alert [CONTENIDO]="TEXTO_MADERA_ALERT"></ng-alert>
                </div>
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
            <app-datos></app-datos>
            }
            @case (2) {
            <app-paso-dos></app-paso-dos>
            }
            @case (3) {
            <app-paso-tres></app-paso-tres>
            }
            }
            <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
            <ng-alert [CONTENIDO]="TEXTOS.inst"></ng-alert>
        </div>
    </div>
</div>
