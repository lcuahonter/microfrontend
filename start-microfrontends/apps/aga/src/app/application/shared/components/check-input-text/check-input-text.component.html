<div [formGroup]="forma">
  <div class="form-group">
    <div [ngClass]="reverse ? 'form-check-custome' : 'form-check'">
      <label class="form-check-label" [for]="idCheckbox">
        {{ label }}
      </label>
      <input
        class="form-check-input"
        type="checkbox"
        title="Checkbox"
        value=""
        [id]="idCheckbox"
        formControlName="checkbox"
        [disabled]="isDisabled"
        (change)="cambioInputTexto()"
      />
    </div>
  </div>

  @if(!hidden) { @if (labelText) {
  <label class="form-check-label" [for]="idInputTexto">
    {{ labelText }}
  </label>
  }
  <input
    type="text"
    class="form-control"
    formControlName="texto"
    name="texto"
    [id]="idInputTexto"
    placeholder=""
    maxlength="{{maxLengthValidacion}}"
    title="Texto"
    (change)="enviarValoresCheckboxInput()"
  />
  }
</div>
