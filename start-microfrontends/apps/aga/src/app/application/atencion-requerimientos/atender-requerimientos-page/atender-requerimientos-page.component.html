<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Atender requerimiento</h1>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row mb-5">
      @switch (indice) { @case (1) {
      <lib-encabezado-requerimiento
        [numFolioTramite]="'02309482934723832'"
        [tipoTramite]="'Registro de solicitud de servicios extraordinarios'"
      ></lib-encabezado-requerimiento>

      <lib-requerimiento-informacion
        [fechaRequerimiento]="'25/02/2025'"
        [justificacionRequerimiento]="'Justificación'"
      ></lib-requerimiento-informacion>

      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>

      <div class="container mb-5">
        <div class="row mt-4">
          <div class="col-md-12">
            <ul class="nav nav-tabs">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page">Solicitud</a>
              </li>
              <li class="nav-item">
                <a class="nav-link">Documentos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link disabled" aria-disabled="true">Dictamen</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" tabindex="-1" aria-disabled="false"
                  >Requerimientos</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link disabled" tabindex="-1" aria-disabled="true"
                  >Opiniones</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" tabindex="-1" aria-disabled="false"
                  >Acuses y resoluciones</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" tabindex="-1" aria-disabled="false"
                  >Tareas del trámite</a
                >
              </li>
            </ul>
          </div>
        </div>
      </div>

      <paso-uno></paso-uno>

      } @case (2) {
      <btn-continuar
        [datos]="datosPasos"
        [btnGuardar]="true"
        (btnGuardarClicked)="guardar($event)"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
      <div class="row mb-5">
        <div class="col-md-12">
          <paso-uno ></paso-uno>
        </div>
      </div>
      } @case (3) {
      <div class="row mb-5">
        <div class="col-md-12">
          <lib-encabezado-requerimiento
            [numFolioTramite]="'02309482934723832'"
            [tipoTramite]="
              'Registro de solicitud de servicios extraordinarios'
            "
          ></lib-encabezado-requerimiento>

          <btn-continuar
            [datos]="datosPasos"
            [btnGuardar]="true"
            (continuarEvento)="getValorIndice($event)"
          ></btn-continuar>
        </div>
      </div>

      } @case (4) {
      <div class="container mb-5">
        <div class="row">
          <div class="col-md-4">
            <firma-electronica
              [tipo]="''"
              (firma)="obtieneFirma($event)"
            ></firma-electronica>
          </div>
        </div>
      </div>
      } }
    </div>
  </div>
</div>
