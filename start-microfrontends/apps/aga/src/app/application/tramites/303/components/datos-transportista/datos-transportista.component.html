<div class="container">
  <ng-titulo titulo="Datos de Transportista" />
  <div class="row">
    <label class="control-label" for="figura">Trasportista: </label>
    <div class="row mt-4">
      <div class="table-responsive">
        <app-tabla-dinamica [tipoSeleccionTabla]="tablaSeleccion.CHECKBOX"
          [configuracionTabla]="encabezadoDeTablaTrasportista" [datos]="personasTrasportistas"
          (listaDeFilaSeleccionada)="trasportistasSeleccionados = $event">>
        </app-tabla-dinamica>
      </div>
    </div>
    <div class="d-flex justify-content-lg-end h1">
      <div class="btn-group">
        <button class="btn btn-default ms-2" type="button" (click)="modificarTransportista()">Modificar</button>
        <button class="btn btn-default ms-2" type="button" (click)="eliminarTransportista()">Eliminar</button>
        <button type="button" class="btn btn-primary ms-2" (click)="agregarTransportista()">
          Agregar
        </button>
      </div>
    </div>
  </div>
</div>
@if (nuevaNotificacion) {
<section>
  <lib-notificaciones [notificacionInput]="nuevaNotificacion">
  </lib-notificaciones>
</section>
}
@if(registrarTrasportistaModal){
<app-registro-trasportista (cerrar)="registrarTrasportistaModal = false">
</app-registro-trasportista>
}
