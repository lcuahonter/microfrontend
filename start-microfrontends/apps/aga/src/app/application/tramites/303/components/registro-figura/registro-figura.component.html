<div [config]="{ show: true, backdrop: 'static' }" (onHidden)="onHidden()" bsModal #modal="bs-modal" class="modal fade"
    tabindex="-1" role="dialog" aria-labelledby="dialog-auto-name">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h4 id="dialog-auto-name" class="modal-title pull-left">
                    {{ titulo }}
                </h4>
            </div>
            <div class="modal-body">
                <form [formGroup]="FormFigura">
                    <div class="row ">
                        <div class="col-md-6">
                            <label for="idNumPatenteModal" class="form-label">Número patente / autorización*:</label>
                            <input type="text" id="idNumPatenteModal" formControlName="idNumPatenteModal"
                                class="form-control font-weight-titulo text-title" />
                            <input class="form-check-input" type="checkbox" id="checkObligFisc"
                                *ngIf="tipoFiguraSeleccionada==='1' || tipoFiguraSeleccionada==='2'">
                            <label class="form-check-label text-muted" for="checkObligFisc"
                                *ngIf="tipoFiguraSeleccionada==='1' || tipoFiguraSeleccionada==='2'">
                                Se encuentran al corriente en el cumplimiento de sus obligaciones fiscales.
                            </label>
                        </div>
                        <div class="col-md-6" *ngIf="tipoFiguraSeleccionada==='1' || tipoFiguraSeleccionada==='2'">
                            <label for="rfcModal" class="form-label text-title">RFC:</label>
                            <input type="text" id="rfcModal" formControlName="rfcModal"
                                class="form-control font-weight-titulo" />
                            <input class="form-check-input" type="checkbox" id="checkAutPantente">
                            <label class="form-check-label text-muted" for="checkAutPantente">
                                La Patente/Autorización se encuentra activa.
                            </label>
                        </div>
                    </div>
                    <div class="row" *ngIf="tipoFiguraSeleccionada==='1' || tipoFiguraSeleccionada==='2'">
                        <div class="d-flex h1">
                            <button class="btn btn-primary ms-2" type="button" (click)="buscarFigura()">Buscar</button>
                        </div>
                    </div>
                    <div class="row ">
                        <div class="col-md-6" *ngIf="tipoFiguraSeleccionada==='1' || tipoFiguraSeleccionada==='2'">
                            <label for="nombreAgente" class="form-label">Nombre(s)*:
                            </label>
                            <input type="text" id="nombreAgente" formControlName="nombreAgente"
                                class="form-control font-weight-titulo text-title" />
                        </div>
                        <div class="col-md-6" *ngIf="tipoFiguraSeleccionada==='3'">
                            <label for="razonSocial" class="form-label">Denominación o razón social*:
                            </label>
                            <input type="text" id="razonSocial" formControlName="razonSocial"
                                class="form-control font-weight-titulo text-title" />
                        </div>
                        <div class="col-md-6" *ngIf="tipoFiguraSeleccionada==='1' || tipoFiguraSeleccionada==='2'">
                            <label for="apellidoPaternoAgente" class="form-label text-title">Primer Apellido*:</label>
                            <input type="text" id="nombreAgente" formControlName="nombreAgente"
                                class="form-control font-weight-titulo" />
                        </div>
                    </div>
                    <div class="row" *ngIf="tipoFiguraSeleccionada==='1' || tipoFiguraSeleccionada==='2'">
                        <div class="col-md-6">
                            <label for="apellidoPaternoAgente" class="form-label">Segundo Apellido*:
                            </label>
                            <input type="text" id="apellidoPaternoAgente" formControlName="apellidoPaternoAgente"
                                class="form-control font-weight-titulo text-title" />
                        </div>
                        <div class="col-md-6">
                            <label for="patente" class="form-label text-title">Número patente / autorización*:</label>
                            <input type="text" id="patente" formControlName="patente"
                                class="form-control font-weight-titulo" />
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer center">
                <button class="btn btn-primary ms-2" type="button" (click)="limpiarFigura()">Limpiar</button>
                <button type="button" class="btn btn-default ms-2" (click)="cancelarFigura()">Cancelar</button>
                <button class="btn btn-primary ms-2" type="button" (click)="agregarFigura()">Agregar</button>
            </div>
        </div>
    </div>
</div>
