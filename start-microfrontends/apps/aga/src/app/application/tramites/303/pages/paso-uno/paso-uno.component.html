<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)">Despacho de mercancías</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)">Terceros relacionados</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)">Pago de derechos</a>
      </li>
    </ul>

    <ng-container>
      @switch (indice) {
      @case (1) {
      <solicitante></solicitante>
      }
      @case (2) {
      <despacho-mercancias-solicitud></despacho-mercancias-solicitud>
      }
      @case (3) {
      <terceros-relacionados></terceros-relacionados>
      }
      @case (4) {
      <pago-derechos></pago-derechos>
        }
      }
    </ng-container>
  </div>
</div>
