<div class="container mt-5">
  <div class="row">
    <div class="col-md-6">
      <h4>Solicitud de Renovación de Certificación en Materia de IVA e IEPS</h4>
    </div>
    <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
  </div>

  <div class="row"> 
    @switch (indice) { 
      @case (1) { 
        <app-datos #datosRef></app-datos> 
      } 
      @case (2) { 
        <app-paso-dos></app-paso-dos> 
      } 
      @case (3) { 
        <app-paso-tres></app-paso-tres> 
      } 
    } 
  </div>
  
  <btn-continuar 
    [datos]="datosPasos" 
    (continuarEvento)="getValorIndice($event)"
  ></btn-continuar>

  <!-- Modalidad de notificación de error -->
  @if(btnContinuar){
  <lib-notificaciones 
   [notificacionInput]="nuevaNotificacion"
    (confirmacionModal)="btnContinuar = false"
    ></lib-notificaciones>
  }
  
</div>
