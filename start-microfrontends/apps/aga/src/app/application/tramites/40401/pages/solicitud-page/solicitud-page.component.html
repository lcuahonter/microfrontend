<div class="page">
  <div class="container">

    <!-- TÍTULO -->
    <div class="row align-items-center mb-3">
      <div class="col-md-6">
        <h3>Registro del código alfanumérico armonizado del transportista</h3>
      </div>
    </div>

    <!-- ZONA DE NOTIFICACIONES BACKEND (Estilo unificado con alerta de registro) -->
    <!-- Ahora usa el mismo diseño de alerta roja centrada -->
    <div class="row" *ngIf="nuevaNotificacion && nuevaNotificacion.mensaje">
        <div class="col-md-12 mt-3">
            <div
              class="alert alert-danger mx-auto text-center"
              role="alert"
              [innerHTML]="nuevaNotificacion.mensaje">
            </div>
        </div>
    </div>

    <!-- ALERTA DE REGISTRO FRONTEND (Validación de campos vacíos) -->
    <div class="row" *ngIf="nombre">
        <div class="col-md-12 mt-3">
            <div
              class="alert alert-danger mx-auto text-center"
              role="alert"
              [innerHTML]="alertaRegistro">
            </div>
        </div>
    </div>


    <div class="row">
      <div class="col-md-12 mt-3">
        <app-wizard [listaPasos]="pasos"></app-wizard>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-md-12">
        @switch (indice) {
          @case (1) {
            <paso-uno></paso-uno>
          }
          @case (2) {
          <paso-firma [idSolicitud]="store.getValue().idSolicitud" [procedure]=40401 [procedureUrl]="'solicitud'"></paso-firma>
          }
        }
      </div>
    </div>

    <div class="row mt-4 mb-5">
      <div class="col-md-12">
        <btn-continuar
          [datos]="datosPasos"
          (continuarEvento)="getValorIndice($event)">
        </btn-continuar>
      </div>
    </div>

  </div>
</div>
