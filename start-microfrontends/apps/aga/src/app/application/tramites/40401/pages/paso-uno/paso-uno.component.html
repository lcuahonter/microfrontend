<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Datos del Trámite</a>
      </li>
    </ul>
    <ng-container>
    @switch (indice) {
      @case (1) {
      <solicitante [tabindex]="1"></solicitante>
      }
      @case (2) {
        @if(esDatosRespuesta){
      <datos-del-tramite [tabindex]="2"></datos-del-tramite>
        }
      }
    }
    </ng-container>
</div>
