<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" tabindex="0" data-toggle="tab" >Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" tabindex="0" data-toggle="tab" >Aviso de cambio de C U R P</a>
        </li>
      </ul>
  
      <ng-container>
        @switch (indice) {
        @case (1) {
          <solicitante #Solicitante></solicitante>
        }
        @case (2) {
          @if(esDatosRespuesta){
            <app-aviso-de-cambio></app-aviso-de-cambio>
          }
        }  
        }
      </ng-container>
    </div>
</div>
