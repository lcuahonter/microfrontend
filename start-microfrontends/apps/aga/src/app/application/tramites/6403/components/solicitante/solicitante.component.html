<div class="container">
  <form [formGroup]="solicitudForm">
    <ng-titulo titulo="Datos generales del solicitante" />
    <div class="row">
      <div class="col-md-4">
        <label class="form-label" for="rfc">RFC:<span class="bi bi-question-circle-fill fs-4 m-1" title="Title"
            ata-bs-toggle="tooltip"></span>
        </label>
        <input type="text" class="form-control" id="rfc" formControlName="rfc" readonly>
      </div>

      <div class="col-md-8">
        <label class="form-label" for="denominacion">Denominación o razón social:</label>
        <input type="text" class="form-control" id="denominacion" formControlName="denominacion" readonly>
      </div>

      <div class="col-md-12">
        <label class="form-label" for="actividad-economica">Actividad económica preponderante:</label>
        <input type="text" class="form-control" id="actividad-economica" formControlName="actividadEconomica" readonly>
      </div>

      <div class="col-md-4">
        <label class="form-label" for="correo-electronico">Correo electrónico:</label>
        <input type="text" class="form-control" id="correo-electronico" formControlName="correoElectronico" readonly>
      </div>
    </div>
    <div class="mt-3">
      <ng-titulo titulo="Domicilio fiscal del solicitante" />
    </div>
    <div class="row">
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label" for="pais">País:</label>
          <input type="text" class="form-control" id="pais" formControlName="pais" readonly>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group"><label class="form-label" for="codigoPostal">Código Postal:</label>
          <input type="text" class="form-control" id="codigoPostal" formControlName="codigoPostal" readonly>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group"><label class="form-label" for="entidadFederativa">Estado:</label>
          <input type="text" class="form-control" id="entidadFederativa" formControlName="entidadFederativa" readonly>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group"><label class="form-label" for="municipio">Municipio o alcaldía:</label>
          <input class="form-control" type="text" formControlName="municipio" id="municipio" readonly>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group"><label class="form-label" for="localidad">Localidad:</label>
          <input class="form-control" type="text" formControlName="localidad" id="localidad" readonly>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group"><label class="form-label" for="colonia">Colonia:</label>
          <input class="form-control" type="text" formControlName="colonia" id="colonia" readonly>
        </div>
      </div>
      <div ng-reflect-ng-class="col-md-8" class="col-md-8">
        <div class="form-group"><label class="form-label" for="calle">Calle:</label>
          <input class="form-control" type="text" formControlName="calle" id="calle" readonly>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group"><label class="form-label" for="nExt">Número exterior:</label>
          <input class="form-control" type="text" formControlName="nExt" id="nExt" readonly>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group"><label class="form-label" for="nInt">Número interior:</label>
          <input class="form-control" type="text" formControlName="nInt" id="nInt" readonly>
        </div>
      </div>
      <div class="col-md-1">
        <div class="form-group"><label class="form-label" for="lada">Lada:</label>
          <input class="form-control" type="text" formControlName="lada" id="lada" readonly>
        </div>
      </div>
      <div class="col-md-3">
        <div class="form-group">
          <label class="form-label" for="telefono">Teléfono:</label>
          <input class="form-control" type="text" formControlName="telefono" id="telefono" readonly>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-3">
        <div class="form-group">
          <label class="form-label" for="adace">ADACE:</label>
          <input class="form-control" type="text" formControlName="adace" id="adace" readonly>
        </div>
      </div>
    </div>
  </form>
</div>
