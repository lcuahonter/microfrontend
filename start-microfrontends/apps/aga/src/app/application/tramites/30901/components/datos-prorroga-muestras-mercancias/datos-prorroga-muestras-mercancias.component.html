<div class="row">
  <form [formGroup]="formDatosProrroga">
    <div class="col-md-12">
      <span class="form-label font-size" for="vigenciaActual">
         {{ vigenciaActualLabel }}</span
      >
    </div>
    <div class="col-md-12">
      <label class="form-label" for="vigenciaActualTexto">{{
        vigenciaActualTextoLabel
      }}</label>
    </div>
    <div class="col-md-8">
      <input-fecha
        class="width"
        [setFecha]="formDatosProrroga.get('fechaInicioVigencia')?.value"
        [datos]="configuracionFechaFinVigencia"
        [icono]="false"
        [isDisabled]="esFormularioSoloLectura"
        (valorCambiado)="onFechaFinVigenciaChange($event)"
      ></input-fecha>
    </div>
    <div class="col-md-4">
      <input-fecha
        [setFecha]="formDatosProrroga.get('fechaFinVigencia')?.value"
        [datos]="configuracionFechaInicioVigencia"
        [icono]="false"
        [isDisabled]="esFormularioSoloLectura"
        (valorCambiado)="onFechaInicioChange($event)"
      ></input-fecha>
    </div>
  </form>
</div>
