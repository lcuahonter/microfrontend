<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="1"
          role="button"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="2"
          role="button"
          >Registro para la toma de muestras de mercancías</a
        >
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(3)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="3"
          role="button"
          >Vigencia de la Autorización</a
        >
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(4)"
          (keydown.enter)="seleccionaTab(4)"
          (keydown.space)="seleccionaTab(4)"
          tabindex="4"
          role="button"
          >Pago de derechos</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
        <solicitante></solicitante>
      } @case (2) { 
        @if(esDatosRespuesta){
        <app-registro-renovaciones-muestras-mercancias></app-registro-renovaciones-muestras-mercancias>
        }
      } @case (3) { 
        @if(esDatosRespuesta){
        <app-datos-prorroga-muestras-mercancias></app-datos-prorroga-muestras-mercancias>
        }
      } @case (4) { 
        @if(esDatosRespuesta){
        <app-pago-linea-de-captura></app-pago-linea-de-captura>
        }
      } 
    }
    </ng-container>
  </div>
</div>
