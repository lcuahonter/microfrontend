<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Vigencia de la Autorización</h1>
      </div>
      <div class="col-md-6"></div>
      <div class="col-md-12 mt-2 mb-2">
        @if(!esValido) {
        <ng-alert
          [CUSTOMECLASS]="'alert-danger'"
          class="text-center"
          [CONTENIDO]="mensajeError"
        ></ng-alert>
        }
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno #pasoUno></app-paso-uno>
      } @case (2) {
      <app-paso-dos></app-paso-dos>
      } @case (3) {
      <app-paso-tres></app-paso-tres>
      } }
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
    </div>
  </div>
</div>
