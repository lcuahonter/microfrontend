<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h3>Aviso de introduccion de mercancia donada a la franja fronteriza del pais (Regla 3.3.6., Apartado B)</h3>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      <!-- Muestra el componente correspondiente según el valor de `indice`. @switch: Directiva que permite cambiar entre diferentes componentes. @case: Caso específico que se muestra cuando `indice` tiene un valor determinado. --> 
       @switch (indice) { 
        @case (1) { 
          <paso-uno></paso-uno> 
        } @case (2) { 
          <app-paso-dos></app-paso-dos> 
        } 
        @case (3) { 
          <app-paso-tres></app-paso-tres> 
        } 
      }
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>

    </div>
  </div>
</div>
