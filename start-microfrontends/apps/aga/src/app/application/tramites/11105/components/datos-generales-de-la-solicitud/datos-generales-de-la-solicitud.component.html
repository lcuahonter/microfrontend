<div class="container">
  <form [formGroup]="tramiteForm" (ngSubmit)="validarDestinatarioFormulario()" class="row mt-5">
    <div class="col-md-12">
      <ng-container>
        <div class="alert alert-info">
          <label style="font-weight: normal">
            <input type="checkbox" formControlName="manifesto" id="manifesto" (change)="setValoresStore(tramiteForm, 'manifesto', 'setManifesto')"/>
            Manifiesto bajo protesta de decir verdad que el donante de la mercancía es extranjero.
          </label>
        </div>
        <div class="row mt-5">
          <div class="col-md-8">
            <app-catalogo-select [catalogo]="aduana.catalogos" [label]="aduana.labelNombre"
              id="aduana" formControlName="aduana"
              [isDisabled]="true" (change)="setValoresStore(tramiteForm, 'aduana', 'setAduana')">
            </app-catalogo-select>
          </div>
          <div class="col-md-1"></div>
          <div class="col-md-3 input-check">
            <lib-input-check
              [id]="'organismoPublico'"
              [label]="'Organismo público'"
              [required]="false"
              formControlName="organismoPublico"
              (change)="setValoresStore(tramiteForm, 'organismoPublico', 'setOrganismoPublico')"
            ></lib-input-check>
          </div>
        </div>

        <ng-titulo titulo="Mercancías" />
        <div class="row mt-5">
          <div class="col-md-8">
            <app-catalogo-select [catalogo]="propositoDeLaMercancia.catalogos"
              [label]="propositoDeLaMercancia.labelNombre" id="tipoMercancia" formControlName="tipoMercancia" [isDisabled]="true" (change)="setValoresStore(tramiteForm, 'tipoMercancia', 'setTipoMercancia')">
            </app-catalogo-select>
          </div>
        </div>
      </ng-container>
      <div class="row">
        <ng-titulo titulo="Mercancías" />
        <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX" [configuracionTabla]="configuracionTabla"
          [datos]="configuracionTablaDatos"></app-tabla-dinamica>
      </div>
      <div class="col-md-12 mt-5 d-flex justify-content-end">
        <button type="button" class="btn btn-primary ms-3" (click)="nextTabla()">
          Consultar
        </button>
      </div>

      <ng-titulo titulo="Datos del donante extranjero" />
      <ng-container>
        <div class="row">
          <div class="col-md-8">
            <label>Nombre(s):</label>
            <input type="text" class="form-control" id="nombre" formControlName="nombre"/>
          </div>
          <div class="col-md-1"></div>
          <div class="col-md-3 input-check">
            <lib-input-check
              [id]="'personaFisica'"
              [label]="'Persona física'"
              [required]="false"
              [isDisabled]="true"
              formControlName="personaFisica"
              (change)="setValoresStore(tramiteForm, 'personaFisica', 'setPersonaFisica')"
            ></lib-input-check>
          </div>
        </div>
        <div class="row mt-3">
          <div class="col-md-4">
            <label>Código postal:</label>
            <input type="text" class="form-control" id="codigoPostal" formControlName="codigoPostal"/>
          </div>
          <div class="col-md-4">
            <app-catalogo-select [catalogo]="pais"
              [label]="'País'" id="pais" formControlName="pais" [isDisabled]="true">
            </app-catalogo-select>
          </div>
          <div class="col-md-4">
            <label>Estado:</label>
            <input type="text" class="form-control" id="estado" formControlName="estado"/>
          </div>
        </div>
        <div class="row mt-3">
          <div class="col-md-4">
            <label>Calle:</label>
            <input type="text" class="form-control" maxlength="100" id="calle" formControlName="calle" [ngClass]="isValid(tramiteForm, 'calle') ? 'required' : ''" (change)="setValoresStore(tramiteForm, 'calle', 'setCalle')"/>
          </div>
          <div class="col-md-4">
            <label>Número exterior:</label>
            <input type="text" class="form-control" id="numeroExterior" formControlName="numeroExterior"/>
          </div>
          <div class="col-md-4">
            <label>Número interior:</label>
            <input type="text" class="form-control" id="numeroInterior" formControlName="numeroInterior"/>
          </div>
        </div>
        <div class="row mt-3">
          <div class="col-md-4">
            <label>Colonia:</label>
            <input type="text" class="form-control" id="colonia" formControlName="colonia"/>
          </div>
          <div class="col-md-4">
            <label>Correo electrónico:</label>
            <input type="text" class="form-control" id="correoElectronico" formControlName="correoElectronico"/>
          </div>
          <div class="col-md-4">
            <label>Teléfono:</label>
            <input type="text" class="form-control" id="telefono" formControlName="telefono"/>
          </div>
        </div>

        <div class="row mt-5">
          <label required="true">Señale si la mercancía formará parte del patrimonio de su representada</label>
          <app-input-radio [radioOptions]="radioOpcions" [selectedValue]="valorSeleccionado"
            (valueChange)="cambiarRadio($event)" id="opcion" formControlName="opcion" (change)="setValoresStore(tramiteForm, 'opcion', 'setOpcion')">
          </app-input-radio>
        </div>

        <div class="row" style="margin-top: 30px; margin-bottom: 30px">
          <div class="form-group">
            <div class="col-md-12">
              <div class="pull-left text-muted text-vertical-align-button"></div>
              <div class="pull-right row">
                <div class="col-md-5" id="botonGuardar">
                  <button type="submit" class="btn btn-primary" (click)="continuar()">
                    Continuar
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </form>
</div>
