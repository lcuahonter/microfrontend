<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          role="button"
          tabindex="1"
          >Solicitante</a
        >
      </li>

      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          role="button"
          tabindex="2"
          >Datos generales de la solicitud</a
        >
      </li>

      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(3)"
          (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)"
          role="button"
          tabindex="3"
          >Desistimiento</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante (continuarEvento)="continuar()"></solicitante>
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
      } @case (2) 
      {@if(esDatosRespuesta)
        {
      <app-datos-generales-de-la-solicitud (continuarEvento)="continuar()"
      ></app-datos-generales-de-la-solicitud>
        }
      } @case (3) {
        @if(esDatosRespuesta)
        {
      <app-desistimiento (continuarEvento)="continuar()"> </app-desistimiento>
      }
       } }
    </ng-container>
  </div>
</div>
