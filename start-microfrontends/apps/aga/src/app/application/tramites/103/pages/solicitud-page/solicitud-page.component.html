<div class="page">
  <div class="container">
    <div class="row mt-5">
      <div class="col-md-12">
        <h2 *ngIf="indice === 1">Exención de Impuestos - Territorio Nacional</h2>
        <h2 *ngIf="indice === 2">Cargar archivos</h2>
        <ng-alert *ngIf="indice === 2" [CONTENIDO]="TEXTO_DE_ALERTA"></ng-alert>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { 
        @case (1) {
          <paso-uno></paso-uno>
        }
        @case (2) {
          <paso-dos></paso-dos>
        } 
        @case (3) {
          <paso-tres></paso-tres>
        }
      }

      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>
  </div>
</div>
