<div class="container" id="divTabIngreso">
    <div class="container">
      <div class="row mt-4">
        <ul class="nav nav-tabs">
          <li [ngClass]="indice === 1 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" role="button" tabindex="1">Persona física</a>
          </li>
          <li [ngClass]="indice === 2 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Persona moral</a>
          </li>
        </ul>
        <ng-container class="row mt-5"> @switch (indice) { @case (1) { <app-persona-fisica [tabindex]="1"></app-persona-fisica> } @case (2) { <app-persona-moral [tabindex]="2"></app-persona-moral> } } </ng-container>
      </div>
    </div>
  </div>
