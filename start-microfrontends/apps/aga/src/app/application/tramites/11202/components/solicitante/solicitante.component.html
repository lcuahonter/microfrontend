<div class="container">
    <form [formGroup]="solicitudForm">
      <ng-titulo titulo="Datos generales del solicitante" />
      <ng-container formGroupName="datosGenerales">
        <div class="row">
          <div class="col-md-4">
            <label class="form-label" for="rfc">RFC: <span class="bi bi-question-circle-fill fs-4 m-1" title="Title" ata-bs-toggle="tooltip"></span>
            </label>
            <input type="text" class="form-control" id="rfc" formControlName="rfc" readonly (change)="setValoresStore(datosGenerales,'rfc', 'setRfc')">
          </div>
          <div class="col-md-8">
            <label class="form-label" for="denominacion">Denominación o razón social:</label>
            <input type="text" class="form-control" id="denominacion" formControlName="denominacion" readonly (change)="setValoresStore(datosGenerales,'denominacion', 'setDenominacion')">
          </div>
          <div class="col-md-12">
            <label class="form-label" for="actividad-economica">Actividad económica preponderante:</label>
            <input type="text" class="form-control" id="actividad-economica" formControlName="actividadEconomica" readonly (change)="setValoresStore(datosGenerales,'actividadEconomica', 'setActividadEconomica')">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="correo-electronico">Correo electrónico:</label>
            <input type="text" class="form-control" id="correo-electronico" formControlName="correoElectronico" readonly (change)="setValoresStore(datosGenerales,'correoElectronico', 'setCorreoElectronico')">
          </div>
        </div>
      </ng-container>
      <ng-titulo titulo="Domicilio fiscal del solicitante" />
      <ng-container formGroupName="domicilioFiscal">
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label" for="pais">País:</label>
            <input type="text" class="form-control" id="pais" formControlName="pais" (change)="setValoresStore(domicilioFiscal,'pais', 'setPais')">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="codigoPostal">Código postal:</label>
            <input type="number" class="form-control" id="codigoPostal" formControlName="codigoPostal" (change)="setValoresStore(domicilioFiscal,'codigoPostal', 'setCodigoPostal')">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="estado">Estado:</label>
            <input type="text" class="form-control" id="estado" formControlName="estado" (change)="setValoresStore(domicilioFiscal,'estado', 'setEstado')">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label" for="municipioAlcaldia">Municipio o alcaldía:</label>
            <input type="text" class="form-control" id="municipioAlcaldia" formControlName="municipioAlcaldia" (change)="setValoresStore(domicilioFiscal,'municipioAlcaldia', 'setMunicipioAlcaldia')">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="localidad">Localidad:</label>
            <input type="text" class="form-control" id="localidad" formControlName="localidad" (change)="setValoresStore(domicilioFiscal,'localidad', 'setLocalidad')">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="colonia">Colonia:</label>
            <input type="text" class="form-control" id="colonia" formControlName="colonia" (change)="setValoresStore(domicilioFiscal,'colonia', 'setColonia')">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-8">
            <label class="form-label" for="calle">Calle:</label>
            <input type="text" class="form-control" id="calle" formControlName="calle" (change)="setValoresStore(domicilioFiscal,'calle', 'setCalle')">
          </div>
          <div class="col-md-4">
            <label class="form-label" for="numeroExterior">Número exterior:</label>
            <input type="text" class="form-control" id="numeroExterior" formControlName="numeroExterior" (change)="setValoresStore(domicilioFiscal,'numeroExterior', 'setNumeroExterior')">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label" for="numeroInterior">Número interior:</label>
            <input type="text" class="form-control" id="numeroInterior" formControlName="numeroInterior" (change)="setValoresStore(domicilioFiscal,'numeroInterior', 'setnumeroInterior')">
          </div>
          <div class="col-md-1">
            <label class="form-label" for="lada">Lada:</label>
            <input type="text" class="form-control" id="lada" formControlName="lada" (change)="setValoresStore(domicilioFiscal,'lada', 'setLada')">
          </div>
          <div class="col-md-3">
            <label class="form-label" for="telefono">Teléfono:</label>
            <input type="text" class="form-control" id="telefono" formControlName="telefono" (change)="setValoresStore(domicilioFiscal,'telefono', 'setTelefono')">
          </div>
        </div>
      </ng-container>
    </form>
  </div>
