<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h3>Cancelación donaciones</h3>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <paso-uno (continuarEvento)="continuar()"></paso-uno>
      } @case (2) {
      <paso-tres></paso-tres>
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
      } }
    </div>
  </div>
</div>
