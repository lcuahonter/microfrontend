<div class="container">
  <form
    [formGroup]="solicitudForm"
    (ngSubmit)="validarDestinatarioFormulario()"
    class="row mt-5"
  >
    <ng-titulo titulo="Cancelación donaciones" />
    <div class="col-md-12">
      <ng-container>
        <label>Datos requeridos*:</label>
        <div class="alert alert-info">
          <div class="form-check">
            <input
              type="checkbox"
              class="form-check-input"
              formControlName="laAutorizacionEsNula"
              id="laAutorizacionEsNula"
              [disabled]="esFormularioSoloLectura"
              (change)="setValoresStore('laAutorizacionEsNula')"
            />
            <label class="form-check-label" for="laAutorizacionEsNula" style="font-weight: normal">
              *Para así convenir a mis intereses solicito se deje sin efectos la
              autorización
            </label>
          </div>
        </div>
        <div class="row" style="margin-top: 30px; margin-bottom: 30px">
          <div class="form-group">
            <div class="col-md-12">
              <div
                class="pull-left text-muted text-vertical-align-button"
              ></div>
              <div class="pull-right row">
                <div class="col-md-5" id="botonGuardar">
                  <button
                    type="submit"
                    class="btn btn-primary"
                    (click)="continuar()"
                  >
                    Continuar
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
    </div>
  </form>
</div>
