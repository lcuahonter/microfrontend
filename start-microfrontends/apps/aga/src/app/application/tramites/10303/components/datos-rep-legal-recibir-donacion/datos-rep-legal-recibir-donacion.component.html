<div [formGroup]="datosRepLegalRecibirDonacionForm">
    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="rfc">R.F.C.*: 
            <span class="bi bi-question-circle-fill" title="Registro Federal de Contribuyentes"
                data-bs-toggle="tooltip"></span></label>
            <input type="text" class="form-control" id="rfcRepLegalAutorizado" name="rfc" maxlength="13"
                (blur)="buscarContribuyenteRfc(3, 'rfcRepLegalAutorizado')" formControlName="rfcRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'rfcRepLegalAutorizado', 'setRfcRepLegalAutorizado')">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="nombreRepLegalAutorizado">Nombre: </label>
            <input type="text" class="form-control" id="nombreRepLegalAutorizado" name="nombre"
                formControlName="nombreRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'nombreRepLegalAutorizado', 'setNombreRepLegalAutorizado')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="calleRepLegalAutorizado">Calle: </label>
            <input type="text" class="form-control" id="calleRepLegalAutorizado" name="alle"
                formControlName="calleRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'calleRepLegalAutorizado', 'setCalleRepLegalAutorizado')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numExteriorRepLegalAutorizado">Número exterior: </label>
            <input type="text" class="form-control" id="numExteriorRepLegalAutorizado" name="numeroExterior"
                formControlName="numExteriorRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'numExteriorRepLegalAutorizado', 'setNumExteriorRepLegalAutorizado')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numInteriorRepLegalAutorizado">Número interior: </label>
            <input type="text" class="form-control" id="numInteriorRepLegalAutorizado" name="numeroInterior"
                formControlName="numInteriorRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'numInteriorRepLegalAutorizado', 'setNumInteriorRepLegalAutorizado')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="pais" [label]="'País'" [isDisabled]="formularioDeshabilitado" name="pais"
                formControlName="cvePaisRepLegalAutorizado" (change)="paisSeleccion()"></app-catalogo-select>
        </div>
        <div class="col-md-4">
            <label class="form-label" for="codigoPostal">Código postal: </label>
            <input type="text" class="form-control" id="codigoPostalRepLegalAutorizado" name="codigoPostal"
                formControlName="codigoPostalRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'codigoPostalRepLegalAutorizado', 'setCodigoPostalRepLegalAutorizado')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="informacionExtra" name="estado">Estado: </label>
            <input type="text" class="form-control" id="estadoRepLegalAutorizado" name="informacionExtra"
                formControlName="estadoRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'estadoRepLegalAutorizado', 'setEstadoRepLegalAutorizado')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="colonia">Colonia: </label>
            <input type="text" class="form-control" id="coloniaRepLegalAutorizado" name="colonia"
                formControlName="coloniaRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'coloniaRepLegalAutorizado', 'setColoniaRepLegalAutorizado')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="correoElectronico">Correo electrónico: </label>
            <input type="text" class="form-control" id="correoElectronicoRepLegalAutorizado" name="correoElectronico"
                formControlName="correoElectronicoRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'correoElectronicoRepLegalAutorizado', 'setCorreoElectronicoRepLegalAutorizado')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="telefono">Teléfono: </label>
            <input type="text" class="form-control" id="telefonoRepLegalAutorizado" name="telefono"
                formControlName="telefonoRepLegalAutorizado"
                (change)="setValoresStore(datosRepLegalRecibirDonacionForm,'telefonoRepLegalAutorizado', 'setTelefonoRepLegalAutorizado')">
        </div>
    </div>
</div>
