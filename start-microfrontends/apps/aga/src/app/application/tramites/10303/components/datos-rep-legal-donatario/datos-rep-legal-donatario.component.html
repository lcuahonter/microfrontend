<div [formGroup]="datosRepLegalDonatarioForm">
    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="rfcRepLegalDonatario">R.F.C.*: 
            <span class="bi bi-question-circle-fill" title="Registro Federal de Contribuyentes"
                data-bs-toggle="tooltip"></span></label>
            <input type="text" class="form-control" id="rfcRepLegalDonatario" name="rfc" maxlength="13"
                (blur)="buscarContribuyenteRfc(2, 'rfcRepLegalDonatario')" formControlName="rfcRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'rfcRepLegalDonatario', 'setRfcRepLegalDonatario')">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="nombreRepLegalDonatario">Nombre: </label>
            <input type="text" class="form-control" id="nombreRepLegalDonatario" name="nombre"
                formControlName="nombreRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'nombreRepLegalDonatario', 'setNombreRepLegalDonatario')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="calleRepLegalDonatario">Calle: </label>
            <input type="text" class="form-control" id="calleRepLegalDonatario" name="alle"
                formControlName="calleRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'calleRepLegalDonatario', 'setCalleRepLegalDonatario')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numExteriorRepLegalDonatario">Número exterior: </label>
            <input type="text" class="form-control" id="numExteriorRepLegalDonatario" name="numeroExterior"
                formControlName="numExteriorRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'numExteriorRepLegalDonatario', 'setNumExteriorRepLegalDonatario')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numInteriorRepLegalDonatario">Número interior: </label>
            <input type="text" class="form-control" id="numInteriorRepLegalDonatario" name="numeroInterior"
                formControlName="numInteriorRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'numInteriorRepLegalDonatario', 'setNumInteriorRepLegalDonatario')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="pais" [label]="'País'" [isDisabled]="formularioDeshabilitado" name="pais"
                formControlName="cvePaisRepLegalDonatario" (change)="paisSeleccion()"></app-catalogo-select>
        </div>
        <div class="col-md-4">
            <label class="form-label" for="codigoPostal">Código postal: </label>
            <input type="text" class="form-control" id="codigoPostalRepLegalDonatario" name="codigoPostal"
                formControlName="codigoPostalRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'codigoPostalRepLegalDonatario', 'setCodigoPostalRepLegalDonatario')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="informacionExtra" name="estado">Estado: </label>
            <input type="text" class="form-control" id="estadoRepLegalDonatario" name="informacionExtra"
                formControlName="estadoRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'estadoRepLegalDonatario', 'setEstadoRepLegalDonatario')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="colonia">Colonia: </label>
            <input type="text" class="form-control" id="coloniaRepLegalDonatario" name="colonia"
                formControlName="coloniaRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'coloniaRepLegalDonatario', 'setColoniaRepLegalDonatario')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="correoElectronico">Correo electrónico: </label>
            <input type="text" class="form-control" id="correoElectronicoRepLegalDonatario" name="correoElectronico"
                formControlName="correoElectronicoRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'correoElectronicoRepLegalDonatario', 'setCorreoElectronicoRepLegalDonatario')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="telefono">Teléfono: </label>
            <input type="text" class="form-control" id="telefonoRepLegalDonatario" name="telefono"
                formControlName="telefonoRepLegalDonatario"
                (change)="setValoresStore(datosRepLegalDonatarioForm,'telefonoRepLegalDonatario', 'setTelefonoRepLegalDonatario')">
        </div>
    </div>
</div>
