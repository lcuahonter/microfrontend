<div [formGroup]="datosDelFabricanteForm">
    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="rfcFabricante">R.F.C.*: 
            <span class="bi bi-question-circle-fill" title="Registro Federal de Contribuyentes"
                data-bs-toggle="tooltip"></span></label>
            <input type="text" class="form-control" id="rfcFabricante" name="rfc" maxlength="13"
                formControlName="rfcFabricante" (blur)="buscarContribuyenteRfc(6, 'rfcFabricante')"
                (change)="setValoresStore(datosDelFabricanteForm,'rfcFabricante', 'setRfcFabricante')">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="razonSocial">Nombre: </label>
            <input type="text" class="form-control" id="nombreFabricante" name="razonSocial"
                formControlName="nombreFabricante"
                (change)="setValoresStore(datosDelFabricanteForm,'nombreFabricante', 'setNombreFabricante')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="calleFabricante">Calle: </label>
            <input type="text" class="form-control" id="calleFabricante" name="calleFabricante"
                formControlName="calleFabricante"
                (change)="setValoresStore(datosDelFabricanteForm,'calleFabricante', 'setCalleFabricante')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numExteriorFabricante">Número exterior: </label>
            <input type="text" class="form-control" id="numExteriorFabricante" name="numExteriorFabricante"
                formControlName="numExteriorFabricante"
                (change)="setValoresStore(datosDelFabricanteForm,'numExteriorFabricante', 'setNumExteriorFabricante')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numInteriorFabricante">Número interior: </label>
            <input type="text" class="form-control" id="numInteriorFabricante" name="numInteriorFabricante"
                formControlName="numInteriorFabricante"
                (change)="setValoresStore(datosDelFabricanteForm,'numInteriorFabricante', 'setNumInteriorFabricante')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="pais" [label]="'País'" [isDisabled]="formularioDeshabilitado" name="pais"
                formControlName="cvePaisFabricante" (change)="paisSeleccion()"></app-catalogo-select>
        </div>
        <div class="col-md-4">
            <label class="form-label" for="codigoPostal">Código postal: </label>
            <input type="text" class="form-control" id="codigoPostalFabricante" name="codigoPostal"
                formControlName="codigoPostalFabricante"
                (change)="setValoresStore(datosDelFabricanteForm,'codigoPostalFabricante', 'setCodigoPostalFabricante')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="estadoFabricante">Estado: </label>
            <input type="text" class="form-control" id="estadoFabricante" name="estadoFabricante"
                formControlName="estadoFabricante"
                (change)="setValoresStore(datosDelFabricanteForm,'estadoFabricante', 'setEstadoFabricante')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="colonia">Colonia: </label>
            <input type="text" class="form-control" id="coloniaFabricante" name="colonia"
                formControlName="coloniaFabricante"
                (change)="setValoresStore(datosDelFabricanteForm,'coloniaFabricante', 'setColoniaFabricante')">
        </div>
    </div>
</div>
