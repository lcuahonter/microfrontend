<div [formGroup]="datosPersonaOirRecibirForm">
    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="rfcPersonaAutorizada">R.F.C.*: 
            <span class="bi bi-question-circle-fill" title="Registro Federal de Contribuyentes"
                data-bs-toggle="tooltip"></span></label>
            <input type="text" class="form-control" id="rfcPersonaAutorizada" name="rfc" maxlength="13"
                (blur)="buscarContribuyenteRfc(4, 'rfcPersonaAutorizada')" formControlName="rfcPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'rfcPersonaAutorizada', 'setRfcPersonaAutorizada')">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="nombrePersonaAutorizada">Nombre: </label>
            <input type="text" class="form-control" id="nombrePersonaAutorizada" name="nombre"
                formControlName="nombrePersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'nombrePersonaAutorizada', 'setNombrePersonaAutorizada')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="callePersonaAutorizada">Calle: </label>
            <input type="text" class="form-control" id="callePersonaAutorizada" name="calle"
                formControlName="callePersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'callePersonaAutorizada', 'setCallePersonaAutorizada')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numExteriorPersonaAutorizada">Número exterior: </label>
            <input type="text" class="form-control" id="numExteriorPersonaAutorizada" name="numeroExterior"
                formControlName="numExteriorPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'numExteriorPersonaAutorizada', 'setNumExteriorPersonaAutorizada')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="numInteriorPersonaAutorizada">Número interior: </label>
            <input type="text" class="form-control" id="numInteriorPersonaAutorizada" name="numeroInterior"
                formControlName="numInteriorPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'numInteriorPersonaAutorizada', 'setNumInteriorPersonaAutorizada')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="pais" [label]="'País'" [isDisabled]="formularioDeshabilitado" name="pais"
                formControlName="cvePaisPersonaAutorizada" (change)="paisSeleccion()"></app-catalogo-select>
        </div>
        <div class="col-md-4">
            <label class="form-label" for="codigoPostal">Código postal: </label>
            <input type="text" class="form-control" id="codigoPostalPersonaAutorizada" name="codigoPostal"
                formControlName="codigoPostalPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'codigoPostalPersonaAutorizada', 'setCodigoPostalPersonaAutorizada')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="informacionExtra" name="estado">Estado: </label>
            <input type="text" class="form-control" id="estadoPersonaAutorizada" name="informacionExtra"
                formControlName="estadoPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'estadoPersonaAutorizada', 'setEstadoPersonaAutorizada')">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="colonia">Colonia: </label>
            <input type="text" class="form-control" id="coloniaPersonaAutorizada" name="colonia"
                formControlName="coloniaPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'coloniaPersonaAutorizada', 'setColoniaPersonaAutorizada')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="correoElectronico">Correo electrónico: </label>
            <input type="text" class="form-control" id="correoElectronicoPersonaAutorizada" name="correoElectronico"
                formControlName="correoElectronicoPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'correoElectronicoPersonaAutorizada', 'setCorreoElectronicoPersonaAutorizada')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="telefono">Teléfono: </label>
            <input type="text" class="form-control" id="telefonoPersonaAutorizada" name="telefono"
                formControlName="telefonoPersonaAutorizada"
                (change)="setValoresStore(datosPersonaOirRecibirForm,'telefonoPersonaAutorizada', 'setTelefonoPersonaAutorizada')">
        </div>
    </div>
</div>
