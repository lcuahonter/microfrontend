<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="1" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="2" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Aviso Único de
                    Renovación</a>
            </li>

        </ul>
        <ng-container>
            @switch (indice) {
            @case(1) {
            <solicitante [tabindex]="1"></solicitante>
            }
            @case (2) {
            @if(esDatosRespuesta) {<app-aviso-de-renovacion></app-aviso-de-renovacion>}
            }
            }
        </ng-container>
    </div>
</div>
