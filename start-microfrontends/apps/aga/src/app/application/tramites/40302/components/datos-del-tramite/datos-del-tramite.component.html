<div class="datos-del-tramite-container">
    <ng-titulo titulo="CAAT" />
    <form [formGroup]="solicitudForm">
        <div class="row d-flex">
            <div class="col-md-4 mt-3">
                <div class="form-group">
                    <label class="form-label" for="cveFolioCaat">CAAT:</label>
                    <input class="form-control" type="text" id="cveFolioCaat" formControlName="cveFolioCaat" />
                </div>
            </div>
            <div class="col-md-4 mt-3">
                <div class="form-group">
                    <label class="form-label" for="idTipoCaat">Perfil:</label>
                    <input class="form-control" type="text" id="idTipoCaat" formControlName="descTipoCaat" />
                </div>
            </div>
            <div class="col-md-4 mt-3">
                <div class="form-group">
                    <label class="form-label" for="tipoAgente">Tipo de agente:</label>
                    <input class="form-control" type="text" id="tipoAgente" formControlName="descTipoAgente" />
                </div>
            </div>
            <div class="col-md-12 d-flex justify-content-end gap-1 mt-5">
                <button type="button" class="btn btn-danger" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight"
                    aria-controls="offcanvasRight">
                    Cancelar
                </button>
            </div>
        </div>

        <ng-titulo titulo="Nombre del director general" />

        <div class="row d-flex">
            <div class="col-md-4 mt-3">
                <div class="form-group">
                    <label class="form-label" for="nombreDirectorGeneral">Nombre(s)*:</label>
                    <input class="form-control" type="text" id="nombreDirectorGeneral"
                        formControlName="directorGeneralNombre" (input)="actualizarDirectorGeneralNombre()" />
                </div>
            </div>
            <div class="col-md-4 mt-3">
                <div class="form-group">
                    <label class="form-label" for="apellidoPaternoDirectorGeneral">Primer apellido*:</label>
                    <input class="form-control" type="text" id="apellidoPaternoDirectorGeneral"
                        formControlName="primerApellido" (input)="actualizarPrimerApellido()" />
                </div>
            </div>
            <div class="col-md-4 mt-3">
                <div class="form-group">
                    <label class="form-label" for="apellidoMaternoDirectorGeneral">Segundo apellido:</label>
                    <input class="form-control" type="text" id="apellidoMaternoDirectorGeneral"
                        formControlName="segundoApellido" (input)="actualizarSegundoApellido()" />
                </div>
            </div>
        </div>
    </form>
</div>
