<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div>
                    <h2 *ngIf="indice === 1">Registro del código alfanumérico armonizado del transportista</h2>
                    <h2 *ngIf="indice === 2">Firmar</h2>
                    <ng-alert *ngIf="indice === 2" [CONTENIDO]="TEXTO_DE_ALERTA"></ng-alert>
                </div>
                <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
            </div>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
            <app-paso-uno></app-paso-uno>
            }
            @case (2) {
            <app-paso-tres></app-paso-tres>
            }
            }
            <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
        </div>
    </div>
</div>
