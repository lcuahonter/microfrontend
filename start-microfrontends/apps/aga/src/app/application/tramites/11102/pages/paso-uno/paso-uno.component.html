<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          role="button"
          tabindex="1"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          role="button"
          tabindex="2"
          >Datos del trámite</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <form [formGroup]="solicitudForm">
        <solicitante></solicitante>
        <div class="row">
          <div class="col-md">
            <ng-titulo titulo="Folio original" />
            <div class="row">
              <div class="col-md-8">
                <label for="folio">Folio:</label>
                <div class="form-group">
                  <input
                    class="form-control"
                    type="text"
                    id="folioOriginal"
                    name="folioOriginal"
                    formControlName="folioOriginal"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </form>
      } @case (2) { @if(esDatosRespuesta){<app-datos-del-tramite
      ></app-datos-del-tramite>} }}
    </ng-container>
  </div>
</div>
