<div class="page">
  <div class="container">
    <div class="row mt-5">
      <div class="col-md-12">
        <h2 *ngIf="indice === 1">Desistimiento de solicitud <br>de servicios extraordinarios</h2>
      </div>
      <div class="col-md-12">
        @if(indice === 2){
       <ng-alert class="text-center" [CONTENIDO]="TEXTOS"></ng-alert>
        }
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno (indiceNombre)="alEventoHijo($event)" (isdataEvent)="isDataEvent($event)"
        (eventoDatosHijo)="alEventoGuarder($event)"></app-paso-uno>
      } @case (2) {
      <app-paso-tres></app-paso-tres>
      }
      }
    </div>
  </div>
  @if (nuevaNotificacion ) { <section *ngIf="nuevaNotificacion">
    <lib-notificaciones [notificacionInput]="nuevaNotificacion"
      (confirmacionModal)="eliminarPedimento($event)"></lib-notificaciones>
  </section> }
</div>
