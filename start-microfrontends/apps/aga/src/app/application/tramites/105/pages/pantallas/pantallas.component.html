<div class="page">
  <div class="container">
    <div class="row">
     <div class="col-md-12" *ngIf="indice === 1">
        <h1>Solicitud de certificación en materia de IVA e IEPS modalidad A</h1>
      </div>
      <div class="col-md-12" *ngIf="indice === 2">
        <h1>Cargar archivos</h1>
      </div>
      <div class="col-md-12" *ngIf="indice === 3">
        <h1>Firmar</h1>
      </div>
        <div *ngIf="isPeligro" class="alert alert-danger text-center" role="alert" [innerHTML]="textoPeligro">
          {{textoPeligro}}
        </div>
      <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-pantalla-datos></app-pantalla-datos>
      } 
     @case (2) {
        <app-paso-carga-documento [idSolicitud]="solicitudState.idSolicitud" [idTipoTRamite]="'105'"
          [cargaArchivosEvento]="cargarArchivosEvento" (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
          (reenviarCargaRealizada)="cargaRealizada($event)"
          (cargaEnProgreso)="onCargaEnProgreso($event)"></app-paso-carga-documento>
      }
      @case (3) {
        <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="105"
        [procedureUrl]="'importacion-otros-vehiculos-usados/solicitud'"></paso-firma>
      }}
        @if (indice !== 2) {
          <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
          } @else {
          <div class="mt-5 mb-3 d-flex justify-content-end">
            <button type="button" class="btn btn-default" (click)="anterior()" *ngIf="seccionCargarDocumentos">
              Anterior
            </button>

            <button class="btn btn-primary ms-3" (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
              [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)">
              {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
            </button>
          </div>
          }
    </div>
  </div>
</div>
