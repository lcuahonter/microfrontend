<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Datos del trámite</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(3)">Datos del trámite</a>
      </li>
    </ul>
    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante #Solicitante></solicitante>
      } @case (2) {
        @if(esDatosRespuesta){
      <app-datos-del-tramite-uno></app-datos-del-tramite-uno>
      }
    }
      @case (3) {
        @if(esDatosRespuesta){
      <app-datos-del-tramite-dos></app-datos-del-tramite-dos>
      }
      }}
    </ng-container>
  </div>
</div>
