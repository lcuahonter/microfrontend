<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Registro de empresas transportistas de mercancía en tránsito</h1>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno></app-paso-uno>
      } @case (2) {
      <app-paso-dos></app-paso-dos>
      } @case (3) {
      <app-paso-tres></app-paso-tres>
      } }
     

      <div class="col-md-12">
        <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
      
        <ng-alert [CONTENIDO]="AVISO_PRIVACIDAD_ADJUNTAR"  *ngIf="indice === 1"></ng-alert>
      </div>

    </div>
  </div>
</div>
