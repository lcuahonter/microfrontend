<div class="col-md-12">
  <form [formGroup]="empresasForm">
    <app-datos-generales
    [titulo] = "'Datos generales del trámite'"
    [grupoDeFormulario]="'numeroCaat'"
    [tipoTransitoList$] = "tipoTransitoList$"
    [cveFolioCaat$] = "cveFolioCaat$"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    ></app-datos-generales>
    <div class="row mt-2">
      <div class="col-md-12">
        <ng-titulo titulo="Datos generales de la empresa" />
        <h5>Aduanas autorizadas*:</h5>
        <crosslist
          [id]="'cboAduanasActuar'"
          [fechas]="seleccionarAduanasEntrada"
          [fechasSeleccionadas]="seleccionadasAduanasEntradaDatos"
          [botones]="aduanasEntradaBotons"
          (fechasSeleccionadasChange)="
            aduanasEntradaSeleccionadasChange($event)
          "
          [isDisabled]="esFormularioSoloLectura"
        ></crosslist>
      </div>
    </div>

    <app-direccion-empresa
    [titulo] = "'Datos generales del trámite'"
    [grupoDeFormulario]="'domicilio'"
    [entidadFederativaList$]="entidadFederativaList$"
    [delegacionMunicipioList$] = "delegacionMunicipioList$"
    [coloniaList$] = "coloniaList$"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    >
    </app-direccion-empresa>
      
    <app-capital-social
    [titulo] = "'Capital social'"
    [grupoDeFormulario]="'empresasCapitalSocial'"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    >
    </app-capital-social>

    <app-permiso-expedido
    [titulo] = "'Permiso expedido por la Dirección General de Autotransporte Federal de la Secretaria de Comunicaciones y Transportes, para prestar el servicio de autotransporte federal de carga'"
    [grupoDeFormulario]="'permiso'"
    [capitalSocialNota]="CAPITAL_SOCIAL_NOTA"
    [miRepresentadaNota]="MI_REPRESENTADA_NOTA"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    >
    </app-permiso-expedido>
    
  </form>
</div>
