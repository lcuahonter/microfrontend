<div class="row">
  <ul class="nav nav-tabs">
    <li [ngClass]="indice === 1 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(1)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="1"
        role="button"
        >Solicitante</a
      >
    </li>
    <li [ngClass]="indice === 2 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(2)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="2"
        role="button"
        >Empresas transportistas</a
      >
    </li>
    <li [ngClass]="indice === 3 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(3)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="3"
        role="button"
        >Vehículos</a
      >
    </li>
    <li [ngClass]="indice === 4 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(4)"
        (keydown.enter)="seleccionaTab(4)"
        (keydown.space)="seleccionaTab(4)"
        tabindex="4"
        role="button"
        >Pago de derechos</a
      >
    </li>
    <li [ngClass]="indice === 5 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(5)"
        (keydown.enter)="seleccionaTab(5)"
        (keydown.space)="seleccionaTab(5)"
        tabindex="5"
        role="button"
        >Consolidación de cargas</a
      >
    </li>
  </ul>

  <ng-container>
    @switch (indice) { @case (1) {
    <solicitante></solicitante>
    } @case (2) {
      @if(esDatosRespuesta){
    <app-empresas-transportistas></app-empresas-transportistas>
      }
    } @case (3) {
      @if(esDatosRespuesta){
      <app-vehiculos></app-vehiculos>
      }
    } @case (4) {
      @if(esDatosRespuesta){
      <app-pago-de-derechos></app-pago-de-derechos>
      }
    } @case (5) {
      @if(esDatosRespuesta){
      <app-consolidacion-de-cargas></app-consolidacion-de-cargas>
      }
    } 
  }
  </ng-container>
</div>
