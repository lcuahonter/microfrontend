
<form [formGroup]="forma">
<div class="col-md-12 pt-5">
    <label class="form-label" for="siConsolidadoET">Estoy interesado en prestar los servicios de carga por vía terrestre bajo el régimen aduanero de transito interno*:</label>
    <app-input-radio id="siConsolidadoET" [radioOptions]="opcionDeBotonDeRadio" [isRequired]="true"
        [layout]="'horizontal'" formControlName="consolidacionCargas"
        (valueChange)="enCambioDeValor($event)"
        (change)="setValoresStore(forma,'consolidacionCargas')"
        ></app-input-radio>
</div>


<ng-container *ngIf="esConsolidatedET">
    <app-registro-agentes></app-registro-agentes>
    <app-registro-vehiculos></app-registro-vehiculos>
    <div class="col-md-12 pt-5">
        <label class="form-label align-left" for="noConsolidadoET">Manifiesto bajo protesta de decir verdad, indicando que dentro del objeto social de la empresa se encuentra la consolidación de carga.*</label>
        <app-input-radio id="noConsolidadoET" [radioOptions]="opcionDeBotonDeRadio" [isRequired]="true"
            [layout]="'horizontal'"  
            formControlName="noConsolidadoET"
            (change)="setValoresStore(forma,'noConsolidadoET')"
        ></app-input-radio>
    </div>
</ng-container>
</form>
