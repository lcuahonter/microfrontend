<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h1>Autorización de importación temporal (formato general)</h1>
    </div>
    @if (esFormaValido) {
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
    }
    @if (esFormaValidoDos) {
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlertDos" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
    }
  </div>

  <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
  <div>
    @switch (indice) {
    @case (1) {
    <app-paso-uno #pasoUno></app-paso-uno>
    }
    @case (2) {
    <app-paso-dos></app-paso-dos>

    }
    @case (3) {
    <app-paso-tres></app-paso-tres>
    }
    }
  </div>
  <div class="container px-3">
    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" ></btn-continuar>
    @if (indice === 1) {
    <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
    }
  </div>
</div>
