<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Registro de Información de Junta Técnica</h1>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <form [formGroup]="reunionForm">
                    <ng-titulo titulo="Concluir trámite"></ng-titulo>
                    <div class="row align-items-center">
                        <div class="col-auto">
                            <label class="label-spacing">{{ textos }}</label>
                        </div>
                        <div class="col" style="margin-left: 245px;">
                            <app-input-radio [selectedValue]="valorSeleccionado" [radioOptions]="radioParcial" [isRequired]="true" [layout]="'horizontal'" formControlName="radioParcial"
 (change)="setValoresStore(reunionForm, 'radioParcial', 'setRadioParcial')">
                            </app-input-radio>
                        </div>
                    </div>
                    <div id="botonesBuscar" class="mt-5">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="form-group pull-right">
                                    <button type="button" name="buscar" id="buscar"
                                        class="btn btn-primary ms-4" (click)="onSiguienteClick()">Siguiente
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
