<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" role="button" tabindex="1">Solicitante</a>
      </li>
      @if(isShowDirector){
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="3">Director general</a>
      </li>
      }
    </ul>

    <ng-container>
      @switch (indice) {
      @case (1) {
      <app-solicitante #Solicitante></app-solicitante>
      } @case (2) {
      @if(esDatosRespuesta) {
      <app-director-general></app-director-general>
      }
      }
      }
    </ng-container>
  </div>
</div>
