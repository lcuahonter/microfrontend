<div class="container">
  <div class="tabs w-100">
    <ul class="nav nav-tabs mt-5" role="tablist">
      <li class="nav-item">
        <a
          class="nav-link"
          [class.active]="activeTab === 'nacional'"
          (click)="setActiveTab('nacional')"
          data-bs-toggle="tab"
          href="#subtabs-1"
          role="tab"
        >
          Registro de chofer nacional
        </a>
      </li>
      <li class="nav-item">
        <a
          class="nav-link"
          [class.active]="activeTab === 'extranjero'"
          (click)="setActiveTab('extranjero')"
          data-bs-toggle="tab"
          href="#subtabs-2"
          role="tab"
        >
          Registro de chofer extranjero
        </a>
      </li>
    </ul>
  </div>
  <div class="row mt-5">
    <div class="tab-content">

    @if(activeTab ==='nacional') {
      <ng-titulo [titulo]="CHOFERES_PAGE.CHOFERES_NACIONALES"></ng-titulo>
      <app-chofere-nacional></app-chofere-nacional>
    }
    @if(activeTab ==='extranjero') {
      <ng-titulo [titulo]="CHOFERES_PAGE.CHOFERES_EXTRANJEROS"></ng-titulo>
      <app-chofere-alta-de-extranjeros></app-chofere-alta-de-extranjeros>
    }

    </div>
  </div>
</div>
