<div class="page">
  <div class="container">
    <!-- CASE 1: If CAAT exists -->
    @if (isCaat) {
    <ng-alert [CONTENIDO]="catErrorMessage" [CUSTOMECLASS]="info"></ng-alert>
    }

    <!-- CASE 2: If NOT CAAT but is Extranjero -->
    @else if (isExtrajero) {
    <app-acuse-recibo [datosTabla]="acuseDocumentos" [datosTablaAcuseNotificacion]="[]" [guardarDatos]="guardarDatos"
      [banderaVista]="'Acuse'">
    </app-acuse-recibo>
    }

    <!-- CASE 3: If NOT CAAT and NOT Extranjero -->
    @else {
    <div class="row">
      <div class="col-md-6">
        <h3>Registro del código alfanumérico armonizado del transportista</h3>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) {
      @case (1) {
      <paso-uno></paso-uno>
      }
      @case (2) {
      <app-paso-dos></app-paso-dos>
      }
      }

      @if (isBtnShow === 'yes') {
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)">
      </btn-continuar>
      }
    </div>
    }



  </div>
</div>
