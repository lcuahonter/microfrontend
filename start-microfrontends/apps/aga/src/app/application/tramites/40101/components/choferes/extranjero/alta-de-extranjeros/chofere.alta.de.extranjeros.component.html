<div class="container">

  <div class="row table-responsive">
    <div class="col-md-12">
      <h5>Choferes extranjeros:</h5>

      <app-tabla-dinamica [tipoSeleccionTabla]="tipoSeleccionTabla" [configuracionTabla]="ConfiguracionColumna"
        [datos]="datosDelChoferExtranjeros" (listaDeFilaSeleccionada)="onChofereNationalSelected($event)">
      </app-tabla-dinamica>

    </div>
  </div>

  <div class="row mt-3">
    <div class="col-md-12 text-end">
      <div class="btn-group">
        <button class="btn btn-default" type="button" (click)="editSelectedRow(agregarModalDialog)"
          [disabled]="esSoloLectura || !datosDelChoferExtranjerosSelected || datosDelChoferExtranjerosSelected.length === 0">
          Modificar
        </button>
        <button class="btn btn-danger" type="button"
          [disabled]="esSoloLectura || !datosDelChoferExtranjerosSelected || datosDelChoferExtranjerosSelected.length === 0"
          data-bs-toggle="modal" data-bs-target="#confirmarEliminarChoferExtranjerosModal">
          Eliminar
        </button>
        <div id="confirmarEliminarChoferExtranjerosModal" class="modal fade" tabindex="-1"
          aria-labelledby="confirmarEliminarChoferExtranjerosModalLabel" aria-hidden="true">
          <div class="modal-dialog modal-sm eliminar-modal" role="document">
            <div class="modal-content">
              <div class="modal-header">
                <button type="button" aria-label="Close" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <label>¿Estás seguro que deseas eliminar los registros marcados?</label>
              </div>
              <div class="modal-footer" style="justify-content: center">
                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" (click)="deleteSelectedRow()"
                  data-bs-dismiss="modal">Aceptar</button>
              </div>
            </div>
          </div>
        </div>
        <button class="btn btn-primary ms-2" (click)="addNewRow(agregarModalDialog)" [disabled]="esSoloLectura">
          Agregar
        </button>
      </div>
    </div>
    <ng-template #datosDeChoferesModal>
      <div id="datosDeChoferesModal">
        <app-choferes-datos-extranjeros-dialog [datosDeChofere]="datosChofere" #datosDeChoferesModal
          [readonly]="esSoloLectura" (addModalEvent)="addModal($event)"
          (cancelEvent)="cancelModal()"></app-choferes-datos-extranjeros-dialog>
      </div>
    </ng-template>
  </div>
