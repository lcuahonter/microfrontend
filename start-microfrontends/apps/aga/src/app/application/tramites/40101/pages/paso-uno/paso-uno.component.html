<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" role="button" tabindex="1">Solicitante</a>
      </li>

      @if(isShowDirector){
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="3">Director general</a>
      </li>
      }

      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Choferes</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)"
          (keydown.space)="seleccionaTab(4)" role="button" tabindex="4">Vehículos</a>
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <app-solicitante #Solicitante></app-solicitante>
      } @case (2) {
      @if(esDatosRespuesta) {
      <app-director-general></app-director-general>
      }
      }@case (3) {
      @if(esDatosRespuesta) {
      <app-choferes></app-choferes>
      }
      } @case (4) {
      @if(esDatosRespuesta) {
      <app-vehiculos></app-vehiculos>
      }
      }
      }
    </ng-container>
  </div>
</div>
