<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h1 *ngIf="!cargarArchivosEvento.observed">Solicitud servicios extraordinarios</h1>
        <h1 *ngIf="cargarArchivosEvento.observed && this.indice === 2">Cargar Archivos</h1>
        <h1 *ngIf="cargarArchivosEvento.observed && this.indice === 3">Firmar</h1>
      </div>
    </div>

    <div class="row mt-5" *ngIf="indice === 2">
      <div class="col-md-12">
        <lib-notificaciones
          [notificacionInput]="alertaNotificacion"
        ></lib-notificaciones>
      </div>
    </div>
    <app-wizard [listaPasos]="pasos" id="wizard5701"></app-wizard>
    <div class="row">
      <div class="col-md-12">
        @switch (indice) { @case (1) {
        <paso-uno #pasoUnoElement (validFrmPadreEsValido)="onFormularioPadreValido($event)" [editable]="true"></paso-uno>
        } @case (2) {

        <paso-dos
          [idTipoTRamite]="'5701'"
          [datosUsuario]="datosUsuario"
          [idSolicitud]="solicitudState.idSolicitud!.toString()"
          [cargaArchivosEvento]="cargarArchivosEvento"
          (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
          (reenviarCargaRealizada)="cargaRealizada($event)"
          (cargaEnProgresoChange)="onCargaEnProgresoPadre($event)"></paso-dos>
        } @case (3) {
        <paso-firma [idSolicitud]="this.solicitudState.idSolicitud" [procedure]="5701" [procedureUrl]="'solicitud'"></paso-firma>
        } 
      }
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        @if (indice === 1) {
        <btn-continuar
          [datos]="datosPasos"
          [ocultabotonAnterior]="!mostrarBotonAnterior"
          (continuarEvento)="getValorIndice($event)"
        ></btn-continuar>
        } @else if (indice === 2) {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
            type="button"
            class="btn btn-default"
            (click)="anterior()"
          >
            Anterior
          </button>

          <button
            class="btn btn-primary ms-3"
            (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
            [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)"
          >
            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
          </button>
        </div>
        } @else if (indice === 3) {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
            type="button"
            class="btn btn-default"
            (click)="anterior()"
          >
            Anterior
          </button>
        </div>
        }
      </div>
    </div>

    
  </div>
</div>

@if(nuevaNotificacion) {
<section>
  <lib-notificaciones [notificacionInput]="nuevaNotificacion">
  </lib-notificaciones>
</section>
}
