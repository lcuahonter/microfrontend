<div class="container table-container">
  <ng-titulo titulo="Importante" />
  <form *ngIf="registroParaLaForm" [formGroup]="registroParaLaForm">
    <ng-alert [CONTENIDO]="TEXTOS.Importante" [CUSTOMECLASS]="'text-center'"></ng-alert>

    <div class="row" style="padding-bottom: 20px; text-align: right">
      <div>
        <button type="button" class="btn btn-primary btn-space" (click)="iniciar()" [disabled]="consultaState.readonly">Iniciar</button>
      </div>
    </div>
    @if (mostrarCampo) {
      <app-catalogo-select
      [catalogo]="registroOptions"
      formControlName="registro"
      [label]="
        '¿Se han realizado previamente importaciones o exportaciones del producto a registrar?'
      "
      [isDisabled]="consultaState.readonly"
      [required]="true"
      name="registro"
      (change)="setValoresStore(registroParaLaForm, 'registro', 'setRegistro')"
    ></app-catalogo-select>
    }
  </form>
</div>
