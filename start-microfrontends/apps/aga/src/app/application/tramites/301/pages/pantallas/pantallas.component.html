<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h1>Registro para la toma de muestras de mercancías</h1>
      </div>
    </div>
     @if (pagoError) {
      <div class="row">
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="pagoErrorMessage" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
      </div>
    }
      @if (registroError) {
        <div class="row">
          <div class="col-md-12">
            <ng-alert [CONTENIDO]="registroErrorMessage" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
          </div>
        </div>
      }
    <div class="row">
      <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-pantalla-datos #datos></app-pantalla-datos>
      } @case (2) {
      <paso-dos ></paso-dos>
      } @case (3) {
      <paso-tres></paso-tres>
      }}
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
    </div>

    <div class="row">
      <ng-alert [CONTENIDO]="ADVERTENCIA.Aviso"></ng-alert>
    </div>
  </div>
</div>
