<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <h1>Concluir relación</h1>
            </div>
            <app-wizard [listaPasos]="pasos"></app-wizard>
        </div>

        <div class="row">
        @switch (indice) {
            @case (1) {
            <app-paso-uno></app-paso-uno>
            } @case (2) {
            <app-paso-dos></app-paso-dos>
            }
        }

        <btn-continuar
            [datos]="datosPasos"
            (continuarEvento)="getValorIndice($event)"
            [vistaEmergente]="vistaEmergente"
            [notificacion]="nuevaAlertaNotificacion"
            >
        </btn-continuar>
        </div>
        
    </div>
</div>
