<ng-titulo titulo="Persona moral extranjera"></ng-titulo>

<label for="Empresa transportista maritima persona moral extranjero">Empresa transportista marítima persona moral
    extranjero:</label>

<div class="row mt-5">
    <div class="col-md-12">
        <app-tabla-dinamica [styleCenter]="true" (listaDeFilaSeleccionada)="onListaDeFilaSeleccionada($event)"
            [configuracionTabla]="configuracionParaPMEEncabezadoDeTabla" [datos]="personaMoralExtranjeraTabla"
            [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX" [disableSeleccionTablaCheckBox]="esFormularioSoloLectura">
        </app-tabla-dinamica>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="pull-right">
            <button (click)="modificarPersona()" type="button" data-bs-toggle="modal" data-bs-target="#modalAgregarPME"
                name="ModificarPME" class="btn btn-default" [disabled]="itemsSeleccionados.size !== 1">
                Modificar
            </button>
            <button (click)="eliminarPersonaPorId()" [disabled]="itemsSeleccionados.size === 0" type="button"
                name="EliminarPME" class="btn btn-danger ms-2" [disabled]="esFormularioSoloLectura">
                Eliminar
            </button>
            <button (click)="esModificacion=false" (click)="agregarPersona()" type="button" name="AgregarPME"
                class="btn btn-primary ms-2" data-bs-toggle="modal" data-bs-target="#modalAgregarPME"
                [disabled]="esFormularioSoloLectura">
                Agregar
            </button>
        </div>
    </div>
</div>


<div class="modal fade" id="modalAgregarPME" tabindex="-1" aria-labelledby="modalAgregarPMELabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body">

                <div id="dialogoPersonaMoralExtranjera">
                    <form [formGroup]="personaMoralExtranjeraForm" id="formPME" name="formPME">
                        <ng-titulo titulo="Persona moral extranjera"></ng-titulo>

                        <div class="col-12">
                            @if (!validForm) {
                            <div class="alert alert-info alert-danger text-center" [innerHTML]="denominacionDuplicado">
                            </div>
                            }
                        </div>

                        <div class="row">
                            <div class="col-md-8">
                                <label class="form-label" for="seguroNumero">Nombre, denominación o razón
                                    social<span
                                        [ngClass]="campoInvalido('denominacionPME') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="denominacionPME"
                                    [ngClass]="campoInvalido('denominacionPME') ? 'required' : ''"
                                    formControlName="denominacionPME" maxlength="254" id="denominacionPME">
                                <div *ngIf="personaMoralExtranjeraForm.get('denominacionPME')?.invalid && personaMoralExtranjeraForm.get('denominacionPME')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="correoPME">Correo electrónico<span
                                        class="bi bi-question-circle-fill" data-bs-toggle="tooltip"
                                        title="{{ TEXTOS.CORREO_TITULO_TOOLTIP }}"></span><span
                                        [ngClass]="campoInvalido('correoPME') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="correoPME" formControlName="correoPME"
                                    [ngClass]="campoInvalido('correoPME') ? 'required' : ''" type="text" maxlength="320"
                                    id="correoPME">
                                <div *ngIf="personaMoralExtranjeraForm.get('correoPME')?.invalid && personaMoralExtranjeraForm.get('correoPME')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Domicilios -->
                        <ng-titulo titulo="Domicilio fiscal"></ng-titulo>

                        <div class="row">
                            <div class="col-md-4">
                                <app-catalogo-select [catalogo]="pais" [id]="'paisPME'" formControlName="paisPME"
                                    [markTouched]="personaMoralExtranjeraForm.get('paisPME')?.touched || false"
                                    [label]="'País'" name="cvePais" [required]="true"
                                    [isDisabled]="esFormularioSoloLectura"></app-catalogo-select>
                            </div>
                            <div class="col-md-4 pt-7">
                                <label class="form-label" for="codigoPostalPME">Código postal<span
                                        [ngClass]="campoInvalido('codigoPostalPME') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="codigoPostalPME" id="codigoPostalPME"
                                    [ngClass]="campoInvalido('codigoPostalPME') ? 'required' : ''" type="text"
                                    formControlName="codigoPostalPME" maxlength="12">
                                <div *ngIf="personaMoralExtranjeraForm.get('codigoPostalPME')?.invalid && personaMoralExtranjeraForm.get('codigoPostalPME')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-4 pt-7">
                                <label class="form-label" for="ciudadPME">Ciudad<span
                                        [ngClass]="campoInvalido('ciudadPME') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="ciudadPME" id="ciudadPME"
                                    [ngClass]="campoInvalido('ciudadPME') ? 'required' : ''" type="text"
                                    formControlName="ciudadPME" maxlength="120">
                                <div *ngIf="personaMoralExtranjeraForm.get('ciudadPME')?.invalid && personaMoralExtranjeraForm.get('ciudadPME')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row pt-7">
                            <div class="col-md-4">
                                <label class="form-label" for="estadoPME">Estado<span
                                        [ngClass]="campoInvalido('estadoPME') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="estadoPME" id="entidadFederativaPME"
                                    [ngClass]="campoInvalido('estadoPME') ? 'required' : ''" type="text"
                                    formControlName="estadoPME" maxlength="200">
                                <div *ngIf="personaMoralExtranjeraForm.get('estadoPME')?.invalid && personaMoralExtranjeraForm.get('estadoPME')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label" for="callePME">Calle<span
                                        [ngClass]="campoInvalido('callePME') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="callePME" id="callePME"
                                    [ngClass]="campoInvalido('callePME') ? 'required' : ''" type="text"
                                    formControlName="callePME" maxlength="100">
                                <div *ngIf="personaMoralExtranjeraForm.get('callePME')?.invalid && personaMoralExtranjeraForm.get('callePME')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row pt-7">
                            <div class="col-md-4">
                                <label class="form-label" for="numeroExteriorPME">Número exterior<span
                                        [ngClass]="campoInvalido('numeroExteriorPME') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="numeroExteriorPME" id="numeroExteriorPME"
                                    [ngClass]="campoInvalido('numeroExteriorPME') ? 'required' : ''" type="text"
                                    formControlName="numeroExteriorPME" maxlength="55">
                                <div *ngIf="personaMoralExtranjeraForm.get('numeroExteriorPME')?.invalid && personaMoralExtranjeraForm.get('numeroExteriorPME')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="numeroInteriorPME">Número interior:</label>
                                <input type="text" class="form-control" name="numeroInteriorPME" id="numeroInteriorPME"
                                    formControlName="numeroInteriorPME" maxlength="55">
                            </div>
                        </div>

                        <!--Nombre del director general-->
                        <ng-titulo titulo="Nombre del director general"></ng-titulo>

                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label" for="seguroNumero">Nombre(s)<span
                                        [ngClass]="campoInvalido('nombreDG') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control"
                                    [ngClass]="campoInvalido('nombreDG') ? 'required' : ''" name="nombreDG"
                                    id="nombreDG" formControlName="nombreDG" maxlength="28">
                                <div *ngIf="personaMoralExtranjeraForm.get('nombreDG')?.invalid && personaMoralExtranjeraForm.get('nombreDG')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>

                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="seguroNumero">Primer apellido<span
                                        [ngClass]="campoInvalido('apellidoPaternoDG') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control"
                                    [ngClass]="campoInvalido('apellidoPaternoDG') ? 'required' : ''"
                                    name="apellidoPaternoDG" id="apellidoPaternoDG" formControlName="apellidoPaternoDG"
                                    maxlength="20">
                                <div *ngIf="personaMoralExtranjeraForm.get('apellidoPaternoDG')?.invalid && personaMoralExtranjeraForm.get('apellidoPaternoDG')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="apellidoMaterno">Segundo apellido:</label>
                                <input type="text" class="form-control" name="apellidoMaternoDG" id="apellidoMaternoDG"
                                    formControlName="apellidoMaternoDG" maxlength="20">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="modal-footer custom-footer mt-4">
                <div class="row">
                    <div class="col-md-8 text-muted">
                        <p>* Campos obligatorios</p>
                    </div>
                    <div class="col-md-4 d-flex justify-content-end">
                        <button type="button" class="btn btn-primary" id="limpiarPME" name="limpiar"
                            (click)="limpiarDatosPME()">Limpiar</button>
                        <button (click)="limpiarDatosPME()" type="button" class="btn btn-default mx-2" id="cancelarPME"
                            name="cancelar" data-bs-dismiss="modal" #closeModal>Cancelar</button>
                        <button type="button" class="btn btn-primary" id="guardarPME" name="guardar"
                            (click)="agregarPME(personaMoralExtranjeraForm.getRawValue())">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


@if (mostrarAlerta) {
<lib-notificaciones [notificacionInput]="nuevaNotificacion" (confirmacionModal)="aceptar()"></lib-notificaciones>
}

@if (mostrarInfo) {
<lib-notificaciones [notificacionInput]="nuevaNotificacionInfo"
    (confirmacionModal)="aceptarInfo($event)"></lib-notificaciones>
}
