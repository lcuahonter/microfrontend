<div class="container" id="divTabIngreso">
    <div class="mt-4 text-center" id="alertInfoPrimario">
        <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
    </div>    

    <div class="container">
        <div class="row">
            <ul class="nav nav-tabs">
                <li [ngClass]="indice === 1 ? 'active' : ''">
                    <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
                        (keydown.space)="seleccionaTab(1)" role="button" tabindex="1">Pers. física nal.</a>
                </li>
                <li [ngClass]="indice === 2 ? 'active' : ''">
                    <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
                        (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Pers. moral nal.</a>
                </li>
                <li [ngClass]="indice === 3 ? 'active' : ''">
                    <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
                        (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Pers. física extranjera</a>
                </li>
                <li [ngClass]="indice === 4 ? 'active' : ''">
                    <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)"
                        (keydown.space)="seleccionaTab(4)" role="button" tabindex="4">Pers. moral extranjera</a>
                </li>
                <li [ngClass]="indice === 5 ? 'active' : ''">
                    <a data-toggle="tab" (click)="seleccionaTab(5)" (keydown.enter)="seleccionaTab(5)"
                        (keydown.space)="seleccionaTab(5)" role="button" tabindex="5">Buscar emp. con CAAT</a>
                </li>
            </ul>
    
            <ng-container>
                @switch (indice) {
                @case (1) {
                <app-persona-fisica-nacional [tabindex]="1"></app-persona-fisica-nacional>
                }
                @case (2) {
                <app-persona-moral-nacional [tabindex]="2"></app-persona-moral-nacional>
                }
                @case (3) {
                <app-persona-fisica-extranjera [tabindex]="3"></app-persona-fisica-extranjera>
                }
                @case (4) {
                <app-persona-moral-extranjera [tabindex]="4"></app-persona-moral-extranjera>
                }
                @case (5) {
                <app-buscar-empresa-caat [tabindex]="5"></app-buscar-empresa-caat>
                }
                }
            </ng-container>
        </div>
    </div>
</div>
