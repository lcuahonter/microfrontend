<ng-titulo titulo="Persona física extranjera"></ng-titulo>

<label for="Empresa transportista maritima persona física extranjero">Empresa transportista marítima persona física
    extranjero:</label>

<div class="row mt-5">
    <div class="col-md-12">
        <app-tabla-dinamica [styleCenter]="true" (listaDeFilaSeleccionada)="onListaDeFilaSeleccionada($event)"
            [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX" [configuracionTabla]="configuracionParaPFEEncabezadoDeTabla"
            [datos]="personaFisicaExtranjeraTabla" [disableSeleccionTablaCheckBox]="esFormularioSoloLectura">
        </app-tabla-dinamica>
    </div>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="pull-right">
            <button type="button" (click)="modificarPersona()" name="ModificarPFE" data-bs-target="#modalAgregarPFE"
                data-bs-toggle="modal" class="btn btn-default" [disabled]="itemsSeleccionados.size !== 1">
                Modificar
            </button>
            <button type="button" name="EliminarPFE" (click)="eliminarPersonaPorId()" class="btn btn-danger ms-2"
                [disabled]="itemsSeleccionados.size === 0">
                Eliminar
            </button>
            <button type="button" name="AgregarPFE" class="btn btn-primary ms-2" data-bs-toggle="modal"
                (click)="agregarPersona()" data-bs-target="#modalAgregarPFE" [disabled]="esFormularioSoloLectura">
                Agregar
            </button>
        </div>
    </div>
</div>


<!-- MODAL AQUI ########################################################################################################## -->
<div class="modal fade" id="modalAgregarPFE" tabindex="-1" aria-labelledby="modalAgregarPFELabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body">
                <div id="dialogoPersonaFisicaExtranjera">
                    <form [formGroup]="personaFisicaExtranjeraForm" id="formPFE" name="formPFE">
                        <ng-titulo titulo="Persona física extranjera"></ng-titulo>

                        <div class="col-12">
                            @if (!validForm) {
                            <div class="alert alert-info alert-danger text-center" [innerHTML]="seguroDuplicado"></div>
                            }
                        </div>

                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label" for="seguroNumero">Número del seguro social<span
                                        [ngClass]="campoInvalido('seguroNumero') ? 'has-error' : ''">*</span>:</label>

                                <input class="form-control" maxlength="9" libSoloNumeros
                                    [ngClass]="campoInvalido('seguroNumero') ? 'required' : ''" type="text"
                                    id="seguroNumero" formControlName="seguroNumero" />
                                <div *ngIf="personaFisicaExtranjeraForm.get('seguroNumero')?.invalid && personaFisicaExtranjeraForm.get('seguroNumero')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>

                            <div class="col-md-4">

                                <label class="form-label" for="nombrePFE">Nombre(s)<span
                                        [ngClass]="campoInvalido('nombrePFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" size="40" id="nombrePFE" maxlength="200"
                                    [ngClass]="campoInvalido('nombrePFE') ? 'required' : ''" type="text"
                                    formControlName="nombrePFE">
                                <div *ngIf="personaFisicaExtranjeraForm.get('nombrePFE')?.invalid && personaFisicaExtranjeraForm.get('nombrePFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label" for="apellidoPaternoPFE">Primer Apellido<span
                                        [ngClass]="campoInvalido('apellidoPaternoPFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" size="40" id="apellidoPaternoPFE"
                                    [ngClass]="campoInvalido('apellidoPaternoPFE') ? 'required' : ''" type="text"
                                    maxlength="200" formControlName="apellidoPaternoPFE">
                                <div *ngIf="personaFisicaExtranjeraForm.get('apellidoPaternoPFE')?.invalid && personaFisicaExtranjeraForm.get('apellidoPaternoPFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label" for="apellidoMaterno">Segundo Apellido:</label>
                                <input type="text" class="form-control" name="apellidoMaternoPFE"
                                    formControlName="apellidoMaternoPFE" id="apellidoMaternoPFE" maxlength="200">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label" for="correoPFE">Correo electrónico<span
                                        class="bi bi-question-circle-fill" data-bs-toggle="tooltip"
                                        title="{{ TEXTOS.CORREO_TITULO_TOOLTIP }}"></span><span
                                        [ngClass]="campoInvalido('correoPFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="correoPFE" formControlName="correoPFE"
                                    [ngClass]="campoInvalido('correoPFE') ? 'required' : ''" type="text" maxlength="320"
                                    id="correoPFE">
                                <div *ngIf="personaFisicaExtranjeraForm.get('correoPFE')?.invalid && personaFisicaExtranjeraForm.get('correoPFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>

                            </div>
                        </div>

                        <!-- Domicilios -->
                        <ng-titulo titulo="Domicilio fiscal"></ng-titulo>

                        <div class="row">
                            <div class="col-md-4">
                                <app-catalogo-select [catalogo]="pais" [id]="'paisPFE'" formControlName="paisPFE"
                                    [markTouched]="personaFisicaExtranjeraForm.get('paisPFE')?.touched || false"
                                    [label]="'País'" name="cvePais" [required]="true"
                                    [isDisabled]="esFormularioSoloLectura"></app-catalogo-select>
                            </div>
                            <div class="col-md-4 pt-7">
                                <label class="form-label" for="codigoPostalPFE">Código postal<span
                                        [ngClass]="campoInvalido('codigoPostalPFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="codigoPostalPFE" id="codigoPostalPFE"
                                    [ngClass]="campoInvalido('codigoPostalPFE') ? 'required' : ''" type="text"
                                    formControlName="codigoPostalPFE" maxlength="12">
                                <div *ngIf="personaFisicaExtranjeraForm.get('codigoPostalPFE')?.invalid && personaFisicaExtranjeraForm.get('codigoPostalPFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-4 pt-7">
                                <label class="form-label" for="ciudadPFE">Ciudad<span
                                        [ngClass]="campoInvalido('ciudadPFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="ciudadPFE" id="ciudadPFE"
                                    [ngClass]="campoInvalido('ciudadPFE') ? 'required' : ''" type="text"
                                    formControlName="ciudadPFE" maxlength="120">
                                <div *ngIf="personaFisicaExtranjeraForm.get('ciudadPFE')?.invalid && personaFisicaExtranjeraForm.get('ciudadPFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row pt-7">
                            <div class="col-md-4">
                                <label class="form-label" for="estadoPFE">Estado<span
                                        [ngClass]="campoInvalido('estadoPFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="estadoPFE" id="entidadFederativaPFE"
                                    [ngClass]="campoInvalido('estadoPFE') ? 'required' : ''" type="text"
                                    formControlName="estadoPFE" maxlength="200">
                                <div *ngIf="personaFisicaExtranjeraForm.get('estadoPFE')?.invalid && personaFisicaExtranjeraForm.get('estadoPFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label" for="callePFE">Calle<span
                                        [ngClass]="campoInvalido('callePFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="callePFE" id="callePFE"
                                    [ngClass]="campoInvalido('callePFE') ? 'required' : ''" type="text"
                                    formControlName="callePFE" maxlength="100">
                                <div *ngIf="personaFisicaExtranjeraForm.get('callePFE')?.invalid && personaFisicaExtranjeraForm.get('callePFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row pt-7">
                            <div class="col-md-4">
                                <label class="form-label" for="numeroExteriorPFE">Número exterior<span
                                        [ngClass]="campoInvalido('numeroExteriorPFE') ? 'has-error' : ''">*</span>:</label>
                                <input type="text" class="form-control" name="numeroExteriorPFE" id="numeroExteriorPFE"
                                    [ngClass]="campoInvalido('numeroExteriorPFE') ? 'required' : ''" type="text"
                                    formControlName="numeroExteriorPFE" maxlength="55">
                                <div *ngIf="personaFisicaExtranjeraForm.get('numeroExteriorPFE')?.invalid && personaFisicaExtranjeraForm.get('numeroExteriorPFE')?.touched"
                                    class="has-error">
                                    <div [innerHTML]="mensajeCampoObligatorio"></div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="numeroInterior">Número interior:</label>
                                <input type="text" class="form-control" name="numeroInteriorPFE" id="numeroInteriorPFE"
                                    formControlName="numeroInteriorPFE" maxlength="55">
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="modal-footer custom-footer mt-4">
                <div class="row">
                    <div class="col-md-8 text-muted">
                        <p>* Campos obligatorios</p>
                    </div>
                    <div class="col-md-4 d-flex justify-content-end">
                        <button type="button" class="btn btn-primary" id="limpiarPFE" name="limpiar"
                            (click)="limpiarDatosPFE()">Limpiar</button>
                        <button type="button" class="btn btn-default mx-2" id="cancelarPFE" name="cancelar"
                            data-bs-dismiss="modal" (click)="limpiarDatosPFE()" #closeModal>Cancelar</button>
                        <button type="button" class="btn btn-primary" id="guardarPFE" name="guardar"
                            (click)="agregarPFE(personaFisicaExtranjeraForm.getRawValue())">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


@if (mostrarAlerta) {
<lib-notificaciones [notificacionInput]="nuevaNotificacion" (confirmacionModal)="aceptar()"></lib-notificaciones>
}

@if (mostrarInfo) {
<lib-notificaciones [notificacionInput]="nuevaNotificacionInfo"
    (confirmacionModal)="aceptarInfo($event)"></lib-notificaciones>
}
