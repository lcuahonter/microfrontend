<form *ngIf="personaMoralForm" [formGroup]="personaMoralForm" id="formPMN" name="formPMN">

    <ng-titulo titulo="Persona moral nacional"></ng-titulo>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="rfcPMN">RFC:</label>
            <input type="text" class="form-control" name="rfcPMN" formControlName="rfcPMN" id="rfcPMN" maxlength="13">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="denominacionPMN">Nombre, denominación o razón
                social:</label>
            <input type="text" class="form-control" name="denominacionPMN" formControlName="denominacionPMN"
                maxlength="254" id="denominacionPMN">
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label for="correoPMN" class="form-label">Correo electrónico: <span class="bi bi-question-circle-fill"
                    title="{{ TEXTOS.CORREO_TITULO_TOOLTIP }}" data-bs-toggle="tooltip"></span></label>
            <input type="text" name="correoPMN" id="correoPMN" class="form-control" maxlength="320"
                formControlName="correoPMN">
        </div>
    </div>

    <!-- Domicilios -->
    <ng-titulo titulo="Domicilio fiscal"></ng-titulo>

    <div class="row">
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="pais" [id]="'paisPMN'" formControlName="paisPMN" [label]="'País'"
                name="cvePais" [isDisabled]="true"></app-catalogo-select>
        </div>
        <div class="col-md-4 pt-7">
            <label for="codigoPostal">Código postal:</label>
            <input type="text" class="form-control" name="codigoPostalPMN" id="codigoPostalPMN"
                formControlName="codigoPostalPMN" maxlength="12">
        </div>
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="estado" [id]="'entidadFederativaPMN'" formControlName="estadoPMN"
                [label]="'Estado'" [isDisabled]="true" name="cveEstado"></app-catalogo-select>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="municipio" formControlName="municipioPMN" [label]="'Municipio o alcaldía'"
                [isDisabled]="true" name="cveMunicipio"></app-catalogo-select>
        </div>
        <div class="col-md-4 pt-7">
            <label for="localidad">Localidad:</label>
            <input type="text" class="form-control" name="localidadPMN" id="localidadPMN" formControlName="localidadPMN"
                maxlength="120">
        </div>
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="colonia" formControlName="coloniaPMN" [label]="'Colonia'" name="cveColonia"
                [isDisabled]="true"></app-catalogo-select>
        </div>
    </div>

    <div class="row pt-7">
        <div class="col-md-8">
            <label for="calle">Calle:</label>
            <input type="text" class="form-control" name="callePMN" id="callePMN" formControlName="callePMN"
                maxlength="100">
        </div>
        <div class="col-md-4">
            <label for="numeroExterior">Número exterior:</label>
            <input type="text" class="form-control" name="numeroExteriorPMN" id="numeroExteriorPMN"
                formControlName="numeroExteriorPMN" maxlength="55">
        </div>
    </div>

    <div class="row pt-7">
        <div class="col-md-4">
            <label for="numeroInterior">Número interior:</label>
            <input type="text" class="form-control" name="numeroInteriorPMN" id="numeroInteriorPMN"
                formControlName="numeroInteriorPMN" maxlength="55">
        </div>
    </div>

    <div class="row">
        <ng-titulo titulo="Nombre del director general"></ng-titulo>
        <div class="col-md-4">
            <label for="nombre">Nombre(s)<span
                    [ngClass]="esControlInvalido('nombreDirectorGeneral') ?  'has-error' : ''">*</span>:</label>
            <input [ngClass]="esControlInvalido('nombreDirectorGeneral') ? 'required' : ''" type="text"
                class="form-control" name="nombreDirectorGeneral" id="nombreDirectorGeneral"
                formControlName="nombreDirectorGeneral" maxlength="200">
            <div *ngIf="esControlInvalido('nombreDirectorGeneral')" class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-4">
            <label for="nombre">Primer Apellido<span
                    [ngClass]="esControlInvalido('apellidoPaternoDirectorGeneral') ?  'has-error' : ''">*</span>:</label>
            <input [ngClass]="esControlInvalido('apellidoPaternoDirectorGeneral') ? 'required' : ''" type="text"
                class="form-control" name="apellidoPaternoDirectorGeneral" id="apellidoPaternoDirectorGeneral"
                formControlName="apellidoPaternoDirectorGeneral" maxlength="200">
            <div *ngIf="esControlInvalido('apellidoPaternoDirectorGeneral')" class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-4">
            <label for="apellidoMaterno">Segundo apellido:</label>
            <input type="text" class="form-control" name="apellidoMaternoDirectorGeneral"
                id="apellidoMaternoDirectorGeneral" formControlName="apellidoMaternoDirectorGeneral" maxlength="200">
        </div>
    </div>

    <div class="mt-5 d-flex justify-content-end">
        <button type="button" class="btn btn-primary ms-3" (click)="cerrarModal()" [disabled]="false">
            Cancelar
        </button>
        <button type="button" (click)="agregarCandidato()" class="btn btn-primary ms-3" [disabled]="false">
            Agregar
        </button>
    </div>
</form>
