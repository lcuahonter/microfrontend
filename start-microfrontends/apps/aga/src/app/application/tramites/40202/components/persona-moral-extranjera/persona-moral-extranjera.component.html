<form [formGroup]="personaMoralExtranjeraForm" id="formPME" name="formPME">
    <ng-titulo titulo="Persona  extranjera"></ng-titulo>

    <div class="col-12">
        @if (!validForm) {
        <div class="alert alert-info alert-danger text-center" [innerHTML]="denominacionDuplicado">
        </div>
        }
    </div>
    @if (empresaModificar && empresaModificar.moral) {
    <div class="row">
        <div class="col-md-8">
            <label class="form-label" for="seguroNumero">Nombre, denominación o razón
                social<span [ngClass]="campoInvalido('denominacionPME') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="denominacionPME"
                [ngClass]="campoInvalido('denominacionPME') ? 'required' : ''" formControlName="denominacionPME"
                maxlength="254" id="denominacionPME">
            <div *ngIf="personaMoralExtranjeraForm.get('denominacionPME')?.invalid && personaMoralExtranjeraForm.get('denominacionPME')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-4">
            <label class="form-label" for="correoPME">Correo electrónico<span class="bi bi-question-circle-fill"
                    data-bs-toggle="tooltip" title="{{ TEXTOS.CORREO_TITULO_TOOLTIP }}"></span><span
                    [ngClass]="campoInvalido('correoPME') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="correoPME" formControlName="correoPME"
                [ngClass]="campoInvalido('correoPME') ? 'required' : ''" type="text" maxlength="320" id="correoPME">
            <div *ngIf="personaMoralExtranjeraForm.get('correoPME')?.invalid && personaMoralExtranjeraForm.get('correoPME')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
    </div>
    }@else{
    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="seguroNumero">Número del seguro social<span
                    [ngClass]="campoInvalido('seguroNumero') ? 'has-error' : ''">*</span>:</label>

            <input class="form-control" maxlength="9" libSoloNumeros
                [ngClass]="campoInvalido('seguroNumero') ? 'required' : ''" type="text" id="seguroNumero"
                formControlName="seguroNumero" />
            <div *ngIf="personaMoralExtranjeraForm.get('seguroNumero')?.invalid && personaMoralExtranjeraForm.get('seguroNumero')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>

        <div class="col-md-4">

            <label class="form-label" for="nombrePFE">Nombre(s)<span
                    [ngClass]="campoInvalido('nombrePFE') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" size="40" id="nombrePFE" maxlength="200"
                [ngClass]="campoInvalido('nombrePFE') ? 'required' : ''" type="text" formControlName="nombrePFE">
            <div *ngIf="personaMoralExtranjeraForm.get('nombrePFE')?.invalid && personaMoralExtranjeraForm.get('nombrePFE')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-4">
            <label class="form-label" for="apellidoPaternoPFE">Primer Apellido<span
                    [ngClass]="campoInvalido('apellidoPaternoPFE') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" size="40" id="apellidoPaternoPFE"
                [ngClass]="campoInvalido('apellidoPaternoPFE') ? 'required' : ''" type="text" maxlength="200"
                formControlName="apellidoPaternoPFE">
            <div *ngIf="personaMoralExtranjeraForm.get('apellidoPaternoPFE')?.invalid && personaMoralExtranjeraForm.get('apellidoPaternoPFE')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="apellidoMaterno">Segundo Apellido:</label>
            <input type="text" class="form-control" name="apellidoMaternoPFE" formControlName="apellidoMaternoPFE"
                id="apellidoMaternoPFE" maxlength="200">
        </div>
        <div class="col-md-8">
            <label class="form-label" for="correoPFE">Correo electrónico<span class="bi bi-question-circle-fill"
                    data-bs-toggle="tooltip" title="{{ TEXTOS.CORREO_TITULO_TOOLTIP }}"></span><span
                    [ngClass]="campoInvalido('correoPFE') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="correoPFE" formControlName="correoPFE"
                [ngClass]="campoInvalido('correoPFE') ? 'required' : ''" type="text" maxlength="320" id="correoPFE">
            <div *ngIf="personaMoralExtranjeraForm.get('correoPFE')?.invalid && personaMoralExtranjeraForm.get('correoPFE')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>

        </div>
    </div>
    }

    <!-- Domicilios -->
    <ng-titulo titulo="Domicilio fiscal"></ng-titulo>

    <div class="row">
        <div class="col-md-4">
            <app-catalogo-select [catalogo]="pais" [id]="'paisPME'" formControlName="paisPME"
                [markTouched]="personaMoralExtranjeraForm.get('paisPME')?.touched || false" [label]="'País'"
                name="cvePais" [required]="true" [isDisabled]="esFormularioSoloLectura"></app-catalogo-select>
        </div>
        <div class="col-md-4 pt-7">
            <label class="form-label" for="codigoPostalPME">Código postal<span
                    [ngClass]="campoInvalido('codigoPostalPME') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="codigoPostalPME" id="codigoPostalPME"
                [ngClass]="campoInvalido('codigoPostalPME') ? 'required' : ''" type="text"
                formControlName="codigoPostalPME" maxlength="12">
            <div *ngIf="personaMoralExtranjeraForm.get('codigoPostalPME')?.invalid && personaMoralExtranjeraForm.get('codigoPostalPME')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-4 pt-7">
            <label class="form-label" for="ciudadPME">Ciudad<span
                    [ngClass]="campoInvalido('ciudadPME') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="ciudadPME" id="ciudadPME"
                [ngClass]="campoInvalido('ciudadPME') ? 'required' : ''" type="text" formControlName="ciudadPME"
                maxlength="120">
            <div *ngIf="personaMoralExtranjeraForm.get('ciudadPME')?.invalid && personaMoralExtranjeraForm.get('ciudadPME')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
    </div>

    <div class="row pt-7">
        <div class="col-md-4">
            <label class="form-label" for="estadoPME">Estado<span
                    [ngClass]="campoInvalido('estadoPME') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="estadoPME" id="entidadFederativaPME"
                [ngClass]="campoInvalido('estadoPME') ? 'required' : ''" type="text" formControlName="estadoPME"
                maxlength="200">
            <div *ngIf="personaMoralExtranjeraForm.get('estadoPME')?.invalid && personaMoralExtranjeraForm.get('estadoPME')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-8">
            <label class="form-label" for="callePME">Calle<span
                    [ngClass]="campoInvalido('callePME') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="callePME" id="callePME"
                [ngClass]="campoInvalido('callePME') ? 'required' : ''" type="text" formControlName="callePME"
                maxlength="100">
            <div *ngIf="personaMoralExtranjeraForm.get('callePME')?.invalid && personaMoralExtranjeraForm.get('callePME')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
    </div>

    <div class="row pt-7">
        <div class="col-md-4">
            <label class="form-label" for="numeroExteriorPME">Número exterior<span
                    [ngClass]="campoInvalido('numeroExteriorPME') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" name="numeroExteriorPME" id="numeroExteriorPME"
                [ngClass]="campoInvalido('numeroExteriorPME') ? 'required' : ''" type="text"
                formControlName="numeroExteriorPME" maxlength="55">
            <div *ngIf="personaMoralExtranjeraForm.get('numeroExteriorPME')?.invalid && personaMoralExtranjeraForm.get('numeroExteriorPME')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-4">
            <label for="numeroInteriorPME">Número interior:</label>
            <input type="text" class="form-control" name="numeroInteriorPME" id="numeroInteriorPME"
                formControlName="numeroInteriorPME" maxlength="55">
        </div>
    </div>

    @if (empresaModificar && empresaModificar.moral) {
    <ng-titulo titulo="Nombre del director general"></ng-titulo>

    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="seguroNumero">Nombre(s)<span
                    [ngClass]="campoInvalido('nombreDG') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" [ngClass]="campoInvalido('nombreDG') ? 'required' : ''"
                name="nombreDG" id="nombreDG" formControlName="nombreDG" maxlength="28">
            <div *ngIf="personaMoralExtranjeraForm.get('nombreDG')?.invalid && personaMoralExtranjeraForm.get('nombreDG')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>

        </div>
        <div class="col-md-4">
            <label class="form-label" for="seguroNumero">Primer apellido<span
                    [ngClass]="campoInvalido('apellidoPaternoDG') ? 'has-error' : ''">*</span>:</label>
            <input type="text" class="form-control" [ngClass]="campoInvalido('apellidoPaternoDG') ? 'required' : ''"
                name="apellidoPaternoDG" id="apellidoPaternoDG" formControlName="apellidoPaternoDG" maxlength="20">
            <div *ngIf="personaMoralExtranjeraForm.get('apellidoPaternoDG')?.invalid && personaMoralExtranjeraForm.get('apellidoPaternoDG')?.touched"
                class="has-error">
                <div [innerHTML]="mensajeCampoObligatorio"></div>
            </div>
        </div>
        <div class="col-md-4">
            <label for="apellidoMaterno">Segundo apellido:</label>
            <input type="text" class="form-control" name="apellidoMaternoDG" id="apellidoMaternoDG"
                formControlName="apellidoMaternoDG" maxlength="20">
        </div>
    </div>
    }

    <div class="mt-5 d-flex justify-content-end">
        <button type="button" class="btn btn-primary ms-3" (click)="cerrar.emit(true)" [disabled]="false">
            Cancelar
        </button>
        <button type="button" (click)="agregarCandidato()" class="btn btn-primary ms-3"
            [disabled]="false">
            Agregar
        </button>
    </div>
</form>
