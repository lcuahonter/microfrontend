<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h3>Importación temporal de contenedores</h3>
      </div>
      <div class="row mt-5" *ngIf="indice === 2">
        <div class="col-md-12">
          <lib-notificaciones
            [notificacionInput]="alertaNotificacion"
          ></lib-notificaciones>
        </div>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <paso-uno (continuarEvento)="continuar()" (cancelarEvento)="cancelar()"></paso-uno>
      } @case (3) {
        <paso-firma
        [idSolicitud]="numeroSolicitud"
        [procedure]="11201"
        [procedureUrl]="'solicitante'"
      ></paso-firma>
      <div class="mt-5 mb-3 d-flex justify-content-end">
        <button
            type="button"
            class="btn btn-default  ms-3"
            (click)="anterior()"
          >
            Anterior
          </button>
      </div>
      
      } @case (2) {
        <app-paso-dos (cancelEvent)="cancelar()" (continuarEvento)="continuar()"></app-paso-dos>
        }}
    </div>
  </div>
</div>
