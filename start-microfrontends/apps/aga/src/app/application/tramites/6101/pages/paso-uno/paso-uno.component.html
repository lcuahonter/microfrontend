<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="1"
          role="button"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="2"
          role="button"
          >Solicitud</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) { @if(esDatosRespuesta){
      <solicitante></solicitante>
      } } @case (2) { @if(esDatosRespuesta){
      <app-solicitud [tramiteId]="tramiteId"></app-solicitud>
      } } }
    </ng-container>
  </div>
</div>
