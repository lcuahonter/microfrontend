<div class="page">
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <h2>Gestión de Cuentas y Roles SAT</h2>
        </div>
        <app-wizard [listaPasos]="pasos"></app-wizard>
      </div>
      <div class="row"> @switch (indice) 
        { @case (1) { <app-paso-uno (miEvento)="alEventoHijo(nombre)"></app-paso-uno> }
        @case (2) { <app-paso-tres></app-paso-tres> } } 
        <btn-continuar *ngIf="nombre !== 2" [datos]="datosPasos"
          (continuarEvento)="getValorIndice($event)"></btn-continuar>
      </div>

        @if(indice === 1) {
        <div class="row">
          <div class="col-md-12">
            <ng-alert [CONTENIDO]="alertText"></ng-alert>
          </div>
        </div>
        }
    </div>
  </div>
