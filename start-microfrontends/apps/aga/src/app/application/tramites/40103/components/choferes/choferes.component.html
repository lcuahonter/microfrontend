<div class="container">
  <div class="tabs w-100">
    <ul class="nav nav-tabs mt-5" role="tablist">
      <li class="nav-item">
        <a
          class="nav-link"
          [class.active]="activeTab === 'nacional'"
          (click)="setActiveTab('nacional')"
          data-bs-toggle="tab"
          href="#subtabs-1"
          role="tab"
        >
          Registro de chofer nacional
        </a>
      </li>
      <li class="nav-item">
        <a
          class="nav-link"
          [class.active]="activeTab === 'extranjero'"
          (click)="setActiveTab('extranjero')"
          data-bs-toggle="tab"
          href="#subtabs-2"
          role="tab"
        >
          Registro de chofer extranjero
        </a>
      </li>
    </ul>
  </div>
  <div class="row mt-5">
    <div class="tab-content">


    @if(activeTab ==='nacional') {
      <ng-titulo [titulo]="CHOFERES_PAGE.CHOFERES_NACIONALES"></ng-titulo>
      <app-chofere-nacional></app-chofere-nacional>
      <app-chofere-nacional-notification [mensaje]="TEXTOS.MENSAJE_NACIONAL"></app-chofere-nacional-notification>
      <app-chofere-nacional-modificacion></app-chofere-nacional-modificacion>
      <app-chofere-nacional-retirada></app-chofere-nacional-retirada>
    }
    @if(activeTab ==='extranjero') {
      <ng-titulo [titulo]="CHOFERES_PAGE.CHOFERES_EXTRANJEROS"></ng-titulo>
      <app-chofere-alta-de-extranjeros></app-chofere-alta-de-extranjeros>
      <app-chofere-nacional-notification [mensaje]="TEXTOS.MENSAJE_EXTRANJERO"></app-chofere-nacional-notification>
      <app-chofere-modification-de-choferes></app-chofere-modification-de-choferes>
      <app-chofere-retirada-de-choferes></app-chofere-retirada-de-choferes>
    }

    </div>
  </div>
</div>
