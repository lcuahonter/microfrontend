<div class="container">
  <ng-titulo titulo="Nombre del director general"></ng-titulo>
  <form [formGroup]="directorGeneralForm">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label" for="nombre">Nombre(s)*:</label>
        <input type="text" class="form-control" id="nombre" formControlName="nombre"
          (change)="setValoresStore(directorGeneralForm,'nombre', 'setNombre')" />
        @if (directorGeneralForm.get('nombre')?.invalid && directorGeneralForm.get('nombre')?.touched) {
        <div class="text-danger">
          <small>Este campo es obligatorio.</small>
        </div>
        }
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label" for="primerApellido">Primer apellido*:</label>
        <input type="text" class="form-control" id="primerApellido" formControlName="primerApellido"
          (change)="setValoresStore(directorGeneralForm,'primerApellido', 'setPrimerApellido')" />
        @if (directorGeneralForm.get('primerApellido')?.invalid && directorGeneralForm.get('primerApellido')?.touched) {
        <div class="text-danger">
          <small>Este campo es obligatorio.</small>
        </div>
        }
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label" for="segundoApellido">Segundo apellido:</label>
        <input type="text" class="form-control" id="segundoApellido" formControlName="segundoApellido"
          (change)="setValoresStore(directorGeneralForm,'segundoApellido', 'setSegundoApellido')" />
      </div>
    </div>
  </form>
</div>
