<div class="container">

  <div class="row table-responsive">
    <div class="col-md-12">
      <h5>Baja de choferes extranjeros:</h5>

      <app-tabla-dinamica [tipoSeleccionTabla]="tipoSeleccionTabla" [configuracionTabla]="ConfiguracionColumna"
        [datos]="datosDelChoferExtranjeros" (listaDeFilaSeleccionada)="onChofereNationalSelected($event)">
      </app-tabla-dinamica>

    </div>
  </div>

  <div class="row mt-3">
    <div class="col-md-12 text-end">
      <div class="btn-group">
        <button class="btn btn-default" type="button" [disabled]="isReadonly"
          (click)="deleteSelectedRow()">
          Eliminar
        </button>
        <button class="btn btn-primary ms-2" (click)="addNewRow(agregarModalDialog)"
          [disabled]="isReadonly">
          Buscar
        </button>
      </div>
    </div>
    <ng-template #datosDeChoferesModal>
      <div id="datosDeChoferesModal">
        <app-choferes-datos-extranjeros-dialog [datosDeChofere]="datosChofere" #datosDeChoferesModal [readonly]="isReadonly"
          (eventoAgregarModal)="agregarModal($event)" (cancelEvent)="cancelModal()" [contexto]="'retirada'"></app-choferes-datos-extranjeros-dialog>

      </div>
    </ng-template>

    
  </div>
