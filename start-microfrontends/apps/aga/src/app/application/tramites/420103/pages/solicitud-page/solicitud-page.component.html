<div class="page">
  <div class="container">
    <div class="row mt-5">
      <div class="col-md-6">
        <h1>Concluir relación</h1>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { 
      @case (1) {
      <paso-uno></paso-uno>
      }
      @case (2){
        <app-paso-tres></app-paso-tres>
      }
    }

      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
    </div>
  </div>
</div>
