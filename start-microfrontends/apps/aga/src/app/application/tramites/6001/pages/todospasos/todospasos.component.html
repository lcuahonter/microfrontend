<div class="page">
    <div class="container">
        <div class="row">
            @if(indice === 1) {
                <div class="col-md-6">
                    <h1>Cuentas bancarias</h1>
                </div>
            } @else if(indice === 3) {
                <div class="col-md-12 mt-5">
                    <div class="mb-3">
                        <h1>Firmar</h1>
                    </div>
                    <ng-alert [CONTENIDO]="TEXTOS.Importante"></ng-alert>
                </div>
            }
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
                    <app-paso-uno></app-paso-uno>
                }
            @case (2) {
                    <app-paso-tres></app-paso-tres>
                }
            @case (3) {
                    <app-paso-dos></app-paso-dos>
                }
            }
            <btn-continuar 
                [datos]="datosPasos" 
                (continuarEvento)="getValorIndice($event)">
            </btn-continuar>
        </div>
    </div>
</div>
