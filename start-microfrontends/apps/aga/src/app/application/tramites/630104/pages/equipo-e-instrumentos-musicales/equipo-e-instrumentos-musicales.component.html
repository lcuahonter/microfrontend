<div class="page">
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <h2>Autorización de importación temporal de equipo e instrumentos musicales</h2>
        </div>
        <app-wizard [listaPasos]="pasosSolicitar"></app-wizard>
      </div>
  
      <div class="row">
        @switch(indice){
          @case(1){
            <app-paso-uno></app-paso-uno>
            }@case(2){
              <app-paso-dos></app-paso-dos>
            }@case(3){
              <app-paso-tres></app-paso-tres>
            }
        }
        <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
     
          <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
          
    </div>
    
  </div>
