<div class="container my-5">
  <form [formGroup]="proveedoreForm">
    <div class="row">
      <div class="col-12 col-md-4">
        <label for="registroFederalContribuyente" class="form-label"
          >Registro federal del contribuyente*:</label
        >
        <input
          type="text"
          id="registroFederalContribuyente"
          class="form-control"
          formControlName="registroFederalContribuyente"
        />
      </div>

      <div class="col-12 col-md-2 my-5">
        <div class="">
          <button type="button" class="btn btn-primary">Buscar</button>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-12 col-md-4">
        <label for="razonSocial" class="form-label"
          >Denominación o razón social:</label
        >
        <input
          type="text"
          id="razonSocial"
          class="form-control"
          formControlName="razonSocial"
        />
      </div>

      <div class="col-12 col-md-8">
        <label for="domicilioFiscal" class="form-label"
          >Domicilio fiscal:</label
        >
        <input
          type="text"
          id="domicilioFiscal"
          class="form-control"
          formControlName="domicilioFiscal"
        />
      </div>
    </div>

    <div class="row">
      <div class="col-12 col-md-12 my-5">
        <crosslist
          [fechas]="usoCrossListDatos"
          [label]="usoNormaSeleccionadaLabel"
          buttonPreset="cambiar"
        >
        </crosslist>
      </div>

      <div class="col-12 col-md-12 my-5">
        <crosslist
          [fechas]="usoCrossListDatos"
          [label]="usoProgramaImmexLabel"
          buttonPreset="cambiar"
        >
        </crosslist>
      </div>

      <div class="col-12 col-md-12 my-5">
        <crosslist
          [fechas]="usoCrossListDatos"
          [label]="usoProgramaProsecLabel"
          buttonPreset="cambiar"
        >
        </crosslist>
      </div>

      <div class="col-12 col-md-12 my-5">
        <crosslist
          [fechas]="usoCrossListDatos"
          [label]="usoAduanaSeleccionadaLabel"
          buttonPreset="cambiar"
        >
        </crosslist>
      </div>

      <div class="col-md-12">
        <div class="text-end my-3">
          <button
            type="button"
            name="cancelarProveedore"
            class="btn btn-danger mx-3"
            (click)="cancelar()"
          >
            Cancelar
          </button>

          <button
            type="button"
            name="agregarProveedore"
            class="btn btn-primary"
            (click)="agregarProveedore()"
          >
            Agregar
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
