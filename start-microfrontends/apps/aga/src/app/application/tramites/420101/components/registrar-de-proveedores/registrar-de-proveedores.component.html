<div class="container">
  <div>
    <ng-titulo titulo="Registrar de proveedores." />
    <div class="row mb-3">
      <label class="form-label text-start mb-3 col-md-12"
        >Para descargar plantilla del archivo de excel de click aquí</label
      >
      <div class="col-md-4">
        <label for="cargarArchivo" class="form-label"
          >Archivo excel a incorporar</label
        >
        <input
          class="form-control"
          type="file"
          name="cargarArchivo"
          id="cargarArchivo"
          required
          [disabled]="esFormularioSoloLectura"
        />
      </div>
      <div class="col-md-4 d-flex justify-content-end w-100 mb-5">
        <button type="button" [disabled]="esFormularioSoloLectura" class="btn btn-default" (click)="archivo()">
          Enviar
        </button>
      </div>
      <div class="table-container">
        <app-tabla-dinamica
          [configuracionTabla]="configuracionTablaRegistrar"
          [tipoSeleccionTabla]="tipoSeleccionTabla"
          [datos]="datosTabla"
        ></app-tabla-dinamica>
      </div>
    </div>
  </div>

  <div>
    <ng-titulo titulo="Registro de proveedores manual" />
    <div class="row">
      <div class="table-container col-md-12">
        <app-tabla-dinamica
          [configuracionTabla]="configuracionTablaRegistrarManual"
          [tipoSeleccionTabla]="tipoSeleccionTabla"
          [datos]="datosProveedoresManual"
        ></app-tabla-dinamica>
      </div>

      <div class="col-md-12">
        <div class="text-end my-3">
          <button
            type="button"
            name="modificarProveedore"
            class="btn btn-default"
            [disabled]="esFormularioSoloLectura"
          >
            Modificar
          </button>

          <button
            type="button"
            name="eliminarProveedore"
            class="btn btn-danger mx-3"
            [disabled]="esFormularioSoloLectura"
          >
            Eliminar
          </button>

          <button
            type="button"
            name="agregarProveedore"
            class="btn btn-primary"
            [disabled]="esFormularioSoloLectura"
            (click)="navigateRegistroProveedoresManual()"
          >
            Agregar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
