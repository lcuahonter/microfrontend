<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(1)">Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(2)">Datos del trámite</a>
        </li>
      </ul>
  
      <ng-container>
        @switch (indice) {
        @case (1) {
        <solicitante></solicitante>
        }
        @case (2) {
        <app-datos-del-inmueble [consultaState]="consultaState"></app-datos-del-inmueble>
        }
        }
      </ng-container>
    </div>
  </div>
