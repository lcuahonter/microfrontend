<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <ul class="nav nav-tabs">
        <li
          *ngFor="let tab of seccionesDeLaSolicitud"
          [ngClass]="indice === tab.index ? 'active' : ''"
        >
          <a
            data-toggle="tab"
            (click)="seleccionaTab(tab.index)"
            (keydown.enter)="seleccionaTab(tab.index)"
            tabindex="0"
            >{{ tab.title }}</a
          >
        </li>
      </ul>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante></solicitante>
      } @case (2) {
      } }
      <app-operaciones-de-comercio-exterior  [class.oculto]="indice !== 2" #operaciones></app-operaciones-de-comercio-exterior>

    </ng-container>
  </div>
</div>
