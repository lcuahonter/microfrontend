<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h3>Transferencia de contenedores</h3>
      </div>
       <div class="row mt-5" *ngIf="indice === 2">
        <div class="col-md-12">
          <lib-notificaciones
            [notificacionInput]="alertaNotificacion"
          ></lib-notificaciones>
        </div>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) {
      @case (1) {
      <paso-uno (continuarEvento)="continuar()"></paso-uno>
      }
      @case (2) {
      <paso-dos [idTipoTRamite]="'11204'" [datosUsuario]="datosUsuario" [cargaArchivosEvento]="cargarArchivosEvento"
        (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
        (reenviarCargaRealizada)="cargaRealizada($event)"></paso-dos>

      }
      @case (3) {
      <paso-firma [idSolicitud]="numeroSolicitud" [procedure]="11204"
        [procedureUrl]="'solicitante'"></paso-firma>
      <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
              type="button"
              class="btn btn-default  ms-3"
              (click)="anterior()"
            >
              Anterior
            </button>
        </div>

      }
      }
    </div>
    <div class="row">
      <div class="col-md-12">
        @if (indice === 2) {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button type="button" class="btn btn-default" (click)="anterior()">
            Anterior
          </button>

          <button class="btn btn-primary ms-3" (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            " [disabled]="!activarBotonCargaArchivos && seccionCargarDocumentos">
            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
          </button>
        </div>
        }
      </div>
    </div>
  </div>
</div>
