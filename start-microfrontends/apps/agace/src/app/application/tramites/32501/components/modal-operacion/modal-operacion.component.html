<form [formGroup]="frmDatosOperacionImp">
  <div class="row">
    <div class="col-md-12">
      <ng-titulo titulo="Modificar operaci&oacute;n de importaci&oacute;n" />
    </div>
  </div>
  <div class="row mt-3">
    <div class="col-md-6">
      <label for="patente">Patente o autorización del Agente Aduanal</label>
      <span class="require">*</span>
      <input
        id="patente"
        formControlName="patente"
        class="form-control"
        [ngClass]="esValido('patente') ? 'required' : ''"
        (change)="establecerValoresEnEstado(frmDatosOperacionImp, 'patente')"
      />
      <div *ngIf="noEsValido('patente')" class="text-danger">
        Este campo es obligatorio
      </div>
    </div>
    <div class="col-md-6">
      <label for="rfc">RFC del Agente o Apoderado Aduanal</label>
      <span class="require">*</span>
      <input
        id="rfc"
        formControlName="rfc"
        class="form-control"
        [ngClass]="esValido('rfc') ? 'required' : ''"
        (change)="establecerValoresEnEstado(frmDatosOperacionImp, 'rfc')"
      />
      <div *ngIf="noEsValido('rfc')" class="text-danger">
        Este campo es obligatorio
      </div>
    </div>
  </div>
  <div class="row mt-3">
    <div class="col-md-6">
      <label for="pedimento">Número de pedimento</label>
      <span class="require">*</span>
      <input
        id="pedimento"
        formControlName="pedimento"
        class="form-control"
        [ngClass]="esValido('pedimento') ? 'required' : ''"
        (change)="establecerValoresEnEstado(frmDatosOperacionImp, 'pedimento')"
      />
      <div *ngIf="noEsValido('pedimento')" class="text-danger">
        Este campo es obligatorio
      </div>
    </div>
    <div class="col-md-6">
      <app-catalogo-select
        formControlName="aduana"
        [catalogo]="opcionAduana.catalogos"
        [label]="opcionAduana.labelNombre"
        [required]="opcionAduana.required"
        name="aduana"
        (selectionChange)="establecerValoresEnEstado(frmDatosOperacionImp, 'aduana')"
      ></app-catalogo-select>
      <div *ngIf="noEsValido('aduana')" class="text-danger">
        Este campo es obligatorio
      </div>
    </div>
  </div>
  <div class="row mt-3">
    <div class="col-md-12">
      <div class="pull-right">
        <button
          type="button"
          id="cancelarDatosOperacionImp"
          class="mid btn btn-default me-3"
          data-bs-dismiss="modal"
        >
          Cancelar
        </button>
        <button
          type="button"
          id="agregarDatosOperacionImp"
          class="default btn btn-primary"
          data-bs-dismiss="modal"
        >
          Agregar
        </button>
      </div>
    </div>
  </div>
</form>
