<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          role="button"
          tabindex="0"
        >
          Solicitante
        </a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          role="button"
          tabindex="2"
        >
          Aviso
        </a>
      </li>
    </ul>

    <div [hidden]="indice !== 1">
      <solicitante></solicitante>
    </div>

    <div [hidden]="indice !== 2">
      <app-datos-solicitud
        #solicitudComponent
        *ngIf="datosRespuestaDisponibles"
      ></app-datos-solicitud>
    </div>
  </div>
</div>
