<div class="row mt-5">
    <div class="col-md-12">
    <ng-titulo titulo="Aviso de Agentes Aduanales y Apoderados Aduanales autorizados" />
    </div>
  
    <div class="col-md-12">
      <app-tabla-dinamica
        [configuracionTabla]="CONFIGURACION_TABLA_AGENTE"
        [datos]="avisoAgenteDatos"
        [tipoSeleccionTabla]="tipoSeleccionsoliMercancias"
        [acciones]="acciones"
        (listaDeFilaSeleccionada)="getAgenteDatos($event)"
      >
      </app-tabla-dinamica>
    </div>

    <div class="row">
    <div class="col-md-12">
      <div class="d-flex justify-content-end">
        <button
          type="button"
          id="btnAgregarPersona"
          class="btn btn-primary"
          (click)="AgregarTransportias()"
          [disabled]="soloLectura"
        >
          Agregar
        </button>
        <button
          type="button"
          id="btnEliminarPersona"
          class="btn btn-danger"
          (click)="eliminarAgente()"
          [disabled]="soloLectura"
        >
          Eliminar
        </button>
        <button
          type="button"
          id="btnModificarPersona"
          class="btn btn-secondary"
          (click)="modificarAgente()"
          [disabled]="soloLectura"
        >
          Modificar
        </button>
      </div>
    </div>
  </div>
</div>
