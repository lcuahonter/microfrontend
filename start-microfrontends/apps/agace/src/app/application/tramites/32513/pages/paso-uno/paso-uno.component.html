<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" tabindex="1" role="button">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" tabindex="2" role="button">Tipo de aviso</a>
      </li>
    </ul>

    <ng-container>
      @switch (indice) { 
        @case (1) {
          <solicitante></solicitante>
          <div class="row mt-3" [formGroup]="solicitanteForm">
            <div class="col-md-4">
              <label>ADACE:</label>
              <input type="text" class="form-control" formControlName="adace" required/>
            </div>
          </div>
        } 
        @case (2){
          <app-aviso></app-aviso>
        } 
        }
    </ng-container>
  </div>
</div>
