<form [formGroup]="avisoForm">
    <div class="col-md-12">
        <ng-titulo titulo="Datos de la mercancía importada" />
    </div>
    <div class="col-md-12">
        <label class="form-label text-start">
            Datos de la mercancía importada de donde procede el desperdicio
        </label>
        <hr class="red">
    </div>
    <div class="col-md-12">
        <div class="row">
            <div class="form-group">
                <label for="descripcionMercancia">
                    Descripción de la mercancía importada temporalmente de donde procede el desperdicio a destruir*:
                </label>
                <input type="text" id="descripcionMercancia" formControlName="descripcionMercancia" class="form-control"
                    (change)="setValoresStore(avisoForm, 'descripcionMercancia', 'setDescripcionMercancia')"
                    [disabled]="esFormularioSoloLectura" />
                <div *ngIf="isInvalid('descripcionMercancia')" class="mensaje-error">
                    Este campo es obligatorio.
                </div>
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label for="porcentajeDesperdicio">
                    Porcentaje que representa el desperdicio de destruir, de la mercancía importada temporalmente de la que procede*:
                </label>
                <input type="number" id="porcentajeDesperdicio" formControlName="porcentajeDesperdicio" class="form-control porWidth" 
                    (change)="setValoresStore(avisoForm, 'porcentajeDesperdicio', 'setPorcentajeDesperdicio')"
                    [disabled]="esFormularioSoloLectura" />
                <div *ngIf="isInvalid('porcentajeDesperdicio')" class="mensaje-error">
                    Este campo es obligatorio.
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-12">
        <ng-titulo titulo="Datos de la mercancía que se destruirá" />
    </div>
    <div class="col-md-12">
        <label class="form-label text-justify">
            Para descargar plantilla del archivo de excel de click
            <a [href]="" target="_blank" class="text-primary fw-bold">aquí</a>
        </label>
        <div class="row">
            <label class="form-label text-justify ml-1"> Cargar archivo: </label>
        </div>
        <div class="row">
            <div class="col-md-6">
                <button type="button" for="archivoMedicamentos" class="file-upload" (click)="activarSeleccionArchivo()" [disabled]="esFormularioSoloLectura">
                    seleccionar archivo
                </button>
                <span class="ml-2">{{ elgirDeArchivo }}</span>
                <input type="file" id="archivoMedicamentos" (change)="onCambioDeArchivo($event)" class="file-upload"
                    style="display: none" />
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 d-flex justify-content-end">
                <button type="button" class="btn btn-default" (click)="cargarProveedores()" [disabled]="esFormularioSoloLectura">
                    Cargar
                </button>
            </div>
        </div>
        <div *ngIf="mostrarMensajeArchivoValido" class="mt-3">
            <textarea class="form-control mesaje-archivo mt-2" rows="4" disabled>{{ mensajeArchivoValido }}</textarea>
        </div>
    </div>
</form>
