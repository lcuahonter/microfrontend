<div class="page">
  <div class="container">
    <div class="row mt-5">
      <div class="col-md-12">
        @if (indice === 1) {
          <h2>
            Aviso para la destrucción de mercancías propiedad del Fisco Federal.
          </h2>
        }
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="TEXTO_DE_ALERTA" [CUSTOMECLASS]="infoAlert"></ng-alert>
        </div>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { 
        @case (1) {
          <paso-uno></paso-uno>
        } 
        @case (2) {
          <paso-dos></paso-dos>
        } 
        @case (3) {
          <paso-tres></paso-tres>
        } 
      }
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
      @if (indice === 1) {
        <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
      }
    </div>
  </div>
</div>
