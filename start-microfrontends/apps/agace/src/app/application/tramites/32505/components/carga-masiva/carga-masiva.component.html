<div class="container">
  <ng-titulo [titulo]="'Plantilla de carga masiva'"></ng-titulo>
  <div class="row">
    <div class="col-md-12">
    <label>Para descargar plantilla del archivo de excel de click aquí</label>
    </div>
    <div class="col-md-12 mt-2">
      <input
        type="file"
        id="fileInput"
        (change)="actualizarArchivo($event)"
        hidden
      />
      <span for="fileInput" class="custom-upload-btn">{{
        TEXTOS.CARGA_DE_ARCHIVOS
      }}</span>
      <span class="file-name">{{ TEXTOS.CARGA_DE_ARCHIVO_DE_TEXTO }}</span>
    </div>
    <div class="col-md-12 d-flex justify-content-end">
      <button type="button" class="btn btn-primary ms-3" [disabled]="false">
        Cargar archivo
      </button>
      <button type="button" class="btn btn-primary ms-3" [disabled]="false">
        Limpiar
      </button>
    </div>
  </div>
</div>
