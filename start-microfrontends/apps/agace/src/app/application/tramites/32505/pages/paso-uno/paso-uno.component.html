<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)" tabindex="0">Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)" tabindex="1">{{ consultaState.parameter === "READ_PROCEDURE" ? 'Datos del Trámite' : 'Aviso' }}</a>
        </li>
      </ul>
  
      <ng-container>
        @switch (indice) { @case (1) {
            <app-solicitante></app-solicitante>
        } 
        @case (2) {
            <app-aviso></app-aviso>
        }
       
    }
      </ng-container>
    </div>
  </div>
