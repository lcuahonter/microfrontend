<div class="container">
    <div class="row">
        <div class="col-md-9">
            <h3>Aviso para la destrucción de mercancías importadas temporalmente para competencias y eventos deportivos o eventos de automovilismo deportivo (Regla 4.2.8)</h3>
        </div>
        <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    </div>
    <div class="row">
        @switch (indice) {
        @case (1) {
        <app-datos #datos></app-datos>
        } @case (2) {
        <app-paso-dos></app-paso-dos>
        } @case (3) {
        <app-paso-tres></app-paso-tres>
        }
        }
    </div>
    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)">
    </btn-continuar>
</div>
