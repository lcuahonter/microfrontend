<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="1" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="2" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Tipo de
                    Aviso</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="3" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Pago de
                    derechos</a>
            </li>

        </ul>
        <ng-container>
            @switch (indice) {
            @case(1) {
            <solicitante [tabindex]="1"></solicitante>
            }

            @case (2) {
            @if(esDatosRespuesta){

            <app-tipo-de-aviso></app-tipo-de-aviso>
            }
            }
            @case (3) {
            @if(esDatosRespuesta){

            <app-aviso-de-renovacion></app-aviso-de-renovacion>
            }
            }
            }
        </ng-container>
    </div>
</div>
