<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" tabindex="0" data-toggle="tab" >Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" tabindex="0" data-toggle="tab" >Datos Comunes</a>
        </li>

        <li [ngClass]="indice === 3 ? 'active' : ''">
          <a (click)="seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" tabindex="0" data-toggle="tab" >Terceros Relacionados</a>
        </li>
        <li [ngClass]="indice === 4 ? 'active' : ''">
            <a (click)="seleccionaTab(4)" (keyup.enter)="seleccionaTab(4)" (keydown.space)="seleccionaTab(4)" tabindex="0" data-toggle="tab" >Mensajeria y Paqueteria</a>
        </li>
        <li [ngClass]="indice === 5 ? 'active' : ''">
            <a (click)="seleccionaTab(5)" (keyup.enter)="seleccionaTab(5)" (keydown.space)="seleccionaTab(5)" tabindex="0" data-toggle="tab" >Perfiles Mensajeria</a>
        </li>
      </ul>
  
      <ng-container>
        @switch (indice) {
        @case (1) {
          <solicitante #Solicitante></solicitante>
        }
        @case (2) {
          <app-dato-comunes></app-dato-comunes>
        } 
        @case (3) {
          <app-represtantante></app-represtantante>
          <app-enlace></app-enlace>
          <app-persona></app-persona>
        } 
        @case (4) {
            <app-mensajeria></app-mensajeria>
        } 
        @case (5) {
          <app-perfiles-mensajeria></app-perfiles-mensajeria>
        } 
        }
      </ng-container>
    </div>
  </div>
