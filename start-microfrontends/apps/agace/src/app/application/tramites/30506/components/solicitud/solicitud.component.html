<form [formGroup]="registroForm" (ngSubmit)="validarDestinatarioFormulario()">
  <ng-container>
    <ng-titulo titulo="Aviso Único de Renovación en el Registro de Despacho de Mercancías" />
   
    <label class="label-spacing">{{ solicitudEnum.DATOS_REGISTRO }}</label>
    <div class="row mt-5">
      <div class="col-md-8">
        <label>Número de oficio*:</label>
        <input type="text" class="form-control" value="25000000346347642731" formControlName="numeroOperacion" readonly required />
      </div>
    </div>
    <div class="row mt-5">
      <div class="col-md-4">
        <input-fecha [setFecha]="registroForm.get('fechaInicio')?.value" [datos]="fechaInicialInput" class="disabled-input-fecha"></input-fecha>
      </div>
      <div class="col-md-4">
        <input-fecha [setFecha]="registroForm.get('fechaFinal')?.value" [datos]="fechaFinalInput" class="disabled-input-fecha"></input-fecha>
      </div>
    </div>
    <ng-titulo titulo="Pago de derechos" />
    <label class="label-spacing">{{ solicitudEnum.CORRESPONDIENTE }}</label>
    <div class="row mt-5">
      <div class="col-md-8">
        <label>Clave de referencia:</label>
        <input type="text" class="form-control" value="250034634" formControlName="claveReferencia" readonly required />
      </div>
    </div>
    <div class="row mt-5">
      <div class="col-md-8">
        <label>Cadena de la dependencia:</label>
        <input type="text" class="form-control" value="2500000AGAR03463" formControlName="cadenaDependecia" readonly required />
      </div>
      <div class="col-md-4">
        <app-catalogo-select [catalogo]="bancoCatalogo.catalogos" [label]="'Banco'" formControlName="banco" [isDisabled]="soloLectura" (change)="setValoresStore(registroForm, 'banco', 'setBanco')"></app-catalogo-select>
      </div>
    </div>
    <div class="row mt-5">
      <div class="col-md-4">
        <label>Llave de pago:</label>
        <input type="text" class="form-control" formControlName="llave" (change)="setValoresStore(registroForm, 'llave', 'setLlave')" />
      </div>
      <div class="col-md-4">
        <input-fecha [setFecha]="registroForm.get('fechaPago')?.value" [datos]="fechaPagoInput" [isDisabled]="soloLectura" (valorCambiado)="cambioFechaPago($event)"></input-fecha>
      </div>
      <div class="col-md-4">
        <label>Importe de pago:</label>
        <input type="text" class="form-control" value="6427" formControlName="importePago" readonly />
      </div>
    </div>
    <div class="row mt-5">
      <div class="col-md-12 mt-5 d-flex justify-content-end">
        <button type="button" class="btn btn-danger"> Borrar datos del pago </button>
      </div>
    </div>
    <div class="row mt-5">
      <div class="alert alert-info">
        <label style="font-weight: normal">
          <input type="checkbox" formControlName="manifiesto1" (change)=" setValoresStore(registroForm, 'manifiesto1', 'setManifiesto1') " />{{ solicitudEnum.MANIFIESTO_1 }}
        </label>
      </div>
    </div>
    <div class="row mt-5">
      <div class="alert alert-info">
        <label style="font-weight: normal">
          <input type="checkbox" formControlName="manifiesto2" (change)=" setValoresStore(registroForm, 'manifiesto2', 'setManifiesto2') " />{{ solicitudEnum.MANIFIESTO_2 }}
        </label>
      </div>
    </div>
  </ng-container>
</form>
