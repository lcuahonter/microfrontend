<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2>Aviso de opción para la determinación del valor provisional (seguro global de transporte).</h2>
      </div>
         @if (esFormaValido) {
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
    }
      <div class="mt-3 mb-3">
        <ng-alert class="text-center" [CONTENIDO]="NOTIFICACION_DE_TITULO"></ng-alert>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>

    </div>

    <div class="row">
      @switch (indice) {
      @case (1) {
      <app-paso-uno #pasoUnoRef></app-paso-uno>
      }
       @case (2) {
      <app-paso-dos></app-paso-dos>
      }
      @case (3) {
        <app-paso-tres></app-paso-tres>
        }
      }

      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" [dePadre]="true"></btn-continuar>
    </div>
    @if(indice === 1) {
      <div class="mt-5">
        <div class="mt-5">
          <ng-alert [CONTENIDO]="TEXTOS.Aviso" [CUSTOMECLASS]="infoAlert"></ng-alert>
        </div>
      </div>
      }
  </div>
</div>
