<div class="container">
  <ng-titulo titulo="Requerimiento" />
  <form [formGroup]="capturarRequirementoForm">
    <div class="row mb-3">
      <div class="col-md-4">
        <app-catalogo-select
          [catalogo]="aduanaLista.catalogos"
          [label]="aduanaLista.labelNombre"
          [placeholder]="aduanaLista.primerOpcion"
          [required]="true"
          [isDisabled]="esFormularioSoloLectura"
          formControlName="tipoDeRequerimiento"
          name="tipoDeRequerimiento"
          id="tipoDeRequerimiento"
          (change)="
            setValoresStore(
              capturarRequirementoForm,
              'tipoDeRequerimiento',
              'setTipoDeRequerimiento'
            )
          "
        ></app-catalogo-select>
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-md-4">
        <label>Justificacion del requerimiento*:</label>
        <textarea
          cols="60"
          rows="5"
          class="form-control area-de-texto"
          formControlName="motivoCancelacion"
          required
          (change)="
            setValoresStore(
              capturarRequirementoForm,
              'motivoCancelacion',
              'setMotivoCancelacion'
            )
          "
        ></textarea>
      </div>
    </div>
  </form>
</div>
