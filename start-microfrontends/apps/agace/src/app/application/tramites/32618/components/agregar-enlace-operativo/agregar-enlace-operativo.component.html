<div class="container">
  <form [formGroup]="agregarEnlaceOperativoForm">
    <div class="row">
      <div class="col-md-12">
        <ng-titulo titulo="Representante Legal" />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="rfcTercero"
          >Registro Federal de Contribuyentes*:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="rfcTercero"
          name="rfcTercero"
          formControlName="agregarEnlaceRfcTercero"
          (change)="actualizarRfcTercero($event)"
        />
        <div *ngIf="noEsValido('agregarEnlaceRfcTercero')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-8">
        <div class="form-group mt-5 pull-left">
          <button
            type="button"
            name="Buscar"
            id="Buscar"
            [disabled]="esFormularioSoloLectura"
            class="btn btn-primary me-5"
            (click)="buscarTerceroNacionalIDC()"
          >
            Buscar
          </button>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="rfc">RFC:</label>
        <input
          class="form-control"
          type="text"
          size="25"
          id="rfc"
          name="rfc"
          formControlName="agregarEnlaceRfc"
        />
        <div *ngIf="noEsValido('agregarEnlaceRfc')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-8"></div>
      <div class="col-md-4">
        <label class="form-label text-start" for="nombre">Nombre:</label>
        <input
          class="form-control"
          type="text"
          size="25"
          id="nombre"
          name="nombre"
          formControlName="agregarEnlaceNombre"
        />
        <div *ngIf="noEsValido('agregarEnlaceNombre')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="apellidoPaterno"
          >Apellido Paterno:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="apellidoPaterno"
          name="apellidoPaterno"
          formControlName="agregarEnlaceApellidoPaterno"
        />
        <div
          *ngIf="noEsValido('agregarEnlaceApellidoPaterno')"
          class="text-danger"
        >
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="apellidoMaterno"
          >Apellido Materno:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="apellidoMaterno"
          name="apellidoMaterno"
          formControlName="agregarEnlaceApellidoMaterno"
        />
      </div>
      <div class="col-md-8">
        <label class="form-label text-start" for="ciudadestado"
          >Ciudad o Estado de Residencia:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="ciudadestado"
          name="ciudadestado"
          formControlName="agregarEnlaceCiudadEstado"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="cargo">Cargo o Puesto:</label>
        <input
          class="form-control"
          type="text"
          size="25"
          id="cargo"
          name="cargo"
          formControlName="agregarEnlaceCargo"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="telefono">Teléfono:</label>
        <input
          class="form-control"
          type="text"
          size="25"
          id="telefono"
          name="telefono"
          formControlName="agregarEnlaceTelefono"
          (change)="actualizarTelefono($event)"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="correoElectronico"
          >Correo Electrónico:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="correoElectronico"
          name="correoElectronico"
          formControlName="agregarEnlaceCorreoElectronico"
          (change)="actualizarCorreoElectronico($event)"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="correoElectronico"
          >Suplente:</label
        >
        <input
          class="form-check"
          type="checkbox"
          size="25"
          id="correoElectronico"
          name="correoElectronico"
          formControlName="agregarEnlaceSuplente"
          (change)="actualizarEnlaceSuplente($event)"
        />
      </div>
    </div>
    <div class="col-12 mt-4 form-group text-end pull-right">
      <button
        type="button"
        name="btnAceptarEnlace"
        id="btnAceptarEnlace"
        [disabled]="esFormularioSoloLectura"
        class="btn btn-primary me-2"
        data-bs-dismiss="modal"
        #closeModal
        (click)="aceptarEnlaceSuplente()"
      >
        Aceptar
      </button>
      <button
        type="button"
        name="btnCancelarEnlace"
        id="btnCancelar"
        [disabled]="esFormularioSoloLectura"
        class="btn btn-danger"
        data-bs-dismiss="modal"
        #closeModal
      >
        Cancelar
      </button>
    </div>
  </form>
</div>
