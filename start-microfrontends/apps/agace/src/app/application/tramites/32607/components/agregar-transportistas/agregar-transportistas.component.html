<div class="container">
  <form [formGroup]="transportistaCertificacionForm">
    <div class="row">
      <div class="col-md-12">
        <ng-titulo titulo="Agregar transportistas" />
      </div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start" for="trRfc">RFC *:</label>
        <input
          type="text"
          class="form-control"
          formControlName="transportistaRFC"
          name="trRfc"
          id="trRfc"
          (change)="actualizarTransportistaRFC($event)"
        />
      </div>
      <div class="col-md-8 mt-4">
        <div class="form-group text-start pull-left">
          <button
            type="button"
            name="btnBuscarEmpresa"
            id="btnBuscarEmpresa"
            class="btn btn-primary mt-5 me-2"
            (click)="selectBuscarTransportista()"
          >
            Buscar
          </button>
        </div>
      </div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start" for="">RFC:</label>
        <input
          type="text"
          class="form-control"
          formControlName="transportistaRFCModifTrans"
          name="trRfcModifTrans"
          id="trRfcModifTrans"
          (change)="actualizarTransportistaRFCModifTrans($event)"
        />
      </div>
      <div class="col-md-4 mt-8"></div>
      <div class="col-md-6 mt-4">
        <label class="form-label text-start" for=""
          >Nombre, denominación o razón social:</label
        >
        <input
          type="text"
          class="form-control"
          formControlName="transportistaRazonSocial"
          name="trRazonSocial"
          id="trRazonSocial"
          (change)="actualizarTransportistaRazonSocial($event)"
        />
      </div>
      <div class="col-md-6 mt-4">
        <label class="form-label text-start" for="">Domicilio:</label>
        <input
          type="text"
          class="form-control"
          formControlName="transportistaDomicilio"
          name="trDomicilio"
          id="trDomicilio"
          (change)="actualizarTransportistaDomicilio($event)"
        />
      </div>
      <div class="col-md-6 mt-4">
        <label class="form-label text-start" for=""
          >Registro CAAT vigente:</label
        >
        <input
          type="text"
          class="form-control"
          formControlName="transportistaCaat"
          name="trCaat"
          id="trCaat"
          (change)="actualizarTransportistaCaat($event)"
        />
      </div>
      <div class="col-md-12">
        <div class="d-flex justify-content-end mt-4">
          <button
            type="button"
            id="aceptar"
            class="btn btn-primary"
            data-bs-dismiss="modal"
            #closeModal
            (click)="aceptarTransportista()"
          >
            Aceptar
          </button>

          <button
            type="button"
            id="limpiar"
            class="btn btn-secondary ms-3"
            data-bs-dismiss="modal"
            #closeModal
          >
            Limpiar
          </button>

          <button
            type="button"
            id="cancelar"
            class="btn btn-danger ms-3"
            data-bs-dismiss="modal"
            #closeModal
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
