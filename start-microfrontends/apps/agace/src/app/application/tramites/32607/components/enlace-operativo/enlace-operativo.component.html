<div class="container">
  <form [formGroup]="enlaceOperativoForm">
    <div class="row">
      <div class="col-md-12">
        <ng-titulo titulo="Agregar Enlace Operativo" />
      </div>
      <div class="col-md-4">
        <app-catalogo-select
          formControlName="entidad"
          [catalogo]="entidadFederative.catalogos"
          [isDisabled]="esFormularioSoloLectura"
          [label]="entidadFederative.labelNombre"
          [required]="entidadFederative.required"
          (selectionChange)="actualizarEntidadFederative($event)"
        ></app-catalogo-select>
      </div>
      <div class="col-md-8"></div>
      <div class="col-md-12 mt-3">
        <label>Instalaciones</label>
        <app-tabla-dinamica
          [tipoSeleccionTabla]="numeroDeEmpleadosTabla"
          [configuracionTabla]="instalacionsConfiguracionColumnas"
          [datos]="instalacionsDatos"
          (listaDeFilaSeleccionada)="seleccionarInstalacionsDato($event)"
        >
        </app-tabla-dinamica>
      </div>

      <div class="col-md-12 mt-5">
        <div class="d-flex justify-content-end mt-4">
          <button
            type="button"
            id="agregar"
            data-bs-dismiss="modal"
            #closeModal
            class="btn btn-primary me-3"
          >
            Aceptar
          </button>
          <button
            type="button"
            id="modificar"
            class="btn btn-secondary"
            data-bs-dismiss="modal"
            #closeModal
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
