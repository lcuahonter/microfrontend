<div class="container">
  <form [formGroup]="modificarInventarioForm">
    <div class="row mt-4">
      <div class="col-md-8">
        <ng-titulo titulo="Modificar inventario" />
      </div>
      <div class="col-md-4"></div>
      <div class="col-md-6 mt-4">
        <label class="form-label text-start"
          >Nombre del sistema o datos para su identificación</label
        >
        <input
          type="text"
          class="form-control"
          maxlength="250"
          size="55"
          formControlName="inventarioNombre"
          name="inventario.nombre"
          id="inventario"
          (change)="actualizarInventarioNombre($event)"
        />
      </div>

      <div class="col-md-6 mt-4">
        <div class="form-check text-start">
          <input
            type="checkbox"
            class="form-check-input"
            formControlName="inventarioAnexo"
            (click)="actualizarInventarioAnexo($event)"
          />
          Indique, si cuenta con un sistema de control de inventarios de
          conformidad con las disposiciones previstas por el Anexo 24.
        </div>
      </div>

      <div class="col-md-6 mt-4">
        <label class="form-label text-start">Lugar de radicación:*</label>
        <input
          type="text"
          class="form-control"
          name="lugarDeRadicacion"
          maxlength="250"
          formControlName="inventarioLugar"
          id="lugar"
          (change)="actualizarLugarDeRadicacion($event)"
        />
      </div>

      <div class="col-md-12 mt-5">
        <div class="d-flex justify-content-end mt-4">
          <button
            type="button"
            id="aceptar"
            class="btn btn-primary me-3"
            data-bs-dismiss="modal"
            #closeModal
          >
            Aceptar
          </button>
          <button
            type="button"
            id="cancelar"
            data-bs-dismiss="modal"
            #closeModal
            class="btn btn-danger"
          >
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
