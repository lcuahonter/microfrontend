<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" role="button" tabindex="1">Solicitante</a>
      </li>

      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Solicitud</a>
      </li>
    </ul>

    <ng-container>
      @switch (indice) { 
        @case (1) {
          <solicitante [tabindex]="1"></solicitante>
          <div class="row">
            <div class="col-md-12 m-5">
              <ng-titulo titulo="Folio original" />
              <div class="row">
                <div class="col-md-8">
                  <div class="form-group">
                    <input class="form-control" type="text" id="folioOriginal" name="folioOriginal"
                      formControlName="folioOriginal" [attr.disabled]="true" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        } 
        @case (2) {
          <app-solicitud></app-solicitud>
        } 
      }
    </ng-container>
  </div>
</div>
