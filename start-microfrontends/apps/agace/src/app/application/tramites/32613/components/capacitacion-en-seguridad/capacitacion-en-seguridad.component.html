<form [formGroup]="capacitacionEnSeguridadForm">
  <div class="page">
    <div class="container">
      <div class="col-md-12">
        <label class="form-label text-start">
          Debe existir un programa de concientización sobre amenazas
          establecido, diseñado y actualizado por el Comité de Seguridad para
          reconocer y crear conciencia sobre amenazas de terroristas y
          contrabandistas en cada punto de la cadena de suministros. El programa
          de capacitación debe ser integral y cubrir todos los requisitos de
          seguridad del Programa Operador Económico Autorizado.
        </label>
      </div>
      <div class="col-md-12">
        <label class="form-label text-start">
          Los empleados administrativos y operativos deben conocer los
          procedimientos establecidos de la compañía para considerar una
          situación de riesgo y saber cómo denunciarla. Se debe brindar
          capacitación específica a los empleados que por sus funciones se
          encuentran en contacto directo con las mercancías y/o los equipos
          tractivos y de arrastre, así como a los empleados que se encuentren en
          áreas críticas y/o sensibles determinadas bajo su análisis de riesgo
          (en las áreas de seguridad, operadores/maquinistas, entre otros).
        </label>
      </div>
      <!-- 10.1 Capacitación en seguridad y concientización. -->
      <div class="col-md-12 mb-3">
        <formas-dinamicas
          formularioTitulo="10.1 Capacitación en seguridad y concientización."
          [forma]="capacitacionEnSeguridadFormGroup"
          [formularioDatos]="capacitacionEnSeguridadFormData"
          [estado]="rubroTransporteFerrovariostate"
          [soloLectura]="consultaState.readonly"
          (emitirCambioDeValor)="establecerCambioDeValor($event)"
        ></formas-dinamicas>
      </div>
    </div>
  </div>
</form>
