<div class="row mb-3">
  <div class="col-md-12">
    <form [formGroup]="forma">
      <div class="row">
        <div class="col-md-4 col-sm-6 mb-5">
<app-catalogo-select
            [catalogo]="entidadFederalivaList"
            formControlName="entidadFederaliva"
            [label]="'Entidad federaliva'"
            [required]="false"
            (change)="alCambiarEntidadFederaliva($event)"
            >
    </app-catalogo-select>
        </div>
      </div>
    
    </form>
  </div>
<div class="col-md-12"> 
    <app-tabla-dinamica
    [tipoSeleccionTabla]="tipoSeleccionTabla"
    [configuracionTabla]="ParqueVehicular"
    [datos]="instalacionesList"
    (listaDeFilaSeleccionada)="manejarFilaSeleccionada($event)"
    [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"
  >
  </app-tabla-dinamica>
  </div>
