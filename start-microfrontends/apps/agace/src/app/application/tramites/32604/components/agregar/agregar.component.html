<div class="container">
  <form [formGroup]="form">
    <div class="row mt-4">
      <div class="col-md-12">
        <ng-titulo titulo="Agregar" />
      </div>
      <div class="col-md-4">
        <app-catalogo-select [catalogo]="aduanaList.catalogos" [label]="aduanaList.labelNombre" [placeholder]="aduanaList.primerOpcion" [required]="false" formControlName="aduana" [markTouched]="!!form.get('aduana')?.touched" (selectionChange)="onAduanaSelectionChange($event)"></app-catalogo-select>
      </div>
      <div class="col-md-12" id="IdGridContenedoresITC">
        <ng-titulo titulo="Instalaciones" />
        <div class="table-responsive">
          <div class="innercontainer">
            <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX" [configuracionTabla]="encabezadoDeTablaManifiesto" [datos]="datosTabla" (listaDeFilaSeleccionada)="onTableRowSelected($event)"></app-tabla-dinamica>
          </div>
        </div>
      </div>
    </div>
    <div class="col-md-12 mt-3 mb-5">
      <div class="d-flex justify-content-end mt-4">
        <button type="button" id="aceptar" class="btn btn-primary" (click)="cerrarModal()"
          #closeModal>
          Aceptar
        </button>

        <button type="button" id="cancelar" class="btn btn-danger ms-3" (click)="cancelarModal()"
          data-bs-dismiss="modal" #closeModal>
          Cancelar
        </button>
      </div>
    </div>
  </form>
</div>

<div class="modal fade" id="modalError" tabindex="-1" aria-labelledby="modalErrorLabel" aria-hidden="true" #modalError>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p>{{ mensajeError }}</p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>
