  <ng-titulo
    titulo="Modificación de las partes con respecto al declarado en la última actualización">
  </ng-titulo>

  <form [formGroup]="formularioModificationPartes">
    <div class="row mt-3">
      <div class="col-md-12">
        <div class="form-group">
          <label class="form-label">Modificación de de las partes</label>
          <app-input-radio
          [radioOptions]="radioOptions"
          [layout]="'horizontal'"
          [gap]="'50px'"
          formControlName="modificacionPartes"
          (change)="setValoresStore(formularioModificationPartes,'modificacionPartes')">
        </app-input-radio>
        </div>
      </div>
    </div>

    <ng-container *ngIf="formularioModificationPartes.get('modificacionPartes')?.value === '1'">
       <div class="row mt-3">
      <div class="col-md-4">
        <div class="form-group">
          <label for="rfcPartesC2" class="form-label">Registro Federal de Contribuyentes*:</label>
          <input type="text" id="rfcPartesC2" formControlName="rfcPartesC2" class="form-control"
          (change)="setValoresStore(formularioModificationPartes,'rfcPartesC2')" />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label d-block">&nbsp;</label>
          <button type="button" class="btn btn-default" [disabled]="esFormularioSoloLectura"
            (click)="cargarDatosRfcPartesC()">
            Buscar
          </button>
        </div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col-md-4">
        <div class="form-group">
          <label for="rfcPartesCons2" class="form-label">RFC</label>
          <input type="text" id="rfcPartesCons2" formControlName="rfcPartesCons2" class="form-control"
          (change)="setValoresStore(formularioModificationPartes,'rfcPartesCons2')" />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <label for="nombrePartesCons2" class="form-label">Nombre</label>
          <input type="text" id="nombrePartesCons2" formControlName="nombrePartesCons2" class="form-control"
          (change)="setValoresStore(formularioModificationPartes,'nombrePartesCons2')" />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <label for="caracterDeCons2" class="form-label">En su carácter de*:</label>
          <input type="text" id="caracterDeCons2" formControlName="caracterDeCons2" class="form-control"
          (change)="setValoresStore(formularioModificationPartes,'caracterDeCons2')" />
        </div>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-md-12 text-right">
        <button type="button" class="btn btn-default" [disabled]="esFormularioSoloLectura"
          (click)="limpiaCamposParteC()">
          Limpiar
        </button>
        <button type="button" class="btn btn-primary ms-2" [disabled]="esFormularioSoloLectura"
          (click)="agregarParteC()">
          Aceptar
        </button>
      </div>
    </div>

    </ng-container>

    <ng-container *ngIf="formularioModificationPartes.get('modificacionPartes')?.value === '2'">
         <div class="row mt-3">
      <div class="col-md-12">
        <div class="form-group">
          <label for="observaciones2M" class="form-label">observaciones:</label>
          <textarea class="form-control" rows="3" id="observaciones2M" formControlName="observaciones2"
            style="height: 80px"
            (change)="setValoresStore(formularioModificationPartes,'observaciones2')"></textarea>
        </div>
      </div>
    </div>
    </ng-container>

  
  </form>
