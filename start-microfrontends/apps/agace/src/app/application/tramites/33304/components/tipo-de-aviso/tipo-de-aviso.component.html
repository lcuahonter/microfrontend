<div class="container">
  <ng-titulo titulo="Modalidad de la certificación"></ng-titulo>
  <form [formGroup]="formularioTipoDeAviso">
    <div class="row">
      <div class="col-md-12">
        <label class="form-label text-start">Solicitud de Renovación en el Esquema de Certificación de Empresas
          Modalidad Comercializadora e Importadora</label>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12 pt-5">
        <div class="form-check bg-light p-0">
          <div class="alert alert-info py-6">
            <div class="row align-items-center mb-3">
              <div class="col">
                Debe seleccionar por lo menos un tipo de aviso
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="form-group">
          <label style="font-weight: normal">
            <input type="checkbox" formControlName="cambioDocumentoUsoGoce" id="cambioDocumentoUsoGoce"
              (change)="setValoresStore(formularioTipoDeAviso, 'cambioDocumentoUsoGoce')" />
            Aviso cuando varie o cambie la situacion respecte del documento con el que se haya acreditado el legal uso o goce
          </label>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="form-group">
          <label style="font-weight: normal">
            <input type="checkbox" formControlName="fusionEscisionEmpresas" id="fusionEscisionEmpresas"
              (change)="setValoresStore(formularioTipoDeAviso, 'fusionEscisionEmpresas')" />
            Avise de fusion o escisión de enioresas que cuenter con el Registro errel Esquema de Certificador de Empresas,
            cuando resulte una nueva sociedad, extinguiéndose una o mas empresas con Registro er e Esquerna de Certificacion
            de Empresas vigente
          </label>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="form-group">
          <label style="font-weight: normal">
            <input type="checkbox" formControlName="reestructuracion" id="reestructuracion"
              (change)="setValoresStore(formularioTipoDeAviso, 'reestructuracion')" />
            Avise de fusion o escisión de enioresas que cuenter con el Registro errel Esquema de Certificador de Empresas,
            cuando resulte una nueva sociedad, extinguiéndose una o mas empresas con Registro er e Esquerna de Certificacion
            de Empresas vigente
          </label>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12">
        <div class="form-group">
          <label style="font-weight: normal">
            <input type="checkbox" formControlName="transportistas" id="transportistas"
              (change)="setValoresStore(formularioTipoDeAviso, 'transportistas')" />
            Aviso de adicion o revocacion de empresas transportistas autorizadas para efectuar el traslado de las mercancias
            de comercio exterior de las empresas que cuenten con el Registre en el Esquema de Certificacion de Empresas,
            en la modalidad de Comercializadora e importadoraAviso de adicion o revocacion de empresas transportistas
            autorizadas para efectuar el traslado de las mercancias de comercio exterior de las empresas que cuenten con
            el Registre en el Esquema de Certificacion de Empresas, en la modalidad de Comercializadora e importadora
          </label>
        </div>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-md-12">
        <div class="alert alert-info" style="text-align: justify;">
          <div class="form-group">
            <label style="font-weight: normal">
              <input type="checkbox" formControlName="BAJO_MANIFIESTO"
                (change)="setValoresStore(formularioTipoDeAviso, 'BAJO_MANIFIESTO')">
              <span class="col-md-12 manifesto">{{ solicitudEnum.BAJO_MANIFIESTO }}</span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
