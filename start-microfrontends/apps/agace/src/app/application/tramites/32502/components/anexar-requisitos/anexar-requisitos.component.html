<div class="container">
  <ng-alert [CONTENIDO]="TEXTOS.ADJUNTAR"></ng-alert>
  <form [formGroup]="anexarForm">
    <table>
      <thead>
        <tr>
          <th>Tipo de Documento</th>
          <th>Documento</th>
          <th>Ver Documento</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let doc of documentos; let i = index">
          <td>{{ doc.tipo }}</td>
          <td>
            <input 
            type="file" class="form-control" id="file-input"
            (change)="cambioDeArchivo($event, i)" 
            [formControlName]="'valorSeleccionado' + i"
          />
          </td>
          <td class="text-center">
            <i class="bi bi-file-earmark-text fs-1" (click)="verDocumento(i)" style="cursor: pointer;"></i>
          </td>
        </tr>
      </tbody>
    </table>
  </form>
</div>
