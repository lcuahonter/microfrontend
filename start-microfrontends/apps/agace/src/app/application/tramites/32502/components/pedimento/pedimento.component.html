<div class="row">
  <div class="col-md-4">
    <div class="form-group">
      <label class="form-label" for="idPedimento">Número de pedimento:</label>
      <input class="form-control" id="idPedimento" placeholder="" type="text" [formControl]="pedimentoForm"
        [ngClass]="isValid ? 'required' : ''" appSoloNumeros>
    </div>
  </div>
  <div class="col-md-4 d-flex align-items-end">
    <button type="button" class="btn btn-primary" (click)="agregaPedimento()">Agregar</button>
  </div>
</div>

<div class="row mt-5">
  <div class="col-md-12">
    <table class="table table-respomsive">
      <thead>
        <tr>
          @for (item of hTabla; track $index) {
          <th>{{item}}</th>
          }
        </tr>
      </thead>
      <tbody>
        <tr>
          @for (item of pedimentos; let i = $index; track i) {
          <td>{{item.patente}}</td>
          <td>{{item.pedimento}}</td>
          <td>{{item.aduana}}</td>
          <td>{{item.descTipoPedimento}}</td>
          <td>{{item.numero}}</td>
          <td>{{item.comprobanteValor}}</td>
          <td>{{item.pedimentoValidado | booleanoSiNo}}</td>
          <td>
          <td>
            <button type="button" class="btn btn-link" (click)="eliminar(i)">
              <i class="bi bi-trash3 bi-c"></i>
            </button>
          </td>
          }
        </tr>

      </tbody>
    </table>
  </div>
</div>
