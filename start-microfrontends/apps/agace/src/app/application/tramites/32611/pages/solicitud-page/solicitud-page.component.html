<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2>
Solicitud de Registro en el Esquema de Certificación de Empresas Modalidad Socio Comercial Certificado, rubro Auto Transportista        </h2>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno #pasoUnoRef></app-paso-uno>
      } @case (2) {
      <app-paso-dos></app-paso-dos>
      } @case (3) {
      <app-paso-tres></app-paso-tres>
      } }

      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
        [dePadre]="true"
        [btnGuardar]="true"
      ></btn-continuar>
    </div>
  </div>
</div>

<lib-notificaciones
  *ngIf="btnContinuar"
  [notificacionInput]="nuevaNotificacion"
  (confirmacionModal)="mostrarNotificacionError()"
>
</lib-notificaciones>
