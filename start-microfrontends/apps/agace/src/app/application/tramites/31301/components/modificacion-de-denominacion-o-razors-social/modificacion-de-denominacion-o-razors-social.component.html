<div class="container">
  <form [formGroup]="registroPolizaEndosoForm">
    <div class="row">
      <div class="col-md-12">
        <ng-titulo titulo="Modificación de denominación o razón social" />
      </div>
    </div>
    <div class="row">
      <div class="col-md-8">
        <div class="form-group">
          <label class="form-label" for="razonSocialAnterior"
            >Denominación o razón social anterior:</label
          >
          <input
            class="form-control"
            type="text"
            size="80"
            id="razonSocialAnterior"
            formControlName="razonSocialAnterior"
            libUppercase
          />
        </div>
      </div>
      <div class="col-md-4"></div>
      <div class="col-md-8">
        <div class="form-group">
          <label class="form-label" for="razonSocialActual"
            >Denominación o razón social actual:</label
          >
          <input
            class="form-control"
            type="text"
            id="razonSocialActual"
            size="80"
            formControlName="razonSocialActual"
            libUppercase
          />
        </div>
      </div>
      <div class="col-md-4"></div>
    </div>
  </form>
</div>
