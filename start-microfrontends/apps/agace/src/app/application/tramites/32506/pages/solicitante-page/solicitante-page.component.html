<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        @if(indice === 1) {
        <h2>
          Aviso para la destrucción de desperdicios conforme al Artículo 109 de la Ley Aduanera, para empresas con Programa IMMEX</h2>
        }@if(indice === 2) {
        <h2>Cargar archivos</h2>
        <ng-alert [CONTENIDO]="TEXTOS.TERCEROS_TEXTO_DE_ALERTA"></ng-alert>
        }@if(indice === 3) {
        <h2>Firmar</h2>
        }
      </div>
      <ng-alert class="text-center" [CONTENIDO]="TITLE_NOTIFICATION"></ng-alert>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno></app-paso-uno>
      } @case (2) {
      <app-paso-dos></app-paso-dos>
      } @case (3) {
      <app-paso-tres></app-paso-tres>
      }}
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
      @if(indice ===1){
      <ng-alert [CONTENIDO]="AVISO.Aviso"></ng-alert>
      }
    </div>
  </div>
</div>
