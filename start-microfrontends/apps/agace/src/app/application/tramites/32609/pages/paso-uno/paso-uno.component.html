<div class="row">
  <ul class="nav nav-tabs">
    <li [ngClass]="indice === 1 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(1)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="1"
        role="button"
        >Solicitante</a
      >
    </li>
    <li [ngClass]="indice === 2 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(2)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="2"
        role="button"
        >Datos Comunes</a
      >
    </li>
    <li [ngClass]="indice === 3 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(3)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="3"
        role="button"
        >Terceros Relacionados</a
      >
    </li>
    <li [ngClass]="indice === 4 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(4)"
        (keydown.enter)="seleccionaTab(4)"
        (keydown.space)="seleccionaTab(4)"
        tabindex="4"
        role="button"
        >Textil</a
      >
    </li>
    <li [ngClass]="indice === 5 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(5)"
        (keydown.enter)="seleccionaTab(5)"
        (keydown.space)="seleccionaTab(5)"
        tabindex="5"
        role="button"
        >CTPAT</a
      >
    </li>

    <li [ngClass]="indice === 6 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(6)"
        (keydown.enter)="seleccionaTab(6)"
        (keydown.space)="seleccionaTab(6)"
        tabindex="5"
        role="button"
        >Perfiles</a
      >
    </li>

  </ul>

  <ng-container>
   <solicitante #solicitanteRef [hidden]="indice !== 1"></solicitante>
      
      @if(esDatosRespuesta){
        <app-datos-comunes
          #datosComunesRef 
          (reconocimientoMutuoCTPATChange)="onReconocimientoMutuoChange($event)"
          [hidden]="indice !== 2">
        </app-datos-comunes>
      }

      @if(esDatosRespuesta){
        <app-terceros-relacionados 
          #tercerosRelacionadosRef  
          [hidden]="indice !== 3">
        </app-terceros-relacionados>
      }

      @if(esDatosRespuesta){
        <app-importador-exportador 
          #importadorExportadorRef 
          [hidden]="indice !== 4">
        </app-importador-exportador>
      }

      @if(esDatosRespuesta){
        <app-c-tpat #ctpatRef [hidden]="indice !== 5"></app-c-tpat>
      }

      @if(esDatosRespuesta){
        <app-perfiles #perfilesRef [hidden]="indice !== 6"></app-perfiles>
      }
  </ng-container>
</div>
