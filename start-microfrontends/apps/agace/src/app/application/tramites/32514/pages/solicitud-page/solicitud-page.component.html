<div class="page">
  <div class="container">
    <div class="row mt-5">
      <div class="col-md-12">
        <h2 *ngIf="indice === 1">Aviso de retorno seguro de vehículos extranjeros</h2>
        <h2 *ngIf="indice !== 1">{{pasos[indice-1].titulo}}</h2>

      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row"> @switch (indice) { @case (1) { <app-paso-uno></app-paso-uno> } @case (2) { <app-paso-dos></app-paso-dos> } @case (3) { <app-paso-tres></app-paso-tres> } } <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>
  </div>
</div>
