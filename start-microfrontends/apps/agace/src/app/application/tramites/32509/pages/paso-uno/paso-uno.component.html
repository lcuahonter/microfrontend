<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Tipo de aviso</a>
            </li>
        </ul>
        <ng-container>
            @switch (indice) {
            @case (1) {
            <solicitante></solicitante>
            }
            @case (2) {
            <app-tipo-de-aviso [formularioDeshabilitado]="formularioDeshabilitado"></app-tipo-de-aviso>
            }
            }
        </ng-container>
    </div>
</div>
