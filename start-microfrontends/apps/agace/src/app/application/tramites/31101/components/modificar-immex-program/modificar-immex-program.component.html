<div class="container">
  <form [formGroup]="modificarImmexProgramForm">
    <div class="row">
      <div class="col-md-4 mt-4">
        <label class="form-label text-start"
          >Instalaciones principales<span [ngClass]="noEsValido('instalacionesPrincipales') ? 'text-danger':''">*</span>:</label
        >
        <app-input-radio
          formControlName="instalacionesPrincipales"
          [selectedValue]="
            modificarImmexProgramForm.get('instalacionesPrincipales')?.value
          "
          [radioOptions]="sinoOpcion.radioOptions"
          [isRequired]="sinoOpcion.isRequired"
          [layout]="'horizontal'"
          [gap]="'50px'"
          (valueChange)="actualizarInstalacionesPrincipales($event)"
        ></app-input-radio>
      </div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start" for="municipio"
          >Municipio o alcaldía<span [ngClass]="noEsValido('municipio') ? 'text-danger':''">*</span>:</label
        >
        <input
          type="text"
          class="form-control"
          formControlName="municipio"
          name="municipioAlcaldía"
          id="municipioAlcaldía"
          (change)="actualizarMunicipio($event)"
        />
        <div *ngIf="noEsValido('municipio')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-4 mt-4"></div>
      <div class="col-md-4 mt-4">
        <app-catalogo-select
          formControlName="tipoDeInstalacion"
          [catalogo]="tipoDeInstalacion.catalogos"
          [label]="tipoDeInstalacion.labelNombre"
          [placeholder]="tipoDeInstalacion.primerOpcion"
          [required]="true"
          [markUntouched]="noEsValido('tipoDeInstalacion') ? true : false"
          [isDisabled]="esFormularioSoloLectura"
          name="tipoDeInstalacion"
          id="tipoDeInstalacion"
          (selectionChange)="actualizarTipoDeInstalacion($event)"
        ></app-catalogo-select>
      </div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start" for="federativa"
          >Entidad federativa<span [ngClass]="noEsValido('federativa') ? 'text-danger':''">*</span>:</label
        >
        <input
          type="text"
          class="form-control"
          formControlName="federativa"
          name="federativa"
          id="federativa"
          (change)="actualizarFederativa($event)"
        />
        <div *ngIf="noEsValido('federativa')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start" for="registroSESAT"
          >Registro ante S E/ S A T<span [ngClass]="noEsValido('registroSE') ? 'text-danger':''">*</span>:</label
        >
        <input
          type="text"
          class="form-control"
          formControlName="registroSE"
          name="registroSESAT"
          id="registroSESAT"
          (change)="actualizarRegistroSE($event)"
        />
        <div *ngIf="noEsValido('registroSE')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start" for="desceripe"
          >Colonia, calle y número<span [ngClass]="noEsValido('desceripe') ? 'text-danger':''">*</span>:</label
        >
        <input
          type="text"
          class="form-control"
          formControlName="desceripe"
          name="desceripe"
          id="desceripe"
          (change)="actualizarDesceripe($event)"
        />
        <div *ngIf="noEsValido('desceripe')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start" for="codigoPostal"
          >Código postal<span [ngClass]="noEsValido('codigoPostal') ? 'text-danger':''">*</span>:</label
        >
        <input
          type="text"
          class="form-control"
          fromControlName="codigoPostal"
          name="codigoPostal"
          maxlength="5"
          id="codigoPostal"
          (change)="actualizarCodigoPostal($event)"
        />
        <div *ngIf="noEsValido('codigoPostal')" class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
      <div class="col-md-4 mt-4"></div>
      <div class="col-md-4 mt-4">
        <label class="form-label text-start">Proceso productivo<span [ngClass]="noEsValido('procesoProductivo') ? 'text-danger':''">*</span>:</label>
        <app-input-radio
          formControlName="procesoProductivo"
          [selectedValue]="
            modificarImmexProgramForm.get('procesoProductivo')?.value
          "
          [radioOptions]="sinoOpcion.radioOptions"
          [isRequired]="sinoOpcion.isRequired"
          [layout]="'horizontal'"
          [gap]="'50px'"
          (valueChange)="actualizarProcesoProductivo($event)"
        ></app-input-radio>
      </div>

      <div class="col-md-12">
        <div class="d-flex justify-content-end">
          <button
            type="button"
            id="cancelar"
            [disabled]="esFormularioSoloLectura"
            class="btn btn-danger ms-3"
            (click)="cancelarImmexProgram()"
          >
            Cancelar
          </button>

          <button
            type="button"
            id="Iceptar"
            [disabled]="esFormularioSoloLectura"
            class="btn btn-primary ms-3"
            (click)="aceptarImmexProgram()"
          >
            Aceptar
          </button>
        </div>
      </div>
    </div>
  </form>
</div>
