<div class="container">
  <div class="row">
    <div class="col-md-12">
      <ng-titulo titulo="Personas para oír y recibir notificaciones" />
    </div>
  </div>
  <div class="row">
    <div class="col-md-12">
      <label>Personas para oír y recibir notificaciones</label>
    </div>
    <div class="col-md-12">
      <app-tabla-dinamica
        [tipoSeleccionTabla]="tipoSeleccionTabla"
        [configuracionTabla]="configuracionColumnas"
        [datos]="orecibirNotificacionesLista"
        [mode]="'client'"
        [totalItems]="orecibirNotificacionesLista.length"
        [showPagination]="true"
      >
      </app-tabla-dinamica>
    </div>
  </div>
</div>
