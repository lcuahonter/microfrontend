<form [formGroup]="tercerosRelacionadosForm">
  <div class="col-md-12">
    <ng-titulo titulo="Representante Legal" />
  </div>
  <div class="row">
    <div class="col-md-4">
      <label class="form-label text-start" for="rfcTercero">
        <span class="required-asterisk">*</span> {{ enumEtiquetas.RFC_TERCERO }} </label>
      <input class="form-control" type="text" size="25" id="rfcTercero" name="rfcTercero" formControlName="rfcTercero" (change)="setValoresStore( tercerosRelacionadosForm, 'rfcTercero', 'setRfcTercero' )"/>
    </div>
    <div class="col-md-8">
      <div class="form-group mt-5 pull-left">
        <button type="button" name="Buscar" id="Buscar" class="btn btn-primary me-5" [disabled]="this.soloLectura">Buscar</button>
      </div>
    </div>
    <div class="row">
      <div class="col-md-4">
        <label class="form-label text-start" for="rfc">RFC:</label>
        <input class="form-control" type="text" size="25" id="rfc" name="rfc" formControlName="rfc" (change)="setValoresStore( tercerosRelacionadosForm, 'rfc', 'setRfc' )"/>
      </div>
      <div class="col-md-8"></div>
    </div>
    <div class="row">
      <div class="col-md-4">
        <label class="form-label text-start" for="nombre">Nombre:</label>
        <input class="form-control" type="text" size="25" id="nombre" name="nombre" formControlName="nombre" (change)="setValoresStore( tercerosRelacionadosForm, 'nombre', 'setNombre' )"/>
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="apellidoPaterno">Apellido Paterno:</label>
        <input class="form-control" type="text" size="25" id="apellidoPaterno" name="apellidoPaterno" formControlName="apellidoPaterno" (change)="setValoresStore( tercerosRelacionadosForm, 'apellidoPaterno', 'setApellidoPaterno' )"/>
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="apellidoMaterno">Apellido Materno:</label>
        <input class="form-control" type="text" size="25" id="apellidoMaterno" name="apellidoMaterno" formControlName="apellidoMaterno" (change)="setValoresStore( tercerosRelacionadosForm, 'apellidoMaterno', 'setApellidoMaterno' )"/>
      </div>
    </div>
    <div class="row">
      <div class="col-md-4">
        <label class="form-label text-start" for="telefono">Teléfono:</label>
        <input class="form-control" type="text" size="25" id="telefono" name="telefono" formControlName="telefono" (change)="setValoresStore( tercerosRelacionadosForm, 'telefono', 'setTelefono' )"/>
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="correoElectronico">Correo Electrónico:</label>
        <input class="form-control" type="text" size="25" id="correoElectronico" name="correoElectronico" formControlName="correoElectronico" (change)="setValoresStore( tercerosRelacionadosForm, 'correoElectronico', 'setCorreoElectronico' )"/>
      </div>
    </div>
  </div>
  <div class="col-md-12">
    <ng-titulo titulo="Enlace Operativo" />
  </div>
  <div class="col-md-12">
    <label>Enlace Operativo</label>
  </div>
  <div class="col-md-12">
    <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX" [configuracionTabla]="enlaceTabla"></app-tabla-dinamica>
  </div>
  <div class="col-md-12 mt-5 d-flex justify-content-end align-items-end">
    <div class="btn-group">
      <button type="button" class="btn btn-primary" [disabled]="this.soloLectura"> Agregar </button>
      <button type="button" class="btn btn-default ms-3" [disabled]="this.soloLectura"> Modificar </button>
      <button type="button" class="btn btn-danger 3 ms-3" [disabled]="this.soloLectura"> Eliminar </button>
    </div>
  </div>
  <div class="col-md-12">
    <ng-titulo titulo="Personas para oír y recibir notificaciones" />
  </div>
  <div class="col-md-12">
    <label>{{ enumEtiquetas.PERSONAS_NOTIFICACION }}</label>
  </div>
  <div class="col-md-12">
    <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.UNDEFINED" [configuracionTabla]="personasTabla" [datos]="personasLista"></app-tabla-dinamica>
  </div>
</form>
