<form [formGroup]="miembroForm">
  <div class="col-md-12">
    <ng-titulo titulo="Agregar miembro de la empresa" />
  </div>
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">
      <span class="required-asterisk">*</span> {{ enumEtiquetas.OBLIGACIONES_FISCALES }} </label>
    <app-input-radio [radioOptions]="radioOpcions08" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio14" (change)="setValoresStore( miembroForm, 'tipoRadio14', 'setTipoRadio14' )"></app-input-radio>
  </div>
  <div class="col-md-12">
    <ng-titulo titulo="Miembro de la empresa" />
  </div>
  <div class="row mt-12">
    <div class="col-md-12">
      <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX" [configuracionTabla]="empresaTabla"></app-tabla-dinamica>
    </div>
  </div>
  <div class="col-md-12 mt-5 d-flex justify-content-end align-items-end">
    <div class="btn-group">
      <button type="button" class="btn btn-primary" [disabled]="this.soloLectura" (click)="agregarMiembro()" data-bs-toggle="modal" data-bs-target="#miembroModal"> Agregar </button>
      <button type="button" class="btn btn-default ms-3" [disabled]="this.soloLectura"> Modificar </button>
      <button type="button" class="btn btn-danger 3 ms-3" [disabled]="this.soloLectura"> Eliminar </button>
    </div>
  </div>
  <div class="modal fade modal-xl" id="miembroModal" tabindex="-1" aria-labelledby="miembroModalLabel" aria-hidden="true" #modalAgregar>
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title">Agregar miembro de la empresa</h4>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="col-md-4">
              <app-catalogo-select [catalogo]="caracterCatalogo.catalogos" [label]="'Eu su carácter de'" [required]="true" formControlName="caracter" (change)="setValoresStore( miembroForm, 'caracter', 'setCaracter' )"></app-catalogo-select>
            </div>
          </div>
          <div class="row mt-12">
            <div class="col-md-4 mt-4">
              <label class="form-label text-start">
                <span class="required-asterisk">*</span> Obligado a tributar en México </label>
              <app-input-radio [radioOptions]="radioOpcions08" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio34" (change)="setValoresStore( miembroForm, 'tipoRadio34', 'setTipoRadio34' )"></app-input-radio>
            </div>
          </div>
          <div class="row mt-12"></div>
          <div class="row mt-12">
            <div class="col-md-4">
              <app-catalogo-select [catalogo]="nacionalidadCatalogo.catalogos" [label]="'Nacionalidad'" [required]="true" formControlName="nacionalidad" ></app-catalogo-select>
            </div>
          </div>
        </div>
        <div class="modal-footer custom-footer">
          <div class="row">
            <div class="col-md-12 mt-5 d-flex justify-content-end align-items-end">
              <button type="button" name="agregar" [disabled]="this.soloLectura" class="btn btn-primary ms-2" #closeModal> Aceptar </button>
              <button type="button" name="cancelar" [disabled]="this.soloLectura" class="btn btn-default ms-2" data-bs-dismiss="modal" #closeModal> Cancelar </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">
      <span class="required-asterisk">*</span> {{ enumEtiquetas.VINCULACION_CANCELACION }}</label>
    <app-input-radio [radioOptions]="radioOpcions08" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio15" (change)="setValoresStore( miembroForm, 'tipoRadio15', 'setTipoRadio15' )"></app-input-radio>
  </div>
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">
      <span class="required-asterisk">*</span> {{ enumEtiquetas.SOLICITUD_INSPECCION }}</label>
    <app-input-radio [radioOptions]="radioOpcions08" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio16" (change)="setValoresStore( miembroForm, 'tipoRadio16', 'setTipoRadio16' )"></app-input-radio>
  </div>
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">
      <span class="required-asterisk">*</span> {{ enumEtiquetas.PROTESTA_VERDAD }}</label>
    <app-input-radio [radioOptions]="radioOpcions08" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio17" (change)="setValoresStore( miembroForm, 'tipoRadio17', 'setTipoRadio17' )"></app-input-radio>
  </div>
</form>
