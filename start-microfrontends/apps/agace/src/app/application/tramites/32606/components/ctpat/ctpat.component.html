<form [formGroup]="ctpatForm">
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">{{ enumEtiquetas.REGLA_ACREDITAR }}</label>
  </div>
  <div class="col-md-12 mt-5">
    <div class="alert alert-info">
      <div class="row mt-3">
        <b>{{ enumEtiquetas.INCLUIR_ANEXOS }}</b>
      </div>
      <div class="row mt-3">
        <b>{{ enumEtiquetas.REPORTE_VALIDACION }}</b>
      </div>
      <div class="row mt-3">
        <b>{{ enumEtiquetas.CARTA_PRESENTACION }}</b>
      </div>
    </div>
  </div>
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">{{ enumEtiquetas.AUTORIZA_COMPARTIR }}</label>
    <app-input-radio [radioOptions]="radioOpcions01" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio24" (change)=" setValoresStore( ctpatForm, 'tipoRadio24', 'setTipoRadio24' )"></app-input-radio>
  </div>
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">{{ enumEtiquetas.CUMPLE_ESTANDARES }}</label>
    <app-input-radio [radioOptions]="radioOpcions01" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio25" (change)=" setValoresStore( ctpatForm, 'tipoRadio25', 'setTipoRadio25' )"></app-input-radio>
  </div>
  <div class="col-md-12 mt-4">
    <label class="form-label text-start">{{ enumEtiquetas.SUSPENSION_CANCELACION }}</label>
    <app-input-radio [radioOptions]="radioOpcions01" [isRequired]="true" [layout]="'horizontal'" [gap]="'445px'" formControlName="tipoRadio26" (change)=" setValoresStore( ctpatForm, 'tipoRadio26', 'setTipoRadio26' )"></app-input-radio>
  </div>
</form>
