<div class="container">
  <form [formGroup]="parqueIndustrialForm">
    <div class="row">
      <div class="col-md-12">
        <label class="form-label text-start">Conforme a la regla 7.1.5., fracción IV, acredite lo siguiente:</label>
      </div>
    </div>

    <div>
      <app-perfiles-mensajeria></app-perfiles-mensajeria>
    </div>
    <div>
      <ng-titulo titulo="Pago de derechos"></ng-titulo>
      <form [formGroup]="mensajeriaGroup">
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="claveReferencia"><span class="danger">*</span>Clave de referencia</label>
              <input type="text" id="claveReferencia" formControlName="claveReferencia" class="form-control"
                (change)="setValoresStore(mensajeriaGroup,'claveReferencia', 'setClaveReferencia')">

            </div>
          </div>
          <div class="col-md-6">
            <div class="form-group">
              <label for="numeroOperacion"><span class="danger">*</span>Número de operación</label>
              <input type="text" id="numeroOperacion" formControlName="numeroOperacion" class="form-control"
                (change)="setValoresStore(mensajeriaGroup,'numeroOperacion', 'setNumeroOperacion')">

            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="form-group">
              <label for="cadenaDependencia"><span class="danger">*</span>Cadena de la dependencia</label>
              <input type="text" id="cadenaDependencia" formControlName="cadenaDependencia" class="form-control"
                (change)="setValoresStore(mensajeriaGroup,'cadenaDependencia', 'setCadenaDependencia')">

            </div>
          </div>
          <div class="col-md-6">
            <app-catalogo-select [isDisabled]="esFormularioSoloLectura" [label]="'Banco'"
              [placeholder]="'Seleccione un valor'" [catalogo]="sectorProductivoAgace" formControlName="banco"
              (change)="setValoresStore(mensajeriaGroup,'banco', 'setBanco')">
            </app-catalogo-select>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label for="llavePago"><span class="danger">*</span>Llave de pago</label>
              <input type="text" id="llavePago" formControlName="llavePago" class="form-control"
                (change)="setValoresStore(mensajeriaGroup,'llavePago', 'setLlavePago')">

            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <input-fecha [datos]="fechaFacturaInput" [setFecha]="mensajeriaGroup.get('fechaFactura')?.value"
                (valorCambiado)="cambioFechaFactura($event,mensajeriaGroup,'fechaFactura', 'setFechaFactura')"></input-fecha>


            </div>
          </div>
          <div class="col-md-3">
            <div class="form-group">
              <label for="importePago"><span class="danger">*</span>Importe de pago</label>
              <input type="text" id="importePago" formControlName="importePago" class="form-control"
                (change)="setValoresStore(mensajeriaGroup,'importePago', 'setImportePago')">

            </div>
          </div>

        </div>
      </form>

    </div>

  </form>
</div>
