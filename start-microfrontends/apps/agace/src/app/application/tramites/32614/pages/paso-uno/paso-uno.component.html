<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="1"
          role="button"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="2"
          role="button"
          >Datos Comunes</a
        >
      </li>

      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(3)"
          (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)"
          tabindex="3"
          role="button"
          >Terceros relacionados</a
        >
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(4)"
          (keydown.enter)="seleccionaTab(4)"
          (keydown.space)="seleccionaTab(4)"
          tabindex="4"
          role="button"
          >Parque Industrial</a
        >
      </li>
      <li [ngClass]="indice === 5 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(5)"
          (keydown.enter)="seleccionaTab(5)"
          (keydown.space)="seleccionaTab(5)"
          tabindex="5"
          role="button"
          >C-TPAT</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante #Solicitante></solicitante>
      } 
      
      @case (2) { @if(esDatosRespuesta){
      <app-datos-comunes-tres [consultaState]="consultaState"></app-datos-comunes-tres>
      } } 

         @case (3) {
          @if(esDatosRespuesta){
          <app-represtantante></app-represtantante>
          <app-enlace></app-enlace>
          <app-persona></app-persona>
        }
        } 
      
      @case (4) { @if(esDatosRespuesta){
      <app-parque-industrial></app-parque-industrial>
      } }
      
      @case (5) { @if(esDatosRespuesta){
      <app-c-tpat></app-c-tpat>
      } } }
    </ng-container>
  </div>
</div>
