<div class="container">
  <form [formGroup]="tercerosRelacionadosForm">
    <div class="row">
      <div class="col-md-12">
        <ng-titulo titulo="Representante Legal" />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="rfcTercero"
          >Registro Federal de Contribuyentes*:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="rfcTercero"
          name="rfcTercero"
          formControlName="rfcTercero"
          (change)="actualizarRfcTercero($event)"
        />
      </div>
      <div class="col-md-8">
        <div class="form-group mt-5 pull-left">
          <button
            type="button"
            name="Buscar"
            [disabled]="esFormularioSoloLectura"
            id="Buscar"
            class="btn btn-primary me-5"
            (click)="buscarTerceroNacionalIDC()"
          >
            Buscar
          </button>
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="rfc">RFC:</label>
        <input
          class="form-control"
          type="text"
          size="25"
          id="rfc"
          name="rfc"
          formControlName="rfc"
        />
      </div>
      <div class="col-md-8"></div>
      <div class="col-md-4">
        <label class="form-label text-start" for="nombre">Nombre:</label>
        <input
          class="form-control"
          type="text"
          size="25"
          id="nombre"
          name="nombre"
          formControlName="nombre"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="apellidoPaterno"
          >Apellido Paterno:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="apellidoPaterno"
          name="apellidoPaterno"
          formControlName="apellidoPaterno"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="apellidoMaterno"
          >Apellido Materno:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="apellidoMaterno"
          name="apellidoMaterno"
          formControlName="apellidoMaterno"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="telefono">Teléfono:</label>
        <input
          class="form-control"
          type="text"
          size="25"
          id="telefono"
          name="telefono"
          formControlName="telefono"
          (change)="actualizarTelefono($event)"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label text-start" for="correoElectronico"
          >Correo Electrónico:</label
        >
        <input
          class="form-control"
          type="text"
          size="25"
          id="correoElectronico"
          name="correoElectronico"
          formControlName="correoElectronico"
          (change)="actualizarCorreoElectronico($event)"
        />
      </div>
      <div class="col-md-12">
        <ng-titulo titulo="Enlace Operativo" />
      </div>
      <div class="col-md-12">
        <label>Enlace Operativo</label>
      </div>
      <div class="col-md-12">
        <app-tabla-dinamica
          [tipoSeleccionTabla]="enlaceOperativoTabla"
          [configuracionTabla]="enlaceOperativoConfiguracionColumnas"
          [datos]="enlaceOperativosLista"
          (listaDeFilaSeleccionada)="seleccionEnlaceOperativo($event)"
        >
        </app-tabla-dinamica>
      </div>
      <div class="col-12 mt-4 form-group text-end pull-right">
        <button
          type="button"
          name="btnAceptarEnlace"
          id="btnAceptarEnlace"
          [disabled]="esFormularioSoloLectura"
          class="btn btn-primary me-2"
          data-bs-toggle="modal"
          data-bs-target="#agregarEnlaceOperativo"
          (click)="guardarDatosEnlaceOperativo()"
        >
          Aceptar
        </button>
        <button
          type="button"
          name="btnModificarEnlace"
          id="btnModificarEnlace"
          [disabled]="esFormularioSoloLectura"
          class="btn btn-secondary me-2"
          data-bs-toggle="modal"
          data-bs-target="#agregarEnlaceOperativo"
          (click)="guardarModificacionEnlaceOperativo()"
        >
          Modificar
        </button>
        <button
          type="button"
          name="btnCancelarEnlace"
          id="btnCancelar"
          class="btn btn-danger"
          [disabled]="esFormularioSoloLectura"
          (click)="cerrarDialogoEnlaceOperativo()"
        >
          Eliminar
        </button>
      </div>
      <div class="col-md-12">
        <ng-titulo titulo="Personas para oír y recibir notificaciones" />
      </div>
      <div class="col-md-12">
        <label>Personas para oír y recibir notificaciones</label>
      </div>
      <div class="col-md-12">
        <app-tabla-dinamica
          [tipoSeleccionTabla]="tipoSeleccionTabla"
          [configuracionTabla]="configuracionColumnas"
          [datos]="orecibirNotificacionesLista"
        >
        </app-tabla-dinamica>
      </div>
    </div>
  </form>
</div>

<div
  class="modal fade"
  id="agregarEnlaceOperativo"
  tabindex="-1"
  aria-labelledby="modalAgregarEnlaceOperativo"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <app-agregar-enlace-operativo
        (agregarEnlaceOperativo)="agregarEnlaceOperativo($event)"
      ></app-agregar-enlace-operativo>
    </div>
  </div>
</div>
