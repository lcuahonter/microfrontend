<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2>Requerimiento</h2>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>

    </div>

    <div class="row">
      @switch (indice) {
      @case (1) {
      <app-requiremento></app-requiremento>
      }
      @case (2) {
      <app-paso-dos></app-paso-dos>
      }
      @case (3) {
      <app-capturar-el-texto-libre></app-capturar-el-texto-libre>
      }
      @case (4) {
      <app-paso-tres></app-paso-tres>
      }
      }

      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>
  </div>
</div>
