<div class="page">
    <div class="container">
        <div class="row">
            <ng-titulo titulo="Tipo de garantía"/>
        </div>
        <div class="row">
            <form [formGroup]="tipoDeGarantiaForm">
                <div class="form-group">
                    <label class="form-label" for="tipoDeGarantia">Tipo de Garantía*:</label>
                    <app-input-radio
                      [radioOptions]="tipoDeGarantiaData"
                      id="tipoDeGarantia"
                      formControlName="tipoDeGarantia"
                      [gridLayout]="true"
                      [isRequired]="true"
                    ></app-input-radio>
                  </div>
            </form>
        </div>
        <div class="row mt-5">
            <div [innerHtml]="tipoNota"></div>
        </div>
    </div>
</div>
