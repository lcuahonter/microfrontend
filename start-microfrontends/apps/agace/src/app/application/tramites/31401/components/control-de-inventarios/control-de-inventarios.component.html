<div class="page">
    <div class="container">
      <form [formGroup]="forma">
        <div class="row">
          <formas-dinamicas
            formularioTitulo="Control de inventarios "
            [forma]="ninoFormGroup"
            [formularioDatos]="controlInventariosFormData"
          ></formas-dinamicas>
        </div>
        <div class="row mt-5">
            <ng-alert [CONTENIDO]="controlDeInventariosAlert"></ng-alert>
        </div>
        <div class="row">
            <div class="col-md-12">
                <p>Nombre del sistema o datos para su indentificacion</p>
                <textarea
                    class="form-control min-height"
                    name="nombreDelSistema"
                    id="nombreDelSistema"
                    rows="3"
                    formControlName="nombreDelSistema"
                    ></textarea>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-12">
                <p>Lugar de radicación</p>
                <textarea
                    class="form-control min-height"
                    name="lugar"
                    id="lugar"
                    rows="3"
                    formControlName="lugar"
                    ></textarea>
            </div>
        </div>

        <div class="row mt-3">
            <div class="form-group">
                <label class="form-label" for="senaleSiIleva">Señale si lleva la contabilidad en medios electrónicos de conformidad con el artículo 28, fracción III, del CFF y la regla 2.8.1.5 de la RMF</label>
                <app-input-radio
                    [radioOptions]="radioDatos"
                    id="senaleSiIleva"
                    formControlName="senaleSiIleva"
                    [gridLayout]="true"
                ></app-input-radio>
            </div>
        </div>

        <div class="row mt-3">
            <div class="form-group">
                <label class="form-label" for="senaleSiIngresa">Señale si ingresa mensualmente su información contable a través del portal del SAT, de conformidad con el artículo 28, fracción IV, del CFF y la regla 2.8.1.6 de la RMF</label>
                <app-input-radio
                    [radioOptions]="radioDatos"
                    id="senaleSiIngresa"
                    formControlName="senaleSiIngresa"
                    [gridLayout]="true"
                ></app-input-radio>
            </div>
        </div>
      </form>
    </div>
  </div>
