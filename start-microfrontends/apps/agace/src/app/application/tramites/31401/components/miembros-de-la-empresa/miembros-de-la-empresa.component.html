<div class="page">
  <div class="container">
    <div class="row">
      <ng-titulo titulo="Miembros de la empresa" />
    </div>
    <div class="row">
      <form [formGroup]="miembrosForm">
        <div class="form-group">
          <label class="form-label" for="senaleSocios"
            >Señale si los socios, accionistas, según corresponda, representante
            legal con facultad para actos de administración o de dominio, e
            integrantes de la administración, de conformidad con la constitución
            de la empresa solicitante, se encuentran al corriente en el
            cumplimiento de sus obligaciones fiscales.
          </label>
          <app-input-radio
            [radioOptions]="radioDatos"
            id="senaleSocios"
            formControlName="senaleSocios"
            [gridLayout]="true"
            [isRequired]="true"
          ></app-input-radio>
        </div>
        <div class="row mt-5">
          <p>
            Opinión positiva vigente del cumplimiento de obligaciones fiscales de la
            solicitante, los socios, accionistas, representante legal con facultad
            para actos de administración o de dominio, administrador único o
            miembros del consejo de administración, según sea el caso.
          </p>
        </div>
        <div class="row">
          <textarea
            formControlName="opinionPositiva"
            class="form-control w-100 min-height"
            rows="3"
            >
          </textarea>
        </div>
      </form>
    </div>
  </div>
</div>
