<div class="page">
    <div class="container">
        <div class="row">
            <ng-titulo titulo="Modalidad de la garantía"/>
        </div>
        <div class="row">
            <form [formGroup]="modalidadDeGarantiaForm">
                <div class="form-group">
                    <label class="form-label" for="modalidad">Modalidad de la Garantía*:</label>
                    <app-input-radio
                      [radioOptions]="modalidadDeGarantiaData"
                      id="modalidad"
                      formControlName="modalidad"
                      [gridLayout]="true"
                      [isRequired]="true"
                    ></app-input-radio>
                  </div>
            </form>
        </div>
    </div>
</div>
