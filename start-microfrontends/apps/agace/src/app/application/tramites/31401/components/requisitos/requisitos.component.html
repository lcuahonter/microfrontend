<div class="page">
  <div class="container">
    <form [formGroup]="forma">
      <div class="row">
        <formas-dinamicas
          formularioTitulo="Requisitos"
          [forma]="ninoFormGroup"
          [formularioDatos]="requisitosFormData"
        ></formas-dinamicas>
      </div>
      <div class="row mt-3">
        <div class="col-md-12">
          <p>
            Indique la denominación o razón social de los subcontratistas de quienes
            reciba los servicios especializados o la ejecución de obras
            especializadas.
          </p>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-4">
          <div class="form-group">
            <label for="rfc">RFC:</label>
            <input
              class="form-control"
              type="text"
              id="rfc"
              formControlName="rfc"
            />
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-12 text-end">
          <button
            name="Agregar"
            id="btnBusqRfc"
            class="btn btn-default"
            type="button"
            disabled
            >Agregar</button>
        </div>
      </div>
      <div class="row mt-5">
        <app-tabla-dinamica
          [tipoSeleccionTabla]="tipoSeleccionTabla"
          [configuracionTabla]="tableHeaderRequisitos"
          [datos]="tablaRequisitos"
          [disableSeleccionTablaCheckBox]="consultaState.readonly"
        >
        </app-tabla-dinamica>
      </div>
      <div class="row mt-5">
        <div class="col-md-12 text-end">
          <button name="Eliminar" id="btnBusqRfcEliminar" class="btn btn-default" type="button" disabled>Eliminar</button>
        </div>
      </div>
      <div class="row mt-3">
        <div class="form-group">
          <label class="form-label" for="senaleEncuentra"
            >Señale si se encuentra en el listado de empresas publicadas por el SAT
            en términos del artículo 69 del CFF, con excepción de lo dispuesto en
            las fracciones II y VI del referido artículo.</label
          >
          <app-input-radio
            class="radio"
            [radioOptions]="requisitosRadioData"
            id="senaleEncuentra"
            formControlName="senaleEncuentra"
            [gridLayout]="true"
            [isRequired]="true"
          ></app-input-radio>
        </div>
      </div>
    
      <div class="row mt-3">
        <div class="form-group">
          <label class="form-label" for="delMismo"
            >Del mismo modo indique si se encuentra en el listado de empresas
            publicadas por el SAT en terminos del articulo 69-B, parrafo cuarto del
            CFF.</label
          >
          <app-input-radio
            class="radio"
            [radioOptions]="requisitosRadioData"
            id="delMismo"
            formControlName="delMismo"
            [gridLayout]="true"
            [isRequired]="true"
          ></app-input-radio>
        </div>
      </div>
    
      <div class="row mt-3">
        <div class="form-group">
          <label class="form-label" for="indiqueEncuentra"
            >Indique si se encuentra en el listado de empresas publicadas por el SAT
            en términos del artículo 69-B Bis, noveno párrafo, párrafo cuarto del
            CFF.</label
          >
          <app-input-radio
            [radioOptions]="requisitosRadioData"
            id="indiqueEncuentra"
            formControlName="indiqueEncuentra"
            [gridLayout]="true"
            [isRequired]="true"
          ></app-input-radio>
        </div>
      </div>
    
      <div class="row mt-3">
        <div class="form-group">
          <label class="form-label" for="senaleCertificados"
            >Senale si sus certificados de sellos digitales estan vigentes.</label
          >
          <app-input-radio
            [radioOptions]="requisitosRadioData"
            id="senaleCertificados"
            formControlName="senaleCertificados"
            [gridLayout]="true"
            [isRequired]="true"
          ></app-input-radio>
        </div>
      </div>
    
      <div class="row mt-3">
        <div class="form-group">
          <label class="form-label" for="senaleActulaizado"
            >Señale si tiene actualizados sus medios de contacto para efectos del
            buzón tributario en términos del artículo 17-K, penúltimo párrafo del
            CFF.</label
          >
          <app-input-radio
            [radioOptions]="requisitosRadioData"
            id="senaleActulaizado"
            formControlName="senaleActulaizado"
            [gridLayout]="true"
            [isRequired]="true"
          ></app-input-radio>
        </div>
      </div>
    
      <div class="row mt-3">
        <div class="form-group">
          <label class="form-label" for="senaleSuspendida"
            >Señale si se encuentra suspendida en el Padrón de Importadores, en el
            Padrón de Importadores de Sectores Específicos o en el Padrón de
            Exportadores Sectorial.</label
          >
          <app-input-radio
            [radioOptions]="requisitosRadioData"
            id="senaleSuspendida"
            formControlName="senaleSuspendida"
            [gridLayout]="true"
            [isRequired]="true"
          ></app-input-radio>
        </div>
      </div>
    </form>
  </div>

</div>
