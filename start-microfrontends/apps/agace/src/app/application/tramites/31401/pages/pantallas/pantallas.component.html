<div class="container">
    <div class="row">
      <div class="col-md-8">
        <h1>
            Cancelación de garantía en materia de IVA e IEPS
        </h1>
      </div>
      <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    </div>
    
    @if (!esFormaValido && esFormaValido !== undefined) {
      <div class="row">
        <ng-alert [CONTENIDO]="formaInvalidoAlerta" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
    }
    
    @if (esFormaValido) {
      <div class="row">
        <ng-alert [CONTENIDO]="formaValidoAlerta"></ng-alert>
      </div>
    }

    <div class="row">
      @switch (indice) {
        @case (1) {
        <paso-uno></paso-uno>
        } @case (2) {
        <paso-dos></paso-dos>
        } @case (3) {
        <paso-tres></paso-tres>
        }
      }
    </div>
    <btn-continuar
      [datos]="datosPasos"
      (continuarEvento)="getValorIndice($event)"
    >
    </btn-continuar>
  </div>
