<div class="page">
  <div class="container">
    <form [formGroup]="forma">
      <div class="row">
        <formas-dinamicas
          formularioTitulo="Régimen Aduanero"
          [forma]="ninoFormGroup"
          [formularioDatos]="regimenFormData"
        ></formas-dinamicas>
      </div>
      <div class="row mt-3">
        <div class="col-md-12">
          <p>Indique el fin de vigencia y el número de oficio con el cual se le otorgó la autorización para operar el régimen de depósito fiscal para someterse al proceso de ensamble y fabricación de vehículos a empresas de la industria automotriz terminal.</p>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-4">
            <input-fecha
              [setFecha]="forma.get('fechaDeFin')?.value"
              [datos]="obtenerInformacionDeFecha"
            ></input-fecha>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label for="numero">Número de oficio de autorización*:</label>

            <input
              class="form-control"
              type="number"
              id="numero"
              formControlName="numero"
              required="true"
            />
          </div>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col-md-12">
          <div class="form-group">
            <label class="form-label" for="senaleEncuentra">Señale si, al momento de la presentación de su solicitud, se encuentra sujeto a un proceso de cancelación de la autorización para operar el régimen de depósito fiscal para someterse al proceso de ensamble y fabricación de vehículos a empresas de la industria automotriz terminal.</label>
            <app-input-radio
              [radioOptions]="radioDatos"
              id="senaleEncuentra"
              formControlName="senaleEncuentra"
              [gridLayout]="true"
              [isRequired]="true"
            ></app-input-radio>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
