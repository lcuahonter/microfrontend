<div class="page">
    <div class="container">
      <form [formGroup]="forma">

        <div class="row">
            <ng-titulo titulo="Miembro de la empresa" />
        </div>
        <div class="row mt-5">
            <app-tabla-dinamica
            [tipoSeleccionTabla]="tipoSeleccionTabla"
            [configuracionTabla]="tableHeaderMiembro"
            [datos]="tablaMiembro"
            [disableSeleccionTablaCheckBox]="consultaState.readonly"
            >
            </app-tabla-dinamica>
        </div>
        <div class="row mt-5">
            <div class="col-md-12 text-end">
            <button name="eliminarSocio" id="eliminarSocio" class="btn btn-default ms-3" type="button" disabled>Eliminar</button>
            <button name="modificarSocio" id="modificarSocio" class="btn btn-default ms-3" type="button" disabled>Modificar</button>
            <button name="agregarSocio" id="agregarSocio" class="btn btn-default ms-3" type="button" disabled>Agregar</button>
            </div>
        </div>

        <div class="row">
          <formas-dinamicas
            [forma]="ninoFormGroup"
            [formularioDatos]="miembroFormData"
          ></formas-dinamicas>
        </div>
        <div class="row mt-5">
            <div class="col-md-12">
                <app-tabla-dinamica
                    [tipoSeleccionTabla]="tipoSeleccionTabla"
                    [configuracionTabla]="tableHeaderTipoInversion"
                    [datos]="tablaTipoInversion"
                    [disableSeleccionTablaCheckBox]="consultaState.readonly"
                    >
                </app-tabla-dinamica>
            </div>
        </div>
        <div class="row mt-3">
            <div class="form-group">
                <label class="form-label" for="senalePreviamente">
                    Señale si previamente contó con la Certificación en materia de IVA e IEPS, el Registro en el Esquema de Certificación de Empresas bajo la modalidad IVA e IEPS o Garantía del interés fiscal del IVA e IEPS.
                </label>
                <app-input-radio
                    [radioOptions]="radioDatos"
                    id="senalePreviamente"
                    formControlName="senalePreviamente"
                    [gridLayout]="true"
                ></app-input-radio>
            </div>
        </div>
        <div class="row mt-3">
            <div class="form-group">
                <label class="form-label" for="enCasoAffirmativo">
                    En caso afirmativo, señale si se encuentra al corriente en el cumplimiento de las obligaciones relativas al Anexo 30 sobre dicho registro.
                </label>
                <app-input-radio
                    [radioOptions]="radioDatos"
                    id="enCasoAffirmativo"
                    formControlName="enCasoAffirmativo"
                    [gridLayout]="true"
                ></app-input-radio>
            </div>
        </div>
      </form>
    </div>
  </div>
