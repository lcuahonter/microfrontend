<ng-titulo titulo="Personas para oir y recibir notificaciones" />
<div class="custom-table-wrapper">
  <div class="container">
    <div class="header">
      <span> Personas para oir y recibir notificaciones </span>
      <span class="plus-icon" [tabindex]="esFormularioSoloLectura ? -1 : 0"
        (click)="!esFormularioSoloLectura && toggleContent()"
        (keyup.enter)="!esFormularioSoloLectura && toggleContent()"
        (keyup.space)="!esFormularioSoloLectura && toggleContent()">+</span>
    </div>
    <div *ngIf="showContent" class="content">
      <app-tabla-dinamica [configuracionTabla]="configuracionTabla" [datos]="personaParas">
      </app-tabla-dinamica>
    </div>
  </div>
</div>
