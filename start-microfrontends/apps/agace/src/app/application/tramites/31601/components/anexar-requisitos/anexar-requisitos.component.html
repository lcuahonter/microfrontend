<div class="container">
  <h6 class="custom-line-height">Si deseas adjuntar un nuevo documento, selecciona la opción --Adjuntar nuevo documento y presiona el botón "Adjuntar documentos"</h6>
  <form [formGroup]="anexarForm">
    <table>
      <thead>
        <tr>
          <th>Tipo de Documento</th>
          <th>Documento</th>
          <th>Ver Documento</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let doc of documentos">
          <td>{{ doc.tipo }}</td>
          <td>
            <app-catalogo-select [catalogo]="[doc.archivoDisponible]" name="valorSeleccionado"
              (change)="cambioDeArchivo($event)" formControlName="valorSeleccionado">
            </app-catalogo-select>
          </td>
          <td class="text-center">
            <i class="bi bi-file-earmark-text fs-1"></i>
          </td>
        </tr>
      </tbody>
    </table>
  </form>
</div>
