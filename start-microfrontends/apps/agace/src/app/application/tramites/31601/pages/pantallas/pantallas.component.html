<div class="container mt-5">
  <div class="row">
    <div class="col-md-6">
      <h5>IVA e IEPS A</h5>
    </div>
    <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
  </div>
  <div class="row">
    @switch (indice) { @case (1) {
    <app-datos></app-datos>
    }  @case (2) {
    <app-anexar-requisitos></app-anexar-requisitos>
    } @case (3) {
    <app-firmar-solicitud></app-firmar-solicitud>
    
    } }
  </div>
  <btn-continuar
      [datos]="datosPasos"
      (continuarEvento)="getValorIndice($event)"
    >
    </btn-continuar>
</div>
