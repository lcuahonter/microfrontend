<div class="container form-container">
  <ng-titulo titulo="Representante Legal" />
  <div>
    <form [formGroup]="represtantante">
      <ng-container >
        <H6>*Registro Federal de Contribuyentes:</H6>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <input
                class="form-control"
                id="resigtro"
                formControlName="resigtro"
                type="text"
                (change)="setValoresStore(represtantante,'resigtro', 'setResigtro')"
              />
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="rfc">RFC</label>
              <input
                class="form-control"
                id="rfc"
                formControlName="rfcDatos"
                type="text"
                (change)="setValoresStore(represtantante,'rfcDatos', 'setRfcDatos')"
              />
            </div>
          </div>

          <div class="col-md-4 d-flex align-items-center">
            <div class="btn-group">
              <button class="btn btn-default" type="button"  [disabled]="esFormularioSoloLectura" (click)="openBuscar()">Buscar</button>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="nombre">Nombre</label>
              <input
                class="form-control"
                id="nombre"
                formControlName="nombre"
                type="text"
                (change)="setValoresStore(represtantante,'nombre', 'setNombre')"
              />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="apellidoPaterno"
                >Apellido Paterno</label
              >
              <input
                class="form-control"
                id="apellidoPaterno"
                formControlName="apellidoPaterno"
                type="text"
                (change)="setValoresStore(represtantante,'apellidoPaterno', 'setApellidoPaterno')"
              />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="apellidoMaterno"
                >Apellido Materno</label
              >
              <input
                class="form-control"
                id="apellidoMaterno"
                formControlName="apellidoMaterno"
                type="text"
                (change)="setValoresStore(represtantante,'apellidoMaterno', 'setApellidoMaterno')"
              />
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="telefono">Teléfono</label>
              <input
                class="form-control"
                id="telefono"
                formControlName="telefono"
                type="text"
                (change)="setValoresStore(represtantante,'telefono', 'setTelefono')"
              />
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="correo">Correo Electrónico</label>
              <input
                class="form-control"
                id="correo"
                formControlName="correo"
                type="text"
                (change)="setValoresStore(represtantante,'correo', 'setCorreo')"
              />
            </div>
          </div>
        </div>
      </ng-container>
    </form>
  </div>
  @if (nuevaNotificacion) {
<section>
  <lib-notificaciones [notificacionInput]="nuevaNotificacion" >
  </lib-notificaciones>
</section>
}
</div>
