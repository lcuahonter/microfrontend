<div class="container">
  <form [formGroup]="proveedorXtranjForm" [ngStyle]="{ 'pointer-events': esFormularioSoloLectura ? 'none' : 'auto' }">
    <div class="row">
      <div class="col-md-12 mb-4">
        <ng-titulo [fontSize]="true" [titulo]="ProveedoresTitulo"></ng-titulo>
        <div class="col-md-12">
          <div class="alert alert-info">
            <div class="form-check">
              Descargue la plantilla para la carga masiva de su(s) proceso(s)
              productivo(s)
              <a  href="#" (click)="descargarPlantilla($event)"
                >Aquí</a
              >
            </div>
          </div>
        </div>

        <div class="row" style="margin-top: 20px">
          <div class="col-md-8">
            <div class="d-flex align-items-center custom-input-file">
                <button class="mb-2" type="button" for="archivoExtranjero" class="file-upload"
                  (click)="activarSeleccionArchivo()">
                  Seleccionar archivo
                </button>
                <div class="ml-2">{{ etiquetaDeArchivo }}</div>
                <input type="file" id="archivoExtranjero" (change)="onCambioDeArchivo($event)"
                  formControlName="archivoExtranjero" class="file-upload" style="display: none;" accept="">
              </div>
          </div>
          <div class="col-md-4 d-flex justify-content-end">
            <button
              type="button"
              name="cargaArchivoProcesos"
              id="cargaArchivoProcesos"
              class="btn btn-primary me-md-3"
              [disabled]="esFormularioSoloLectura"
              (click)="cargarArchivoProceso()"
            >
              Anexar
            </button>
            <button
              type="button"
              name="vistaPreviaProcesos"
              id="vistaPreviaProcesos"
              class="btn btn-primary"
              [disabled]="esFormularioSoloLectura"
            >
              Vista previa
            </button>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <label
              for="agace.seccionProveedores.existentes"
              id="labelProveedor"
            >
              {{ seccionProveedoresExistentes }}
            </label>
          </div>
          </div>
          <div class="row">
          <div class="col-md-6">
            <input
              type="text"
              class="form-control"
              name="registrosProveedoresExtranjeros"
              id="registrosProveedoresExtranjeros"
              formControlName="registrosProveedoresExtranjeros"
            />
          </div>
          <div class="col-md-2">&nbsp;</div>
        </div>
         <div class="text-right">
        
        <button type="button" class="btn btn-danger me-3">
            Cancelar
        </button>
         <button type="submit"  (click)="continuar()" class="btn btn-primary">
          Continuar
        </button>
    </div>
      </div>
    </div>
  </form>
</div>

@if (nuevaNotificacion) {
  <section>
    <lib-notificaciones [notificacionInput]="nuevaNotificacion">
    </lib-notificaciones>
  </section>
  }
