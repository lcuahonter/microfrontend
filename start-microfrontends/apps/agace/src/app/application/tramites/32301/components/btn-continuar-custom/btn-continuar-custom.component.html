<div class="row my-5">
  <div class="col-md-8">
    <p>* Campos obligatorios</p>
  </div>
  <div class="col-md-4 d-flex justify-content-end">
    <button type="button" class="btn btn-default" (click)="anterior()" [style.visibility]="btnAntVisible">
      {{ datos.txtBtnAnt }}
    </button>



    @if (btnContVisible) {
    <button type="button" class="btn btn-primary ms-3" [disabled]="!habilitarBoton" (click)="continuar()">
      {{ datos.txtBtnSig }}
    </button>
    @if (btngardarClickedModificacionSocios) {
    <button type="button" class="btn btn-default ms-3" (click)="guardar()">
      Guardar
    </button>
  }
    }
  </div>
  <div>
    @if(moduloEmergente){
    <lib-notificaciones [notificacionInput]="notificacion"
      (confirmacionModal)="eliminarPedimento($event)"></lib-notificaciones>
    }
  </div>
</div>
