<div class="container">
  <ng-titulo titulo="Ampliación de vigencia (etapa pre-operativa)"></ng-titulo>
  <form [formGroup]="formularioAvisoDeExtension">
    <div class="row mt-5">
      <div class="alert alert-info" style="text-align: justify;">
        <label style="font-weight: normal">
          <input type="checkbox" formControlName="MANIFIESTO_1" (change)="setValoresStore(formularioAvisoDeExtension, 'MANIFIESTO_1', 'setManifiesto1')">
          <span class="col-md-12 manifesto">{{ solicitudEnum.MANIFIESTO_1 }}</span>
        </label>
      </div>
    </div>
    <div class="row mt-5">
      <div class="alert alert-info" style="text-align: justify;">
        <label style="font-weight: normal">
          <input type="checkbox" formControlName="MANIFIESTO_2" (change)="setValoresStore(formularioAvisoDeExtension, 'MANIFIESTO_2', 'setManifiesto2')">
          <span class="col-md-12 manifesto">{{ solicitudEnum.MANIFIESTO_2 }}</span>
        </label>
      </div>
    </div>
    <div class="row mt-5">
      <div class="alert alert-info" style="text-align: justify;">
        <label style="font-weight: normal">
          <input type="checkbox" formControlName="MANIFIESTO_3" (change)="setValoresStore(formularioAvisoDeExtension, 'MANIFIESTO_3', 'setManifiesto3')">
          <span class="col-md-12 manifesto">{{ solicitudEnum.MANIFIESTO_3 }}</span>
        </label>
      </div>
    </div>
    <div class="row mt-5">
      <div class="alert alert-info" style="text-align: justify;">
        <label style="font-weight: normal">
          <input type="checkbox" formControlName="MANIFIESTO_4" (change)="setValoresStore(formularioAvisoDeExtension, 'MANIFIESTO_4', 'setManifiesto4')">
          <span class="col-md-12 manifesto">{{ solicitudEnum.MANIFIESTO_4 }}</span>
        </label>
      </div>
    </div>
    <div *ngIf="formularioAvisoDeExtension.errors?.['notAllSelected']" class="text-danger">
      Todas las casillas de verificación deben estar seleccionadas.
    </div>
  </form>
</div>
