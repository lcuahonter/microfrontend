  <div class="row mt-3">
    <form [formGroup]="conceptosForm">
    @if (siONo === 'No') {
          <div class="col-md-4">
            <p class="fw-bold">
              Capture el valor total*
            </p>
            <input
              type="text"
              formControlName="captureElValorTotal"
              class="form-control"
              (change)="setValoresStore(conceptosForm,'captureElValorTotal', 'setCaptureElValorTotal')"
              placeholder=""
            />
          </div>
        }
      <div [ngClass]="siONo === 'No' ? 'col-md-8' : 'col-md-12'">
          <table class="table">
            <thead>
              <tr>
                <th>Conceptos</th>
                <th>Valor en moneda nacional</th>
                <th>Equivalencia en porcentaje</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Transferencias virtuales y/o desperdicios</td>
                <td>
                  <input
                    type="text"
                    formControlName="transferencias"
                    class="form-control"
                    (change)="setValoresStore(conceptosForm,'transferencias', 'setTransferencias')"
                    placeholder=""
                  />
                </td>
                <td>
                  <input
                    type="text"
                    formControlName="transferenciasVir"
                    class="form-control"
                    (change)="setValoresStore(conceptosForm,'transferenciasVir', 'setTransferenciasVir')"
                    placeholder=""
                  />
                </td>
              </tr>
              <tr>
                <td>Retornos</td>
                <td>
                  <input
                    type="text"
                    formControlName="retornos"
                    (change)="setValoresStore(conceptosForm,'retornos', 'setRetornos')"
                    class="form-control"
                    placeholder=""
                  />
                </td>
                <td>
                  <input
                    type="text"
                    formControlName="retornosSe"
                    (change)="setValoresStore(conceptosForm,'retornosSe', 'setRetornosSe')"
                    class="form-control"
                    placeholder=""
                  />
                </td>
              </tr>
              <tr>
                <td>Constancias de transferencia de mercancía CTM</td>
                <td>
                  <input
                    type="text"
                    formControlName="constancias"
                    (change)="setValoresStore(conceptosForm,'constancias', 'setConstancias')"
                    class="form-control"
                    placeholder="10"
                  />
                </td>
                <td>
                  <input
                    type="text"
                    formControlName="constanciasDe"
                    (change)="setValoresStore(conceptosForm,'constanciasDe', 'setConstanciasDe')"
                    class="form-control"
                    placeholder="10"
                  />
                </td>
              </tr>
              <tr>
                <td>Total</td>
                <td>
                  <input
                    type="text"
                    formControlName="total"
                    (change)="setValoresStore(conceptosForm,'total', 'setTotal')"
                    class="form-control"
                    placeholder="100"
                  />
                </td>
                <td>
                  <input
                    type="text"
                    formControlName="totalDos"
                    (change)="setValoresStore(conceptosForm,'totalDos', 'setTotalDos')"
                    class="form-control"
                    placeholder="100"
                  />
                </td>
              </tr>
            </tbody>
          </table>
        </div>
