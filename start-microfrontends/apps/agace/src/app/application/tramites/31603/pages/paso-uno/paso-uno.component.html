
<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Datos Comunes</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(3)">Terceros Relacionados</a>
            </li>
            <li *ngIf="mostrarImportaciones || mostrarDepositoFiscal || mostrarElaboracion || mostrarRecinto" [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(4)">Datos por Régimen</a>
            </li>
            <li [ngClass]="indice === 5 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(5)">IVA e IEPS AAA</a>
            </li>
        </ul>
        <ng-container>
            @switch (indice) {
                @case(1) {
                    <solicitante></solicitante>
                }              
                @case (2) {
                    <shared-datos-comunes (radioChanged)="onRadioChanged($event)" (mostrarImportacionesChange)="onMostrarImportacionesChange($event)" (mostrarDepositoFiscalChange)="onMostrarDepositoFiscalChange($event)" (mostrarElaboracionChange)="onMostrarElaboracionChange($event)" (mostrarRecintoChange)="onMostrarRecintoChange($event)"></shared-datos-comunes>
                }
                @case(3) {
                    <shared-terceros-relacionados [consultaState]="consultaState"></shared-terceros-relacionados>
                }
                @case(4) {
                    <app-datos-por-regimen *ngIf="mostrarImportaciones || mostrarDepositoFiscal || mostrarElaboracion || mostrarRecinto" [mostrarSoloImportaciones]="mostrarImportaciones" [mostrarSoloDepositoFiscal]="mostrarDepositoFiscal" [mostrarSoloElaboracion]="mostrarElaboracion" [mostrarSoloRecinto]="mostrarRecinto" [consultaState]="consultaState"></app-datos-por-regimen>
                }
                @case (5) {
                    <app-ivaeieps></app-ivaeieps>
                }

            }
        </ng-container>
        <app-shared-modal
            [visible]="mostrarPopup"
            [message]="popupMessage"
            (closed)="cerrarPopup()"
        ></app-shared-modal>
    </div>
</div>
