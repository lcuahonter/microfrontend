<div class="modal" tabindex="-1" [ngClass]="{'show': visible}" [ngStyle]="{'display': visible ? 'block' : 'none', 'background': visible ? 'rgba(0,0,0,0.5)' : 'none'}">
  <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
    <div class="modal-content" *ngIf="visible" @fadeInOut>
      <div class="modal-header">
        <button type="button" class="btn-close" aria-label="Close" (click)="onClose()"></button>
      </div>
      <div class="modal-body">
        <p>{{ message }}</p>
      </div>
      <div class="modal-footer justify-content-center">
        <button type="button" class="btn btn-primary" (click)="onClose()">Aceptar</button>
      </div>
    </div>
  </div>
</div>
