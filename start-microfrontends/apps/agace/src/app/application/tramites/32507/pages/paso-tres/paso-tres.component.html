<div class="container">
    @if(esAcuse) {
        <lib-component-acuse
            titulo="Acuse de recibo"
            [txtAlerta]="txtAlerta"
            [subtitulo]="subtitulo"
            [folio]="folio"
            [url]="url"
            [idSolicitud]="idSolicitud"
            [procedure]="procedure">
        </lib-component-acuse>
    } @else {
        <div class="row">
            <div class="col-md-6">
                <firma-electronica
                    [tipo]="''"
                    [cadenaOriginal]="cadenaOriginal"
                    (datosFirma)="obtieneDatosFirma($event)">
                </firma-electronica>
            </div>
        </div>
    }
</div>
