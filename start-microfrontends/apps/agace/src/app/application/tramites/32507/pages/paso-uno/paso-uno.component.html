<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)" tabindex="1">Aviso</a>
      </li>
    </ul>
    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante (datosGeneralesLoaded)="onDatosGeneralesLoaded($event)"></solicitante>
      }
      @case (2) {
      <app-aviso #avisoComponentRef></app-aviso>
      }

      }
    </ng-container>
  </div>
</div>
