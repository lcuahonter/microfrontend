@for (seccion of secciones; track $index; let i = $index) {
<div class="table-container">
  <div class="table-header pb-2">
    <h3>
      {{seccion.titulo}}
    </h3>
    <button (click)="acordeonAbierto(i)" class="toggle-btn">
      <i
        class="bi fs-5 m-1"
        [ngClass]="{
          'bi-chevron-down': indiceAbierto !== i,
          'bi-chevron-up': indiceAbierto === i
        }"
      >
      </i>
    </button>
  </div>
  <div class="accordion-body body-panel {{ indiceAbierto === i ? 'open' : 'close' }}">
    <ng-container #contenedorDinamico></ng-container>
  </div>
</div>
}
