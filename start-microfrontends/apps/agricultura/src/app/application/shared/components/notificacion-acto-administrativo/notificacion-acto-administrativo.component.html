<div class="row mt-5">
  <ng-titulo [titulo]="'Notificación de acto administrativo'"></ng-titulo>
</div>
<div class="row mt-5">
  <form [formGroup]="notificacionForm">
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre, denominación o razón social:</label>
      <input type="text" class="form-control" id="nombre" formControlName="nombre" />
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="rfc" class="form-label">RFC: <span tooltip="Registro Federal de Contribuyente">
            <i class="bi bi-question-circle-fill"></i>
          </span>
        </label>
        <input type="text" class="form-control" id="rfc" formControlName="rfc" />
      </div>
      <div class="col-md-6 mb-3">
        <label for="fechaHora" class="form-label">Fecha y hora de la notificación:</label>
        <input type="datetime-local" class="form-control" id="fechaHora" formControlName="fechaHora" />
      </div>
    </div>
  </form>
</div>
