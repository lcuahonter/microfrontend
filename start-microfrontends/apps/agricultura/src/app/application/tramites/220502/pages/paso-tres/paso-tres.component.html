<div class="container">
    @if(isSuccessCert){
  <app-acuse-recibo [datosTabla]="acuseDocumentos" [datosTablaAcuseNotificacion]="[]" [guardarDatos]="guardarDatos"
    [banderaVista]="'Acuse'">
  </app-acuse-recibo>
 
  }@else {
  <div class="row">
    <div class="col-md-4">
        <firma-electronica 
        [tipo]="''" 
        [cadenaOriginal]="cadenaOriginal"
        [cadenasOriginalesDocumentos]="cadenasOriginalesDocumentos"
        (datosFirma)="datosFirma($event)"
        (documentosFirmados)="onDocumentosFirmados($event)"
      ></firma-electronica>
    </div>
  </div>
}
</div>
