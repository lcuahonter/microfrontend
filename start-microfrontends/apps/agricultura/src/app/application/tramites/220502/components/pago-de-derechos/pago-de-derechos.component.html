<div class="container">
  <form [formGroup]="pagoForm">
    <div class="row">
      <ng-titulo titulo="Pago de derechos" />
      <div class="row mt-2">
        <div class="col-md-12">
          <label for="certficacion_a">Exento de pago</label>
        </div>
        <app-input-radio
        [radioOptions]="opcionDeBotonDeRadio"
        [isRequired]="true"
        [selectedValue]="esSolicitudFerrosValor"
        [layout]="'vertical'"
        formControlName="exentoPagoNo"
        (valueChange)="setExentoPagoNo($event)"
      ></app-input-radio>
      </div>
      <div class="row">
        <div class="col-md-8">
          <app-catalogo-select
            [catalogo]="justificacion.catalogos"
            [label]="justificacion.labelNombre"
            [placeholder]="justificacion.primerOpcion"
            [isDisabled]="true"
            formControlName="justificacion"
            (selectionChange)="seleccionarJustificacionCatalogo($event)"
          ></app-catalogo-select>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="nombreImportExport"
              >Clave de referencia:</label
            >
            <input
              class="form-control"
              id="nombreImportExport"
              readonly
              placeholder=""
              type="text"
              value="454000554"
              formControlName="claveReferencia"
              (change)="setClaveReferencia($event)"
            />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="nombreImportExport"
              >Cadena de dependencia:</label
            >
            <input
              class="form-control"
              id="nombreImportExport"
              readonly
              placeholder=""
              type="text"
              value="0003008010CEZI"
              readonly
              required
              formControlName="cadenaDependencia"
              (change)="setCadenaDependencia($event)"
            />
          </div>
        </div>
        <div class="col-md-4">
             <label class="form-label" for="nombreImportExport"
              >Banco:</label
            >
    <input
  class="form-control"
  id="banco"
  readonly
  placeholder="{{ banco.primerOpcion }}"
  type="text"
  [disabled]="formularioDeshabilitado"
  formControlName="banco"
  (change)="selectBancoCatalogo($event)"
/>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="nombreImportExport"
              >Llave de pago:</label
            >
            <input
              class="form-control"
              id="nombreImportExport"
             
              placeholder=""
              type="text"
              libUppercase
              formControlName="llavePago"
              (change)="setIlavePago($event)"
            />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="nombreImportExport"
              >Fecha de pago:</label
            >
            <input
              class="form-control"
              id="nombreImportExport"
              readonly
              placeholder=""
              type="text"
              libUppercase
              formControlName="fetchapago"
              (change)="setFetchaPago($event)"
            />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="nombreImportExport"
              >Importe de pago:</label
            >
            <input
              class="form-control"
              id="nombreImportExport"
             placeholder=""
              type="text"
              formControlName="importePago"
              (change)="setImportePago($event)"
            />
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
