<div class="container">
    <form [formGroup]="form">
      @if(isSolicitud){
      <!-- Solicitud Tabla -->
    
      <app-solicitud-datos [tablaHeadData]="hSolicitud" [procedimiento]="procedimiento" [tablaFilaDatos]="dSolicitud"></app-solicitud-datos>
      }
      <!-- Datose del tramite a realizar -->
      <app-datos-del-tramite-a-realizar claveDeControl="datoseDelTramiteRealizar" [procedimiento]="procedimiento" [formularioDeshabilitado]="formularioDeshabilitado" (certificadosAutorizEmitido)="certificadosAutorizEmitido($event)"></app-datos-del-tramite-a-realizar>
      <!-- Responsable inspeccion en punto -->
      <app-responsable-inspeccion-en-punto claveDeControl="responsableInspeccionEnPunto" [formularioDeshabilitado]="formularioDeshabilitado" [procedimiento]="procedimiento"></app-responsable-inspeccion-en-punto>
        <!-- app-medio-transporte -->
      <app-medio-transporte claveDeControl="mediotransporte" [mercanciaLista]="mercanciaLista" [mediodetransporte]="mediodetransporte" [formularioDeshabilitado]="formularioDeshabilitado"></app-medio-transporte>
      <!-- Cantidad de carros de ferrocarril -->

      <app-carros-de-ferrocarril [tablaHeadData]="hCarroFerrocarril" [tablaFilaDatos]="dCarrosDeFerrocarril"></app-carros-de-ferrocarril>
      <!-- Historial inspeccion fisica -->
      <app-historial-inspeccion-fisica [tablaHeadData]="hHistorialinspeccion" [tablaFilaDatos]="dHistorialInspecciones"></app-historial-inspeccion-fisica>
    </form>
  </div>
