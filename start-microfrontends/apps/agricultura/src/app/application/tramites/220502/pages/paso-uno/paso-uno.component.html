<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          (click)="seleccionaTab(1)"
          (keyup.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          tabindex="0"
          data-toggle="tab"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          (click)="seleccionaTab(2)"
          (keyup.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          tabindex="0"
          data-toggle="tab"
          >Datos de la solicitud</a
        >
      </li>
      @if(isRevisionDocumental){
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          (click)="seleccionaTab(3)"
          (keyup.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)"
          tabindex="0"
          data-toggle="tab"
          >Revisión documental</a
        >
      </li>
      }
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante></solicitante>
      } @case (2) {
      <app-solicitud
        (certificadosAutorizValor)="certificadosAutorizValor($event)"
      ></app-solicitud>
      } @case (3) { @if(isRevisionDocumental){
      <app-revision-documental></app-revision-documental>
      } } }
    </ng-container>
  </div>
</div>
