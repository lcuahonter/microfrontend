<fieldset [formGroupName]="claveDeControl">
  <ng-titulo titulo="Medio de transporte" />
  <div class="row">
    <div class="col-md-4">
      <div class="form-field">
        <app-catalogo-select
          id="Mediodetransporte"
          [catalogo]="mediodetransporte.catalogos"
          [label]="mediodetransporte.labelNombre"
          [placeholder]="mediodetransporte.primerOpcion"
          [required]="mediodetransporte.required"
          formControlName="transporteIdMedio"
          (selectionChange)="setTransporteIdMedio($event)"
          [isDisabled]="formularioDeshabilitado"
           [markTouched]="grupoFormularioPadre.get(claveDeControl)?.get('transporteIdMedio')?.touched ?? false"
        ></app-catalogo-select>
      </div>
    </div>
    <div class="col-md-4">
      <div class="form-field">
        <label for="puntos" class="form-label"
          >Identificación del transporte:</label
        >
        <input
          class="form-control"
          type="text"
          maxlength="30"
          size="30"
          formControlName="identificacionTransporte"
          id="puntos"
          (change)="setIdentificacionTransporte($event)"
        />
      </div>
    </div>
    <div class="col-md-12 mt-5">
   <label class="form-label" for="solicituddeInspección">
  ¿La solicitud de Inspección Física es para trámites que arriban por
  Ferrocarril o por Partes II
  <span
    class="require"
    [ngClass]="{
      'text-danger':
        grupoFormularioPadre.get(claveDeControl + '.esSolicitudFerros')?.invalid &&
        grupoFormularioPadre.get(claveDeControl + '.esSolicitudFerros')?.touched &&
        grupoFormularioPadre.get(claveDeControl + '.esSolicitudFerros')?.dirty
    }"
    >*</span
  >:
</label>
      <app-input-radio
        [radioOptions]="opcionDeBotonDeRadio"
        [isRequired]="true"
        [selectedValue]="esSolicitudFerrosValor"
        [layout]="'vertical'"
        formControlName="esSolicitudFerros"
        (valueChange)="enCambioDeValor($event)"
      ></app-input-radio>
       <span
    *ngIf="
      grupoFormularioPadre
        .get(claveDeControl + '.esSolicitudFerros')
        ?.hasError('required') &&
      grupoFormularioPadre
        .get(claveDeControl + '.esSolicitudFerros')
        ?.touched
    "
    class="mensaje-error"
  >
    Este campo es obligatorio
  </span>
    </div>
    <div class="col-md-12 mt-4 mb-3">
      @if(solicitud220502State.esSolicitudFerros === 1) {
      <ng-alert
        class="text-center"
        [CONTENIDO]="SALDO_PENDIENTE_NOTIFICACION"
      ></ng-alert>
      }
    </div>
    <div class="col-md-12">
      <div class="form-field">
        <label for="Datosdelamercancía" class="form-label mb-5"
          >Datos de la mercancía:</label
        >
      </div>
    </div>
    <div class="col-md-12 mb100">
      <app-tabla-dinamica
        [tipoSeleccionTabla]="tipoSeleccionTabla"
        [configuracionTabla]="mercanciaConfiguracionColumnas"
        [datos]="mercanciaLista"
        [inputSelection]="inputMercanciaSelection"
        (listaDeFilaSeleccionada)="obtenerMercanciaLista($event)"
      >
      </app-tabla-dinamica>
    </div>
    @if (solicitud220502State.esSolicitudFerros !== 2 && mercanciaLista.length >
    0) {
    <div class="row">
      <div class="text-end">
        <button
          name="modificarSaldoMercancia"
          id="btnSaldoMercancia"
          class="btn btn-primary"
          (click)="modificarSaldosMercancia()"
          [disabled]="formularioDeshabilitado"
        >
          Modificar
        </button>
      </div>
    </div>
    } @if (solicitud220502State.esSolicitudFerros !== 2) {
    <div class="col-md-4">
      <div class="form-field">
        <label for="totalDeGuiasAmparadas" class="form-label"
          >Total de guías amparadas:
          <span
            tooltip="Total de guías amparadas por la parte II, remesa de consolidado ó copia simple"
            ><i class="bi bi-question-circle-fill"></i
          ></span>
        </label>
        <input
          class="form-control"
          type="text"
          maxlength="50"
          formControlName="totalDeGuiasAmparadas"
          id="totalDeGuiasAmparadas"
          (change)="setTotalDeGuiasAmparadas($event)"
        />
      </div>
    </div>
    }
  </div>
</fieldset>

<!--Agregar Mercancía Popup-->
<div
  #modalModificarSaldoMercancia
  class="modal fade"
  id="modalModificarSaldoMercancia"
  tabindex="-1"
  aria-labelledby="modalModificarSaldoMercanciaLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body">
        <app-agregar-mercancia
          [mercanciasDatos]="mercanciaSeleccionLista"
          (actualizarMercancia)="actualizarMercanciaEnTabla($event)"
        ></app-agregar-mercancia>
      </div>
    </div>
  </div>
</div>

@if (nuevaNotificacion) {
<section>
  <lib-notificaciones
    [notificacionInput]="nuevaNotificacion"
    (confirmacionModal)="eliminarPedimento($event)"
  >
  </lib-notificaciones>
</section>
}
