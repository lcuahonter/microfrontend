<div class="container m-5">
    <div class="row">
            <ul class="nav nav-tabs">
                <li *ngFor="let tab of seccionesDeLaSolicitud" [ngClass]="indice === tab.index ? 'active' : ''">
                    <a data-toggle="tab" (click)="seleccionaTab(tab.index)" (keydown.enter)="seleccionaTab(tab.index)"
                        tabindex="0">{{ tab.title }}</a>
                </li>
            </ul>
      <ng-container>
        @switch (indice) { @case (1) {
        <interna-datos-generales></interna-datos-generales>
        } 
        @case (2) {
          <interna-terceros-relacionados></interna-terceros-relacionados>
        } 
        @case (3) {
          <interna-pago-de-derechos></interna-pago-de-derechos>
        } 
      }
      </ng-container>
    </div>
  </div>
