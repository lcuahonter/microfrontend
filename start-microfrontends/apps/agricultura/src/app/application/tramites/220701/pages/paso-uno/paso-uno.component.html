<div class="container">
  <div class="row">
      <ul class="nav nav-tabs">
          <li [ngClass]="indice === 1 ? 'active' : ''">
              <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)"
                  tabindex="0" data-toggle="tab">Solicitante</a>
          </li>
          <li [ngClass]="indice === 2 ? 'active' : ''">
              <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)"
                  tabindex="0" data-toggle="tab">Datos de la solicitud</a>
          </li>
          <li [ngClass]="indice === 3 ? 'active' : ''">
              <a (click)="seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)"
                  tabindex="0" data-toggle="tab">Revisión Documental</a>
          </li>
          <li [ngClass]="indice === 4 ? 'active' : ''">
              <a (click)="seleccionaTab(4)" (keyup.enter)="seleccionaTab(4)" (keydown.space)="seleccionaTab(4)"
                  tabindex="0" data-toggle="tab">Pago de derechos</a>
          </li>
      </ul>

      <ng-container>
          @switch (indice) {
          @case (1) {
          <solicitante></solicitante>
          }
          @case (2) {
            @if(esDatosRespuesta){
          <datos-de-la-solicitud></datos-de-la-solicitud>
            }
          }
          @case (3) {
            @if(esDatosRespuesta){
          <revision-documental></revision-documental>
            }
          }
          @case (4) {
            @if(esDatosRespuesta){
          <pago-de-derechos [consultaState]="consultaState"></pago-de-derechos>
            }
          }
          }
      </ng-container>
  </div>
</div>
