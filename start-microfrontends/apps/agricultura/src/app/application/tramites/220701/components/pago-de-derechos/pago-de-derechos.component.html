<div class="container">
  <form [formGroup]="pagosDeDerechosForm">

    <div class="row mt-5">
      <ng-titulo titulo="Pago de derechos" />
      <div class="row">
        <div class="col-md-8 form-group">
          <label class="form-label" for="coordenadas">Exento de pago:</label>
          <app-input-radio [radioOptions]="exentoPagoRadio" [selectedValue]="exentoPagoValor" [isRequired]="true"
            [layout]="'vertical'" formControlName="exentoPago" [required]="true" [disabled]="esFormularioSoloLectura"
            (valueChange)="cambioValorRadio('exentoPago', $event.toString())"></app-input-radio>
        </div>
      </div>
      <div class="row">
        <div class="col-md-8">`
          <ng-container *ngIf="exentoPagoValor === 'Si'; else noTrack">
            <app-catalogo-select [catalogo]="justificacionCatalogo" formControlName="justificacion"
              [label]="'Justificación'" [required]="false" [isDisabled]="true || esFormularioSoloLectura"></app-catalogo-select>
          </ng-container>
          <ng-template #noTrack>
            <app-catalogo-select [catalogo]="justificacionCatalogo" formControlName="justificacion"
              [label]="'Justificación'" [required]="false" [isDisabled]="true || esFormularioSoloLectura"
              name="justificacion"></app-catalogo-select>
          </ng-template>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4 form-group">
          <label class="form-label" for="claveDeReferencia">Clave de referencia:</label>
          <input type="text" id="claveDeReferencia" class="form-control" formControlName="claveDeReferencia"
            [required]="true" [disabled]="true || esFormularioSoloLectura"/>
        </div>

        <div class="col-md-4 form-group">
          <label class="form-label" for="cadenaDependencia">Cadena de la dependencia:</label>
          <input type="text" id="cadenaDependencia" class="form-control" formControlName="cadenaDependencia"
            [required]="true" [disabled]="true || esFormularioSoloLectura"/>
        </div>

        <div class="col-md-4">
          <div class="form-group">
            <app-catalogo-select [catalogo]="banco.catalogos" [label]="banco.labelNombre"
              [placeholder]="banco.primerOpcion" [isDisabled]="true || esFormularioSoloLectura" formControlName="banco"
              (change)="setValoresStore(pagosDeDerechosForm, 'banco')"></app-catalogo-select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4 form-group">
          <label class="form-label" for="llaveDePago">Llave de pago:</label>
          <input type="text" id="llaveDePago" class="form-control" formControlName="llaveDePago" [required]="true" [disabled]="true || esFormularioSoloLectura"/>
        </div>

        <div class="col-md-4">
          <input-fecha 
            [datos]="fechaFinalInput" 
            formControlName="fechaInicio" 
            [setFecha]="pagosDeDerechosForm.get('fechaInicio')?.value" 
            [isDisabled]="esFormularioSoloLectura" 
            (valorCambiado)="cambioFechaInicio($event)"></input-fecha>
        </div>

        <div class="col-md-4 form-group">
          <label class="form-label" for="importeDePago">Importe de pago:</label>
          <input type="text" id="importeDePago" class="form-control" formControlName="importeDePago"
            [required]="true" [disabled]="true || esFormularioSoloLectura"/>
        </div>
      </div>


      <div class="d-flex justify-content-end mt-5">
        <div class="btn-group">
          <button class="btn btn-danger mx-3" [disabled]="consultaState?.readonly || esFormularioSoloLectura" type="button" (click)="borrarDatosPago()">
            Borrar datos del pago
          </button>
        </div>
      </div>
    </div>

    <div class="row">
      <ng-titulo titulo="Pago de derechos revisión documental" />
      <div class="row">
        <div class="col-md-8 form-group">
          <label class="form-label" for="coordenadas">Exento de pago:</label>
          <app-input-radio [radioOptions]="exentoPagoRevisionRadio" [selectedValue]="exentoPagoRevisionValor"
            [isRequired]="true" [layout]="'vertical'" formControlName="exentoPagoRevision" [required]="true"
            [disabled]="esFormularioSoloLectura"
            (valueChange)="cambioValorRadioRevision('exentoPagoRevision', $event.toString())"></app-input-radio>
        </div>
      </div>
      <div class="row p-2">
        <div class="col-md-4">
          <ng-container *ngIf="exentoPagoRevisionValor  === 'Si'; else noTrack">
            <app-catalogo-select [catalogo]="justificacionCatalogo" formControlName="justificacionRevision"
              [label]="'Justificación'" [required]="false" [isDisabled]="true || esFormularioSoloLectura"></app-catalogo-select>
          </ng-container>
          <ng-template #noTrack>
            <app-catalogo-select [catalogo]="justificacionCatalogo" formControlName="justificacionRevision"
              [label]="'Justificación'" [required]="false" [isDisabled]="true || esFormularioSoloLectura"
              name="justificacion"></app-catalogo-select>
          </ng-template>
        </div>
      </div>
      <div class="col-md-8 form-group">
        <label class="form-label" for="claveDeReferenciaRevision">Clave de referencia:</label>
        <input type="text" id="claveDeReferenciaRevision" class="form-control"
          formControlName="claveDeReferenciaRevision" [disabled]="esFormularioSoloLectura"/>
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="cadenaDependenciaRevision">Cadena de la dependencia:</label>
        <input type="text" id="cadenaDependenciaRevision" class="form-control"
          formControlName="cadenaDependenciaRevision" [disabled]="true || esFormularioSoloLectura"/>
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <app-catalogo-select [catalogo]="bancoRevision.catalogos" [label]="bancoRevision.labelNombre"
            [placeholder]="bancoRevision.primerOpcion" [isDisabled]="true || esFormularioSoloLectura" formControlName="bancoRevision"
            (change)="setValoresStore(pagosDeDerechosForm, 'bancoRevision')"></app-catalogo-select>
        </div>
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="llaveDePagoRevision">Llave de pago:</label>
        <input type="text" id="llaveDePagoRevision" class="form-control" formControlName="llaveDePagoRevision" [disabled]="esFormularioSoloLectura"/>
      </div>

      <div class="col-md-4 form-group">
          <input-fecha [datos]="fechaFinalInput" 
            formControlName="fechaInicioRevision" 
            [setFecha]="pagosDeDerechosForm.get('fechaInicioRevision')?.value" 
            [isDisabled]="esFormularioSoloLectura" 
            (valorCambiado)="cambioFechaInicioRevision($event)"></input-fecha>
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="importeDePagoRevision">Importe de pago:</label>
        <input type="text" id="importeDePagoRevision" class="form-control" formControlName="importeDePagoRevision" [disabled]="esFormularioSoloLectura"/>
      </div>
    </div>
  </form>
</div>
