<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-12" *ngIf="indice !== 2">
        <h1>Certificado de Exportación Fitosanitario</h1>
      </div>
      <div class="col-12" *ngIf="indice === 2">
        <h2>Cargar Archivo</h2>
        <ng-alert style="text-align: center;" [CONTENIDO]="TEXTOS"></ng-alert>
      </div>
      <div class="col-12">
        @if (esFormaValido) {
          <div class="alert alert-info alert-danger" [innerHTML]="formErrorAlert"></div>
        }
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <paso-uno #pasoUnoRef></paso-uno>
      } @case (2) {
      <app-paso-dos          
          [idTipoTRamite]="'220402'"
          [datosUsuario]="datosUsuario"
          [idSolicitud]="idSolicitud"
          [cargaArchivosEvento]="cargarArchivosEvento"
          (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
          (reenviarCargaRealizada)="cargaRealizada($event)"
          (cargaEnProgresoChange)="onCargaEnProgresoPadre($event)"></app-paso-dos>
      } @case (3) {
      <app-paso-tres></app-paso-tres>
      } }

       @if (indice !== 2) {
            <btn-continuar [btnGuardar]="indice===1" (btnGuardarClicked)="guardar($event)" [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"></btn-continuar>
        } @else {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
            type="button"
            class="btn btn-default"
            (click)="anterior()"
            *ngIf="seccionCargarDocumentos"
          >
            Anterior
          </button>

          <button
            class="btn btn-primary ms-3"
            (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
            [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)"
          >
            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
          </button>
        </div>
        }
    </div>
  </div>
</div>
