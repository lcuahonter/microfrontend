<div class="Page">
    <div class="container mt-5">
      <div class="row">
        <div class="col-md-6">
          <h2>
            Solicitud de Requisitos de Sanidad Acuícola para Importación
          </h2>
        </div>
      </div>
      <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    
    <div class="row">
      @switch (indice) { @case (1) {
    <app-paso-uno></app-paso-uno>
      } @case (2) {
    <app-paso-dos></app-paso-dos>
      } @case (3) {
    <app-paso-tres></app-paso-tres>
      }
      }
    </div>
  
    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
  </div>
  </div>
