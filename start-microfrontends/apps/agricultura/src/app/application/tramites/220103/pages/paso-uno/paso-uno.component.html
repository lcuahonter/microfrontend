<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionarPestana(1)" (keydown.enter)="seleccionarPestana(1)"
            (keydown.space)="seleccionarPestana(1)" role="button" tabindex="0">Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionarPestana(2)" (keydown.enter)="seleccionarPestana(2)"
            (keydown.space)="seleccionarPestana(2)" role="button" tabindex="2">Datos de la solicitud</a>
        </li>
        <li [ngClass]="indice === 3 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionarPestana(3)" (keydown.enter)="seleccionarPestana(3)"
            (keydown.space)="seleccionarPestana(3)" role="button" tabindex="3">Instalación de procedencia</a>
        </li>
        <li [ngClass]="indice === 4 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionarPestana(4)" (keydown.enter)="seleccionarPestana(4)"
            (keydown.space)="seleccionarPestana(4)" role="button" tabindex="4">Terceros relacionados</a>
        </li>
        
      </ul>
  
      <ng-container>
        @switch (indice) {
        @case (1) {
        <solicitante [tabindex]="1"></solicitante>
        }
        @case (2) {
          @if(datosRespuestaDisponibles){
          <app-datos-del-tramite [tabIndex]="2"></app-datos-del-tramite>
          }
        }
        @case (3) {
          @if(datosRespuestaDisponibles){
          <app-datos-de-instalacion [tabIndex]="3"></app-datos-de-instalacion>
          }
        }
        @case (4){
          @if(datosRespuestaDisponibles){
          <app-datos-del-terceros [tabIndex]="4"></app-datos-del-terceros>
          }
        }
        }
      </ng-container>
    </div>
</div>
