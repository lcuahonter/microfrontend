<div class="form">
  <ng-titulo [titulo]="'Terceros relacionados'"> </ng-titulo>
  <div class="row mt-4 text-center">
    <ng-alert [CONTENIDO]="mensajeImportante"></ng-alert>
  </div>
  <div class="row">
    <label for="destinatario" class="form-label text-left"
      >Destinatario (destino final)*:</label
    >
    <app-tabla-dinamica
      [configuracionTabla]="configuracionTablaContacto"
      [datos]="datosTabla"
      [tipoSeleccionTabla]="seleccionTabla"
      [disableSeleccionTablaCheckBox]="esSoloLectura"
      (listaDeFilaSeleccionada)="obtenerDestinatarioSeleccionadas($event)"
    ></app-tabla-dinamica>
    <nav aria-label="Ejemplo de paginación">
      <ul class="pagination d-flex justify-content-center">
      <li class="page-item"><a class="page-link">1</a></li>
      </ul>
    </nav>
  </div>
  <div class="row mt-4 ">
    <div class="col-12 d-flex justify-content-end">
      <button
      [disabled]="esSoloLectura"
        name="agregar"
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#modalDestinatario"
      >
        Agregar
      </button>
    </div>
  </div>

  <div
    #modalDestinatario
    class="modal fade test-modal"
    id="modalDestinatario"
    tabindex="-1"
    aria-labelledby="modalDestinatario"
  >
    <div class="modal-dialog modal-dialog-centered modal-fullscreen">
      <div class="modal-content">
        <div class="modal-body">
          <app-agregar-destinatario
          ></app-agregar-destinatario>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <label for="instalaci" class="form-label text-left"
      >Instalación de procedencia'*:</label
    >
    <app-tabla-dinamica
      [configuracionTabla]="configuracionTablaInstalacion"
      [datos]="datosTablaInstalacion"
      [tipoSeleccionTabla]="seleccionTabla"
      [disableSeleccionTablaCheckBox]="esSoloLectura"
      (listaDeFilaSeleccionada)="obtenerInstalaciSeleccionadas($event)"
    ></app-tabla-dinamica>
    <nav aria-label="Ejemplo de paginación">
      <ul class="pagination d-flex justify-content-center">
        <li class="page-item"><a class="page-link">1</a></li>
      </ul>
    </nav>
  </div>

  <div class="col-md-12 mt-4">
    <div class="col-12 d-flex justify-content-end">
      <button
        name="agregar"
        class="btn btn-primary"
        data-bs-toggle="modal"
        data-bs-target="#modalInstalaci"
        [disabled]="esSoloLectura"
      >
        Agregar
      </button>
    </div>
  </div>
  <div
    #modalInstalaci
    class="modal fade test-modal"
    id="modalInstalaci"
    tabindex="-1"
    aria-labelledby="modalInstalaci"
  >
    <div class="modal-dialog modal-dialog-centered modal-fullscreen">
      <div class="modal-content">
        <div class="modal-body">
          <app-agregar-destinatario
            [esModoInstalacion]="true"
          ></app-agregar-destinatario>
        </div>
      </div>
    </div>
  </div>
</div>
