<div class="container">
  <form [formGroup]="datosGeneralesForm">
    <div class="row mt-5">
      <ng-titulo titulo="Número de folio del trámite"></ng-titulo>
      <div class="col-md-12 p-0">
        <div class="col-md-8 p-0">
          <div class="form-group">
            <label for="folioDelTramite">Folio del trámite:</label>
            <input
              formControlName="folioDelTramite"
              class="form-control"
              id="folioDelTramite"
              type="text"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <ng-titulo titulo="Datos del trámite a realizar"></ng-titulo>
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <app-catalogo-select
              [catalogo]="aduanaDeIngreso.catalogos"
              [label]="aduanaDeIngreso.labelNombre"
              [placeholder]="aduanaDeIngreso.primerOpcion"
              formControlName="aduanaDeIngreso"
              [isDisabled]="esFormularioSoloLectura"
              (selectionChange)="cambioAduanaDeIngreso($event)"
            ></app-catalogo-select>
          </div>
        </div>
        <div class="col-md-8">
          <div class="form-group">
            <app-catalogo-select
              [catalogo]="oficinaDeInspeccion.catalogos"
              [label]="oficinaDeInspeccion.labelNombre"
              [placeholder]="oficinaDeInspeccion.primerOpcion"
              formControlName="oficinaDeInspeccion"
              [isDisabled]="esFormularioSoloLectura"
              (selectionChange)="cambioOficinaDeInspeccion($event)"
            ></app-catalogo-select>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <app-catalogo-select
              [catalogo]="puntoDeInspeccion.catalogos"
              [label]="puntoDeInspeccion.labelNombre"
              [placeholder]="puntoDeInspeccion.primerOpcion"
              formControlName="puntoDeInspeccion"
              [isDisabled]="esFormularioSoloLectura"
              (selectionChange)="cambioPuntoDeInspeccion($event)"
            ></app-catalogo-select>
          </div>
        </div>  
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="numeroDeGuia">Número de guía:</label>
            <input
              type="text"
              id="numeroDeGuia"
              class="form-control"
              formControlName="numeroDeGuia"
            />
          </div>
        </div>
        <div class="col-md-8">
          <div class="form-group">
            <app-catalogo-select
              [catalogo]="regimenAlQueDestina.catalogos"
              [label]="regimenAlQueDestina.labelNombre"
              [placeholder]="regimenAlQueDestina.primerOpcion"
              formControlName="regimenAlQueDestina"
              [isDisabled]="esFormularioSoloLectura"
              (selectionChange)="cambioRegimenAlQueDestina($event)"
            ></app-catalogo-select>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-12 mt-5">
        <label for="mercancia">Mercancías</label>
      </div>
      <div class="col-md-12 mt-5">
        <div class="table-container">
          <app-tabla-dinamica
            [tipoSeleccionTabla]="tablaSeleccionCheckbox"
            [configuracionTabla]="mercanciaTabla"
            [datos]="mercanciaTablaDatos"
            [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"
          ></app-tabla-dinamica>
        </div>
      </div>
    </div>

    <div class="row">
      <ng-titulo titulo="Medio de transporte"></ng-titulo>
      <div class="col-md-4">
        <div class="form-group">
          <app-catalogo-select
            [catalogo]="datosParaMovilizacion.catalogos"
            [label]="datosParaMovilizacion.labelNombre"
            [placeholder]="datosParaMovilizacion.primerOpcion"
            formControlName="datosParaMovilizacion"
            [isDisabled]="esFormularioSoloLectura"
            (selectionChange)="cambioDatosParaMovilizacion($event)"
          ></app-catalogo-select>
        </div>
      </div>
      <div class="col-md-8">
        <div class="form-group">
          <label class="form-label" for="identificacionDelTransporte"
            >Identificación del transporte:</label
          >
          <input
            class="form-control"
            id="identificacionDelTransporte"
            type="text"
            formControlName="identificacionDelTransporte"
          />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <app-catalogo-select
            [catalogo]="puntoDeVerificacion.catalogos"
            [label]="puntoDeVerificacion.labelNombre"
            [placeholder]="puntoDeVerificacion.primerOpcion"
            formControlName="puntoDeVerificacion"
            [isDisabled]="esFormularioSoloLectura"
            (selectionChange)="cambioPuntoDeVerificacion($event)"
          ></app-catalogo-select>
        </div>
      </div>
      <div class="col-md-8">
        <div class="form-group">
          <label class="form-label" for="nombreDeLaEmpresaTransportista"
            >Nombre de la empresa transportista:</label
          >
          <input
            class="form-control"
            id="nombreDeLaEmpresaTransportista"
            type="text"
            formControlName="nombreDeLaEmpresaTransportista"
          />
        </div>
      </div>
    </div>
  </form>
</div>
