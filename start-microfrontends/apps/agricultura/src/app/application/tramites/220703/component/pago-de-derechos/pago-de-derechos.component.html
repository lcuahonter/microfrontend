<div class="container">
  <form [formGroup]="pagosDeDerechosForm">
    <div class="row mt-5">
      <ng-titulo titulo="Pago de derechos" />
      <div class="col-md-4 form-group">
        <label class="form-label" for="claveDeReferencia"
          >Clave de referencia*:</label
        >
        <input
          type="text"
          id="claveDeReferencia"
          class="form-control"
          formControlName="claveDeReferencia"
        />
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="cadenaDependencia"
          >Cadena de la dependencia*:</label
        >
        <input
          type="text"
          id="cadenaDependencia"
          class="form-control"
          formControlName="cadenaDependencia"
        />
      </div>

      <div class="col-md-4">
        <div class="form-group">
          <app-catalogo-select
            [catalogo]="banco.catalogos"
            [label]="banco.labelNombre"
            [placeholder]="banco.primerOpcion"
            formControlName="banco"
            [isDisabled]="esFormularioSoloLectura"
            (selectionChange)="selectBancoCatalogo($event)"
          ></app-catalogo-select>
        </div>
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="llaveDePago">Llave de pago*:</label>
        <input
          type="text"
          id="llaveDePago"
          class="form-control"
          formControlName="llaveDePago"
          (change)="setllaveDePago($event)"
        />
      </div>

      <div class="col-md-4">
        <input-fecha
        [datos]="fachaDePago"
        (valorCambiado)="cambioFechaPagoDeDerechos($event)"
        [setFecha]="this.tramiteState.fechaPagoDeDerechos"
        [isDisabled]="esFormularioSoloLectura"
        formControlName="fechaPagoDeDerechos"
      ></input-fecha>
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="importeDePago">Importe de pago*:</label>
        <input
          type="text"
          id="importeDePago"
          class="form-control"
          formControlName="importeDePago"
        />
      </div>

      <div class="d-flex justify-content-end mt-5">
        <div class="btn-group">
          <button class="btn btn-danger mx-3" [disabled]="esFormularioSoloLectura" type="button">
            Borrar datos del pago
          </button>
        </div>
      </div>
    </div>

    <div class="row">
      <ng-titulo titulo="Pago de derechos revisión documental" />
      <div class="col-md-8 form-group">
        <label class="form-label" for="claveDeReferenciaRevision"
          >Clave de referencia:</label
        >
        <input
          type="text"
          id="claveDeReferenciaRevision"
          class="form-control"
          formControlName="claveDeReferenciaRevision"
        />
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="cadenaDependenciaRevision"
          >Cadena de la dependencia:</label
        >
        <input
          type="text"
          id="cadenaDependenciaRevision"
          class="form-control"
          formControlName="cadenaDependenciaRevision"
        />
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="bancoRevision"> Banco:</label>
        <input
          type="text"
          id="bancoRevision"
          class="form-control"
          formControlName="bancoRevision"
        />
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="llaveDePagoRevision"
          >Llave de pago:</label
        >
        <input
          type="text"
          id="llaveDePagoRevision"
          class="form-control"
          formControlName="llaveDePagoRevision"
        />
      </div>

      <div class="col-md-4 form-group">
        <input-fecha
        [datos]="fachaDePagoRevision"
        (valorCambiado)="cambioFechaPagoDeDerechosRevision($event)"
        [setFecha]="this.tramiteState.fechaPagoDeDerechosRevision"
        [isDisabled]="esFormularioSoloLectura"
        formControlName="fechaPagoDeDerechosRevision"
      ></input-fecha>
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="importeDePagoRevision"
          >Importe de pago:</label
        >
        <input
          type="text"
          id="importeDePagoRevision"
          class="form-control"
          formControlName="importeDePagoRevision"
        />
      </div>
    </div>
  </form>
</div>
