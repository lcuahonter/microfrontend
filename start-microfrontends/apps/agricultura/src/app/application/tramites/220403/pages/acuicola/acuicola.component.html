<div class="page">
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <h1>Certificado de Exportación Acuícola</h1>
        </div>

        @if (!esFormValido) {
        <ng-alert [CONTENIDO]="ALERTA" [CUSTOMECLASS]="infoError"></ng-alert>
        }

        <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno></app-paso-uno>
      }
      @case (2) {
      <app-paso-dos></app-paso-dos>
      }
      @case (3) {
      <app-paso-tres></app-paso-tres>
      }
     }
      <btn-continuar
        [datos]="datosPasos"
        [btnGuardarVisible]="'visible'"
        [btnGuardar]="indice === 1"
        (continuarEvento)="getValorIndice($event)"
        (btnGuardarClicked)="onBtnGuardarClicked()"
      ></btn-continuar>
    </div>
  </div>
