<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Datos de la solicitud</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(3)">Transporte</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(4)">Pago de derechos</a>
            </li>
            <li [ngClass]="indice === 5 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(5)">Terceros relacionados</a>
            </li>
        </ul>
        <ng-container>
            @switch (indice) {
            @case (1) {
            <solicitante></solicitante>
            }
            @case (2) {
                <app-datos-de-la-solicitud [formularioDeshabilitado]="formularioDeshabilitado"></app-datos-de-la-solicitud>
            }
            @case (3){
                <app-transporte [formularioDeshabilitado]="formularioDeshabilitado"></app-transporte>
            }
            @case (4){
                <app-pago-de-derechos [formularioDeshabilitado]="formularioDeshabilitado"></app-pago-de-derechos>
            }
            @case (5){
                <app-tercerospage></app-tercerospage>
            }
        }
        </ng-container>
    </div>
</div>
