<div class="container form-container">
    <ng-titulo titulo="Combinación Requerida" />
    <form [formGroup]="formCombinacion">
        <div class="row mb-3">
            @if(certificadaValue === 'Animal')
            {
                <div class="col-md-4">
                <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'Especie'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="especie"
                (change)="setValoresStore(formCombinacion,'especie', 'setespecie')"
                ></app-catalogo-select>
            </div>

             <div class="col-md-4">
             
                <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'Función zootécnica'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="funcionZootecnica"
                (change)="setValoresStore(formCombinacion,'funcionZootecnica', 'setfuncionZootecnica')"
                ></app-catalogo-select>
            </div>

             <div class="col-md-4">
                <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'Mercancía'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="mercancia"
                (change)="setValoresStore(formCombinacion,'mercancia', 'setmercancia')"
                ></app-catalogo-select>
            </div>
            }
             @if(certificadaValue === 'Producto')
            {
               <div class="col-md-4">
                <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'Especie'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="especie"
                (change)="setValoresStore(formCombinacion,'especie', 'setespecie')"
                ></app-catalogo-select>
            </div>

             <div class="col-md-4">
                <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'Uso'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="uso"
                (change)="setValoresStore(formCombinacion,'uso', 'setUso')"
                ></app-catalogo-select>
            </div>

             <div class="col-md-4">
                 <app-catalogo-select
                [catalogo]="tipoActividad"
                [tooltipQuestionCircle]="false"
                [label]="'Tipo de producto'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="tipoProducto"
                (change)="setValoresStore(formCombinacion,'tipoProducto', 'settipoProducto')"
                ></app-catalogo-select>
            </div>

            
            <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'Mercancía'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="mercancia"
                (change)="setValoresStore(formCombinacion,'mercancia', 'setmercancia')"
                ></app-catalogo-select>
            </div>

              <div class="col-md-4">
                 <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'País destino'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="paisDestino"
                (change)="setValoresStore(formCombinacion,'paisDestino', 'setpaisDestino')"
                ></app-catalogo-select>
            </div>
            }
            @if(certificadaValue === 'QFBA')
            {
                <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="tipoActividad"
                [tooltipQuestionCircle]="false"
                [label]="'Tipo de producto'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="tipoProducto"
                (change)="setValoresStore(formCombinacion,'tipoProducto', 'settipoProducto')"
                ></app-catalogo-select>
            </div>
                 <div class="col-md-4">
              <app-catalogo-select
                [catalogo]="paisDestino"
                [tooltipQuestionCircle]="false"
                [label]="'País destino'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="paisDestino"
                (change)="setValoresStore(formCombinacion,'paisDestino', 'setpaisDestino')"
                ></app-catalogo-select>
            </div>
            }
          
        </div>

        <div class="row mb-3">
            <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="nombreEstablecimiento"
                [tooltipQuestionCircle]="false"
                [label]="'Nombre, denominación o razón social del establecimiento de origen autorizado'"
               
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="nombreEstablecimiento"
                (change)="setValoresStore(formCombinacion,'nombreEstablecimiento', 'setnombreEstablecimiento')"
               ></app-catalogo-select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="tipoActividad"
                [tooltipQuestionCircle]="false"
                [label]="'Tipo de actividad del establecimiento'"
                
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="tipoActividad"
                (change)="setValoresStore(formCombinacion,'tipoActividad', 'settipoActividad')"
                ></app-catalogo-select>
            </div>
            <div class="col-md-4">
                <label for="otro" class="form-label">Otro:</label>
                <input type="text" class="form-control" id="otro" formControlName="otro"
                (change)="setValoresStore(formCombinacion,'otro', 'setotro')">
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-8">
                    <label for="establecimientoAutorizado" class="form-label">Establecimiento de origen autorizado *</label>
                    <div class="d-flex d-flex p-5 fs-5">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="nombreEstablecimientoCheck" formControlName="nombreEstablecimientoCheck" (change)="setValoresStore(formCombinacion,'nombreEstablecimientoCheck', 'setnombreEstablecimientoCheck')">
                            <label class="form-check-label" for="nombreEstablecimientoCheck">Nombre del Establecimiento</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="numeroAutorizacionCheck" formControlName="numeroAutorizacionCheck" (change)="setValoresStore(formCombinacion,'numeroAutorizacionCheck', 'setnumeroAutorizacionCheck')">
                            <label class="form-check-label" for="numeroAutorizacionCheck">Número de Autorización</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="tipoActividadCheck" formControlName="tipoActividadCheck" (change)="setValoresStore(formCombinacion,'tipoActividadCheck', 'settipoActividadCheck')">
                            <label class="form-check-label" for="tipoActividadCheck">Tipo de Actividad del Establecimiento</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="otroCheck" formControlName="otroCheck" (change)="setValoresStore(formCombinacion,'otroCheck', 'setotroCheck')">
                            <label class="form-check-label" for="otroCheck">Otro</label>
                        </div>
                    </div>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="aduanaSalida"
                [tooltipQuestionCircle]="false"
                [label]="'Aduana de salida/lugar de embarque'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="aduanaSalida"
                (change)="setValoresStore(formCombinacion,'aduanaSalida', 'setaduanaSalida')"
              ></app-catalogo-select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="oisaSalida"
                [tooltipQuestionCircle]="false"
                [label]="'OISA de salida'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="oisaSalida"
                (change)="setValoresStore(formCombinacion,'oisaSalida', 'setoisaSalida')"
              ></app-catalogo-select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="regimenMercancia"
                [tooltipQuestionCircle]="false"
                [label]="'Régimen al que se destinará la mercancía '"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="regimenMercancia"
                (change)="setValoresStore(formCombinacion,'regimenMercancia', 'setregimenMercancia')"
              ></app-catalogo-select>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-8">
                <app-catalogo-select
                [catalogo]="paisOrigen"
                [tooltipQuestionCircle]="false"
                [label]="'País origen'"
                [required]="true"
                [placeholder]="'Seleccione un valor'"
                [isDisabled]="esFormularioSoloLectura"
                formControlName="paisOrigen"
                (change)="setValoresStore(formCombinacion,'paisOrigen', 'setpaisOrigen')"
              ></app-catalogo-select>
            </div>
            <div class="col-md-4">
                <label for="fechaArribo" class="form-label">Fecha arribo país importador:</label>
                <input type="date" class="form-control" id="fechaArribo" formControlName="fechaArribo" (change)="setValoresStore(formCombinacion,'fechaArribo', 'setfechaArribo')">
            </div>
        </div>

    
        <div class="row mb-3">
            <div class="col-md-4">
                <label for="puntoIngreso" class="form-label">Punto de ingreso al país destino:</label>
                <input type="text" class="form-control" 
                    id="puntoIngreso" 
                    formControlName="puntoIngreso"
                    maxlength="200"
                    [ngClass]="isValid('puntoIngreso') ? 'required' : ''"
                    (change)="setValoresStore(formCombinacion,'puntoIngreso', 'setpuntoIngreso')">
            </div>
        </div>
    </form>
</div>
