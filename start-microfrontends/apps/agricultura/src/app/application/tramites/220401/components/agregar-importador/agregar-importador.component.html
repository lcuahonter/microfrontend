<div class="container">
  <ng-titulo titulo="Agregar datos del importador" />

  <div class="row mb-3">
    <div class="col-md-12">
      <label class="form-label" for="tipoPersona">Tipo persona*:</label>
    </div>
    <div class="col-md-12">
      <input type="radio" id="fisica" name="tipoPersona" [checked]="fisica" (change)="inputChecked('fisica')">
      <label for="fisica">Física</label>
    </div>
    <div class="col-md-12">
      <input type="radio" id="moral" name="tipoPersona" [checked]="moral" (change)="inputChecked('moral')">
      <label for="moral">Moral</label>
    </div>
  </div>

  <ng-titulo titulo="Datos personales" />
  @if (fisica) {
  <div class="row">
    <div class="col-md-4 mb-3">
      <label class="form-label" for="nombre">Nombre(s)*:</label>
      <input type="text" class="form-control" id="nombre">
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label" for="primerApellido">Primer apellido*:</label>
      <input type="text" class="form-control" id="primerApellido">
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label" for="segundoApellido">Segundo apellido:</label>
      <input type="text" class="form-control" id="segundoApellido">
    </div>
  </div>
  }

  @if (moral) {
  <div class="row">
    <div class="col-md-8 mb-3">
      <label class="form-label" for="denominación">Denominación/razón social*:</label>
      <input type="text" class="form-control" id="denominacion">
    </div>
  </div>
  }

  <div class="row">
    <div class="col-md-4 mb-3">
      <app-catalogo-select [catalogo]="pais" formControlName="pais" [label]="'País'" [required]="true"
        name="pais"></app-catalogo-select>
    </div>
  </div>

  <div class="row">
    <div class="col-md-8 mb-3">
      <label class="form-label" for="domicilio">Domicilio*:</label>
      <textarea class="form-control" id="domicilio" rows="2" height="50"
        placeholder="Calle, No Ext, No Int, Ciudad, C.P." style="height: 100px;"></textarea>
    </div>
  </div>

  <div class="row">
    <div class="col-md-1 mb-3">
      <label class="form-label" for="lada">Lada:</label>
      <input type="text" class="form-control" id="lada" maxlength="5">
    </div>
    <div class="col-md-3 mb-3">
      <label class="form-label" for="telefono">Teléfono:</label>
      <input type="text" class="form-control" id="telefono">
    </div>
    <div class="col-md-4 mb-3">
      <label class="form-label" for="correoElectronico">Correo electrónico:</label>
      <div class="input-group">
        <input type="email" class="form-control" id="correoElectronico">
        <span class="input-group-text"></span>
      </div>
    </div>
  </div>

  <div class="container-fluid text-end mt-5">
    <button class="btn btn-default me-2">Limpiar</button>
    <button class="btn btn-danger me-2" (click)="cerrarModal()">Cancelar</button>
    <button class="btn btn-primary">Guardar</button>
  </div>
</div>
