<div *ngIf="showTableDiv && !showAgregarImportador && !showAgregarDestinatario" class="container table-container">
    <ng-titulo titulo="Terceros relacionados" />
    <ng-alert [CONTENIDO]="TEXTOS.ADJUNTAR" [CUSTOMECLASS]="infoAlert"></ng-alert>
    <div class="row">
        <div class="col-md-12">
            <h6 class="mb-5">Establecimiento de Origen *</h6>
            <ng-table [commonTableHeader]="establecimientoHeaderData" [commonTableBody]="establecimientoBodyData"
                [disableSeleccionTablaCheckBox]="esFormularioSoloLectura? true : false"></ng-table>
            <nav aria-label="Page navigation example">
                <ul class="pagination d-flex justify-content-center">
                    <!-- <li class="page-item disabledd">
                        <a class="page-link" href="#" tabindex="-1">Previous</a>
                    </li> -->
                    <li class="page-item"><a class="page-link" href="#">1</a></li>
                    <!-- <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li> -->
                    <!-- <li class="page-item">
                        <a class="page-link" href="#">Next</a>
                    </li> -->
                </ul>
            </nav>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <h6 class="mb-5">Destinatario (destino final)*</h6>
            <ng-table [commonTableHeader]="destinatarioHeaderData" [commonTableBody]="destinatarioBodyData"
                [disableSeleccionTablaCheckBox]="esFormularioSoloLectura? true : false"></ng-table>
            <nav aria-label="Page navigation example">
                <ul class="pagination d-flex justify-content-center">
                    <!-- <li class="page-item disabledd">
                        <a class="page-link" href="#" tabindex="-1">Previous</a>
                    </li> -->
                    <li class="page-item"><a class="page-link" href="#">1</a></li>
                    <!-- <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li> -->
                    <!-- <li class="page-item">
                        <a class="page-link" href="#">Next</a>
                    </li> -->
                </ul>
            </nav>
            <div class="container-fluid text-end mt-5">
                <button class="btn btn-agregar me-3" (click)="toggleAgregarDestinatario()"
                    [disabled]="esFormularioSoloLectura? true : false">Agregar</button>
                <button class="btn btn-buscar" [disabled]="esFormularioSoloLectura? true : false">Buscar</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <h6 class="mb-5">Importador*</h6>
            <ng-table [commonTableHeader]="importadorHeaderData" [commonTableBody]="importadorBodyData"
                [disableSeleccionTablaCheckBox]="esFormularioSoloLectura? true : false"></ng-table>
            <nav aria-label="Page navigation example">
                <ul class="pagination d-flex justify-content-center">
                    <!-- <li class="page-item disabledd">
                        <a class="page-link" href="#" tabindex="-1">Previous</a>
                    </li> -->
                    <li class="page-item"><a class="page-link" href="#">1</a></li>
                    <!-- <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li> -->
                    <!-- <li class="page-item">
                        <a class="page-link" href="#">Next</a>
                    </li> -->
                </ul>
            </nav>
            <div class="container-fluid text-end mt-5">
                <button class="btn btn-agregar me-3" [disabled]="esFormularioSoloLectura? true : false" (click)="toggleAgregarImportador()">Agregar</button>
                <button class="btn btn-buscar" [disabled]="esFormularioSoloLectura? true : false">Buscar</button>
            </div>
        </div>
    </div>
</div>


<app-modal [active]="showAgregarDestinatario" [anchoCompleto]="true">
    <app-agregar-destinatoria (cerrar)="cerrarAgregarDestinatario()"></app-agregar-destinatoria>
</app-modal>

<app-modal [active]="showAgregarImportador" [anchoCompleto]="true">
    <app-agregar-importador (cerrar)="cerrarAgregarImportador()"></app-agregar-importador>
</app-modal>
