<div class="container">
  <form [formGroup]="form">
    <!--Solicitud Tabla-->
    <app-tab-solicitud-datos (rowSelected)="handleTableSelection($event)" [tablaFilaDatos]="dSolicitud"
      #solicitudDatosTabRef>
    </app-tab-solicitud-datos>
    <!-- Datose del tramite a realizar -->
    <app-datos-del-tramite-a-realizar (certificadoResultado)="onCertificadoResultado($event)"
      claveDeControl="datoseDelTramiteRealizar" #datosDelTramiteARealizarRef></app-datos-del-tramite-a-realizar>
    <!-- Responsable inspeccion en punto -->
    <app-responsable-inspeccion-en-punto claveDeControl="responsableInspeccionEnPunto"
      #responsableInspeccionEnPuntoRef></app-responsable-inspeccion-en-punto>
    <!-- app-medio-transporte -->
 
    <app-medio-transporte claveDeControl="mediotransporte" [hMercanciaTabla]="hMercanciaTabla"
      [dMercanciaBody]="dMercanciaBody" [mediodetransporte]="mediodetransporte"
      #medioTransporteRef></app-medio-transporte>
    <!-- Cantidad de carros de ferrocarril -->
    <app-carros-de-ferrocarril [tablaHeadData]="hCarroFerrocarril"
      [tablaFilaDatos]="dCarrosDeFerrocarril"></app-carros-de-ferrocarril>
    <!-- Historial inspeccion fisica -->
    <app-historial-inspeccion-fisica [tablaHeadData]="hHistorialinspeccion"
      [tablaFilaDatos]="dHistorialInspecciones"></app-historial-inspeccion-fisica>

  </form>
</div>
