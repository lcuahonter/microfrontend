<div class="container">
  <ng-titulo titulo="Número de folio del trámite" />
  <form [formGroup]="forma">
    <div
      class="panel-group ficha-collapse margin-bottom-30px"
      id="accordion"
    ></div>
    <div class="row">
      <div class="col-md-8">
        <label class="form-label" for="foliodel">{{ foliodelLbl }}</label>
        <input
          formControlName="foliodel"
          class="form-control"
          id="foliodel"
          placeholder=""
          readonly
          type="text"
          libUppercase
        />
      </div>
    </div>
    <div class="row">
      <ng-titulo titulo="Datos del tramite a realizar" />
      <div class="row">
        <div class="col-md-4">
          <app-catalogo-select
            id="aduanaIngreso"
            [catalogo]="aduanaIngreso.catalogos"
            [label]="aduanaIngreso.labelNombre"
            [placeholder]="aduanaIngreso.primerOpcion"
            [isDisabled]="true"
            formControlName="aduanaIngreso"
            (selectionChange)="seleccionarAduanaIngreso($event)"
          ></app-catalogo-select>
        </div>
        <div class="col-md-8">
          <app-catalogo-select
            [catalogo]="oficianaInspeccion.catalogos"
            [label]="oficianaInspeccion.labelNombre"
            [placeholder]="oficianaInspeccion.primerOpcion"
            [isDisabled]="true"
            formControlName="oficinaInspeccion"
            (selectionChange)="seleccionarOficianaInspeccion($event)"
          ></app-catalogo-select>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4">
          <app-catalogo-select
            [catalogo]="puntoInspeccion.catalogos"
            [label]="puntoInspeccion.labelNombre"
            [placeholder]="puntoInspeccion.primerOpcion"
            [isDisabled]="true"
            formControlName="puntoInspeccion"
            (selectionChange)="seleccionarPuntoInspeccion($event)"
          ></app-catalogo-select>
        </div>
      </div>
      <div class="row d-none">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="claveUCON"
              >Clave UCON:
              <i
                class="bi bi-question-circle-fill"
                style="margin-bottom: '5px'"
              ></i
            ></label>
            <input
              formControlName="claveUCON"
              value=""
              class="form-control"
              id="claveUCON"
              placeholder=""
              type="text"
              libUppercase
            />
          </div>
        </div>
        <div class="col-md-4">
          <app-catalogo-select
            [catalogo]="establecimiento.catalogos"
            [label]="establecimiento.labelNombre"
            [placeholder]="establecimiento.primerOpcion"
            [isDisabled]="esFormularioSoloLectura"
            formControlName="establecimientoTIF"
          ></app-catalogo-select>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="nombreVeterinario"
            >Nombre del médico veterinario:</label
          >
          <input
            formControlName="nombre"
            readonly
            value=""
            class="form-control"
            id="claveUCON"
            placeholder=""
            type="text"
            libUppercase
          />
        </div>
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="numeroGuia">Número de guía:</label>
            <input
              class="form-control"
              readonly
              id="numeroGuia"
              placeholder=""
              formControlName="numeroguia"
              type="text"
              libUppercase
            />
          </div>
        </div>
        <div class="col-md-8">
          <app-catalogo-select
            [catalogo]="regimenDestinaran.catalogos"
            [label]="regimenDestinaran.labelNombre"
            [placeholder]="regimenDestinaran.primerOpcion"
            formControlName="regimen"
            [isDisabled]="true"
            (selectionChange)="seleccionarRegimen($event)"
          ></app-catalogo-select>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="row mt-5">
        <div class="col-md-12">
          <label for="mercancia">Mercancía</label>
        </div>
        <div class="col-md-12 mt-5">
          <div class="table-container">
               <app-tabla-dinamica  [configuracionTabla]="configuracionColumnasTabla"
            [datos]="tablaFilaDatos" ></app-tabla-dinamica>
          </div>
        </div>
      </div>
      <div class="container">    
        <ng-titulo titulo="Medio de transporte" />
        <div class="row">
          <div class="col-md-4">  
            <app-catalogo-select
              [catalogo]="movilizacionNacional.catalogos"
              [label]="movilizacionNacional.labelNombre"
              [placeholder]="movilizacionNacional.primerOpcion"
              [isDisabled]="true"
              formControlName="movilizacion"
              (selectionChange)="seleccionarMovilizacionNacional($event)"
            ></app-catalogo-select>
          </div>
          <div class="col-md-8 form-group">
            <label class="form-label" for="identificacionTransporte"
              >Identificación del transporte:</label
            >
            <input
              class="form-control"
              id="identificacionTransporte"
              readonly
              placeholder=""
              type="text"
              formControlName="transporte"
            />
          </div>
          <div class="col-md-4">
            <app-catalogo-select
              [catalogo]="puntoVerificacion.catalogos"
              [label]="puntoVerificacion.labelNombre"
              [placeholder]="puntoVerificacion.primerOpcion"
              [isDisabled]="true"
              formControlName="punto"
              (selectionChange)="seleccionarPuntoVerificacion($event)"
            ></app-catalogo-select>
          </div>
          <div class="col-md-8">
   
            <label class="form-label" for="nombreEmpresa">
  Nombre de la empresa transportista
</label>

<input
  class="form-control"
  id="nombreEmpresa"
  type="text"
  formControlName="nombreEmpresa"
  readonly
  [placeholder]=""
  [disabled]="true"
/>
          </div>
        </div>
      </div>
      <div class="row my-5">
        <div class="col-md-12 d-flex justify-content-end"></div>
      </div>
    </div>
  </form>
</div>
