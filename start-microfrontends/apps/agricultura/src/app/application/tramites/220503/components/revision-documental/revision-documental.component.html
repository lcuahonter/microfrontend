<div class="container">
    <div class="row ">
      <ul class="nav nav-tabs mt-5">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(1)">Datos generales</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(2)">Terceros relacionados</a>
        </li>
        <li [ngClass]="indice === 3 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(3)">Pago de derechos</a>
        </li>
      </ul>
    <app-datos-generales [hidden]="indice !== 1" [isActive]="indice === 1" #datosGenerals  [datosGeneralesRevision]="datosGeneralesRevision"></app-datos-generales>
    <app-terceros-relacionados [hidden]="indice !== 2" [isActive]="indice === 2" #tercerosRelacionadosRef></app-terceros-relacionados>
    <app-pago-de-derechos [hidden]="indice !== 3" [isActive]="indice === 3" #pagoDeDerechosRef></app-pago-de-derechos>
    </div>
  </div>
