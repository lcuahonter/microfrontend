<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" tabindex="0" data-toggle="tab" >Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" tabindex="0" data-toggle="tab" >Datos de la solicitud</a>
        </li>
        @if(isRevisionDocumental$ | async){
        <li [ngClass]="indice === 3 ? 'active' : ''">
          <a (click)="seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" tabindex="0" data-toggle="tab">Revisión Documental</a>
        </li>
      }
      </ul>
  
      <ng-container>
        <solicitante [hidden]="indice !== 1" #solicitanteRef></solicitante>
        <app-solicitud-datos *ngIf="esDatosRespuesta" [hidden]="indice !== 2" #solicitudDatosRef></app-solicitud-datos>
          @if(isRevisionDocumental$ | async){
        <app-revision-documental *ngIf="esDatosRespuesta" [hidden]="indice !== 3" [isActive]="indice === 3" #revisionDocumentalRef></app-revision-documental>
          }
      </ng-container>
    </div>
  </div>
