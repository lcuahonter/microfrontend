<div class="container">
  <ng-titulo titulo="Requisitos opcionales" />

  <ng-alert [CONTENIDO]="TEXTOS.INSTRUCCIONES"></ng-alert>

    <div class="col-md-12">
    <carga-documento
      [idTipoTRamite]="'220201'"
      [datosUsuario]="datosUsuario"
      [cargaArchivosEvento]="reenviarEvento"
      [regresarSeccionCargarDocumentoEvento]="reenviarRegresarSeccion"
      (cargaRealizada)="documentosCargados($event)"
      (activarBotonCargaArchivos)="manejarEventoCargaDocumento($event)"
      (cargaEnProgreso)="onCargaEnProgreso($event)"
      [idSolicitud]="this.idSolicitud"
      [esDocumentosAgricultura]="true"
      [esPrellenado]="this.esPrellenado"
    ></carga-documento>
  </div>

</div>
