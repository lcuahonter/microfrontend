<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <ul class="nav nav-tabs">
        <li
          *ngFor="let tab of seccionesDeLaSolicitud"
          [ngClass]="indice === tab.index ? 'active' : ''"
        >
          <a
            data-toggle="tab"
            (click)="seleccionaTab(tab.index)"
            (keydown.enter)="seleccionaTab(tab.index)"
            tabindex="0"
            >{{ tab.title }}</a
          >
        </li>
      </ul>
    </ul>
    <div style="border: 1px solid #ccc">
      <ng-container>
        <solicitante #solicitanteRef [hidden]="indice !== 1"></solicitante>
        <app-datos-de-la-solicitud
          #datosDeLaSolicitudRef
          [hidden]="indice !== 2"
        ></app-datos-de-la-solicitud>
        <app-datos-para-movilizacion-nacional
          #datosParaMovilizacionNacionalRef
          [hidden]="indice !== 3"
        ></app-datos-para-movilizacion-nacional>
        <app-tercerospage
          [hidden]="indice !== 4"
          #tercerospageRef
        ></app-tercerospage>
        <app-pago-de-derechos
          #padoDeRef
          [hidden]="indice !== 5"
        ></app-pago-de-derechos>
      </ng-container>
      <br />
    </div>
  </div>
</div>
