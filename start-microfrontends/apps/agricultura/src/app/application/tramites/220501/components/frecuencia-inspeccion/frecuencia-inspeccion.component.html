<div [formGroup]="frecuenciaInspeccionForm" class="form-group mt-5">
    <div class="row">
        <div class="col-md-4">
            <label for="certificadoNumero" class="form-label">Número de certificado:</label>
            <input class="form-control" type="text" formControlName="certificadoNumero" id="certificadoNumero" />
        </div>
        <div class="col-md-8">
            <label for="calculoResultado" class="form-label">Resultado del cálculo:</label>
            <input class="form-control" type="text" formControlName="calculoResultado" id="calculoResultado" />
        </div>
    </div>
</div>
