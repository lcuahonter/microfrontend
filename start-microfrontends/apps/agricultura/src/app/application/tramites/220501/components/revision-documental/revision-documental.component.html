<div class="container">
  <div class="row ">
    <ul class="nav nav-tabs mt-5">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)">Datos generales</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)">Terceros relacionados</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)">Pago de derechos</a>
      </li>
    </ul>

    <ng-container>
      @switch (indice) {
      @case (1) {
      @if (esDatosRespuesta) {
      <app-datos-generales></app-datos-generales>
      }
      }
      @case (2) {
      @if (esDatosRespuesta) {
      <app-terceros-relacionados></app-terceros-relacionados>
      }
      }
      @case (3) {
      @if (esDatosRespuesta) {
      <app-pago-de-derechos></app-pago-de-derechos>
      }
      }
      }
    </ng-container>
  </div>
</div>
