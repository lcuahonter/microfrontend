<div class="container">
  <ng-titulo titulo="Terceros relacionados" />
  <div class="row">
    <ng-alert [CONTENIDO]="TEXTO_DE_ALERTA"></ng-alert>
    <div class="row mt-5">
      <div class="col-md-12">
        <label class="form-label" for="">Exportador</label>
        <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX"
          [configuracionTabla]="exportadorConfiguracionTabla" [datos]="exportadorDatos"
          [disableSeleccionTablaCheckBox]="formularioDeshabilitado"></app-tabla-dinamica>
      </div>
    </div>
    <div class="row mt-5">
      <div class="col-md-12">
        <label class="form-label" for="">Destinatario (destino final)</label>
        <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX"
          [configuracionTabla]="destinatarioConfiguracionTabla" [datos]="destinatarioDatos"
          [disableSeleccionTablaCheckBox]="formularioDeshabilitado"></app-tabla-dinamica>
      </div>
    </div>
  </div>
</div>
