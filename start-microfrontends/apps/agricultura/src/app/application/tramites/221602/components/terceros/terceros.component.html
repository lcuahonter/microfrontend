<ng-titulo titulo="Terceros relacionados" />

<ng-alert [CONTENIDO]="TEXTOS"></ng-alert>

<div class="row">
  <h6>Exportador*</h6>
  <app-tabla-dinamica
    [configuracionTabla]="configuracionTabla"
    [datos]="exportador"
    [tipoSeleccionTabla]="checkbox"
    [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"
  ></app-tabla-dinamica>
  
  <nav aria-label="Page navigation example">
    <ul class="pagination justify-content-center">
      <li class="page-item"><a class="page-link">1</a></li>
    </ul>
  </nav>
</div>

<div class="row">
  <h6>Destinatario (destino final)*</h6>
  <app-tabla-dinamica
    [configuracionTabla]="configuracionTablaDatos"
    [datos]="destinatario"
    [tipoSeleccionTabla]="checkbox"
   [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"
  ></app-tabla-dinamica>

  <nav aria-label="Page navigation example">
    <ul class="pagination justify-content-center">
      <li class="page-item"><a class="page-link">1</a></li>
    </ul>
  </nav>
</div>
