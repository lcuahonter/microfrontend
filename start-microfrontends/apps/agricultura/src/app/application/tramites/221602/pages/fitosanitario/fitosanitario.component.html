
<div class="Page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Captura de la Modificación del Certificado Fitosanitario para Importación</h1>
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
           <app-datos></app-datos>
            }
            @case (2) {
          <app-paso-dos></app-paso-dos>
                
                }
             @case (3) {
                  
                <app-firmar-solicitud></app-firmar-solicitud>
                    }
                }
            <btn-continuar
                  [datos]="datosPasos"
                  (continuarEvento)="getValorIndice($event)"
                >
                </btn-continuar>
                <ng-alert [CONTENIDO]="TEXTOS.inst"></ng-alert>
        </div>
    </div>

</div>
