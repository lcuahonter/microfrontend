<div class="container" [formGroup]="MedioForm">
    <ng-titulo titulo="Medio de transporte" />
    
    
    <div class="row">
      <div class="col-md-4">
        <div class="form-group">
          <app-catalogo-select [catalogo]="medio" [label]="'Medio de transporte'" [required]="true" name="medio" [isDisabled]="esFormularioSoloLectura"
            formControlName="medio" (change)="setValoresStore(MedioForm, 'medio', 'setMedio')">
          </app-catalogo-select>
        </div>
      </div>
  
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label" for="transporte">Identificación del transporte:</label>
          <input class="form-control" id="transporte" formControlName="transporte" type="number"
            (change)="setValoresStore(MedioForm, 'transporte', 'setTransporte')" />
        </div>
      </div>
    </div>
  
   
    <div class="row">
      <div class="col-md-8">
        <div class="form-group">
          <app-catalogo-select [catalogo]="verificacion" [label]="'Punto de verificación federal'" [tooltipQuestionCircle]="true" [isDisabled]="esFormularioSoloLectura"
            name="verificacion" formControlName="verificacion" (change)="setValoresStore(MedioForm, 'verificacion', 'setVerificacion')">
          </app-catalogo-select>
        </div>
      </div>
    </div>
  
    
    <div class="row">
      <div class="col-md-8">
        <div class="form-group">
          <label class="form-label" for="empresa">Nombre de la empresa transportista*:</label>
          <input class="form-control" id="empresa" formControlName="empresa" type="text"
            (change)="setValoresStore(MedioForm, 'empresa', 'setEmpresa')" />
        </div>
      </div>
    </div>
  </div>
