<div class="container">
    <ng-titulo titulo="Pago de derechos" />
    
    <form [formGroup]="pagoDerechosForm">
      <div class="form">
        
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="clave">Clave de referencia*:</label>
              <input class="form-control" id="clave" type="number"
                formControlName="clave" (change)="setValoresStore(pagoDerechosForm, 'clave', 'setClave')" />
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="dependencia">Cadena de la dependencia*:</label>
              <input class="form-control" id="dependencia" 
                type="text" formControlName="dependencia" (change)="setValoresStore(pagoDerechosForm, 'dependencia', 'setDependencia')" />
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="form-group">
              <app-catalogo-select [catalogo]="bancocatalogo" formControlName="banco" [label]="'Banco'" [isDisabled]="esFormularioSoloLectura"
                [required]="true" name="banco" (change)="setValoresStore(pagoDerechosForm, 'banco', 'setBanco')"></app-catalogo-select>
            </div>
          </div>
        </div>
  
       
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="llave">Llave de pago*:</label>
              <input class="form-control" id="llave" type="text"
                formControlName="llave" (change)="setValoresStore(pagoDerechosForm, 'llave', 'setLlave')" />
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="fecha">Fecha de pago*:</label>
              <input class="form-control" id="fecha" type="date"
                formControlName="fecha" (change)="setValoresStore(pagoDerechosForm, 'fecha', 'setFecha')" />
            </div>
          </div>
          
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="importe">Importe de pago*:</label>
              <input class="form-control" id="importe" type="number"
                formControlName="importe" (change)="setValoresStore(pagoDerechosForm, 'importe', 'setImporte')" />
            </div>
          </div>
        </div>
        
      </div>
    </form>
  </div>
