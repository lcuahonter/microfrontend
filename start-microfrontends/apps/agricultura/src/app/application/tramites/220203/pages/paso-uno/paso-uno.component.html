<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <ul class="nav nav-tabs">
        <li
          *ngFor="let tab of seccionesDeLaSolicitud"
          [ngClass]="indice === tab.index ? 'active' : ''"
        >
          <a
            data-toggle="tab"
            (click)="seleccionaTab(tab.index)"
            (keydown.enter)="seleccionaTab(tab.index)"
            tabindex="0"
            >{{ tab.title }}</a
          >
        </li>
      </ul>
    </ul>

    <ng-container *ngIf="RENDERDOM">
      <solicitante [hidden]="indice !== 1" #solicitanteRef></solicitante>
      <app-datos-de-la-solicitud
        [hidden]="indice !== 2"
        [consultaState]="consultaState"
        [ocultarForm]="ocultarForm"
        #datosSolicitudRef
      ></app-datos-de-la-solicitud>
      <app-datos-para-movilizacion
        [hidden]="indice !== 3"
        [consultaState]="consultaState"
        [ocultarForm]="ocultarForm"
        #datosParaMovilizacionRef
      ></app-datos-para-movilizacion>
      <app-tercerospage
        [hidden]="indice !== 4"
        [consultaState]="consultaState"
        [ocultarForm]="ocultarForm"
        #tercerospageRef
      ></app-tercerospage>
      <app-pago-de-derechos
        [hidden]="indice !== 5"
        [consultaState]="consultaState"
        [ocultarForm]="ocultarForm"
        #pagoDerechosRef
      ></app-pago-de-derechos>
    </ng-container>
  </div>
</div>
