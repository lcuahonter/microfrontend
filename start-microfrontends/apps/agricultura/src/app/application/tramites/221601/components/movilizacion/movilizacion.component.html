<div class="container" [formGroup]="MedioForm">
  <ng-titulo titulo="Destino" />
  <div class="row custom-destino">
    <div class="col-md-4">
      <div class="form-group">
        <label class="form-label" for="coordenadas">Coordenadas geográficas:</label>
        <input class="form-control" id="coordenadas" formControlName="coordenadas" type="text" maxlength="80"
          (change)="setValoresStore(MedioForm, 'coordenadas', 'setCoordenadas')" />
      </div>
      <div class="d-grid">
          <div *ngIf="MedioForm.get('empresa')?.touched">
            <small class="mensaje-error" *ngIf="MedioForm.get('coordenadas')?.hasError('required')">
              Este campo es obligatorio.
            </small>
            <small class="mensaje-error" *ngIf="MedioForm.get('coordenadas')?.hasError('maxlength')">
              El teléfono no puede exceder los 80 caracteres.
            </small>
          </div>
        </div>
          </div>
    </div>  
    <ng-titulo titulo="Medio de transporte" />    
    <div class="row">
      <div class="col-md-4">
        <div class="form-group">
          <app-catalogo-select [catalogo]="medio" [label]="'Medio de transporte'" [required]="true" name="medio" [isDisabled]="esFormularioSoloLectura" [placeholder]="'Seleccione un opción'"
            formControlName="medio" (change)="setValoresStore(MedioForm, 'medio', 'setMedio')">
          </app-catalogo-select>
        </div>
      </div>  
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label" for="transporte">Identificación del transporte:</label>
          <input class="form-control" id="transporte" formControlName="transporte" type="text"  maxlength="30" size="29"
            (change)="setValoresStore(MedioForm, 'transporte', 'setTransporte')" />
            <div class="d-grid">
          <div *ngIf="MedioForm.get('transporte')?.touched">
            <small class="mensaje-error" *ngIf="MedioForm.get('transporte')?.hasError('required')">
              Este campo es obligatorio.
            </small>
            <small class="mensaje-error" *ngIf="MedioForm.get('transporte')?.hasError('maxlength')">
              El teléfono no puede exceder los 30 caracteres.
            </small>
          </div>
        </div>
          </div>
         </div>
         <div class="row">
      <div class="col-md-8">
        <div class="form-group">
          <app-catalogo-select [catalogo]="verificacion" [label]="'Punto de verificación federal'"  [isDisabled]="esFormularioSoloLectura" [placeholder]="'Seleccione un opción'" [tooltipQuestionCircleText]="'Es el primer punto de Inspección Federal dentro del territorio nacional por donde cruzará el embarque'" [tooltipQuestionCircle]="true"
            name="verificacion" formControlName="verificacion" (change)="setValoresStore(MedioForm, 'verificacion', 'setVerificacion')" >
          </app-catalogo-select>
        </div>
      </div>
    </div>    
    <div class="row">
      <div class="col-md-8">
        <div class="form-group">
          <label class="form-label" for="empresa">Nombre de la empresa transportista*:</label>
          <input class="form-control" id="empresa" formControlName="empresa" type="text" maxlength="80" size="29"
            (change)="setValoresStore(MedioForm, 'empresa', 'setEmpresa')" />
        </div>
       <div class="d-grid">
          <div *ngIf="MedioForm.get('empresa')?.touched">
            <small class="mensaje-error" *ngIf="MedioForm.get('empresa')?.hasError('required')">
              Este campo es obligatorio.
            </small>
            <small class="mensaje-error" *ngIf="MedioForm.get('empresa')?.hasError('maxlength')">
              El teléfono no puede exceder los 80 caracteres.
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>
