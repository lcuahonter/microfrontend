<div class="container" [formGroup]="datosSolicitudForm">
  <div class="row">
    <div class="col-md-12 accordion-bar">
          <div class="panel-group ficha-collapse" id="accordion">
            <div class="panel panel-default mt-5">
                <div class="panel-heading" (click)="mostrar_colapsable()">
                  <h4 class="panel-title">
              <a aria-label="Repeat"><i class="bi bi-repeat" aria-hidden="true"></i></a>
            </h4>
                  <button type="button" class="collpase-button collapsed"
                  [ngClass]="{ 'expanded': colapsable,'collapsed': !colapsable}" [disabled]="esFormularioSoloLectura" >
                  </button>
                </div>
                @if(colapsable){
                <div class="panel-collapse collapse in" [ngClass]="{ 'in': colapsable, 'collapse': !colapsable}" id="panel-01">
                  <div class="panel-body">
                      <div class="row mt-5">
                        <div class="col-md-12">
                            <ng-alert [CONTENIDO]="TEXTOS"></ng-alert>
                            <div class="col-md-12 mt-5 d-flex justify-content-end">
                             <button type="button" class="btn btn-primary ms-3" [disabled]="esFormularioSoloLectura">Cargar</button>
                            </div>                            
                        </div>
                        
                      </div>
                  </div>
                </div>
                }
            </div>
          </div>
      </div>
    <div class="col-md-12">
      <div class="form-group">
        <label class="form-label" for="justificacionDescription">Justificación*:</label>
        <textarea
          class="form-control custom-textarea"
          id="justificacionDescription"
          formControlName="justificacionDescription"
          style="height: 90px"
          (change)="setValoresStore('justificacionDescription', 'setJustificacionDescription')"
          [class.is-invalid]="datosSolicitudForm.get('justificacionDescription')?.touched && datosSolicitudForm.get('justificacionDescription')?.invalid"
        ></textarea>
        <div
          class="invalid-feedback"
          *ngIf="
            datosSolicitudForm.get('justificacionDescription')?.touched &&
            datosSolicitudForm.get('justificacionDescription')?.invalid
          "
        >
          <span
            *ngIf="
              datosSolicitudForm.get('justificacionDescription')?.hasError('required')
            "
            >Este campo es obligatorio.</span
          >
        </div>
      </div>
    </div>
  </div>

  <ng-titulo titulo="Datos del trámite a realizar" />

  <div class="row" style="padding-bottom: 20px">
    <div class="col-md-8">
      <div class="form-group">
        <label class="form-label" for="aduana">Aduana de ingreso*:</label>
        <input
          class="form-control"
          id="aduana"
          formControlName="aduana"
          type="text"
          (change)="setValoresStore('aduana', 'setAduana')"
        />
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-8">
      <div class="form-group">
        <label class="form-label" for="oficina"
          >Oficina de inspección de Sanidad Agropecuaria*:</label
        >
        <input
          class="form-control"
          id="oficina"
          formControlName="oficina"
          type="text"
          (change)="setValoresStore('oficina', 'setOficina')"
        />
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-8">
      <div class="form-group">
        <label class="form-label" for="punto">Punto de inspección*:</label>
        <input
          class="form-control"
          id="punto"
          formControlName="punto"
          type="text"
          (change)="setValoresStore('punto', 'setPunto')"
        />
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4">
      <div class="form-group">
        <label class="form-label" for="guia">Número de guía:</label>
        <input class="form-control" id="guia" formControlName="guia" type="text" maxlength="50" size="29"
            (change)="setValoresStore('guia', 'setGuia')"/>
      </div>
    </div>

    <div class="col-md-4">
      <div class="form-group">
        <app-catalogo-select
          [catalogo]="sanidadService.regimen"
          [label]="'Régimen'"
          [tooltipQuestionCircleText]="'Régimen al que se destinará la mercancía'" 
          [tooltipQuestionCircle]="true"
          [required]="true"
          name="regimen"
          formControlName="regimen"
          (change)="setValoresStore('regimen', 'setRegimen')"
          [isDisabled]="esFormularioSoloLectura"
        >
        </app-catalogo-select>
      </div>
    </div>
  </div>

  <div class="row" style="margin-top: 50px">
    <h6>Mercancías</h6>
    <app-tabla-dinamica
      [configuracionTabla]="configuracionTabla"
      [datos]="sanidadService.mercancia"
      [tipoSeleccionTabla]="checkbox"
       [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"
    ></app-tabla-dinamica>

    <nav aria-label="Page navigation example">
      <ul class="pagination justify-content-center">
        <li class="page-item"><a class="page-link">1</a></li>
      </ul>
    </nav>
  </div>

  <div class="col-md-12 mt-5 d-flex justify-content-end">
    <button type="button" class="btn btn-default" [disabled]="esFormularioSoloLectura">Modificar</button>
    <button type="button" class="btn btn-danger ms-3" [disabled]="esFormularioSoloLectura">Eliminar</button>
    <button type="button" class="btn btn-primary ms-3" [disabled]="esFormularioSoloLectura">Agregar</button>
  </div>
</div>
