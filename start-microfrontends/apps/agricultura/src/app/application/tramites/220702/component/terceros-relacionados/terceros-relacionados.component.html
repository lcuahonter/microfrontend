<div class="page">
  <div class="container">
    <ng-titulo [titulo]="'Terceros relacionados'"></ng-titulo>

    <ng-alert [CONTENIDO]="instruccionDobleClic" class="text-center"></ng-alert>
  
    
    <div class="row">
      <div class="col-md-12">
        <label for="Exportador" class="control-label">Exportador</label>
      </div>

      <div class="col-md-12 mt-5">
        <div class="table-responsive">
          <app-tabla-dinamica 
            [tipoSeleccionTabla]="tablaSeleccionCheckbox" 
            [configuracionTabla]="exportadorTabla"
            [datos]="exportadorTableDatos" 
            [disableSeleccionTablaCheckBox]="campoDeshabilitar">
          </app-tabla-dinamica>
        </div>
      </div>
    </div>
    
    <div class="row">
      <div class="col-md-12">
        <label for="Fabricante" class="control-label">Destinatario (destino final)</label>
      </div>

      <div class="col-md-12 mt-5">
        <div class="table-responsive">
          <app-tabla-dinamica 
            [tipoSeleccionTabla]="tablaSeleccionCheckbox" 
            [configuracionTabla]="destinoTabla"
            [datos]="destinoTableDatos" 
            [disableSeleccionTablaCheckBox]="campoDeshabilitar">
          </app-tabla-dinamica>
        </div>
      </div>
    </div>
  </div>
</div>
