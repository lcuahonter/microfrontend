<div class="container">
  <form [formGroup]="pagosDerechosForm">
    <div class="row mt-5">
      <ng-titulo titulo="Pago de derechos" />
      <div class="row">
        <div class="col-md-12">
          <div class="row mt-2">
              <div class="col-md-12">
                  <label for="certficacion_a">Exento de pago:</label>
              </div>
              <div class="col-md-4">
                  <app-input-radio [radioOptions]="radioOpcions" 
                  (valueChange)="cambiarRadio($event)" formControlName="exentoDePago"
                      [isRequired]="true" [layout]="'vertical'"></app-input-radio>
              </div>
          </div>
      </div>

       </div>

       <div class="row">
         <div class="col-md-8">
          <div class="form-group p-2">
            <app-catalogo-select
              [catalogo]="pagoJustificacion.catalogos"
              [label]="pagoJustificacion.labelNombre"
              [placeholder]="pagoJustificacion.primerOpcion"
              formControlName="pagoJustificacion"
              [isDisabled]="true"
            ></app-catalogo-select>
          </div>
        </div>
       </div>

      
      <div class="col-md-4 form-group">
        <label class="form-label" for="claveDeReferencia"
          >Clave de referencia*:</label
        >
        <input
          type="text"
          id="claveDeReferencia"
          class="form-control"
          formControlName="claveDeReferenciaDerechos"
        />
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="cadenaDependencia"
          >Cadena de la dependencia*:</label
        >
        <input
          type="text"
          id="cadenaDependencia"
          class="form-control"
          formControlName="cadenaDependenciaDerechos"
        />
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="banco">Banco:</label>
        <input
          type="text"
          id="banco"
          class="form-control"
          formControlName="bancoDerechos"
        />
      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="llaveDePago">Llave de pago*:</label>
        <input
          type="text"
          id="llaveDePago"
          class="form-control"
          formControlName="llaveDePagoDerechos"
        />
      </div>

      <div class="col-md-4 form-group">
        <div class="form-field">
          <input-fecha
            [datos]="configuracionFechaFinVigencia"
            (valorCambiado)="cambioFechaDePago($event)"
            [setFecha]="this.tramiteState.fechaDePago"
            formControlName="fechaDePago"
          ></input-fecha>
        </div>

      </div>

      <div class="col-md-4 form-group">
        <label class="form-label" for="importeDePago">Importe de pago*:</label>
        <input
          type="text"
          id="importeDePago"
          class="form-control"
          formControlName="importeDePagoDerechos"
        />
      </div>
    </div>
  </form>
</div>
