<div class="row mt-5">
    <div class="col-md-12">
        <div class="panel-group ficha-collapse" id="accordion">
            <div class="panel panel-default">
                <div class="panel-heading" (click)="mostrarColapsable()" (keyup.enter)="mostrarColapsable()"
                    tabindex="0">
                    <p class="panel-title espacio-extra">
                        <i 
                        class="bi bi-clipboard"
                         aria-hidden="true"></i>Opciones de
                        pre-llenado de Solicitud
                    </p>
                    <button 
                    type="button" 
                    class="collpase-button" 
                    [ngClass]="{ 'expanded': colapsable, 'collapsed': !colapsable }" 
                    (keydown)="mostrarColapsable()">
                </button>                
            </div>
                @if(colapsable){
                <div class="panel-collapse collapse in" id="panel-01">
                    <div class="panel-body">

                        <div class="text-center">
                            <ng-alert [CONTENIDO]="TEXTOS"></ng-alert>
                        </div>
                        <div class="col-md-12 mr-0">
                            <label for="solicitud">Solicitud</label>
                        </div>
                        <div class="col-md-12">
                            <table class="table table-responsive table-striped">
                                <thead>
                                    <tr>
                                        @for (item of tablaHeadData; track $index) {
                                        <th class="text-center">{{ item }}</th>
                                        }
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr *ngFor="let det of tablaFilaDatos; let i = index" class="text-center"
                                    (dblclick)="onRowClick(det.id_solicitud.toString())">
                                        <td>{{ det.fecha_creacion }}</td>
                                        <td>{{ det.mercancia }}</td>
                                        <td>{{ det.cantidad }}</td>
                                        <td>{{ det.proovedor }}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                }
            </div>
        </div>
    </div>
</div>
