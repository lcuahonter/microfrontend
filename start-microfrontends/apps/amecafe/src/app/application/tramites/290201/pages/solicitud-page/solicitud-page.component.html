<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Certificado de origen</h1>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>

    </div>

    <div class="row">
      @switch (indice) {
      @case (1) {
      <paso-uno></paso-uno>
      }
      @case (2) {
      <app-paso-tres></app-paso-tres>
      }
      }

      <btn-continuar [datos]="datosPasos"   [dePadre]="true"  (continuarEvento)="getValorIndice($event)"  (anteriorEvento)="getValorIndice($event)"></btn-continuar>
    </div>
  </div>
</div>
