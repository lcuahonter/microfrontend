<div class="page">
  <div class="container">
    <div class="container">
      <form [formGroup]="regionForm">
        <div class="row mt-5">
          <ng-titulo titulo="Regiones donde Compra " />

          <div class="col-md-8 ">
            <div class="form-group ">
              <app-catalogo-select
              
                [catalogo]="estado.catalogos"
                [label]="estado.labelNombre"
                [placeholder]="estado.primerOpcion"
                [isDisabled]="false"
                formControlName="estado"
                [required]="true"
              ></app-catalogo-select>
            </div>
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <app-catalogo-select
              
                [catalogo]="productoCafe.catalogos"
                [label]="productoCafe.labelNombre"
                [placeholder]="productoCafe.primerOpcion"
                [isDisabled]="false"
                formControlName="productoCafe"
                [required]="true"
              ></app-catalogo-select>
            </div>
          </div>
          <div class="col-md-12 form-group">
            <label class="form-label" for="descRegionCompra"
              >Región / Municipio*:</label
            >
            <input
              type="text"
              id="descRegionCompra"
              class="form-control"
              formControlName="descRegionCompra"
              [required]="true"
            />
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <app-catalogo-select
              
                [catalogo]="descripTipoCafe.catalogos"
                [label]="descripTipoCafe.labelNombre"
                [placeholder]="descripTipoCafe.primerOpcion"
                [isDisabled]="false"
                formControlName="descripTipoCafe"
                [required]="true"
              ></app-catalogo-select>
            </div>
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label text-start" for="volumen"
              >Volumen por ciclo cafetalero en Kg*:</label
            >
            <input
              type="number"
              id="volumen"
              [required]="true"
              class="form-control"
              formControlName="volumen"
            />
          </div>

          <div class="row mb-5">
            <div class="col-md-12">
              <div class="pull-right">
                <button
                  type="button"
                  class="btn btn-danger me-2"
                  id="cancelarBtnBd"
                  (click)="cancelarBodega()"
                >
                  Cancelar
                </button>
                <button
                  type="submit"
                  class="btn btn-primary"
                  id="guardarBtnBd"
                  (click)="seleccionaTab(2)"
                >
                Guardar
                </button>
              </div>
            </div>
          </div> 


        </div>
    
       
      </form>
    </div>
    
    
   

    
 
  </div>
</div>
