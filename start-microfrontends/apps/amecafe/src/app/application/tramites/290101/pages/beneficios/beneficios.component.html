<div class="page">
  <div class="container">
    <div class="container">
      <form [formGroup]="beneficiosForm">
        <div class="row mt-5">
          <ng-titulo titulo="Beneficios" />
          <div class="col-md-8 form-group">
            <label class="form-label" for="razonSocial"
              >Nombre del Beneficio*:</label
            >
            <input
              type="text"
              id="razonSocial"
              class="form-control"
              formControlName="razonSocial"
              [disabled]="esFormularioSoloLectura"
            />
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <app-catalogo-select
              
                [catalogo]="propAlquil.catalogos"
                [label]="propAlquil.labelNombre"
                [placeholder]="propAlquil.primerOpcion"
                [isDisabled]="false"
                formControlName="propAlquil"
                [required]="true"
               [isDisabled]="esFormularioSoloLectura"
              ></app-catalogo-select>
            </div>
          </div>
    
    
        
          <div class="col-md-4 form-group">
            <label class="form-label" for="calle"
              >Calle*:</label
            >
            <input
              type="text"
              id="calle"
              class="form-control"
              formControlName="calle"
              [disabled]="esFormularioSoloLectura"
            />
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label" for="numeroExterior"
              >Número Exterior*:</label
            >
            <input
              type="text"
              id="numeroExterior"
              class="form-control"
              formControlName="numeroExterior"
              [disabled]="esFormularioSoloLectura"
            />
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label" for="numeroInterior"
              >Número Interior*:</label
            >
            <input
              type="text"
              id="numeroInterior"
              class="form-control"
              formControlName="numeroInterior"
              [disabled]="esFormularioSoloLectura"
            />
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label" for="colonia"
              >Colonia*:</label
            >
            <input
              type="text"
              id="colonia"
              class="form-control"
              formControlName="colonia"
              [disabled]="esFormularioSoloLectura"
            />
          </div>
          <div class="col-md-4">
            <div class="form-group">
              <app-catalogo-select
              
                [catalogo]="estado.catalogos"
                [label]="estado.labelNombre"
                [placeholder]="estado.primerOpcion"
                [isDisabled]="false"
                formControlName="estado"
                [required]="true"
                [isDisabled]="esFormularioSoloLectura"
                
              ></app-catalogo-select>
            </div>
          </div>
    
          <div class="col-md-4 form-group">
            <label class="form-label" for="codigoPostal"
              >Código Postal*:</label
            >
            <input
              type="text"
              id="codigoPostal"
              class="form-control"
              formControlName="codigoPostal"
              [disabled]="esFormularioSoloLectura"
            />
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label text-start" for="capacidadAlmacenaje"
              >Capacidad por ciclo cafetalero en Kg*:</label
            >
            <input
              type="text"
              id="capacidadAlmacenaje"
              class="form-control"
              formControlName="capacidadAlmacenaje"
              [disabled]="esFormularioSoloLectura"
            />
          </div>
          <div class="col-md-4 form-group">
            <label class="form-label text-start" for="volumenAlmacenaje"
              >Volúmen por ciclo cafetalero en Kg*:</label
            >
            <input
              type="text"
              id="volumenAlmacenaje"
              class="form-control"
              formControlName="volumenAlmacenaje"
              [disabled]="esFormularioSoloLectura"
            />
          </div>

          <div class="row mb-5">
            <div class="col-md-12">
              <div class="pull-right">
                <button
                  type="button"
                  class="btn btn-danger me-2"
                  id="cancelarBtnBd"
                  (click)="cancelarBodega()"
                  (click)="seleccionaTab(2)"
                >
                  Cancelar
                </button>
                <button
                  type="submit"
                  class="btn btn-primary"
                  id="guardarBtnBd"
                  (click)="seleccionaTab(2)"
                >
                  Guardar
                </button>
              </div>
            </div>
          </div> 


        </div>
    
       
      </form>
    </div>
    
    
   

    
 
  </div>
</div>
