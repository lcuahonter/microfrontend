<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Registro nacional de exportadores de café</h1>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <paso-uno></paso-uno>
      } @case (2) {
      <paso-dos></paso-dos>
      } @case (3) {
      <paso-tres></paso-tres>
      }
    }
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
  </div>
  </div>
</div>
