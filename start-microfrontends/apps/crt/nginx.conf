user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    # Enable compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        application/javascript
        application/json
        application/x-javascript
        text/css
        text/javascript
        text/plain
        text/xml;

    # Custom log format for debugging
    log_format debug_format '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           '$request_time "$http_x_forwarded_for" '
                           '$host $request_filename';

    access_log /var/log/nginx/access.log debug_format;

    server {
        listen 80 default_server;
        server_name _;

        # Serve CRT app under /crt/
        location /crt/ {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /index.html;
        }

        # Disable caching for index.html to ensure version updates are visible
        location = /crt/index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
            try_files $uri =404;
        }

        # Enable CORS for Module Federation (JS/CSS files)
        location ~* \.(js|css)$ {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type" always;
            add_header Access-Control-Allow-Credentials "true" always;
        }

        # Cache static assets (JS, CSS, images) with long TTL
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Fallback for SPA routing
        location / {
            return 404;
        }
    }
}
