<div class="container">
  <lib-notificaciones *ngIf="notificacionInput" [notificacionInput]="notificacionInput"></lib-notificaciones>
  
  <div *ngIf="!viewDetail">
    <div class="d-flex align-items-center mb-3">
      <a href="javascript:void(0)" class="text-primary text-decoration-none">Antecesor</a>
      <span class="text-muted mx-2">|</span>
      <span class="text-muted">Activo</span>
    </div>
    <ng-titulo [titulo]="'Consulta y retroalimentación del COD emitido por países de la Alianza del Pacífico.'"></ng-titulo>
    <form [formGroup]="form" (ngSubmit)="onConsultar()" class="row g-3 mb-5">
      <div class="col-md-3">
        <label class="form-label fw-bold">No. de Certificado</label>
        <input type="text" class="form-control" formControlName="noCertificado">
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">País de procedencia</label>
        <select class="form-control form-select" formControlName="paisProcedencia">
          <option [value]="null">Seleccione un valor</option>
          <option *ngFor="let p of paises" [value]="p.clave">{{ p.descripcion }}</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">Estado del COD</label>
        <select class="form-control form-select" formControlName="estadoCod">
          <option [value]="null">Seleccione un valor</option>
          <option *ngFor="let e of estadosCod" [value]="e.clave">{{ e.descripcion }}</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">Estado por Reemplazo</label>
        <select class="form-control form-select" formControlName="estadoReemplazo">
          <option [value]="null">Seleccione un valor</option>
          <option *ngFor="let r of estadosReemplazo" [value]="r.clave">{{ r.descripcion }}</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label fw-bold">No. de Transacción</label>
        <input type="text" class="form-control" formControlName="noTransaccion">
      </div>
      <div class="col-md-3">
        <input-fecha
          [datos]="configFechaInicio"
          [setFecha]="form.get('fechaInicio')?.value"
          (valorCambiado)="onFechaInicioChange($event)"
        ></input-fecha>
      </div>
      <div class="col-md-3">
        <input-fecha
          [datos]="configFechaFin"
          [setFecha]="form.get('fechaFin')?.value"
          (valorCambiado)="onFechaFinChange($event)"
        ></input-fecha>
      </div>
      <div class="col-12 text-end mt-4">
        <button type="submit" class="btn btn-primary px-5 py-1 me-2" [disabled]="loading">
          <span *ngIf="!loading">Consultar</span>
          <span *ngIf="loading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
        </button>
        <button type="button" (click)="onLimpiar()" class="btn btn-primary px-5 py-1">
          Limpiar
        </button>
      </div>
    </form>
    <div class="mt-4">
      <app-expandir-tabla [title]="'Certificados de Alianza Pacífico'" [isExpanded]="true">
        <div class="mt-2">
          <div class="d-flex justify-content-start mb-2 gap-2">
            <button class="btn btn-sm btn-outline-secondary border-0"><i class="bi bi-search"></i></button>
            <button class="btn btn-sm btn-outline-secondary border-0"><i class="bi bi-arrow-clockwise"></i></button>
          </div>
          <app-tabla-dinamica
            [configuracionTabla]="configuracionTabla"
            [datos]="results"
            (alternarValor)="onAlternarValor($event)"
            (filaClic)="onFilaClick($event)"
          ></app-tabla-dinamica>
          <div class="mt-3 d-flex justify-content-between align-items-center">
            <app-table-pagination
              [totalItems]="results.length"
              [itemsPerPage]="10"
              [currentPage]="1"
            ></app-table-pagination>
          </div>
        </div>
      </app-expandir-tabla>
    </div>
  </div>

  <div *ngIf="viewDetail && selectedRow">
    <app-alianza-pacifico-detalle
      [data]="selectedRow"
      (regresar)="onRegresarDetalle()"
    ></app-alianza-pacifico-detalle>
  </div>
</div>
