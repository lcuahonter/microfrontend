<form [formGroup]="form" class="row g-3">
  <div class="col-md-4">
    <label><span class="text-danger">*</span> Numero Folio Tramite</label>
    <input type="text" class="form-control" formControlName="numeroFolio">
  </div>

  <div class="col-12 d-flex justify-content-end mt-4">
    <button type="button" class="btn btn-primary" (click)="onBuscar()" [disabled]="form.invalid">Buscar</button>
  </div>
</form>
