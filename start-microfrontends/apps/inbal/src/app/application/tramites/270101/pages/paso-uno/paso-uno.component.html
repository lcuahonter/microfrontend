<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Datos de la solicitud</a>
            </li>
            <li [ngClass]="{ 'active': indice === 3, 'disabled': desactivarPestana }">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Pago de derechos</a>
            </li>
        </ul>
        <ng-container>
            @switch (indice) {
                @case(1) {
                    <solicitante></solicitante>
                }              
                @case (2) {
                    @if (esDatosRespuesta) {
                        <datos-de-la-solicitud [consultaState]="consultaState"></datos-de-la-solicitud>
                        <periodo-en-el-extranjero [consultaState]="consultaState"></periodo-en-el-extranjero>
                        <motivo-de-la-exportacion [consultaState]="consultaState"></motivo-de-la-exportacion>
                        <lugar-de-destino [consultaState]="consultaState"></lugar-de-destino>
                        <aduana [consultaState]="consultaState" (formularioEventoEmitir)="formularioEventoEmitir($event)"></aduana>
                    }
                } @case (3) {
                    <pago-de-derechos [consultaState]="consultaState"></pago-de-derechos>
                }
            }
        </ng-container>
    </div>
</div>
