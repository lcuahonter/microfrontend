<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Aviso de importación y exportación de obra artística de los siglos XX y XXI</h1>
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
            <app-datos-270201></app-datos-270201>
            }
            @case (2) {
            <app-paso-dos></app-paso-dos>
            }
            @case (3) {
            <app-paso-tres></app-paso-tres>
            }
            }
            <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
            <div class="mt-5">
                <ng-alert [CONTENIDO]="avisoPrivacidadAlert"></ng-alert>
            </div>
        </div>
    </div>
</div>
