<ng-titulo titulo="Representante legal"></ng-titulo>
<form  [formGroup]="representante" *ngIf="representante">
    <div class="form">
        <div class="row align-item-end">
            <div class="col-md-4">
               <div class="form-group">
    <label class="form-label" for="rfc">RFC<span
  [ngClass]="{'tiene-error': representante.controls['rfc'].invalid && representante.controls['rfc'].touched }"
>*</span>:</label>
    <input
        class="form-control"
        id="rfc"
        placeholder=""
        type="text"
        formControlName="rfc"
        [ngClass]="{
            'required': esValido('rfc'),
            'tiene-invalido': representante.controls['rfc'].invalid && representante.controls['rfc'].touched
        }"
          [maxlength]="13"
        (change)="setValoresStore(representante,'rfc', 'setRfc')"
    />
     <div class="d-grid">
    <div *ngIf="representante.controls['rfc'].invalid && representante.controls['rfc'].touched ">
      <span *ngIf="representante.controls['rfc'].errors?.['required']" class="mensaje-error">
        Este campo es obligatorio.
      </span>
      <span *ngIf="representante.controls['rfc'].errors?.['maxlength']" class="mensaje-error">
        El texto excede el límite de caracteres permitido.
      </span>
      <span *ngIf="representante.controls['rfc'].errors?.['pattern']" class="mensaje-error">
       El valor capturado no es válido.
      </span>
    </div>
</div>

</div>
    
            </div>
            <div class="col-md-4 d-flex align-items-center">
                <div>
                    <button class="btn btn-primary me-2" (click)="obtenerValor()" [disabled]="esFormularioSoloLectura ? true : false">Buscar</button>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre o Razón Social<span  [ngClass]="{'tiene-error':representante.get('nombre')?.invalid && representante.get('nombre')?.touched || (mostrarErroresRepresentante.nombre && representante.get('nombre')?.value === '')}">*</span>:</label>
                    <input
                        class="form-control"
                        id="nombre"
                        placeholder=""
                        type="text"
                        formControlName="nombre"
                        (change)="setValoresStore(representante,'nombre', 'setNombre')"
                    />
                </div>
                 <small  *ngIf="representante.get('nombre')?.touched && representante.get('nombre')?.hasError('required') || (mostrarErroresRepresentante.nombre && representante.get('nombre')?.value === '')" class="mensaje-error">
        Este campo es obligatorio.
    </small >
            </div>
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="apellidoPaterno">Apellido paterno<span  [ngClass]="{'tiene-error':representante.get('apellidoPaterno')?.invalid && representante.get('apellidoPaterno')?.touched || (mostrarErroresRepresentante.apellidoPaterno && representante.get('apellidoPaterno')?.value === '')}">*</span>:</label>
                    <input
                        class="form-control"
                        id="apellidoPaterno"
                        placeholder=""
                        type="text"
                        formControlName="apellidoPaterno"
                        (change)="setValoresStore(representante,'apellidoPaterno', 'setApellidoPaterno')"
                    />
                </div>
                 <small  *ngIf="representante.get('apellidoPaterno')?.touched && representante.get('apellidoPaterno')?.hasError('required') || (mostrarErroresRepresentante.apellidoPaterno && representante.get('apellidoPaterno')?.value === '')" class="mensaje-error">
        Este campo es obligatorio.
    </small >
            </div>
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="apellidoMaterno">Apellido materno:</label>
                    <input
                        class="form-control"
                        id="apellidoMaterno"
                        placeholder=""
                        type="text"
                        formControlName="apellidoMaterno"
                        (change)="setValoresStore(representante,'apellidoMaterno', 'setApellidoMaterno')"
                    />
                </div>
            </div>
            
        </div>
    </div>
</form>
@if (nuevaNotificacion) {
  <section>
    <lib-notificaciones [notificacionInput]="nuevaNotificacion" (confirmacionModal)="eliminarPedimento($event)">
    </lib-notificaciones>
  </section>
  }
