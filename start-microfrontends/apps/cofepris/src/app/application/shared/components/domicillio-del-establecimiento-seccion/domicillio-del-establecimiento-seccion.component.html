<ng-titulo titulo="Domicillio del establecimiento"></ng-titulo>
<form [formGroup]="domicilioEstablecimiento">
  <div class="row">
    <div id="establecimientoDomicilioCodigoPostal" class="col-md-4">
      <label for="establecimientoDomicilioCodigoPostal">Código postal<span class="require">*</span>:</label>

      <div>
        <input type="text" maxlength="12" id="establecimientoDomicilioCodigoPostalId"
          formControlName="establecimientoDomicilioCodigoPostal" class="form-control"
          (change)="onControlChange('establecimientoDomicilioCodigoPostal')" 
          [ngClass]="{'is-invalid': domicilioEstablecimiento.get('establecimientoDomicilioCodigoPostal')?.invalid && domicilioEstablecimiento.get('establecimientoDomicilioCodigoPostal')?.touched}"
          />
        <div *ngIf="hasError('establecimientoDomicilioCodigoPostal', 'required')" class="text-danger mt-1">
          <small>Este campo es obligatorio</small>
        </div>
        <div *ngIf="!validateCodigoPostal() && domicilioEstablecimiento.get('establecimientoDomicilioCodigoPostal')?.touched" class="text-danger mt-1">
          <small>Por favor, ingrese un código postal válido</small>
        </div>
      </div>
    </div>

    <div id="Estado" class="col-md-4">
      <app-catalogo-select [catalogo]="estadoDomicillio" [label]="'Estado'" [placeholder]="'Seleccione una valor'"
        [isDisabled]="formularioDeshabilitado" formControlName="establecimientoDomicilioEstado"
        (change)="onControlChange('establecimientoDomicilioEstado')" [required]="true"></app-catalogo-select>
        <div *ngIf="hasError('establecimientoDomicilioEstado', 'required')" class="text-danger mt-1">
          <small>Este campo es obligatorio</small>
        </div>
    </div>

    <div id="establecimientoMunicipioYAlcaldia" class="col-md-4">
      <label for="establecimientoMunicipioYAlcaldia">Municipio y alcaldia<span class="require">*</span>:</label>

      <div>
        <input type="text" maxlength="120" id="establecimientoMunicipioYAlcaldiaId"
          formControlName="establecimientoMunicipioYAlcaldia" class="form-control"
          (change)="onControlChange('establecimientoMunicipioYAlcaldia')" 
          [ngClass]="{'is-invalid': domicilioEstablecimiento.get('establecimientoMunicipioYAlcaldia')?.invalid && domicilioEstablecimiento.get('establecimientoMunicipioYAlcaldia')?.touched}"
          />
        <div *ngIf="hasError('establecimientoMunicipioYAlcaldia', 'required')" class="text-danger mt-1">
          <small>Este campo es obligatorio</small>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div id="establecimientoDomicilioLocalidad" class="col-md-4">
      <label for="establecimientoDomicilioLocalidad">Localidad:</label>
      <div>
        <input type="text" maxlength="12" id="establecimientoDomicilioLocalidadId"
          formControlName="establecimientoDomicilioLocalidad" class="form-control"
          (change)="onControlChange('establecimientoDomicilioLocalidad')" />
      </div>
    </div>

    <div id="establecimientoDomicilioColonia" class="col-md-4">
      <label for="establecimientoDomicilioColonia">Colonia:</label>
      <div>
        <input type="text" maxlength="120" id="establecimientoDomicilioColoniaId"
          formControlName="establecimientoDomicilioColonia" class="form-control"
          (change)="onControlChange('establecimientoDomicilioColonia')" />
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>
  <div class="row">
    <div id="establecimientoDomicilioCalle" class="col-md-8">
      <label for="establecimientoDomicilioCalle">Calle<span>*</span>:<span class="bi bi-question-circle-fill require"
         tooltip="Domicilio, calle, número interior, número exterior, lote"></span></label>
      <div>
        <input type="text" maxlength="90" id="establecimientoDomicilioCalleId"
          formControlName="establecimientoDomicilioCalle" class="form-control"
          (change)="onControlChange('establecimientoDomicilioCalle')" 
          [ngClass]="{'is-invalid': domicilioEstablecimiento.get('establecimientoDomicilioCalle')?.invalid && domicilioEstablecimiento.get('establecimientoDomicilioCalle')?.touched}"
          />
        <div *ngIf="hasError('establecimientoDomicilioCalle', 'required')" class="text-danger mt-1">
          <small>Este campo es obligatorio</small>
        </div>
      </div>
    </div>
  </div>
  <div class="row mb-5">
    <div id="establecimientoDomicilioLada" class="col-md-1">
      <label for="establecimientoDomicilioLada">Lada:</label>
      <div>
        <input type="text" maxlength="5" id="establecimientoDomicilioLadaId"
          formControlName="establecimientoDomicilioLada" class="form-control"
          (change)="onControlChange('establecimientoDomicilioLada')" />
      </div>
    </div>

    <div id="establecimientoDomicilioTelefono" class="col-md-3">
      <label for="establecimientoDomicilioTelefono">Teléfono<span class="require">*</span>:</label>
      <div>
        <input type="text" maxlength="24" id="establecimientoDomicilioTelefonoId"
          formControlName="establecimientoDomicilioTelefono" class="form-control"
          (change)="onControlChange('establecimientoDomicilioTelefono')" 
          [ngClass]="{'is-invalid': domicilioEstablecimiento.get('establecimientoDomicilioTelefono')?.invalid && domicilioEstablecimiento.get('establecimientoDomicilioTelefono')?.touched}"
          />
        <div *ngIf="hasError('establecimientoDomicilioTelefono', 'required')" class="text-danger mt-1">
          <small>Este campo es obligatorio</small>
        </div>
        <div *ngIf="!validateTelefono() && domicilioEstablecimiento.get('establecimientoDomicilioTelefono')?.touched" class="text-danger mt-1">
          <small>Por favor, ingrese un número de teléfono válido</small>
        </div>
      </div>
    </div>

    <div class="col-md-8"></div>
  </div>

  <label class="mt-5"> S.C.I.A.N.*</label>
  <app-tabla-dinamica
    [tipoSeleccionTabla]="TablaSeleccion.CHECKBOX"
    [configuracionTabla]="configuracionTabla"
    [datos]="personaparas"
    [disableSeleccionTablaCheckBox]="formularioDeshabilitado"
    (listaDeFilaSeleccionada)="onSeleccionChangeScian(convertirScianModelADatos($event)); onScianRecordAdded(convertirScianModelADatos($event))"
  ></app-tabla-dinamica>
  <div class="col-md-12 mt-5 d-flex justify-content-end">
    <button
      type="button"
      class="btn btn-danger mb-5"
      [disabled]="selectedRowsScian.length === 0 || formularioDeshabilitado"
      (click)="eliminarScianConfirmacion()"
    >
      Eliminar
    </button>
    <button
      type="button"
      class="btn btn-primary ms-3 mb-5"
      (click)="openScianModal()"
      [disabled]="formularioDeshabilitado"
    >
      Agregar
    </button>
  </div>


  <div class="row pt-6">
    <div id="rfcDelProfesionalResponsable" class="col-md-4">
      <label for="rfcDelProfesionalResponsable">RFC del profesional responsable :</label>
      <div>
        <input type="text" maxlength="30" id="rfcDelProfesionalResponsableId"
          formControlName="rfcDelProfesionalResponsable" class="form-control"
          (change)="onControlChange('rfcDelProfesionalResponsable')" />
      </div>
    </div>

    <div id="nombreDelProfesionalResponsable" class="col-md-8">
      <label for="nombreDelProfesionalResponsable">
        Nombre del profesional responsable :</label>
      <div>
        <input type="text" maxlength="60" id="nombreDelProfesionalResponsableId"
          formControlName="nombreDelProfesionalResponsable" class="form-control"
          (change)="onControlChange('nombreDelProfesionalResponsable')" />
      </div>
    </div>
  </div>

  <div class="row mt-5">
    <div class="col-md-4">
      <div class="form-check">
        <input type="checkbox" maxlength="245" id="avisoDeFuncionamientoId" formControlName="avisoDeFuncionamiento"
          class="form-check-input" (change)="onControlChange('avisoDeFuncionamiento')" />
        <label class="form-check-label" for="avisoDeFuncionamiento">
          Aviso de funcionamiento
        </label>
      </div>
    </div>
    <div class="col-md-4">
      <label for="noDeLicenciaSanitaria"> No.de licencia sanitaria: <span
            title="Número de la autorización indicado en el  documento emitido por la autoridad sanitaria competente">
            <i class="bi bi-question-circle-fill"></i>
          </span></label>

      <div class="d-flex flex-column align-items-end">
        <input type="text" maxlength="20" id="noDeLicenciaSanitariaId" formControlName="noDeLicenciaSanitaria"
          class="form-control" (change)="onControlChange('noDeLicenciaSanitaria')" />

        <div class="mt-4">
          <button type="button" [disabled]="!isCheckboxChecked() || formularioDeshabilitado"
            class="btn btn-primary mt-2" [class.btn-disabled-state]="!isCheckboxChecked() || formularioDeshabilitado"
            [class.btn-enabled-state]="isCheckboxChecked() && !formularioDeshabilitado"
            [title]="(!isCheckboxChecked() || formularioDeshabilitado) ? 'Debe marcar el checkbox Aviso de funcionamiento para habilitar este botón' : 'Agregar licencia sanitaria'">
            Agregar
          </button>
        </div>
        <div class="col-md-12 row mt-4">
          <textarea id="message" class="form-control mb-5 h-100" placeholder=""
            formControlName="noDeLicenciaSanitariaObservaciones"
            (change)="onControlChange('noDeLicenciaSanitariaObservaciones')" row="4"></textarea>
        </div>
        <div>
          <button type="button" class="btn btn-danger" [disabled]="!isCheckboxChecked() || formularioDeshabilitado"
            (click)="eliminarLicenciaSanitaria()"
            [class.btn-disabled-state]="!isCheckboxChecked() || formularioDeshabilitado"
            [class.btn-enabled-state]="isCheckboxChecked() && !formularioDeshabilitado"
            [title]="(!isCheckboxChecked() || formularioDeshabilitado) ? 'Debe marcar el checkbox Aviso de funcionamiento para habilitar este botón' : 'Eliminar licencia sanitaria'">
            Eliminar
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-4"></div>
  </div>
  <div class="row">
    <div class="col-md-8">
      <app-catalogo-select [catalogo]="regimenQueDestinara" [label]="'Régimen al que se destinará la mercancía*'"
        [isDisabled]="formularioDeshabilitado" [placeholder]="'Seleccione un valor'"
        formControlName="regimenAlQueSeDestinaraLaMercancía"
        [tooltipQuestionCircle]="true"
        [tooltipQuestionCircleText]="'Régimen al que se destinará la mercancía'"
        (change)="onControlChange('regimenAlQueSeDestinaraLaMercancía')"></app-catalogo-select>
        <div *ngIf="hasError('regimenAlQueSeDestinaraLaMercancía', 'required')" class="text-danger mt-1">
          <small>Este campo es obligatorio</small>
        </div>
    </div>
    <div class="col-md-4">
      <app-catalogo-select [catalogo]="aduanaDeSalida" [label]="'Aduana de salida*'"
        [isDisabled]="formularioDeshabilitado" [placeholder]="'Seleccione una valor'" formControlName="aduanaDeSalida"
        (change)="onControlChange('aduanaDeSalida')"></app-catalogo-select>
        <div *ngIf="hasError('aduanaDeSalida', 'required')" class="text-danger mt-1">
          <small>Este campo es obligatorio</small>
        </div>
    </div>
  </div>
</form>




<div class="modal fade" #establecimientoModal>
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form [formGroup]="scianForm">
        <div class="modal-body">
          <ng-titulo titulo="Clave S.C.I.A.N."></ng-titulo>
          <div class="row">
            <div class="col-md-8">
              <app-catalogo-select [showClave]="true" [required]="true" [catalogo]="scianJson" [label]="'Clave S.C.I.A.N.'" formControlName="scian"
                (change)="onControlChange('scian')" [markTouched]="scianForm.get('scian')?.touched??false"></app-catalogo-select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-8">
              <app-catalogo-select [catalogo]="descripcionScianJson" [label]="'Descripción del S.C.I.A.N.'" [required]="true"
                formControlName="descripcionScian" [markTouched]="scianForm.get('descripcionScian')?.touched??false"
                (change)="onControlChange('descripcionScian')"></app-catalogo-select>
            </div>
          </div>
        </div>
        <div class="modal-footer mt-5">
          <button type="button" class="btn btn-primary" (click)="limpiarScianForm()">Limpiar</button>
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="button" class="btn btn-primary" (click)="guardarScian()">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>


@if(mostrarAlerta) {
  <section>
    <lib-notificaciones [notificacionInput]="seleccionarFilaNotificacion" (confirmacionModal)="cerrarModal($event)">
    </lib-notificaciones>
  </section>
  }
