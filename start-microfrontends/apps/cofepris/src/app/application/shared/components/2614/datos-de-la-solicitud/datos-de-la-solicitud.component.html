<div class="container">
  <div class="row mt-5">
    <form [formGroup]="formulario" class="pl-16">
      <div class="row">
        <div class="col-md-8">
          <div class="form-group">
            <label for="justificacionId">
              Justificación
              <span [ngClass]="formulario.get('observaciones')?.invalid && formulario.get('observaciones')?.touched ? 'text-danger' : ''">*</span>:
            </label>
            <textarea
              class="textarea-fix"
              rows="5"
              cols="70"
              maxlength="2000"
              formControlName="observaciones"
              id="justificacionId"
              [ngClass]="isValid(formulario,'observaciones') ? 'required' : ''"
            ></textarea>
            @if (formulario.get('observaciones')?.invalid && formulario.get('observaciones')?.touched) {
              <div class="text-danger">
                @if (formulario.get('observaciones')?.errors?.['required']) {
                  <small>Este campo es obligatorio</small>
                }
              </div>
            }
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
<app-propietario [idProcedimiento]="idProcedimiento"></app-propietario>
