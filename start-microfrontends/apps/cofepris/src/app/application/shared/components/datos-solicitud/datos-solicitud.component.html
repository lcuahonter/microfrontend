<div class="container">
  <app-datos-del-establecimiento-rfc [idProcedimiento]="idProcedimiento"  (rfcValidoChange)="onRfcValidoChange($event)" (formValidityChange)="establecimientoFormValidityChange($event)"></app-datos-del-establecimiento-rfc>
  <app-domicillo 
    [isAvisoLicenciaVisible]="isAvisoLicenciaVisible" 
    [isAduanasEntradaVisible]="isAduanasEntradaVisible" 
    [configuracionVisibilidad]="configuracionVisibilidad"
    [isGarantiasOfrecidasVisible]="isGarantiasOfrecidasVisible"
    [esPaginacionVisible]="esPaginacionVisible"
    [tieneDomicilioHabilitar]="tieneDomicilioHabilitar"
    [mostrarNumeroRegistro]="mostrarNumeroRegistro"
    [tieneUsoEspecifico]="tieneUsoEspecifico"
    [idProcedimiento]="idProcedimiento"
    [identificacion]="identificacion"
    [rfcValido]="rfcValido"
    [estadoValidte]="estadoValidte"
    (formValidityChange)="domicilioFormValidityChange($event)"
    >
  </app-domicillo>
  <app-manifiestos  [esProcedimientoEspecifico]="false" [idProcedimiento]="idProcedimiento" (formValidityChange)="manifiestosFormValidityChange($event)"></app-manifiestos>
  <app-representante-legal-rfc  [idProcedimiento]="idProcedimiento" (formValidityChange)="representanteLegalFormValidityChange($event)"></app-representante-legal-rfc>
</div>
@if (nuevaNotificacion) {
  <section>
    <lib-notificaciones [notificacionInput]="nuevaNotificacion" (confirmacionModal)="eliminarPedimento($event)">
    </lib-notificaciones>
  </section>
  }
