<h5 class="mt-4 mb-5">Tramites asociados*:</h5>

<app-tabla-dinamica 
    [configuracionTabla]="configuracionTablaTramites" 
    [datos]="acuseTablaDatos"
    [disableSeleccionTablaCheckBox]="esFormularioSoloLectura? true : false">
</app-tabla-dinamica>
<div class="d-flex justify-content-center mt-3" [class.disabled]="esFormularioSoloLectura"
[style.pointerEvents]="esFormularioSoloLectura? 'none' : 'auto'"
[style.opacity]="esFormularioSoloLectura ? '0.5' : '1'">
<app-table-pagination [showCurrentPage]="true"> </app-table-pagination>
</div>
