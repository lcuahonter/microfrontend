<div class="page">
  <div class="container">
    <ng-titulo titulo="Selecci&oacute;n de tr&aacute;mite" />
    <rfc-solicitante></rfc-solicitante>
    <div class="row">
      <table class="table table-responsive table-striped table-hover">
        <thead>
          <tr>
            <th> #</th>
            <th> departmento</th>
            <th>Tipo tr&aacute;mite</th>
            <th>URL</th>
          </tr>
        </thead>
        <tbody>
          @for(item of tramiteData; track $index) {
            @if(item?.linkDepartment) {
              <tr>
                <td> {{$index + 1}}</td>
                <td> {{item?.department}}</td>
                <td> {{item?.tramite}}</td>
               <td>
              <a [routerLink]="item.linkDepartment" (click)="onTramiteClick(item?.tramite)">
              {{ ruta }}{{item?.linkDepartment}}
             </a>
             </td>
              </tr>
            }
          }
        </tbody>
      </table>
      <div class="text-right fs-5">
        Version : COFEPRIS:{{ version }}
      </div>
    </div>
  </div>
</div>
