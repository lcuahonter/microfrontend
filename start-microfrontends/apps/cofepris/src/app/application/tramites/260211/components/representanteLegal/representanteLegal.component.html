<ng-titulo titulo="Representante legal"></ng-titulo>
<form [formGroup]="representante">
    <div class="form">
        <div class="row align-item-end">
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="rfc">RFC*:</label>
                    <input
                        class="form-control"
                        id="rfc"
                        placeholder=""
                        type="text"
                        formControlName="rfc"
                        (change)="setValoresStore(representante,'rfc', 'setRfc')"
                    />
                </div>
            </div>
            <div class="col-md-4">
                <button class="btn btn-primary me-2" (click)="obtenerValor()" [disabled]="esFormularioSoloLectura">Buscar</button>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="nombre">Nombre o Razón Social*:</label>
                    <input
                        class="form-control"
                        id="nombre"
                        placeholder=""
                        type="number"
                        formControlName="nombre"
                        (change)="setValoresStore(representante,'nombre', 'setNombre')"
                    />
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="apellidoPaterno">Apellido paterno*:</label>
                    <input
                        class="form-control"
                        id="apellidoPaterno"
                        placeholder=""
                        type="text"
                        formControlName="apellidoPaterno"
                        (change)="setValoresStore(representante,'apellidoPaterno', 'setApellidoPaterno')"
                    />
                </div>
            </div>
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="apellidoMaterno">Apellido materno:</label>
                    <input
                        class="form-control"
                        id="apellidoMaterno"
                        placeholder=""
                        type="text"
                        formControlName="apellidoMaterno"
                        (change)="setValoresStore(representante,'apellidoMaterno', 'setApellidoMaterno')"
                    />
                </div>
            </div>
            
        </div>
    </div>
</form>
