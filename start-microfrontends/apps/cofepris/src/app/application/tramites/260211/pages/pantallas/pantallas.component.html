<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
          <h4>Permiso sanitario de importación de dispositivos médicos que cuenten con registro sanitario/ fuentes de radiación</h4>
        </div>
        <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
      </div>
      <div class="row">
        @switch (indice) { 
        @case (1) {
          <app-datos></app-datos>
        } @case (2) {
          <app-pasoduos></app-pasoduos>
        } @case (3) {
          <app-paso-tres></app-paso-tres>
        }
       }
      </div>
      <btn-continuar
      [datos]="datosPasos"
      (continuarEvento)="getValorIndice($event)"
    >
    </btn-continuar>
     <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
</div>
