
<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Datos de la solicitud</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(3)">Terceros Relacionados</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(4)">Pago de derechos</a>
            </li>
            
        </ul>
        <ng-container>
            @switch (indice) {
                @case(1) {
                    <solicitante [tabindex]="1"></solicitante>
                }              
                @case (2) {
                    <app-datos-establecimiento [tabindex]="2"></app-datos-establecimiento>
                }
                @case(3) {
                  <app-terceros-relacionados></app-terceros-relacionados>
                }
               
                @case(4) {
                   <app-derechos></app-derechos>
                    }
                }
        </ng-container>
    </div>
</div>
