<ng-titulo titulo="Manifiestos y declaraciones"></ng-titulo>
<form [formGroup]="manifiestos">
  <div class="form-check bg-light p-0">
  <div class="alert alert-info content-with-checkbox py-6">
    <input type="checkbox" id="mensaje" formcontrolName="mensaje" [checked]="esFormularioSoloLectura" [disabled]="esFormularioSoloLectura"/>
    <span class="fw-bold align-middle"> *</span>
    <div>{{ MANIFIESTOS_ALERT }} </div>
  </div>
</div>

    <div class="form mt-5">
 <div class="form-group">
          <label for="producto">Los datos o anexos pueden contener información confidencial ¿Está de acuerdo en hacerlos públicos?*:</label>
          <app-input-radio
            [radioOptions]="producto"
            [isRequired]="true"
            [selectedValue]="defaultSelect"
            formControlName="cumplimiento"
           (change)="setValoresStore(manifiestos,'cumplimiento', 'setCumplimiento')"
            [layout]="'horizontal'"
          ></app-input-radio>
        </div>

      
    </div>
</form>
