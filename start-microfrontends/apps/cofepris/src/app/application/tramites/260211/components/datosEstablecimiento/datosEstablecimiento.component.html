<div class="container">
    <form [formGroup]="forma">
        <div class="row mt-5">
            <div class="col-md-12">
              <div class="panel-group ficha-collapse" id="accordion">
                <div class="panel panel-default">
                  <div
                    class="panel-heading"
                    (click)="mostrar_colapsable()"
                    tabindex="0"
                  >
                    <p class="panel-title">
                      Opciones de pre-llenado de Solicitud
                    </p>
                    <button type="button" class="collpase-button collapsed"  [disabled]="esFormularioSoloLectura"></button>
                  </div>
                  @if(colapsable){
                  <div class="panel-collapse collapse in" id="panel-01">
                    <div class="panel-body">
                        <ng-alert [CONTENIDO]="TEXTOS.AlDar"></ng-alert>
                    </div>
                  </div>
                  }
                </div>
              </div>
            </div>
        </div>
        <ng-titulo titulo="Datos del establecimiento"></ng-titulo>
        <div class="row">
            <div class="col-md-8"></div>
            <div class="col-md-4 d-flex justify-content-end">
                <button
                    type="button"
                    class="btn btn-primary"
                    (click)="toggleFormControls()"
                    [disabled]="esFormularioSoloLectura"
                    >
                    Seleccionar establecimiento
                </button>

            </div>
        </div>
        <div class="row">
            <div class="col-md-4">
                <div class="form-group">
                  <label class="form-label" for="rfcResponsableSanitario">RFC del responsable sanitario:</label>
                  <input
                    class="form-control"
                    id="rfcResponsableSanitario"
                    placeholder=""
                    type="text"
                    formControlName="rfcResponsableSanitario"
                    (change)="setValoresStore(forma,'rfcResponsableSanitario', 'setRfcResponsableSanitario')"
                  />
                </div>
            </div>
            <div class="col-md-8">
                <div class="form-group">
                  <label class="form-label" for="denominacion">Denominación o razón social*:</label>
                  <input
                    class="form-control"
                    id="denominacion"
                    placeholder=""
                    type="text"
                    formControlName="denominacion"
                    (change)="setValoresStore(forma,'denominacion', 'setDenominacion')"
                  />
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4">
                <div class="form-group">
                  <label class="form-label" for="correo">Correo electrónico*:
                      <span class="bi bi-question-circle-fill fs-4 m-1" title="ejemplo@dominio.com" data-bs-toggle="tooltip"></span>
                  </label>
                  <input
                    class="form-control"
                    id="correo"
                    placeholder=""
                    type="text"
                    formControlName="correo"
                    (change)="setValoresStore(forma,'correo', 'setCorreo')"
                  />
                </div>
            </div>
        </div>
    </form>
    <app-domicillo></app-domicillo>
    <app-manifiestos></app-manifiestos>
    <app-representante-legal></app-representante-legal>
</div>
  @if (nuevaNotificacion) {
<section>
  <lib-notificaciones [notificacionInput]="nuevaNotificacion" >
  </lib-notificaciones>
</section>
}
