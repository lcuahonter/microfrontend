
<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Datos de la solicitud</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(3)">Terceros relacionados</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(4)">Pago de derechos</a>
            </li>
            <li [ngClass]="indice === 5 ? 'active' : ''">
                <a data-toggle="tab" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(5)">Tramites Asociados</a>
            </li>
            
        </ul>
        <ng-container>
            @switch (indice) {
                @case(1) {
                    <solicitante></solicitante>
                }              
                @case (2) {
                    <app-datos-de-la-solicitud [idProcedimiento]="idProcedimiento" [isContinuarTriggered]="isContinuarTriggered" (formValidityChange)="onFormValidityChange($event)" (tipoTramiteChange)="tipoTramite = $event"></app-datos-de-la-solicitud>
                }
                @case(3) {
                    <app-terceros-relacionados [idProcedimiento]="idProcedimiento" [isContinuarTriggered]="isContinuarTriggered" [tipoTramite]="tipoTramite"></app-terceros-relacionados>
                }
               
                @case(4) {
                   <app-pago-de-derecho [idProcedimiento]="idProcedimiento"></app-pago-de-derecho>
                }

                @case (5) {
                    <app-tramites-asociados></app-tramites-asociados>
                }
            }
        </ng-container>
    </div>
</div>
