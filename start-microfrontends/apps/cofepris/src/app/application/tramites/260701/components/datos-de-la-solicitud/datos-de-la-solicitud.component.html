<div class="container">
  <form [formGroup]="forma">
    <div class="row mt-5">
      <div class="col-md-12">
        <div class="panel-group ficha-collapse" id="accordion">
          <div class="panel panel-default">
            <div class="panel-heading" (click)="mostrar_colapsable()" tabindex="0">
              <p class="panel-title">
                Opciones de pre-llenado de Solicitud
              </p>
              <button type="button" class="collpase-button collapsed" [disabled]="esFormularioSoloLectura"></button>
            </div>
            @if(colapsable){
            <div class="panel-collapse collapse in" id="panel-01">
              <div class="panel-body">
                <ng-alert [CONTENIDO]="TEXTOS.AlDar"></ng-alert>

                <div class="row">
                  <div class="d-flex justify-content-end mb-2">
                    <button type="button" class="btn btn-primary" [disabled]="esFormularioSoloLectura">
                      Copiar datos en una Nueva Solicitud
                    </button>
                  </div>
                </div>
              </div>

            </div>
            }
          </div>
        </div>
      </div>
    </div>
    <div class="row mt-5">
      <h6>Seleccione el tipo de operación que desea realizar*:</h6>
      <div class="col-md-8">
        <div class="d-flex justify-content-between">
          <app-input-radio [radioOptions]="radioOpcions" [selectedValue]="valorSeleccionado"
            (valueChange)="cambiarRadio($event)" formControlName="tipoOperacion" id="tipoOperacion"
            [layout]="'horizontal'" (change)="setValoresStore(forma, 'tipoOperacion', 'setTipoOperacion')">
          </app-input-radio>
        </div>
        <div class="form-group">
          <label for="exampleFormControlTextarea1" class="form-label">Justificación*:</label>
          <textarea class="form-control h-100 ovr-y" [ngClass]="{'disable-class': esFormularioSoloLectura}"
            formControlName="justificacion" [readonly]="esFormularioSoloLectura" id="exampleFormControlTextarea1"
            rows="6"></textarea>
        </div>
      </div>
    </div>
    <ng-titulo titulo="Datos del establecimiento"></ng-titulo>
    <div class="row">
      <div class="col-md-8"></div>
      <div class="col-md-4 d-flex justify-content-end">
        <button type="button" class="btn btn-primary" (click)="toggleFormControls()"
          [disabled]="esFormularioSoloLectura">
          Seleccionar establecimiento
        </button>

      </div>
    </div>
    <div class="row">
      <div class="col-md-8">
        <div class="form-group">
          <label class="form-label" for="denominacionORazonSocial">Denominación o razón social*:</label>
          <input class="form-control" id="denominacionORazonSocial" placeholder="" type="text"
            formControlName="denominacionORazonSocial" maxlength="100"
            (change)="setValoresStore(forma, 'denominacionORazonSocial', 'setDenominacionORazonSocial')" />
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group">
          <label class="form-label" for="correoElectronico">Correo electrónico*: 
              <span class="bi bi-question-circle-fill" tooltip="ejemplo@dominio.com" placement="top"></span>
          </label>
          <input class="form-control" id="correoElectronico" placeholder="" type="text"
            formControlName="correoElectronico" maxlength="320"
            (change)="setValoresStore(forma, 'correoElectronico', 'setCorreoElectronico')" />
        </div>
      </div>
    </div>
  </form>
  <app-domicillo-del></app-domicillo-del>
  <app-manifiestos></app-manifiestos>
  <app-representante-legal></app-representante-legal>
</div>

@if (nuevaNotificacion) {
  <section>
    <lib-notificaciones [notificacionInput]="nuevaNotificacion" (confirmacionModal)="eliminarPedimento($event)">
    </lib-notificaciones>
  </section>
}
