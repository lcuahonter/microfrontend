<ng-titulo titulo="Manifiestos y declaraciones"></ng-titulo>
<ng-alert [CONTENIDO]="mensaje"></ng-alert>
<form [formGroup]="manifiestos">
    <div class="form mt-5">
        <div class="row">
            <div class="col-md-12">
                <label class="control-label" for="buscar">Los datos o anexos pueden contener información confidencial ¿Está de acuerdo en hacerlos públicos?*:</label>
                <app-input-radio
                    [radioOptions]="radioOpcions"
                    [selectedValue]="valorSeleccionado"
                    (valueChange)="cambiarRadio($event)"
                    id="cumplimiento"
                    [layout]="'horizontal'"
                    formControlName="cumplimiento"
                    (change)="setValoresStore(manifiestos,'cumplimiento', 'setCumplimiento')">
                </app-input-radio>
            </div>
          </div>
    </div>
</form>
