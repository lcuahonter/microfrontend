<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h2 class="fw-bold">{{titulo}}</h2>
            </div>
              @if (isPeligro) {
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
    }
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
              <app-paso-uno  #pasoUnoRef [isContinuarTriggered]="isContinuarTriggered"></app-paso-uno>
            }
            @case (2) {
            <app-paso-carga-documento [idSolicitud]="guardarIdSolicitud" [idTipoTRamite]="'260701'"
                [cargaArchivosEvento]="cargarArchivosEvento" (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
                (reenviarCargaRealizada)="cargaRealizada($event)"
                (cargaEnProgreso)="onCargaEnProgreso($event)"></app-paso-carga-documento>
            } @case (3) {
            <paso-firma [idSolicitud]="guardarIdSolicitud" [procedure]="260701"
                [procedureUrl]="'permiso-certificados/registrarSolicitudIP'"></paso-firma>
            }
            }
            <btn-continuar [datos]="datosPasos"  [dePadre]="true"
 (continuarEvento)="getValorIndice($event)">
            </btn-continuar>
            @if (indice === 1) {
            <ng-alert [CONTENIDO]="TEXTOS.Aviso" [CUSTOMECLASS]="infoAlert"></ng-alert>
            }
        </div>
    </div>
</div>
