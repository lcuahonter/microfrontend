

<div class="Page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>{{msgData}}</h1>
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
        <app-paso-uno-pages></app-paso-uno-pages>
            }
            @case (2) {
               <app-paso-dos></app-paso-dos>
            }
            @case (3) {
                 <app-paso-tres></app-paso-tres>
            }}
        </div>
        <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
        @if (indice === 1) {
            <ng-alert [CONTENIDO]="TEXTOS.Aviso" [CUSTOMECLASS]="infoAlert"></ng-alert>
        }
    </div>

</div>
