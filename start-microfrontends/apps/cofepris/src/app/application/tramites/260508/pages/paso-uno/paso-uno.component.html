<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          role="button"
          tabindex="0"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          role="button"
          tabindex="2"
          >Datos de la solicitud</a
        >
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(3)"
          (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)"
          role="button"
          tabindex="3"
          >Terceros relacionados</a
        >
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(4)"
          (keydown.enter)="seleccionaTab(4)"
          (keydown.space)="seleccionaTab(4)"
          role="button"
          tabindex="4"
          >Pago de derechos</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante #Solicitante></solicitante>
      } @case (2) { 
      <app-datos-solicitud #DatosSolicitudComponent [tieneUsoEspecifico]="tieneUsoEspecifico" [isContinuarTriggered]="isContinuarTriggered"></app-datos-solicitud>
      } @case (3) {
      <app-terceros-relacionados-fabricante #TercerosRelacionadosFabricanteComponent [isContinuarTriggered]="isContinuarTriggered"></app-terceros-relacionados-fabricante>
      } @case (4) {
      <app-pago-derechos #PagoDerechosComponent [isContinuarTriggered]="isContinuarTriggered"></app-pago-derechos>
      } }
    </ng-container>
  </div>
</div>
