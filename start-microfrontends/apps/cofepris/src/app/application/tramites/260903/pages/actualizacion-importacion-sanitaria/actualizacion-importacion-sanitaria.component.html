<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Modificación del permiso sanitario de importación de insumos para la salud de materias primas con
                    registro sanitario</h1>
            </div>
            <div class="col-12">
                @if (esFormaValido) {
                <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="infoError"></ng-alert>
              }
            </div>
             <ng-container *ngIf="indice === 2"> </ng-container>
            <app-wizard #WizardComponent [listaPasos]="pantallasPasos"></app-wizard>
        </div>

        <div class="row">
    @switch (indice) { @case (1) {
    <app-datos-260903 [confirmarSinPagoDeDerechos]="confirmarSinPagoDeDerechos" #PasoUnoComponent></app-datos-260903>
    } @case (2) {
    <app-paso-carga-documento 
    [idSolicitud]="storeData.idSolicitud"
    [idTipoTRamite]="idTipoTRamite"
    [cargaArchivosEvento]="cargarArchivosEvento"
    (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
    (reenviarCargaRealizada)="cargaRealizada($event)"
    (cargaEnProgreso)="onCargaEnProgreso($event)"
    (enBlancoObligatoria)="onBlancoObligatoria($event)"
    ></app-paso-carga-documento>
    } @case (3) {
     <paso-firma [idSolicitud]="storeData.idSolicitud" [procedure]="260903" [procedureUrl]="'actualizacion-importacion/solictud'"></paso-firma>

    } }

 <div class="row">
      <div class="col-md-12">
        @if (indice !== 2) {
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" (anteriorEvento)="getValorIndice($event)"></btn-continuar>
        } @else {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
            type="button"
            class="btn btn-default"
            (click)="anterior()"
            *ngIf="seccionCargarDocumentos"
          >
            Anterior
          </button>

          
           @if(isSaltar) {
          <button
            type="button"
            class="btn btn-default ms-3"
            (click)="saltar()"
          >
            Saltar
          </button>
        }

          <button
            class="btn btn-primary ms-3"
            (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
            [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)"
          >
            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
          </button>
        </div>
        }
      </div>
    </div>

  </div>
  @if(indice === 1) {
    <div class="mt-5">
      <div class="mt-5">
        <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
      </div>
    </div>
    }
        
    </div>

    @if(mostrarAlerta){
    <section>
      <lib-notificaciones *ngIf="mostrarAlerta && !requiresPaymentData" [notificacionInput]="seleccionarFilaNotificacion" (confirmacionModal)="cerrarModal($event)">
      </lib-notificaciones>
    </section>
    }
</div>
