<div class="container">
    <ng-titulo titulo="Datos generales del solicitante" />
    <form [formGroup]="solicitudForm">
        <div class="row">
            <div class="col-md-4">
                <label class="form-label" for="rfc">RFC:<span class="bi bi-question-circle-fill fs-4 m-1" title="Title"
                        ata-bs-toggle="tooltip"></span>
                </label>
                <input type="text" class="form-control" id="rfc" formControlName="rfc">
            </div>

            <div class="col-md-8">
                <label class="form-label" for="denominacion">Denominación o razón social:</label>
                <input type="text" class="form-control" id="denominacion" formControlName="denominacion">
            </div>

            <div class="col-md-12">
                <label class="form-label" for="actividad-economica">Actividad económica preponderante:</label>
                <input type="text" class="form-control" id="actividad-economica" formControlName="actividadEconomica">
            </div>

            <div class="col-md-4">
                <label class="form-label" for="correo-electronico">Correo electrónico:</label>
                <input type="text" class="form-control" id="correo-electronico" formControlName="correoElectronico">
            </div>
        </div>

        <ng-titulo titulo="Domicilio fiscal del solicitante" />

        <div class="row">
            <div class="col-md-4">
                <label class="form-label" for="pais">País:
                </label>
                <input type="text" class="form-control" id="pais" formControlName="pais">
            </div>

            <div class="col-md-8">
                <label class="form-label" for="códigoPostal:">Código postal:</label>
                <input type="text" class="form-control" id="códigoPostal" formControlName="codigoPostal">
            </div>

            <div class="col-md-12">
                <label class="form-label" for="estado">Estado:</label>
                <input type="text" class="form-control" id="estado" formControlName="estado">
            </div>

            <div class="col-md-4">
                <label class="form-label" for="municipio-alcaldía">Municipio o alcaldía:</label>
                <input type="text" class="form-control" id="municipio-alcaldía" formControlName="municipioAlcaldia">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="localidad">Localidad:</label>
                <input type="text" class="form-control" id="localidad" formControlName="localidad">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="Colonia">Colonia:</label>
                <input type="text" class="form-control" id="Colonia" formControlName="colonia">
            </div>
            <div class="col-md-8">
                <label class="form-label" for="calle">Calle:</label>
                <input type="text" class="form-control" id="calle" formControlName="calle">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="número-exterior">Número exterior:</label>
                <input type="text" class="form-control" id="número-exterior:" formControlName="numeroExterior">
            </div>
            <div class="col-md-4">
                <label class="form-label" for="número-interior:">Número interior:</label>
                <input type="text" class="form-control" id="número-interior:" formControlName="numeroInterior">
            </div>
            <div class="col-md-1">
                <label class="form-label" for="lada">Lada:</label>
                <input type="text" class="form-control" id="lada" formControlName="lada">
            </div>
            <div class="col-md-3">
                <label class="form-label" for="teléfono">Teléfono:</label>
                <input type="text" class="form-control" id="teléfono" formControlName="telefono">
            </div>

        </div>
        <ng-titulo titulo=" Folio original" />
        <div class="row">
            <div class="col-md-8">
                <label class="form-label" for="folio">Folio:
                </label>
                <input type="text" class="form-control" id="folio" formControlName="folio">
            </div>
        </div>
    </form>
</div>
