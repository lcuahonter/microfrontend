<div class="container mt-5">
    <div class="row">
        <div class="col-md-6">
          <h2>Desistimiento</h2>
        </div>
        <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
      </div>
      <div class="row">
        @switch (indice) { 
        @case (1) {
          <paso-uno></paso-uno>
        } @case (2) {
    <app-paso-carga-documento [idSolicitud]="idSolicitud" [idTipoTRamite]="'261702'"
      [cargaArchivosEvento]="cargarArchivosEvento" (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
      (reenviarCargaRealizada)="cargaRealizada($event)"
      (cargaEnProgreso)="onCargaEnProgreso($event)"></app-paso-carga-documento>
    } @case (3) {
    <paso-firma [idSolicitud]="idSolicitud" [procedure]="261702"
      [procedureUrl]="'retiros-cofepris/pantallas'"></paso-firma>
    }
       }
      </div>
     <div class="row">
    <div class="col-md-12">
      @if (indice !== 2) {
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
      } @else {
      <div class="mt-5 mb-3 d-flex justify-content-end">
        <button
          type="button"
          class="btn btn-default"
          (click)="anterior()"
          *ngIf="seccionCargarDocumentos"
        >
          Anterior
        </button>

        @if(isSaltar) {
        <button
          type="button"
          class="btn btn-default ms-3"
          (click)="saltar()"
        >
          Saltar
        </button>
        }

        <button
          class="btn btn-primary ms-3"
          (click)="
            seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
          "
          [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)"
        >
          {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
        </button>
      </div>
      }
    </div>
  </div>

    @if (indice === 1) {
      <div class="mt-5">
        <ng-alert [CONTENIDO]="avisoPrivacidadAlert"></ng-alert>
      </div>
    }
</div>
