<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Datos de la
          solicitud</a>
      </li>
    </ul>
    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante #Solicitante></solicitante>
      } @case (2) {
         @if(esDatosRespuesta){
      <app-aduaneras-informaciones #AduanaInformacionesComponent [isContinuarTriggered]="isContinuarTriggered"></app-aduaneras-informaciones>
      <app-represtantante #RepresentanteComponent [isContinuarTriggered]="isContinuarTriggered"></app-represtantante>
      
      }
    } }
    </ng-container>
  </div>
</div>
