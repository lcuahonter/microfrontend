<div class="page">
  <div class="container">
    <div class="row">
      @if(indice === 1){
      <div class="col-md-8">
        <h1>Aviso de modificación de aduana</h1>
      </div>
      <div *ngIf="isPeligro" class="alert alert-danger text-center" role="alert" [innerHTML]="textoPeligro">
        {{textoPeligro}}
      </div>
      }
      @if(indice === 2){
      <div class="col-md-12">
        <h1>Cargar archivos</h1>
      </div>
      <div class="col-md-12">
        <ng-alert class="text-center" [CONTENIDO]="MSG_REGISTRO_EXITOSO(guardarIdSolicitud)"></ng-alert>
      </div>
      }
      @if(indice === 3){
      <div class="col-md-12">
        <h1>Firmar</h1>
      </div>
      }

      <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-pantalla-datos #datosComponentRef [isContinuarTriggered]="isContinuarTriggered"></app-pantalla-datos>
      } @case (2) {
      <app-paso-carga-documento [idSolicitud]="guardarIdSolicitud" [idTipoTRamite]="'260605'"
        [cargaArchivosEvento]="cargarArchivosEvento" (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
        (reenviarCargaRealizada)="cargaRealizada($event)" [showInstrucciones]="true" [showTituloOpcional]="false"
        (cargaEnProgreso)="onCargaEnProgreso($event)"></app-paso-carga-documento>
      } @case (3) {
      <paso-firma [idSolicitud]="guardarIdSolicitud" [procedure]="260605"
        [procedureUrl]="'aviso-de-modificacion-module/datos-de-la-solicitud'"></paso-firma>
      }}

      <div class="row">
        <div class="col-md-12">
          @if (indice === 1) {
          <btn-continuar [datos]="datosPasos" [dePadre]="true"
            (continuarEvento)="getValorIndice($event)"></btn-continuar>
          }
          @if (indice === 2) {
          <div class="mt-5 mb-3 d-flex justify-content-end">
            <button type="button" class="btn btn-default" (click)="anterior()">
              Anterior
            </button>

            <button class="btn btn-primary ms-3" (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
              [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)">
              {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
            </button>
          </div>
          }

          @if (indice === 3){
          <div class="mt-5 mb-3 d-flex justify-content-end">
            <button type="button" class="btn btn-default  ms-3" (click)="anterior()">
              Anterior
            </button>
          </div>
          }


        </div>
      </div>
    </div>
  </div>
</div>
