<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Modificación del permiso sanitario de importación de insumos para la salud de dispositivos médicos para uso médico</h1>
            </div>
            
            @if (esFormaValido) {
                <div class="col-12">
                    <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger text-center'"></ng-alert>
                </div>
            }
            
            <app-wizard #wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
                @case (1) {
                   <app-datos-260914 #pasoUno [confirmarSinPagoDeDerechos]="confirmarSinPagoDeDerechos"></app-datos-260914> 
                }
                @case (2) {
                    <app-paso-carga-documento
                        [idSolicitud]="storeData.idSolicitud"
                        [idTipoTRamite]="'260914'"
                        [cargaArchivosEvento]="cargarArchivosEvento"
                        (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
                        (reenviarCargaRealizada)="cargaRealizada($event)"
                        (cargaEnProgreso)="onCargaEnProgreso($event)"
                        (enBlancoObligatoria)="onBlancoObligatoria($event)"
                    ></app-paso-carga-documento>
                 }
                 @case (3) {
                      <paso-firma [idSolicitud]="storeData.idSolicitud" [procedure]="260914" [procedureUrl]="'enmienda-permiso-sanitario/solictud'"></paso-firma>
                 }
                }
        </div>
        <div class="row">
            <div class="col-md-12">
                @if (indice !== 2) {
            <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
                } @else {
                <div class="mt-5 mb-3 d-flex justify-content-end">
                <button
                    type="button"
                    class="btn btn-default"
                    (click)="anterior()"
                    *ngIf="seccionCargarDocumentos"
                >
                    Anterior
                </button>

                
                @if(isSaltar) {
                <button
                    type="button"
                    class="btn btn-default ms-3"
                    (click)="saltar()"
                >
                    Saltar
                </button>
                }

                <button
                    class="btn btn-primary ms-3"
                    (click)="
                    seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
                    "
                    [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)"
                >
                    {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
                </button>
                </div>
                }
            </div>
        </div>
    </div>
</div>

@if(mostrarAlerta){
    <section>
        <lib-notificaciones *ngIf="mostrarAlerta && !requiresPaymentData" [notificacionInput]="seleccionarFilaNotificacion" (confirmacionModal)="cerrarModal($event)">
        </lib-notificaciones>
    </section>
}
