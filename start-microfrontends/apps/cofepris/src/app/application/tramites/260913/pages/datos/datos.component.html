<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Datos de la solicitud</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Terceros Relacionados</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(4)" (click)="seleccionaTab(4)">Pago de derechos</a>
            </li>
            <li [ngClass]="indice === 5 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(5)" (click)="seleccionaTab(5)">Tramites asociados</a>
            </li>
            </ul>
        <ng-container>
            @switch (indice) {
                @case(1) {
                    <solicitante [tabindex]="1"></solicitante>
                }              
                @case (2) {
                    <app-datos-de-la-solicitud-modificacion [tramiteID]="tramiteID"></app-datos-de-la-solicitud-modificacion>
                }
                @case(3) {
                    <app-terceros-relacionados-fabricante 
                        [programTitle]="true"
                        [nuevaTablaColumn]="nuevaColumna"
                        [tieneTablaNuevaColumna]="true">
                    </app-terceros-relacionados-fabricante>
                }
                @case (4) {
                    <app-pago-de-derechos-entrada></app-pago-de-derechos-entrada>  

                }
                @case(5) {

                    <app-tramites-asociados-seccion></app-tramites-asociados-seccion>
                }
                
                

            }
        </ng-container>
    </div>
</div>
