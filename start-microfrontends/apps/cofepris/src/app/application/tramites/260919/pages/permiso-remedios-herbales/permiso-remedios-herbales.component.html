<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h1>Modificación del permiso sanitario de importación de remedios herbolarios</h1>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>

    </div>

    <div class="row">
      @switch (indice) {
      @case (1) {
      <app-paso-uno></app-paso-uno>
      }
      @case (2) {
      <app-paso-dos></app-paso-dos>
      }
      @case (3) {
      <app-paso-tres></app-paso-tres>
      }
      }

      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>
  </div>
</div>
