<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Modificación del permiso sanitario de importación de insumos para la salud de dispositivos médicos para donación</h1>
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
                @case (1) {
                   <app-datos-260916></app-datos-260916> 
                }
                @case (2) {
                    <app-paso-dos></app-paso-dos>
                 }
                 @case (3) {
                      <app-paso-tres></app-paso-tres>
                 }
                }
             <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
        </div>
    </div>
</div>
