<div class="container">
  <div class="row">
    <div class="col-md-6">
      <h1>{{ tituloMensaje || null }}</h1>
    </div>
         @if(MENSAJE_DE_ERROR){
    <ng-alert
      [CONTENIDO]="MENSAJE_DE_ERROR"
      [CUSTOMECLASS]="infoAlert"
    ></ng-alert>
    }
    <ng-container *ngIf="indice === 2"> </ng-container>
    <app-wizard [listaPasos]="pasos"></app-wizard>
  </div>

  <div class="row">
    @switch (indice) { @case (1) {
    <app-paso-uno #PasoUnoComponent></app-paso-uno>
    } @case (2) {
    <app-paso-dos></app-paso-dos>
    } @case (3) {
    <app-paso-tres></app-paso-tres>

    } }

    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    <div class="row">
      <ng-alert [CONTENIDO]="avisoContrnido"></ng-alert>
    </div>
  </div>
</div>
@if(mostrarAlerta){
<section>
  <lib-notificaciones [notificacionInput]="seleccionarFilaNotificacion" (confirmacionModal)="mostrarAlerta = false">
  </lib-notificaciones>
</section>
}
