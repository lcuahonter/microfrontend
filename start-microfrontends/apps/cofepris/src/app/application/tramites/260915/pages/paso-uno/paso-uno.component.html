<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Datos de la solicitud</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Terceros relacionados</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)"
          (keydown.space)="seleccionaTab(4)" role="button" tabindex="4">Pago de derechos</a>
      </li>
      <li [ngClass]="indice === 5 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(5)" (keydown.enter)="seleccionaTab(5)"
          (keydown.space)="seleccionaTab(5)" role="button" tabindex="5">Tramites Asociados</a>
      </li>
    </ul>

    <ng-container>
      <solicitante [tabindex]="1" [hidden]="indice !== 1"#Solicitante></solicitante>
      
          <app-datos-del-solicitud-modificacion 
          [idProcedimiento]= "idProcedimiento" 
          #DatosDelSolicitudModificacionComponent
           [mostrarBotonCopiarDatos]="false"
            [mostrarNumeroYFecha]="false" 
            [showAifaCheckbox]="false" 
            (tipoTramiteChange)="tipoTramite = $event" 
            [hidden]="indice !== 2"></app-datos-del-solicitud-modificacion>
          <app-manifiestos [hidden]="indice !== 2"></app-manifiestos>
          <app-representante-legal 
           #RepresentanteLegalComponent 
          [hidden]="indice !== 2"
          [idProcedimiento]= "idProcedimiento "
          [tipoTramite]="tipoTramite" 
           (datasolicituActualizar)="datasolicituActualizar($event)">
          </app-representante-legal>
       
    
          <app-terceros-relacionados-vista [hidden]="indice !== 3"
          #TercerosRelacionadosVistaComponent
          [tipoTramite]="tipoTramite" ></app-terceros-relacionados-vista>
     
    
          <app-pago-de-derechos-contenedora #pagoDeDerechosContenedoraComponent [tipoTramite]="tipoTramite" [hidden]="indice !== 4"></app-pago-de-derechos-contenedora>
      
          <app-tramites-asociados-seccion [hidden]="indice !== 5" [idProcedimiento]="idProcedimiento" [folio]="'0402600900520254001000006'"></app-tramites-asociados-seccion>       
        
      
    </ng-container>
  </div>
</div>
