

<!-- Renderiza el componente compartido solo una vez, pasando todos los datos de las tablas y enlaces de eventos -->
<app-terceros-relacionados
	[fabricanteTablaDatos]="fabricanteTablaDatos"
	[destinatarioFinalTablaDatos]="destinatarioFinalTablaDatos"
	[proveedorTablaDatos]="proveedorTablaDatos"
	[facturadorTablaDatos]="facturadorTablaDatos"
	(fabricanteSeleccionadoDatos)="onFabricanteSeleccionado($event)"
	(destinatarioSeleccionadoDatos)="onDestinatarioSeleccionado($event)"
	(proveedorSeleccionadoDatos)="onProveedorSeleccionado($event)"
	(facturadorSeleccionadoDatos)="onFacturadorSeleccionado($event)"
	[estaOculto]="botonDesactivarParaProrrogar"
	[idProcedimiento]="idProcedimiento"
	[tramiteID]="tramiteID"
	[formularioDeshabilitado]="esFormularioSoloLectura || isFabricanteTablaDatosDisabled || isDestinatarioFinalTablaDatosDisabled || isProveedorTablaDatosDisabled || isFacturadorTablaDatosDisabled"
></app-terceros-relacionados>
