<label class="mt-5">Mercancías*:</label>
<app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion" [datos]="mercanciasDatas"
  [configuracionTabla]="configuracionTabla" [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"></app-tabla-dinamica>
<ng-container>
  
  <div class="table-container mt-5">
    <div class="col-md-12 mt-5 d-flex justify-content-end">
      <button type="button" class="btn btn-danger ms-3" [disabled]="esFormularioSoloLectura">Eliminar</button>
      <button type="button" class="btn btn-primary ms-3" [disabled]="esFormularioSoloLectura"> Modificar </button>
    </div>
  </div>
</ng-container>
<form [formGroup]="aduanaFormulario">
  <div class="row">
    <div class="col-md-4">
      <app-catalogo-select formControlName="aduanas" [label]="'Aduana'" [isDisabled]="esFormularioSoloLectura" [catalogo]="aduanaData"></app-catalogo-select>
    </div>
  </div>
</form>
