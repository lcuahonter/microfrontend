<ng-titulo titulo="Representante legal"></ng-titulo>
<br>
<form [formGroup]="domicilioEstablecimiento">
    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="representanteLegalRFCPostal">RepresentanteLegalRFC*:
            </label>
            <input [ngClass]="isValid('representanteLegalRFC') ? 'required' : ''" type="text" class="form-control" id="representanteLegalRFCPostal" formControlName="representanteLegalRFC" (change)="setValoresStore(domicilioEstablecimiento,'representanteLegalRFC')">
            <div  *ngIf="domicilioEstablecimiento?.get('representanteLegalRFC')?.invalid && domicilioEstablecimiento?.get('representanteLegalRFC')?.touched" class="text-danger">
                Favor de seleccionar el representanteLegalRFC.
            </div>
        </div>

        <div class="col-md-8">
            <label class="form-label" for="buscar :">Buscar :*</label>
            <input [ngClass]="isValid('buscar') ? 'required' : ''" type="text" class="form-control" id="buscar " formControlName="buscar" (change)="setValoresStore(domicilioEstablecimiento,'buscar')">
            <div  *ngIf="domicilioEstablecimiento?.get('buscar')?.invalid && domicilioEstablecimiento?.get('buscar')?.touched" class="text-danger">
                Favor de seleccionar el buscar.
            </div>
        </div>

        <div class="col-md-12">
            <label class="form-label" for="representanteLegalNombre">Nombre o Razón Social*:</label>
            <input  [ngClass]="isValid('representanteLegalNombre') ? 'required' : ''" type="text" class="form-control" id="representanteLegalNombre"
             formControlName="representanteLegalNombre" (change)="setValoresStore(domicilioEstablecimiento,'representanteLegalNombre')">
            <div  *ngIf="domicilioEstablecimiento?.get('representanteLegalNombre')?.invalid && domicilioEstablecimiento?.get('representanteLegalNombre')?.touched" class="text-danger">
                Favor de seleccionar el representanteLegalNombre.
            </div>
        </div>

        <div class="col-md-4">
            <label class="form-label" for="apellidoPaterno">Apellido paterno: </label>
            <input type="text" class="form-control" id="apellidoPaterno" formControlName="representanteLegalApPaterno" (change)="setValoresStore(domicilioEstablecimiento,'apellidoPaterno')">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="apellidoMaterno">Apellido materno: </label>
            <input type="text" class="form-control" id="apellidoMaterno" formControlName="representanteLegalApMaterno" (change)="setValoresStore(domicilioEstablecimiento,'representanteLegalApMaterno')">
        </div>
    </div>
</form>
