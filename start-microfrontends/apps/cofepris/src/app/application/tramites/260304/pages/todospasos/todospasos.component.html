<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>{{titulo}}</h1>
                @if(indice === 2) {
                    <ng-alert [CONTENIDO]="TEXTOS.Importante"></ng-alert>
                }
            </div>
            <div class="col-12">
	          @if (esFormaValido) {
	          <div
	            class="alert alert-info alert-danger"
	            [innerHTML]="formErrorAlert"
	          ></div>
	          }
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
                @case (1) {
                    <app-paso-uno></app-paso-uno>
                }
                @case (2) {
                    <app-paso-carga-documento 
                        [idSolicitud]="storeData.idSolicitud"
                        [idTipoTRamite]="'260304'"
                        [cargaArchivosEvento]="cargarArchivosEvento"
                        (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
                        (reenviarCargaRealizada)="cargaRealizada($event)"
                        (cargaEnProgreso)="onCargaEnProgreso($event)"
                        (enBlancoObligatoria)="onBlancoObligatoria($event)"
                    ></app-paso-carga-documento>
                }
                @case (3) {
                    <paso-firma [idSolicitud]="storeData.idSolicitud" [procedure]="260304" [procedureUrl]="'exportacion-medicamentos-contengan/contenedor-de-pasos'"></paso-firma>
                }
            }
            <div class="row">
                <div class="col-md-12">
                @if (indice !== 2) {
                <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
                } @else {
                <div class="mt-5 mb-3 d-flex justify-content-end">
                    <button type="button" class="btn btn-default" (click)="anterior()" *ngIf="seccionCargarDocumentos">
                    Anterior
                    </button>

                    <button class="btn btn-primary ms-3" (click)="
                    seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
                    "
                    [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)">
                    {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
                    </button>
                </div>
                }
                </div>
            </div>
    
        </div>
    </div>
</div>
