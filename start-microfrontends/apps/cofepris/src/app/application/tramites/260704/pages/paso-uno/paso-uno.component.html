<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Datos de la Solicitud</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Terceros Relacionados</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)" (keydown.space)="seleccionaTab(4)" role="button" tabindex="4">Pago de Derechos</a>
      </li>
      <li [ngClass]="indice === 5 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(5)" (keydown.enter)="seleccionaTab(5)" (keydown.space)="seleccionaTab(5)" role="button" tabindex="5">Trámites Asociados</a>
      </li>
    </ul>
    <ng-container> @switch (indice) { @case (1) { <solicitante [tabindex]="1"></solicitante>
      <form [formGroup]="pasoUnoForm">
        <div class="row">
          <div class="col-md-12 m-5">
            <ng-titulo titulo="N&uacute;mero folio de desistimiento" />
            <div class="row">
              <div class="col-md-8">
                <div class="form-group">
                  <input class="form-control" type="text" id="folioDeDesistimiento" name="folioDeDesistimiento"
                    formControlName="folioDeDesistimiento" [attr.disabled]="true" />
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-12 m-5">
            <ng-titulo titulo="Folio original" />
            <div class="row">
              <label>Folio:</label>
              <div class="col-md-8">
                <div class="form-group">
                  <input class="form-control" type="text" id="folioOriginal" name="folioOriginal"
                    formControlName="folioOriginal" [attr.disabled]="true" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </form> }
      @case (2) {
         @if(esDatosRespuesta){
         <app-contenedor-de-datos-solicitud></app-contenedor-de-datos-solicitud>
          }}
         <!-- <app-datos-de-la-solicitud [tabIndex]="2" [idProcedimiento]="idProcedimiento" [isContinuarTriggered]="isContinuarTriggered" (formValidityChange)="onFormValidityChange($event)"></app-datos-de-la-solicitud>   -->
      @case (3) {
         @if(esDatosRespuesta){ 
          <app-terceros-relacionados-two [idProcedimiento]="idProcedimiento.toString()" [tramiteID]="'260704'" (fabricanteTablaDataChange)="fabricanteTabla($event)" (destinatarioTablaDataChange)="destinatarioTabla($event)"
           ></app-terceros-relacionados-two>

          <!-- <app-terceros-relacionados [tabIndex]="3" [idProcedimiento]="idProcedimiento" [isContinuarTriggered]="isContinuarTriggered"></app-terceros-relacionados> -->
         }}
     @case (4) {
  @if(esDatosRespuesta){ 
      <app-pago-de-derechos-contenedora></app-pago-de-derechos-contenedora>

    <!-- <app-pago-de-derecho [tabIndex]="4" [idProcedimiento]="idProcedimiento" ></app-pago-de-derecho> -->
   } }
     @case (5) { 
       @if(esDatosRespuesta){
         <app-tramites-asociados-seccion 
        
        [idProcedimiento]="idProcedimiento" 
        [folio]="'0402600100420264006000011'">
      </app-tramites-asociados-seccion>
        <!-- <app-tramites-asociados [tabIndex]="5"></app-tramites-asociados>  -->
      } }
    }
    </ng-container>
  </div>
</div>
