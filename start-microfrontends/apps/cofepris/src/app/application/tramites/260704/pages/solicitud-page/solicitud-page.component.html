  <div class="container">
    <div class="row mt-5">
      <div class="col-md-12">
        <h2 >Solicitud de modificación y/o prórroga del permiso previo de productos del tabaco</h2>
        </div>
  @if (isPeligro) {
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
    }
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno #pasoUnoRef [isContinuarTriggered]="isContinuarTriggered" [confirmarSinPagoDeDerechos]="confirmarSinPagoDeDerechos"></app-paso-uno>
      } @case (2) {
      <app-paso-carga-documento [idSolicitud]="storeData.idSolicitud"  [idTipoTRamite]="'260704'"
         [cargaArchivosEvento]="cargarArchivosEvento"
          (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
          (reenviarCargaRealizada)="cargaRealizada($event)"
          (cargaEnProgreso)="onCargaEnProgreso($event)"
          (enBlancoObligatoria)="onBlancoObligatoria($event)">
        </app-paso-carga-documento>
      } @case (3) {
      <paso-firma [idSolicitud]="storeData.idSolicitud" [procedure]="260704"
        [procedureUrl]="'consulta/solicitud'"></paso-firma>
      }

      }

      <!-- <btn-continuar
        [datos]="datosPasos"
        [dePadre]="true"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar> -->

      <div class="row">
    <div class="col-md-12">
      @if (indice !== 2) {
        <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
      } @else {
      <div class="mt-5 mb-3 d-flex justify-content-end">
        <button
          type="button"
          class="btn btn-default"
          (click)="anterior()"
          *ngIf="seccionCargarDocumentos"
        >
          Anterior
        </button>

        @if(isSaltar) {
          <button
            type="button"
            class="btn btn-default ms-3"
            (click)="saltar()"
          >
            Saltar
          </button>
        }

        <button
          class="btn btn-primary ms-3"
          (click)="
            seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
          "
          [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)"
        >
          {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
        </button>
      </div>
      }
    </div>
  </div>
      <!-- <ng-alert [CONTENIDO]="TEXTOS.Aviso" [CUSTOMECLASS]="infoAlert"></ng-alert> -->
    </div>
  </div>

  
@if(mostrarAlerta){
  <section>
    <lib-notificaciones *ngIf="mostrarAlerta && !requiresPaymentData" [notificacionInput]="seleccionarFilaNotificacion" (confirmacionModal)="cerrarModal($event)">
    </lib-notificaciones>
  </section>
}
