<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Datos de la solicitud</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Terceros relacionados</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(4)" (click)="seleccionaTab(4)">Pago de derechos</a>
            </li>
        </ul>
        
        <ng-container>
        <!-- indice = 1 -->
        <solicitante #Solicitante [hidden]="indice !== 1"></solicitante>
        @if (esDatosRespuesta) {
        <!-- indice = 2 -->
        <app-propietario #PropietarioComponent [tramites]="tramites" [idProcedimiento]="idProcedimiento" [hidden]="indice !== 2"></app-propietario>
        <!-- indice = 3 -->
        <app-terceros-relacionados-procedencia [title]="'Destinatario (destino final)*'" [tramites]="tramites" [hidden]="indice !== 3"></app-terceros-relacionados-procedencia>
        <!-- indice = 4 -->
        <app-pago-de-derechos-entrada #PagoDeDerechosEntradaComponent [idProcedimiento]="260401" [tramites]="tramites" [hidden]="indice !== 4"></app-pago-de-derechos-entrada>
        }
        </ng-container>
    </div>
</div>
