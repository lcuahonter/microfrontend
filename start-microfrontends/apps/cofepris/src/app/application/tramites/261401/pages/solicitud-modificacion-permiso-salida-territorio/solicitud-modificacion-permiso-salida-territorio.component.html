<div class="page">
    <div class="container">
      <div class="row">
        <div class="col-md-12 col-12">
          <h2>Solicitud de modificación de permiso de salida del territorio nacional de células y tejidos incluyendo sangre, sus componentes y derivados, así como otros productos de seres humanos</h2>
        </div>
        <app-wizard [listaPasos]="pasosSolicitar"></app-wizard>
      </div>
  
      <div class="row">
        @switch(indice){ @case(1){
        <app-paso-uno></app-paso-uno>
        } @case (2) {
      <carga-documento
        [idSolicitud]="idSolicitudActual.toString()"
        [idTipoTRamite]="'261401'"
        [cargaArchivosEvento]="cargarArchivosEvento"
        (cargaEnProgreso)="onCargaEnProgreso($event)"
        (cargaRealizada)="cargaRealizada($event)"
      ></carga-documento>
      } @case (3) {
      <paso-firma
        [idSolicitud]="idSolicitudActual"
        [procedure]="261401"
        [procedureUrl]="
          'solicitud-modificacion-permiso-salida-territorio/solicitud'
        "
      ></paso-firma>
      } }
        <btn-continuar
          [datos]="datosPasos"
          (continuarEvento)="getValorIndice($event)"
        ></btn-continuar>
        <ng-alert [CONTENIDO]="alert_message" [CUSTOMECLASS]="'alert-info'"></ng-alert>
      </div>
    </div>
  </div>
