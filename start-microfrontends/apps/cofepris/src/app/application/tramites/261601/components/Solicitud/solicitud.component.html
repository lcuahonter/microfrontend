
<form [formGroup]="solicitudForm">
<div class="row">
    <div class="col-md-8">
        <div class="form-group mb-3">
        <label class="form-label" for="foliodeltramite">Folio de trámite:</label>
            <input class="form-control" 
            id="foliodeltramite" 
            type="text"
            [value]="foliodeltramite" 
            [disabled]="true"
            />
      </div>
    </div>
</div> 
<div class="row">
    <div class="col-md-8">
        <div class="form-group mb-3">
        <label class="form-label" for="tipodesolicitud">Tipo de solicitud:</label>
        <textarea class="form-control" id="tipodesolicitud" rows="2" height="50"
        placeholder="" style="height: 100px" [value]="tipodesolicitud"  [disabled]="true"
       ></textarea>
      </div>
    </div>
</div> 
<div class="row">
    <div class="col-md-12">
        <div class="form-group mb-3">
        <label class="form-label" for="detalledelaSolicitud">Detalle de la solicitud de corrección al dictmen*:</label>
        <textarea class="form-control" id="detalledelaSolicitud" rows="2" height="50"
        placeholder="" style="height: 100px" formControlName="detalledelaSolicitud" 
        (change)="setValoresStore(solicitudForm,'detalledelaSolicitud', 'setDetalledelaSolicitud')"
        [disabled]="esFormularioSoloLectura ? true : false"
       ></textarea>
      </div>
    </div>
</div> 
<ng-titulo titulo="Manifiestos y declaraciones" />
<div class="alert alert-info">
  <label style="font-weight: normal">
    <div class="col-md-1 mt-5">
      <input type="checkbox" class="mt-5" formControlName="cumplocon" 
      (change)="setValoresStore(solicitudForm,'cumplocon', 'setCumplocon')"
      [disabled]="esFormularioSoloLectura ? true : false"/>
      <b> *</b>
    </div>
    <div class="col-md-11 mt-4">{{ TEXTOS.TEXTOS_MANIFIESTOS}} </div>
  </label>
</div>
<ng-titulo titulo="Representante legal" />
<div class="row mt-5">
  <div class="col-md-4 mt-2">
    <label class="form-label" for="rfc">RFC*:</label>
    <input class="form-control" type="text" formControlName="rfc" [value]="rfc" 
    (change)="setValoresStore(solicitudForm,'rfc', 'setRfc')"
    [disabled]="esFormularioSoloLectura ? true : false"
    />
  </div>
  <div class="col-md-2 mt-4">
    <button type="button" class="btn btn-primary" (click)="getSolicitudData()"
    [disabled]="esFormularioSoloLectura ? true : false">Buscar</button>
  </div>
</div>
<div class="row mt-5">
    <div class="col-md-4 mt-4">
      <label class="form-label" for="legalRazonSocial">Nombre o Razón Social*:</label>
      <input class="form-control" type="text" formControlName="legalRazonSocial" [value]="legalRazonSocial" 
      (change)="setValoresStore(solicitudForm,'legalRazonSocial', 'setLegalRazonSocial')"
      [disabled]="esFormularioSoloLectura ? true : false"
      />
    </div>
    <div class="col-md-4 mt-4">
      <label class="form-label" for="apellidoPaterno">Apellido paterno*:</label>
      <input class="form-control" type="text" formControlName="apellidoPaterno"[value]="apellidoPaterno" 
      (change)="setValoresStore(solicitudForm,'apellidoPaterno', 'setApellidoPaterno')"
      [disabled]="esFormularioSoloLectura ? true : false"

      />
    </div>
    <div class="col-md-4 mt-4">
      <label class="form-label" for="apellidoMaterno">Apellido materno:</label>
      <input class="form-control" type="text" formControlName="apellidoMaterno" [value]="apellidoMaterno" 
      (change)="setValoresStore(solicitudForm,'apellidoMaterno', 'setApellidoMaterno')"
      [disabled]="esFormularioSoloLectura ? true : false"
      />
    </div>
  </div>
</form>
