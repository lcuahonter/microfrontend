<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Solicitud</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Tramites Asociados</a>
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) { 
        <solicitante [tabindex]="1" #Solicitante></solicitante>
      } 
      @case (2) {
      <app-solicitud [tabindex]="2"></app-solicitud>
      }
      @case (3) {
      <app-tramites-asociados [tabindex]="3"></app-tramites-asociados>
      }
      }
    </ng-container>
  </div>
</div>
