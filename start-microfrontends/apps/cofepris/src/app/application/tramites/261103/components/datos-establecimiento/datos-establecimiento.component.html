<ng-titulo titulo="Datos del establecimiento"></ng-titulo>
 <ng-container *ngIf="!debeEstarDeshabilitado">
<br>
<div class="row mt-5 mb-5">
  <div class="col-md-12 d-flex justify-content-end">
      <button type="button" class="btn btn-default me-3" [disabled]="debeEstarDeshabilitado"> Seleccionar establecimiento </button>
  </div>
</div>
 </ng-container>
<form [formGroup]="datosdelestablecimiento">
  <div class="row mt-5">
    <div class="col-md-4 form-group">
      <label class="form-label" for="motivoDesistimiento"> Denominacion o razon social: </label>
      <textarea formControlName="denominacion" id="motivoDesistimiento" name="motivoDesistimiento" rows="4" cols="50"
        [disabled]="debeEstarDeshabilitado"
        (change)="setValoresStore(datosdelestablecimiento,'denominacion')"></textarea>
    </div>
  </div>
</form>
