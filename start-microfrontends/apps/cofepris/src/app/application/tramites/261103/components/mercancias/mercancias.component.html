<ng-titulo titulo="Mercancias*:"></ng-titulo>
<app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion" [datos]="mercanciasDatas"
  [configuracionTabla]="configuracionTabla" [disableSeleccionTablaCheckBox]="debeEstarDeshabilitado"></app-tabla-dinamica>
<ng-container>
  <div class="row mt-5">
    <label>Mercancías seleccionadas</label>
  </div>
  <div class="table-container mt-5">
    <div class="col-md-12 mt-5 d-flex justify-content-end">
      <ng-container *ngIf="!debeEstarDeshabilitado">
      <button type="button" class="btn btn-danger ms-3" [disabled]="esFormularioSoloLectura">Eliminar</button>
      <button type="button" class="btn btn-primary ms-3" [disabled]="esFormularioSoloLectura"> Modificar </button>
      </ng-container>
    </div>
  </div>
</ng-container>
<form [formGroup]="aduanaFormulario">
  <div class="row">
    <div class="col-md-4">
      <app-catalogo-select formControlName="aduanas" [label]="'Aduana'" [isDisabled]="debeEstarDeshabilitado" [catalogo]="aduanaData"></app-catalogo-select>
    </div>
  </div>
</form>
