<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)">Datos de la solicitud</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)">Terceros relacionados</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)">Pago de derechos</a>
      </li>
      <li [ngClass]="indice === 5 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(5)">Trámites Asociados</a>
      </li>
    </ul>

    <ng-container>
      <solicitante *ngIf="indice === 1" [tabindex]="1"></solicitante>

      <app-contenedor-de-datos-solicitud
  #contenedorDeDatosSolicitudComponent
  [formularioDeshabilitado]="formularioDeshabilitado"
  [hidden]="indice !== 2 || !esDatosRespuesta">
</app-contenedor-de-datos-solicitud>

<app-terceros-relacionados-vista
  #tercerosRelacionadosVistaComponent
  [hidden]="indice !== 3 || !esDatosRespuesta">
</app-terceros-relacionados-vista>

      <app-pago-de-derechos-contenedora
        *ngIf="indice === 4 && esDatosRespuesta"
        #pagoDerechos>
      </app-pago-de-derechos-contenedora>

      <app-tramites-asociados-seccion
        *ngIf="indice === 5 && esDatosRespuesta"
        #TramitesAsociadoComponent
        [idProcedimiento]="idProcedimiento"
        [folio]="'0402600901220254001000004'">
      </app-tramites-asociados-seccion>
    </ng-container>
  </div>
</div>
