<form [formGroup]="Aduana">
  <div class="alert alert-info">
    <label for="filaSeleccion">
      <input formControlName="aduanas" id="filaSeleccion" class="cursor-pointer" type="checkbox"
        aria-label="Seleccionar" [checked]="declaracionEstaMarcado" [disabled]="debeEstarDeshabilitado" />{{manifiestosText}}
    </label>
  </div>
  <app-input-radio [radioOptions]="radioOptions" formControlName="informacionConfidencial"
    (change)="setValoresStore(Aduana,'informacionConfidencial')" [layout]="'horizontal'"></app-input-radio>
</form>
