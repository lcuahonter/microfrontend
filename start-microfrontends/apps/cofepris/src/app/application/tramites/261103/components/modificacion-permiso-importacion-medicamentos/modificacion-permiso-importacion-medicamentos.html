<div class="container">
  <h6 class="mt-4">Seleccione el tipo de operación que desea realizar*:</h6>
  <form [formGroup]="preOperativeForm">
    <div class="row mt-4">
      <div class="col-md-12">
        <app-input-radio [radioOptions]="radioOptions" formControlName="ideGenerica1"
          (change)="setValoresStore(preOperativeForm,'ideGenerica1'); disableGenerical()" [layout]="'horizontal'"></app-input-radio>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-md-12">
        <label for="observaciones">Justificación*:</label>
      </div>
      <div class="col-md-12">
        <textarea formControlName="observaciones" class="w-100" id="motivoDesistimiento" name="motivoDesistimiento" rows="4" cols="50"
          [ngClass]="isValid('motivoDesistimiento') ? 'required' : ''"
          (change)="setValoresStore(preOperativeForm,'observaciones')"></textarea>
        <div *ngIf="preOperativeForm?.get('observaciones')?.invalid && preOperativeForm?.get('observaciones')?.touched"
          class="text-danger">
          Este campo es obligatorio
        </div>
      </div>
    </div>
    <br>
  </form>
</div>
