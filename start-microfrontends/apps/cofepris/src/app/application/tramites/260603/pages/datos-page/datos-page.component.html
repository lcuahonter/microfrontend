<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Datos de la
                    solicitud</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Terceros
                    relacionados</a>
            </li>
        </ul>
        <ng-container>
            @if(esDatosRespuesta){
            <solicitante [tabindex]="1" [hidden]="indice !== 1" #Solicitante></solicitante>
            <app-datos-solicitud #datosSolicitudComponent [hidden]="indice !== 2"></app-datos-solicitud>
            <app-terceros-relacionados-vista #tercerosRelacionadosVistaComponent
                [hidden]="indice !== 3"></app-terceros-relacionados-vista>
            }
        </ng-container>
    </div>
</div>
