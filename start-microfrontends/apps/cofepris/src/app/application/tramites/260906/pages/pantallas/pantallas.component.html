<div class="container mt-5">
  <div class="row">
    <div class="col-md-6">
      <h4>Modificación al permiso sanitario de importación de medicamentos o sus materias primas destinados a maquila</h4>
    </div>
    @if(esFormaValido){
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }
    <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
  </div>
  <div class="row"> 
    @switch (indice) { 
      @case (1) { 
        <app-datos #datosComponent></app-datos> 
      } @case (2) { 
        <app-paso-carga-documento [idSolicitud]="solicitudState.idSolicitud" [idTipoTRamite]="'260906'"
      [cargaArchivosEvento]="cargarArchivosEvento"
      (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
      (reenviarCargaRealizada)="cargaRealizada($event)"
      (cargaEnProgreso)="onCargaEnProgreso($event)"></app-paso-carga-documento>
      }
      @case (3) {
      <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="260906" [procedureUrl]="'certificado/solicitud'"></paso-firma>
      } 
    } 
    <div class="row">
      <div class="col-md-12">
        @if (indice !== 2) {
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
        } @else {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
            type="button"
            class="btn btn-default"
            (click)="anterior()"
            *ngIf="seccionCargarDocumentos"
          >
            Anterior
          </button>

          
           @if(isSaltar) {
          <button
            type="button"
            class="btn btn-default ms-3"
            (click)="saltar()"
          >
            Saltar
          </button>
        }

          <button
            class="btn btn-primary ms-3"
            (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
            [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)"
          >
            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
          </button>
        </div>
        }
      </div>
    </div>
  </div>
  @if(indice === 1) {
    <div class="mt-5">
      <div class="mt-5">
        <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
      </div>
    </div>
    }
</div>
