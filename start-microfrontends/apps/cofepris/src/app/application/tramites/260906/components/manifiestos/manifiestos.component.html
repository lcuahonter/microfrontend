<form [formGroup]="manifiestos">
<div class="col-md-12 mt-4">
  <ng-titulo titulo="Manifiestos y declaraciones" />
  <div class="alert alert-info">
    <label style="font-weight: normal">
      <div class="col-md-1 mt-5">
        <input type="checkbox" class="mt-5" formControlName="manifesto" (change)="setManifesto($event)" id="manifesto" />
        <b> *</b>
      </div>
      <div class="col-md-11 mt-4">{{mensaje}}</div>
    </label>
  </div>
</div>
  <div class="form mt-5">
    <div class="row">
      <div class="col-md-12">
        <label class="form-label" for="">Los datos o anexos pueden contener información confidencial ¿Está de acuerdo en hacerlos públicos?*:</label>
        <app-input-radio [radioOptions]="radioOptions" [isRequired]="true" formControlName="informacionConfidencial" [layout]="'horizontal'" (valueChange)="setInformacionConfidencial($event)"></app-input-radio>
      </div>
    </div>
  </div>
</form>
