<div class="container">
  <h2>Funcionarios</h2>
  <hr class="red" />
  <div class="mb-5">
    <form role="form" [formGroup]="loginForm" (ngSubmit)="login()">
      <div class="form-group">
        <label class="control-label">Certificado (cer):</label>
        <input
          class="form-control"
          [ngClass]="{ 'form-control-error': formUtils.isValidField(loginForm, 'certificate') }"
          accept=".cer"
          type="file"
          formControlName="certificate"
        />
        <small class="form-text form-text-error" *ngIf="formUtils.isValidField(loginForm, 'certificate')">
          {{ formUtils.getFieldError(loginForm, 'certificate') }}
        </small>
      </div>
      <div class="form-group">
        <label class="control-label"> Clave privada (key)</label>
        <input
          class="form-control form-control-error"
          [ngClass]="{ 'form-control-error': formUtils.isValidField(loginForm, 'key') }"
          accept=".key"
          type="file"
          formControlName="key"
        />
        <small class="form-text form-text-error" *ngIf="formUtils.isValidField(loginForm, 'key')">
          {{ formUtils.getFieldError(loginForm, 'key') }}
        </small>
      </div>
      <div class="form-group">
        <label class="control-label">Contraseña de clave privada</label>
        <input
          class="form-control form-control-error"
          [ngClass]="{ 'form-control-error': formUtils.isValidField(loginForm, 'password') }"
          placeholder="Contraseña"
          type="password"
          formControlName="password"
        />
        <small class="form-text form-text-error" *ngIf="formUtils.isValidField(loginForm, 'password')">
          {{ formUtils.getFieldError(loginForm, 'password') }}
        </small>
      </div>
      <button class="btn btn-primary" type="submit">Ingresar</button>
    </form>
  </div>
</div>
