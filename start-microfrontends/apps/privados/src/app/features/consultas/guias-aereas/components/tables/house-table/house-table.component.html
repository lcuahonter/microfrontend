<div class="row">
    <div class="col-md-12 mt-3 text-center">
      <app-table
        title="Guías House"
        [tableData]="tableHousesData"
        [borderedStyle]="true"
        [isLoading]="isLoadingHousesDataTable"
        [hiddenData]="hiddenHousesData"
        [error]="errorHousesData"
        [hasRedirect]="true"
        [hasPagination]="true"
        [textCenterTitleColums]="true"
        [pagination]="pagination()"
        (pageChange)="onHousesPageChange($event)"
        (onRowClicked)="houseSelected($event)"
      />
    </div>
  </div>
