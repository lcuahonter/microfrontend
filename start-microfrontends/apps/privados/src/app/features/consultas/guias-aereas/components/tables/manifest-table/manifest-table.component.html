<div class="row">
    <div class="col-md-12 mt-3 text-center">
        <app-table
          *ngIf="!manifestSelected()"
          title="Manifiestos"
          [tableData]="tableManifestData"
          [borderedStyle]="true"
          [isLoading]="isLoadingManifestDataTable"
          [hiddenData]="hiddenManifestData"
          [error]="errorManifestsData"
          [hasRedirect]="true"
		  [textCenterTitleColums]="true"
          (onRowClicked)="onMasterSelected($event.hiddenData)"
        />

        <ng-container *ngIf="manifestSelected()">
          <app-table
            title="Manifiesto"
            [tableData]="tableManifestSelectedData"
            [borderedStyle]="true"
            [textCenterTitleColums]="true"
            [isLoading]="isLoadingManifestSelectedDataTable"
            [error]="errorManifestsSelectedData"
          />
          <app-table
            title="Guías Master"
            [tableData]="tableMasterData"
            [borderedStyle]="true"
            [isLoading]="isLoadingMasterDataTable"
            [hiddenData]="hiddenMasterData"
            [error]="errorMasterData"
            [textCenterTitleColums]="true"
            [hasRedirect]="true"
            (onRowClicked)="masterSelected($event)"
          />
        </ng-container>
      </div>
  </div>
