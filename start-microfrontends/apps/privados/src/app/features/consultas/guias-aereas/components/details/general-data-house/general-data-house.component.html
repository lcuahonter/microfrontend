<div class="row">
  <div class="col-sm-4">
    <div class="form-group">
      <label>No guía house: </label>
      <input
        type="text"
        class="form-control"
        [value]="houseDetails().numGuia"
        disabled
      />
    </div>
  </div>

  <div class="col-sm-4">
    <div class="form-group">
      <label>Lugar de carga: </label>
      <input
        type="text"
        class="form-control"
        [value]="houseDetails().lugarCarga"
        disabled
      />
    </div>
  </div>

  <div class="col-sm-4">
    <div class="form-group">
      <label>Lugar de descarga: </label>
      <input
        type="text"
        class="form-control"
        [value]="houseDetails().lugarDescarga"
        disabled
      />
    </div>
  </div>
</div>

<!-- Segunda fila -->
<div class="row">
  <div class="col-sm-4">
    <div class="form-group">
      <label>Fecha de transmisión:</label>
      <input
        type="text"
        class="form-control"
        [value]="houseDetails().fechaTransmision"
        disabled
      />
    </div>
  </div>

  <div class="col-sm-4">
    <div class="form-group">
      <label>No de piezas:</label>
      <input
        type="text"
        class="form-control"
        [value]="houseDetails().numPiezas"
        disabled
      />
    </div>
  </div>

  <div class="col-sm-4">
    <div class="form-group">
      <label>Tipo Operación:</label>
      <input
        type="text"
        class="form-control"
        [value]="houseDetails().operacion"
        disabled
      />
    </div>
  </div>
</div>

<!-- Última fila -->
<div class="row">
  <div class="col-sm-4">
    <div class="form-group">
      <label>R F C transmisor: </label>
      <input
        type="text"
        class="form-control"
        [value]="houseDetails().rfc"
        disabled
      />
    </div>
  </div>
</div>
