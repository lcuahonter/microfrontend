<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h2>Datos Generales</h2>
    </div>
    <div class="col-md-12">
      <app-general-data-house *ngIf="isHouseSelected()"></app-general-data-house>
      <app-general-data-master *ngIf="!isHouseSelected()"></app-general-data-master>
    </div>
    <div class="col-md-12">
      <app-house *ngIf="!isHouseSelected()" (houseClicked)="houseClicked($event)"></app-house>
    </div>
    <div class="col-md-12">
      <app-people-merchandise *ngIf="dataLoaded()"></app-people-merchandise>
    </div>
    <div class="col-md-12 mt-5 text-right">
      <gob-button
        type="button"
        className="btn-primary"
        label="Regresar"
        (clicked)="goBack()"
      ></gob-button>
    </div>
  </div>
</div>
