<!-- Totales de documento de transporte -->
<div class="container-fluid">
  <h5>Totales de documento de transporte</h5>
  <hr class="red" />
  <div class="row">
    <div class="col-sm-3">
      <div class="form-group">
        <label>No. total de piezas</label>
        <input type="text" class="form-control" [value]="totals()?.numTotalPiezas" disabled />
      </div>
    </div>
    <div class="col-sm-3">
      <div class="form-group">
        <label>Descripción de mercancía</label>
        <input type="text" class="form-control" [value]="totals()?.descripcionMercancia" disabled />
      </div>
    </div>
    <div class="col-sm-3">
      <div class="form-group">
        <label>Peso total bruto</label>
        <input type="text" class="form-control" [value]="totals()?.pesoTotalBruto" disabled />
      </div>
    </div>
    <div class="col-sm-3">
      <div class="form-group">
        <label>Total volumen</label>
        <input type="text" class="form-control" [value]="totals()?.totalVolumen" disabled />
      </div>
    </div>
  </div>

  <!-- Valor declarado -->
  <div class="row">
    <div class="col-sm-4">
      <h5>Valor declarado para transporte</h5>
      <div class="form-group">
        <label>Sin valor declarado para transporte</label>
        <input type="text" class="form-control" [value]="totals()?.sinValorDeclaradoTransporte" disabled />
      </div>
      <div class="form-group">
        <label>Valor declarado para transporte</label>
        <input type="text" class="form-control" [value]="totals()?.valorDeclaradoTransporte" disabled />
      </div>
    </div>
    <div class="col-sm-4">
      <h5>Valor declarado para aduanas</h5>
      <div class="form-group">
        <label>Sin valor declarado para aduana</label>
        <input type="text" class="form-control" [value]="totals()?.sinValorDeclaradoAduana" disabled />
      </div>
      <div class="form-group">
        <label>Valor declarado para aduana</label>
        <input type="text" class="form-control" [value]="totals()?.valorDeclaradoAduana" disabled />
      </div>
    </div>
    <div class="col-sm-4">
      <h5>Valor declarado para seguro</h5>
      <div class="form-group">
        <label>Sin valor declarado para seguro</label>
        <input type="text" class="form-control" [value]="totals()?.sinValorDeclaradoSeguro" disabled />
      </div>
      <div class="form-group">
        <label>Importe de seguro</label>
        <input type="text" class="form-control" [value]="totals()?.importeSeguro" disabled />
      </div>
    </div>
  </div>

  <!-- Totales del documento -->
  <h5>Totales del documento de transporte</h5>
  <div class="row">
    <div class="col-sm-4">
      <div class="form-group">
        <label>Cargos por el peso</label>
        <input type="text" class="form-control" [value]="totals()?.cargosPeso" disabled />
      </div>
      <div class="form-group">
        <label>Valor de carga</label>
        <input type="text" class="form-control" [value]="totals()?.valorCarga" disabled />
      </div>
    </div>
    <div class="col-sm-4">
      <div class="form-group">
        <label>Importe de impuestos</label>
        <input type="text" class="form-control" [value]="totals()?.importeImpuestos" disabled />
      </div>
      <div class="form-group">
        <label>Total otros cargos debido agente</label>
        <input type="text" class="form-control" [value]="totals()?.totalOtrosCargosAgente" disabled />
      </div>
    </div>
    <div class="col-sm-4">
      <div class="form-group">
        <label>Total otros cargos debidos transporte</label>
        <input type="text" class="form-control" [value]="totals()?.totalOtrosCargosTransporte" disabled />
      </div>
      <div class="form-group">
        <label>Cargos totales</label>
        <input type="text" class="form-control" [value]="totals()?.cargosTotales" disabled />
      </div>
    </div>
  </div>

  <!-- Declaración de transporte -->
  <h5>Declaración de transporte</h5>
  <div class="row">
    <div class="col-sm-4">
      <div class="form-group">
        <label>Fecha contrato</label>
        <input type="text" class="form-control" [value]="totals()?.fechaContrato" disabled />
      </div>
    </div>
    <div class="col-sm-4">
      <div class="form-group">
        <label>Lugar contrato</label>
        <input type="text" class="form-control" [value]="totals()?.lugarContrato" disabled />
      </div>
    </div>
    <div class="col-sm-4">
      <div class="form-group">
        <label>Firma transportista</label>
        <input type="text" class="form-control" [value]="totals()?.firmaTransportista" disabled />
      </div>
    </div>
  </div>
</div>
