<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h2>Detalle de Documento de Transporte</h2>
    </div>
    <div class="col-md-12">
      <app-general-data-transport-document [documentGeneralData]="documentGeneralData"/>
    </div>
    <div class="col-md-12">
      <app-transport-document-details [isManifest]="isManifest" [documentDetails]="documentDetails"/>
    </div>
    <div class="col-md-12">
      <app-air-waybill-detail [isManifest]="isManifest"/>
    </div>
    <div class="col-md-12">
      <app-transport-document-totals [totals]="totals"/>
    </div>
    <div class="col-md-12 text-right">
      <gob-button
        type="button"
        className="btn-primary"
        label="Regresar"
        (clicked)="goBack()"
      ></gob-button>
    </div>
  </div>
</div>
