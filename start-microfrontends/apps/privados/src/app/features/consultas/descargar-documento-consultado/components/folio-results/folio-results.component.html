<div class="row mt-3">
  <div class="col-md-5">
    <div class="row">
      <div class="col-md-4">
        <p><strong>Funcionario:</strong></p>
      </div>
      <div class="col-md-8">
        <p><span>{{ authInformation.authInfo.name }}</span></p>
      </div>
    </div>
  </div>
  <div class="col-md-2"></div>
  <div class="col-md-5">
    <div class="row">
      <div class="col-md-4">
        <p><strong>RFC:</strong></p>
      </div>
      <div class="col-md-8">
        <p><span>{{ authInformation.authInfo.rfc }}</span></p>
      </div>
    </div>
  </div>
</div>
<div class="row mt-2">
  <div class="col-md-5">
    <div class="row">
      <div class="col-md-4">
        <label for="folio">Folio:</label>
      </div>
      <div class="col-md-8">
        <input
          type="text"
          id="folio"
          class="form-control"
          [(ngModel)]="folio"
          placeholder="Ingrese folio"
        />
      </div>
    </div>
  </div>
</div>

<div class="row mt-3">
  <div class="col-md-12 mt-1 text-right">
    <gob-button
      type="button"
      className="btn-primary"
      label="Buscar"
      (clicked)="search()"
    ></gob-button>
  </div>
</div>
<div class="row mt-3 text-center">
  <div class="col-md-12">
    <app-table
      [tableData]="tableData"
      [borderedStyle]="true"
      title="Folios"
      [isLoading]="isLoadingDataReportsTable"
      [hiddenData]="hiddenData"
      [hasRedirect]="true"
      [textCenterTitleColums]="true"
      (onRowClicked)="onRowClicked($event)"
    />
  </div>
</div>
