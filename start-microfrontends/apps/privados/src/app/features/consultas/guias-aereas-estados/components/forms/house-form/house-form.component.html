<form [formGroup]="houseForm" autocomplete="off">
  <div class="row mt-5">
    <!-- First column -->
    <div class="col-md-4 col-sm-4 col-xs-6">
      <div class="form-group">
        <label
          >Guía House:
          <span class="form-text form-text-error">*</span>
        </label>
        <input
          type="text"
          class="form-control"
          formControlName="guideHouse"
          [ngClass]="{
            'form-control-error': formUtils.isValidField(houseForm, 'guideHouse')
          }"
        />
        @if (formUtils.isValidField(houseForm, 'guideHouse')) {
          <small class="form-text form-text-error">
            {{ formUtils.getFieldError(houseForm, 'guideHouse') }}
          </small>
        }
      </div>
    </div>

    <!-- Second column -->
    <div class="col-md-4 col-sm-4 col-xs-6">
      <div class="form-group">
        <label
          >CAAT:
            <span class="form-text form-text-error">*</span>

        </label>
        <input
          type="text"
          class="form-control"
          formControlName="caat"
          [ngClass]="{
            'form-control-error': formUtils.isValidField(houseForm, 'caat')
          }"
        />
        @if (formUtils.isValidField(houseForm, 'caat')) {
          <small class="form-text form-text-error">
            {{ formUtils.getFieldError(houseForm, 'caat') }}
          </small>
        }
      </div>
    </div>
  </div>
</form>
