<form [formGroup]="manifestForm" autocomplete="off">
  <div class="row mt-5">
    <div class="col-md-4 col-sm-4 col-xs-6">
      <div class="form-group">
        <label
          >Guía Manifiesto:
          <span class="form-text form-text-error">*</span>
        </label>
        <input
          type="text"
          class="form-control"
          formControlName="guideManifest"
          [ngClass]="{
            'form-control-error': formUtils.isValidField(manifestForm, 'guideManifest')
          }"
        />
        @if (formUtils.isValidField(manifestForm, 'guideManifest')) {
          <small class="form-text form-text-error">
            {{ formUtils.getFieldError(manifestForm, 'guideManifest') }}
          </small>
        }
      </div>
    </div>
  </div>
</form>
