  @if(displayErrorAlert()) {
    <div class="alert alert-danger mt-5">
      Error al consultar el manifiesto.
    </div>
  } @else {
    <div class="row">
      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Número de manifiesto</label>
          <input type="text" class="form-control" [value]="manifest()?.numManifiesto" disabled>
        </div>
      </div>

      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">RFC del transmisor</label>
          <input type="text" class="form-control" [value]="manifest()?.rfcTransmisor" disabled>
        </div>
      </div>

      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Tipo de operación</label>
          <input type="text" class="form-control" [value]="manifest()?.tipoOperacion" disabled>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Empresa transportista</label>
          <input type="text" class="form-control" [value]="manifest()?.empresaTransportista" disabled>
        </div>
      </div>

      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Fecha y hora de la transmisión</label>
          <input type="text" class="form-control" [value]="manifest()?.fechaHoraTransmision" disabled>
        </div>
      </div>

      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Fecha y hora de arribo</label>
          <input type="text" class="form-control" [value]="manifest()?.fechaHoraArribo" disabled>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Origen de la carga</label>
          <input type="text" class="form-control" [value]="manifest()?.origenCarga" disabled>
        </div>
      </div>

      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Número de vuelo</label>
          <input type="text" class="form-control" [value]="manifest()?.numVuelo" disabled>
        </div>
      </div>

      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">Destino de la carga</label>
          <input type="text" class="form-control" [value]="manifest()?.destinoCarga" disabled>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-sm-4">
        <div class="form-group form-group-sm">
          <label class="control-label">CAAT</label>
          <input type="text" class="form-control" [value]="manifest()?.caat" disabled>
        </div>
      </div>
    </div>
  }
