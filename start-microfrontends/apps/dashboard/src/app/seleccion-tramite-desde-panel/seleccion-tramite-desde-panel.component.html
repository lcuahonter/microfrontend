<div class="page">
  <div class="container">
    <ng-titulo titulo="Selecci&oacute;n de tr&aacute;mite" />
    <rfc-solicitante></rfc-solicitante>
    <div class="row">
      <div class="table-scroll">
        <table class="table table-responsive table-striped table-hover">
          <thead>
            <tr>
              <th>id</th>
              <th>departmento</th>
              <th>Tipo tr&aacute;mite</th>
              <th>URL</th>
            </tr>
          </thead>
          <tbody>
            @for(item of tramiteData; track item?.id) { @if(item?.linkDashboard)
            {
            <tr>
              <td>{{ item?.id }}</td>
              <td>{{ item?.department }}</td>
              <td>{{ item?.tramite }}</td>
              <td>
                <a [routerLink]="item.linkDashboard"
                  (click)="configuraOrigenPeticion(item?.tramite)"
                  >{{ ruta }}{{ item.linkDashboard }}</a
                >
              </td>
            </tr>
            } }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
