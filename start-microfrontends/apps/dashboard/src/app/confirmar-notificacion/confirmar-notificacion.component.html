<div class="container">
  @if(indiceDePaso === 1) {
  <div class="row">
    <ng-titulo [titulo]="'Confirmar notificación'"></ng-titulo>
  </div>
  <app-detalles-folio></app-detalles-folio>
  } @if(indiceDePaso === 3){
  <app-acuse-recibo></app-acuse-recibo>
  }@else if(indiceDePaso ===1) {
  <app-notificacion-acto-administrativo></app-notificacion-acto-administrativo>
  } @if(indiceDePaso === 2) {
  <div class="row mt-5 mb-5">
    <ng-titulo [titulo]="'Firmar'"></ng-titulo>
    <firma-electronica
      [tipo]="''"
      (firma)="obtieneFirma($event)"
    ></firma-electronica>
  </div>

  } @if(indiceDePaso === 1) {
  <div class="row mt-5 mb-5">
    <div class="col-md-12">
      <div class="pull-right">
        <button
          type="button"
          name="eliminarMercancias"
          class="btn btn-primary ms-2"
          (click)="alContinuar()"
        >
          Continuar
        </button>
      </div>
    </div>
  </div>
  } @else if(indiceDePaso === 3) {
  <div class="row mt-5 mb-5">
    <div class="col-md-12">
      <div class="pull-right">
        <button
          type="button"
          name="eliminarMercancias"
          class="btn btn-primary"
          (click)="cerrar()"
        >
          Cerrar
        </button>
      </div>
    </div>
  </div>
  }
</div>
