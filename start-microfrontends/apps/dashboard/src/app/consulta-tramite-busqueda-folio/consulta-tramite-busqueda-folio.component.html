<div class="page page-funcionario">
    <div class="container">
        <div class="bg-primary"></div>
        <div class="col-md-12">
            <div class="row">
                <h2 class="fw-bold my-5 titulo-tasks">Consulta de trámites</h2>
            </div>
        </div>
        @if(alertVisible){
           <ng-alert [CONTENIDO]="alertMessage" [CUSTOMECLASS]="classAlert"></ng-alert>
        }
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex bg-light rounded m-xxl-3 p-4">
                    <div class="col-md-12">
                        <form [formGroup]="FormBuscaTramite">
                            <div class="row">
                                <div class="col-md-2">
                                    <strong class="text-title">
                                        Funcionario:
                                    </strong>
                                </div>
                                <div class="col-md-6">
                                    <label class="text-title font-weight-titulo">
                                        EUROFOODS DE MEXICO GONZALEZ PINAL
                                    </label>
                                </div>
                                <div class="col-md-2">
                                    <strong class="text-title">
                                        RFC:
                                    </strong>
                                </div>
                                <div class="col-md-2">
                                    <label class="text-title font-weight-titulo">
                                        {{rfcValor}}
                                    </label>
                                </div>
                                <div class="col-md-2">
                                    <strong class="text-title">
                                        *Folio tr&aacute;mite
                                    </strong>
                                </div>
                                <div class="col-md-10">
                                    <input type="text" id="folioDelTramite" formControlName="folioDelTramite"
                                        class="form-control font-weight-titulo text-title" placeholder="Folio tramite">

                                    <div *ngIf="esInvalido('folioDelTramite')" class="text-danger">

                                        <small *ngIf="FormBuscaTramite.get('folioDelTramite')?.hasError('required')">
                                            Este campo es obligatorio.
                                        </small>

                                        <small *ngIf="FormBuscaTramite.get('folioDelTramite')?.hasError('pattern')">
                                            Solo se permiten números.
                                        </small>

                                        <small *ngIf="FormBuscaTramite.get('folioDelTramite')?.hasError('minlength')">
                                            Debe tener al menos 25 caracteres.
                                        </small>

                                    </div>
                                </div>

                                <div class="col-md-12">
                                    <div class="d-flex justify-content-end m-lg-5">
                                        <button class="btn  btn-primary ms-2 btn-size-1 color-back" type="button"
                                            (click)="buscarTramite()">Buscar</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
