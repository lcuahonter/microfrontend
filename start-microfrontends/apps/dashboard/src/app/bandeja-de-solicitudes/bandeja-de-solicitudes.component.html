<div class="container">
    <div class="row">
      <ng-container>
        <lib-bandeja
          [titulo]="'Bandeja de Solicitudes'"
          [tieneBandeja]="false"
          [tablaTitulo]="'Solicitud'"
          [configuracionTabla]="bandejaConfiguracionTabla"
          [configuracionTablaDatos]="bandejaTablaDatos"
          [bandejaSolicitudeDatos]="bandejaSolicitudeFormaDatos"
          [seleccionadoDepartamento]="selectedDepartamentoObj"
          [duplicarDatos]="copiarBandejaTablaDatos"
          [rfcNombre]="rfcValor"
          [isBandejaSolicitudes]="true"
          (obtenerNombreDelDepartamento)="procedureNumero($event)"
          (getDatosBandejaSolicitudes)="getSolicitudeTablaDatos($event)"
        >
        </lib-bandeja>
      </ng-container>
    </div>
  </div>
