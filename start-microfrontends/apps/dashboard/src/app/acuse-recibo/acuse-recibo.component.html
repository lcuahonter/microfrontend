<div class="container">
  <div class="row mt-5">
    <ng-titulo [titulo]="'Acuses y resoluciones'"></ng-titulo>
  </div>
  <ng-alert
    [CONTENIDO]="alertaNotificacion"
    [CUSTOMECLASS]="infoAlert"
  ></ng-alert>
  <div>
    <div class="row mt-5">
      <ng-titulo [titulo]="'Acuse(s)'"></ng-titulo>
    </div>
    <app-tabla-dinamica
      class="confirmar-notificacion-tabla"
      [configuracionTabla]="tablaConfiguracion.configuracionTabla"
      [datos]="acuseConfirmarResolucionTablaDatos"
      [acciones]="tablaConfiguracion.acuseAcciones"
    >
    </app-tabla-dinamica>
  </div>

  <div>
    <div class="row mt-5">
      <ng-titulo [titulo]="'Resolución(es)'"></ng-titulo>
    </div>
    <app-tabla-dinamica
      class="confirmar-notificacion-tabla"
      [configuracionTabla]="tablaConfiguracion.configuracionTabla"
      [datos]="resolucionConfirmarResolucionTablaDatos"
      [acciones]="tablaConfiguracion.resolucionAcciones"
    >
    </app-tabla-dinamica>
  </div>
</div>
