<div class="container mt-5 my-5">  
  @if (nuevaAlertaNotificacion) {
    <div>
      <lib-notificaciones [notificacionInput]="nuevaAlertaNotificacion"></lib-notificaciones>
    </div>
  }
  
  <h3 class="title">Recuperación de Cuenta</h3>

  <form [formGroup]="formularioRecuperar" (ngSubmit)="alEnviar()">
    <div class="form-section">
      <h3>Información Personal</h3>

      <div class="form-group">
        <label class="form-label">Nacionalidad mexicana*:</label>
        <div class="radio-group">
          <div class="radio-option">
            <input type="radio" 
                   id="nacionalidadSi" 
                   formControlName="nacionalidad" 
                   [value]="true"
                   class="radio-input">
            <label for="nacionalidadSi">Sí</label>
          </div>
          <div class="radio-option">
            <input type="radio" 
                   id="nacionalidadNo" 
                   formControlName="nacionalidad" 
                   [value]="false"
                   class="radio-input">
            <label for="nacionalidadNo">No</label>
          </div>
        </div>
      </div>

      <!-- Panel Nacional -->
      <ng-container *ngIf="esNacionalidadMexicana()">
        <!-- Tipo de Identificación -->
        <div class="form-group">
          <label>Tipo de Identificación*:</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" 
                     id="rfc" 
                     formControlName="tipoDocumento" 
                     value="RFC"
                     class="radio-input">
              <label for="rfc">Registro Federal de Contribuyentes (RFC)</label>
            </div>
            <div class="radio-option">
              <input type="radio" 
                     id="curp" 
                     formControlName="tipoDocumento" 
                     value="CURP"
                     class="radio-input">
              <label for="curp">Clave Única de Registro de Población (CURP)</label>
            </div>
          </div>
        </div>

        <!-- Panel RFC -->
        <ng-container *ngIf="formularioRecuperar.get('tipoDocumento')?.value === TIPO_IDENTIFICACION.RFC">
          <!-- Tipo de Persona -->
          <div class="form-group">
            <label>Tipo de Persona*:</label>
            <div class="radio-group">
              <div class="radio-option">
                <input type="radio" 
                       id="personaFisica" 
                       formControlName="personaTipo" 
                       [value]="TIPO_PERSONA.FISICA"
                       class="radio-input">
                <label for="personaFisica">Persona Física</label>
              </div>
              <div class="radio-option">
                <input type="radio" 
                       id="personaMoral" 
                       formControlName="personaTipo" 
                       [value]="TIPO_PERSONA.MORAL"
                       class="radio-input">
                <label for="personaMoral">Persona Moral</label>
              </div>
            </div>
          </div>

          <!-- Campos comunes RFC -->
          <div class="form-group" *ngIf="formularioRecuperar.get('personaTipo')?.value">
            <label for="usuario">RFC*:</label>
            <input type="text" 
                   id="usuario" 
                   formControlName="usuario" 
                   class="form-control"
                   placeholder="Ingrese su RFC">
          </div>

          <!-- Campos Persona Física -->
          <ng-container *ngIf="formularioRecuperar.get('personaTipo')?.value === TIPO_PERSONA.FISICA">
            <div class="form-group">
              <label for="nombre">Nombre*:</label>
              <input type="text" 
                     id="nombre" 
                     formControlName="nombre" 
                     class="form-control"
                     placeholder="Ingrese su nombre">
            </div>

            <div class="form-group">
              <label for="primerApellido">Primer apellido*:</label>
              <input type="text" 
                     id="primerApellido" 
                     formControlName="primerApellido" 
                     class="form-control"
                     placeholder="Ingrese su primer apellido">
            </div>

            <div class="form-group">
              <label for="segundoApellido">Segundo apellido*:</label>
              <input type="text" 
                     id="segundoApellido" 
                     formControlName="segundoApellido" 
                     class="form-control"
                     placeholder="Ingrese su segundo apellido">
            </div>
          </ng-container>

          <!-- Campos Persona Moral -->
          <ng-container *ngIf="formularioRecuperar.get('personaTipo')?.value === TIPO_PERSONA.MORAL">
            <div class="form-group">
              <label for="razonSocial">Razón social*:</label>
              <input type="text" 
                     id="razonSocial" 
                     formControlName="razonSocial" 
                     class="form-control"
                     placeholder="Ingrese la razón social">
            </div>
          </ng-container>
        </ng-container>

        <!-- Panel CURP -->
        <ng-container *ngIf="formularioRecuperar.get('tipoDocumento')?.value === TIPO_IDENTIFICACION.CURP">
          <div class="form-group">
            <label for="usuarioCurp">CURP*:</label>
            <input type="text" 
                   id="usuarioCurp" 
                   formControlName="usuario" 
                   class="form-control"
                   placeholder="Ingrese su CURP">
          </div>

          <div class="form-group">
            <label for="nombreCurp">Nombre*:</label>
            <input type="text" 
                   id="nombreCurp" 
                   formControlName="nombre" 
                   class="form-control"
                   placeholder="Ingrese su nombre">
          </div>

          <div class="form-group">
            <label for="primerApellidoCurp">Primer apellido*:</label>
            <input type="text" 
                   id="primerApellidoCurp" 
                   formControlName="primerApellido" 
                   class="form-control"
                   placeholder="Ingrese su primer apellido">
          </div>

          <div class="form-group">
            <label for="segundoApellidoCurp">Segundo apellido*:</label>
            <input type="text" 
                   id="segundoApellidoCurp" 
                   formControlName="segundoApellido" 
                   class="form-control"
                   placeholder="Ingrese su segundo apellido">
          </div>
        </ng-container>
      </ng-container>
      
      <!-- Panel Extranjero -->
      <ng-container *ngIf="!esNacionalidadMexicana() && formularioRecuperar.get('nacionalidad')?.value !== null">
        <!-- Tipo de Persona -->
        <div class="form-group">
          <label>Tipo de Persona*:</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" 
                     id="personaFisicaExt" 
                     formControlName="personaTipo" 
                     [value]="TIPO_PERSONA.FISICA"
                     class="radio-input">
              <label for="personaFisicaExt">Persona Física</label>
            </div>
            <div class="radio-option">
              <input type="radio" 
                     id="personaMoralExt" 
                     formControlName="personaTipo" 
                     [value]="TIPO_PERSONA.MORAL"
                     class="radio-input">
              <label for="personaMoralExt">Persona Moral</label>
            </div>
          </div>
        </div>

        <!-- Campos según tipo de persona extranjera -->
        <ng-container *ngIf="formularioRecuperar.get('personaTipo')?.value">
          <!-- Campos Persona Física Extranjera -->
          <ng-container *ngIf="formularioRecuperar.get('personaTipo')?.value === TIPO_PERSONA.FISICA">
            <div class="form-group">
              <label for="nombreExt">Nombre*:</label>
              <input type="text" 
                     id="nombreExt" 
                     formControlName="nombre" 
                     class="form-control"
                     placeholder="Ingrese su nombre">
            </div>

            <div class="form-group">
              <label for="primerApellidoExt">Primer apellido*:</label>
              <input type="text" 
                     id="primerApellidoExt" 
                     formControlName="primerApellido" 
                     class="form-control"
                     placeholder="Ingrese su primer apellido">
            </div>
          </ng-container>

          <!-- Campos Persona Moral Extranjera -->
          <ng-container *ngIf="formularioRecuperar.get('personaTipo')?.value === TIPO_PERSONA.MORAL">
            <div class="form-group">
              <label for="razonSocialExt">Razón social*:</label>
              <input type="text" 
                     id="razonSocialExt" 
                     formControlName="razonSocial" 
                     class="form-control"
                     placeholder="Ingrese la razón social">
            </div>
          </ng-container>

          <!-- Campos comunes extranjero -->
          <div class="form-group">
            <label for="codigoPostal">Código postal*:</label>
            <input type="text" 
                   id="codigoPostal" 
                   formControlName="codigoPostal" 
                   class="form-control"
                   placeholder="Ingrese el código postal">
          </div>

          <div class="form-group">
            <label for="estado">Estado*:</label>
            <input type="text" 
                   id="estado" 
                   formControlName="estado" 
                   class="form-control"
                   placeholder="Ingrese el estado">
          </div>

          <div class="form-group">
            <label for="pais">País*:</label>
            <select id="pais" 
                    formControlName="pais" 
                    class="form-control">
              <option value="">Seleccione un país</option>
              <option value="USA">Estados Unidos</option>
              <option value="CAN">Canadá</option>
            </select>
          </div>
        </ng-container>
      </ng-container>
    </div>

    <div class="form-footer">
      <p class="campos-obligatorios">* Campos obligatorios</p>
      <div class="form-actions">
        <button type="button" 
                class="btn-salir btn btn-primary" 
                (click)="alSalir()">
          Salir
        </button>
        <button type="submit" 
                class="btn-recuperar btn btn-primary" 
                [disabled]="!formularioRecuperar.valid || !flujoValido()">
          Recuperar
        </button>
      </div>
    </div>
  </form>
</div>
