<div class="rows mt-4">
  <div class="col-md-8">
    @if (nuevaAlertaNotificacion) {
        <div>
            <lib-notificaciones [notificacionInput]="nuevaAlertaNotificacion"></lib-notificaciones>
        </div>
    }
    <div class="justify-content-start mb-3">
      <div class="center">
            <form [formGroup]="loginForm">
              <div class="mb-3">
                <label for="usuario" class="form-label">Usuario*:</label>
                <input
                  type="text"
                  id="usuario"
                  class="form-control"
                  formControlName="usuario"
                  placeholder="Ingrese su usuario"
                />
                <div *ngIf="loginForm.get('usuario')?.invalid && loginForm.get('usuario')?.touched" class="text-danger">
                  (Usuario) es un campo requerido.
                </div>
              </div>
          
              <div class="mb-3">
                <label for="contrasena" class="form-label">Contraseña*:</label>
                <input
                  type="password"
                  id="contrasena"
                  class="form-control"
                  formControlName="contrasena"
                  placeholder="Ingrese su contraseña"
                />
                <div *ngIf="loginForm.get('contrasena')?.invalid && loginForm.get('contrasena')?.touched" class="text-danger">
                  (Contraseña) es un campo requerido.
                </div>
              </div>
          
              <div class="d-flex justify-content-start">
                <button type="button" class="btn btn-primary me-2" (click)="ingresar()">Ingresar</button>
                <button type="button" class="btn btn-default" (click)="registrarse()">Registrarse</button>
              </div>
            </form>          
            <div class="mt-3">
              <a href="#" class="text-primary">¿Olvidaste tu contraseña?</a>
            </div>  
      </div>
    </div>
  </div>    
</div>
