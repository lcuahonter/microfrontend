<div class="page page-color">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h2 class="fw-bold my-5 titulo-tasks">Confirma datos de Capturista Privado</h2>
            </div>
            <div class="bg-primary"></div>
            <form [formGroup]="formConsultaCapturista">
                <div class="row ">
                    <div class="col-md-4">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" id="nombre" formControlName="nombre"
                            class="form-control font-weight-titulo text-title" />
                    </div>
                    <div class="col-md-4">
                        <label for="apellidoPaterno" class="form-label text-title">Apellido paterno</label>
                        <input type="text" id="apellidoPaterno" formControlName="apellidoPaterno"
                            class="form-control font-weight-titulo" />
                    </div>
                    <div class="col-md-4">
                        <label for="curp" class="form-label">Apellido materno</label>
                        <input type="text" id="curp" formControlName="apellidoMaterno"
                            class="form-control font-weight-titulo text-title" />
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <label for="rfc" class="form-label">Registro Federal del Contribuyentes</label>
                        <input type="text" id="rfc" formControlName="rfc"
                            class="form-control font-weight-titulo text-title" />
                    </div>
                    <div class="col-md-4">
                        <label for="rfc" class="form-label">Clave Unica de Registro de Población</label>
                        <input type="text" id="rfc" formControlName="curp"
                            class="form-control font-weight-titulo text-title" />
                    </div>
                </div>
            </form>
            <div class="row">
                <div class="d-flex justify-content-lg-end h1">
                    <button class="btn btn-primary ms-2" type="button" (click)="confirmarDatosCapturista()">Confirma datos</button>
                    <button type="button" class="btn btn-default ms-2">Cancelar</button>
                </div>
            </div>
        </div>
    </div>
</div>
