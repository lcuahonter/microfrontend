<div class="container">
  <h2>Ingreso a VUCEM</h2>
  <hr class="red">
  <div class="row">
    <div class="col-md-6">
      <div></div>
      <div class="center">
        <ul class="nav nav-tabs">
          <li [ngClass]="indice === 1 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
              (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Con FIEL</a>
          </li>
          <li [ngClass]=" indice===2 ? 'active' : ''">
            <a data-toggle=" tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
              (keydown.space)="seleccionaTab(2)" role="button" tabindex="1">Sin FIEL</a>
          </li>
        </ul>

        <ng-container>
          @switch (indice) {
          @case (1) {
          <firma-electronica [tipo]="'login'" (valido)="validarEFirma($event)"></firma-electronica>
          }
          @case (2) {
          <h1>Password</h1>
          }
          }
        </ng-container>
      </div>
    </div>
    <div class="col-md-3"></div>
  </div>
</div>
