<div class="row">
  <!-- Fila principal que contiene todo el contenido -->
  <div class="col-md-12 mb-3">
    <!-- Contenedor para la tabla de cancelaciones disponibles -->
    <div class="">
      <!-- Título para indicar al usuario que seleccione un programa -->
      <ng-titulo titulo="Elija el programa del que desea realizar el tramite" />
      <!-- Componente de tabla dinámica con opciones de selección y datos -->
      <app-tabla-dinamica
      [tipoSeleccionTabla]="tablaSeleccion.RADIO"
      [configuracionTabla]="encabezadoDeTabla"
      [tableId] = "Id"
      [inputSelection] = "radioId"
      [datos]="datosTabla"
      (filaSeleccionada)="valorDeAlternancia($event)"
      [disableSeleccionTablaRadio]="esFormularioSoloLectura"
      [showPagination]="true"
      [mode]="'client'"
      [totalItems]="datosTabla.length"
      [itemsPerPage]="5"
      ></app-tabla-dinamica>
    </div>
  </div>
</div>

<!-- Encabezado para mostrar el programa seleccionado -->
<div class="CustomPrograma mt-5">
<h3>
  <label for="programaSeleccionado">Programa seleccionado</label>
</h3>
<hr class="red">
<!-- Formulario para mostrar y capturar información del programa -->
<form [formGroup]="programaForm">
  <div class="row">
    <div class="col-md-4">
      <!-- Campo para mostrar el folio del programa -->
      <div class="form-group">
        <label for="folioPrograma">Folio de programa:</label>
        <input
          type="text"
          id="folioPrograma"
          formControlName="folioPrograma"
          class="form-control"
        />
        <!-- Campo oculto para almacenar el ID del programa seleccionado -->
        <input type="hidden" id="idProgramaSeleccionado" formControlName="idProgramaSeleccionado" />
      </div>
    </div>

    <div class="col-md-4">
      <!-- Campo para mostrar la modalidad seleccionada -->
      <div class="form-group">
        <label for="modalidad">Selecciona la modalidad:</label>
        <input
          type="text"
          id="modalidad"
          formControlName="modalidad"
          class="form-control"
        />
      </div>
    </div>

    <div class="col-md-4">
      <!-- Campo para mostrar la representación federal -->
      <div class="form-group">
        <label for="representacionFederal">Representación federal:</label>
        <input
          type="text"
          id="representacionFederal"
          formControlName="representacionFederal"
          class="form-control"
        />
      </div>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-md-4">
      <!-- Campo para mostrar el tipo de programa -->
      <div class="form-group">
        <label for="tipoPrograma">Tipo programa:</label>
        <input
          type="text"
          id="tipoPrograma"
          formControlName="tipoPrograma"
          class="form-control"
        />
      </div>
    </div>

    <div class="col-md-4">
      <!-- Campo para mostrar el estatus del programa -->
      <div class="form-group">
        <label for="estatus">Estatus:</label>
        <input
          type="text"
          id="estatus"
          formControlName="estatus"
          class="form-control"
        />
      </div>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-md-12">
      <!-- Campo para capturar el motivo de cancelación -->
      <div class="form-group">
        <label for="motivoCancelacion">Motivo cancelación<span class="require">*</span>:</label>
        <textarea
          id="motivoCancelacion"
          formControlName="solicitudObservaciones"
          [ngClass]="programaForm.get('solicitudObservaciones')?.invalid && (programaForm.get('solicitudObservaciones')?.touched || programaForm.get('solicitudObservaciones')?.dirty) ? 'required' : ''"
          rows="5"
          class="form-control"
          (change)="setValoresStore(
            programaForm,
              'solicitudObservaciones',
              'setSolicitudObservaciones'
            )"
        ></textarea>
        <div *ngIf="esInvalido('solicitudObservaciones')" class="text-danger">
              <small
                *ngIf="programaForm.controls['solicitudObservaciones'].hasError('required')">Este
                campo es obligatorio</small>
              <small
                *ngIf="programaForm.controls['solicitudObservaciones'].hasError('maxlength')">No puede escribir más de 255 caracteres</small>
            </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-12">
      <div class="row mt-3">
        <!-- Checkbox para confirmar la cancelación -->
        <div class="form-check checkbox-space">
          <lib-input-check
           [id]="'etiqueta'"
            [formControlName]="'confirmar'"
            [label]="'Confirmo estar de acuerdo con la cancelación del Programa IMMEX/PROSEC *'"
            [required]="true"
            [isDisabled]="esFormularioSoloLectura"
            (change)="setValoresStore(
              programaForm,
              'confirmar',
              'setConfirmar'
            )"></lib-input-check>

            <div *ngIf="esInvalido('confirmar')" class="text-danger">
              <small
                *ngIf="programaForm.controls['confirmar'].hasError('required')">Este
                campo es obligatorio</small>
            </div>
        </div>
        </div>
      </div>
    </div>
</form>
</div>
