<form [formGroup]="formularioDatosMercancia">
    <div class="form">
        <ng-titulo [titulo]="'Datos de la Mercancía'"></ng-titulo>
        <div class="row">
            <div class="col-md-6 form-group">
                <label for="certificadoOrigenProductoNumRegistro" class="form-label text-start">Número de Registro de
                    Productos Elegibles*:</label>
                <input type="text" id="cveRegistroProductor" formControlName="cveRegistroProductor" class="form-control"
                    (change)="establecerValoresEnEstado(formularioDatosMercancia,'cveRegistroProductor')" />
                <div *ngIf="esControlInvalido('cveRegistroProductor')" class="text-danger">
                    <small *ngIf="formularioDatosMercancia.controls['cveRegistroProductor'].hasError('required')">Este
                        campo es obligatorio.</small>
                </div>
            </div>
            <div class="col-md-2 mt-4">
                <button type="button" class="btn btn-primary mt-4" (click)="actualizarGridComercializadores()" 
                    [disabled]="esSoloLectura">
                    Buscar
                </button>
            </div>
        </div>
    </div>
</form>

 @if (alertaNotificacion) {
        <div>
            <lib-notificaciones [notificacionInput]="alertaNotificacion"></lib-notificaciones>
        </div>
    }
