<form [formGroup]="formularioExpAut">
    <div>
        <div class="row declaration-container">
            <div class="col-md-12 ml-3">
                <div *ngFor="let opcion of radioOpcionsExpAut"  class="radio-label-wrap">
                    <input 
                        type="radio" 
                        [id]="opcion.value" 
                        [value]="opcion.value"
                        [disabled]="esFormularioSoloLectura" 
                        formControlName="informacionRadios">
                    <span class="etiqueta-de-radio radio-label-margin-left" [title]="opcion.label">
                        {{ opcion.label }}
                    </span>
                    <span class="p-2" *ngIf="opcion.label" tooltip="{{opcion.value }}">
                    </span>
                </div>
            </div>
        </div>
        
    </div>
    <div class="row declaration-container">
        <div class="col-md-7">
            <p>Mercancia Calificación Sistema</p>
        </div>
        <div class="col-md-5">            
            <span *ngIf="calificacionSistema === true" class="text-uppercase"> Autorizada </span>
            <span *ngIf="calificacionSistema === false" class="text-uppercase"> Rechazada </span>
        </div>
    </div>
</form>
