<div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Solicitud empresa de la frontera persona física.</h1>
      </div>
    </div>

    @if (esFormaValido) {
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
    }

    <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    <div>
      @switch (indice) {
      @case (1) {
      <app-paso-uno #pasoUnoRef></app-paso-uno>
      }
      @case (2) {
      <app-paso-carga-documento 
      [idSolicitud]="solicitudState.idSolicitud ?? null"
      [idTipoTRamite]="'120601'"
      [cargaArchivosEvento]="cargarArchivosEvento"
      (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
      (reenviarCargaRealizada)="cargaRealizada($event)"
      (cargaEnProgreso)="onCargaEnProgreso($event)"
      (enBlancoObligatoria)="onBlancoObligatoria($event)"
      ></app-paso-carga-documento>

      }
      @case (3) {
        <paso-firma [idSolicitud]="solicitudState.idSolicitud ?? null" [procedure]="120601" [procedureUrl]="'registro-como-empresa/datos'"></paso-firma>
      }
      @case (4) {
        Firmar solicitud
      }
    }
    </div>
    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" [dePadre]="true"></btn-continuar>
</div>
