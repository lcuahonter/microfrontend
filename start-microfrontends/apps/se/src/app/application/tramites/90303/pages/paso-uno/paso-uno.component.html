<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Modificación</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Bitácora</a>
      </li>
    </ul>
    <ng-container> @switch (indice) { 
      @case (1) { 
      <solicitante [tabindex]="1"></solicitante>
      } 
      @case (2) { 
        <app-modificacion [tabIndex]="2"></app-modificacion> 
      }
      @case (3) { 
        <app-bitacora [tabIndex]="3"></app-bitacora> 
      } 
    }
    </ng-container>
  </div>
</div>
