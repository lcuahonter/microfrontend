<ng-titulo titulo="Detalles del transporte" />
<form [formGroup]="detallas">
    <div class="row mb-3">
        <div class="col-md-8">
            <app-catalogo-select [catalogo]="estado" [label]="'Medio de transporte'"
                [required]="false" name="medio" formControlName="medioTransporte" [isDisabled]="esFormularioSoloLectura ? true : false" (change)="setValoresStore(detallas,'medioTransporte', 'setMedioTransporte')"
                ></app-catalogo-select>
        </div>
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="rutaCompleta" class="form-label">Ruta completa:</label>
            <input type="text" class="form-control" formControlName="rutaCompleta"
                id="rutaCompleta" (change)="setValoresStore(detallas,'rutaCompleta', 'setRutaCompleta')">
        </div>
        
    </div>
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="puertoDeEmbarque" class="form-label">Puerto de embarque:</label>
            <input type="text" class="form-control" formControlName="puertoDeEmbarque"
                id="puertoDeEmbarque" (change)="setValoresStore(detallas,'puertoDeEmbarque', 'setPuertoDeEmbarque')">
        </div>
        <div class="col-md-6">
            <label for="puertoDeDesembarque" class="form-label">Puerto de desembarque:</label>
            <input type="text" class="form-control" formControlName="puertoDeDesembarque"
                id="puertoDeDesembarque" (change)="setValoresStore(detallas,'puertoDeDesembarque', 'setPuertoDeDesembarque')">
        </div>
        
    </div>
</form>
