<div class="Page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Cancelación de Certificados de CUPO por Facultad</h1>
            </div>
                <div class="col-12">
                    @if (!esFormaValido) {
                    <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="infoError"></ng-alert>
                    }
                
                </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>         
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
            <app-paso-uno></app-paso-uno>
            }
            @case (2) {
            <paso-firma [idSolicitud]="idSolicitudState" [procedure]="140205"
                [procedureUrl]="'cancelaciones-certificado/solicitud'"></paso-firma>
            }
            }
            <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
        </div>
    </div>
</div>
