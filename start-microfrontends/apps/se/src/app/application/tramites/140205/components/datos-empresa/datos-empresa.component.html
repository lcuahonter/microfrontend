<form [formGroup]="solicitudForm">
  <ng-titulo titulo="Buscar Empresa" />
  <ng-container formGroupName="grupoEmpresa">
    <div class="row">
      <div class="col-md-8 mb-3">
        <label
          >Por favor, ingrese el RFC de la Empresa de la que desea
          consultar<span [class.text-danger]="solicitudForm.get('grupoEmpresa.rfc')?.touched && solicitudForm.get(['grupoEmpresa','rfc'])?.errors?.['required']">*</span>
          </label
        >
        <input
          type="text"
          class="form-control"
          maxlength="13"
          formControlName="rfc"
          id="rfc"
          
          (change)="setValoresStore(grupoEmpresa, 'rfc', 'setGrupoEmpresaRFC');"
        />
      </div>
      <div class="row">
        <div class="col-md-8 mt-3">
          <div class="pull-right">
            <button
              type="button"
              class="btn btn-primary"
              [disabled]="soloLectura"
              (click)="buscarEmpresa()"
            >
              Buscar
            </button>
          </div>
        </div>
      </div>
    </div>
  </ng-container>

  @if (mostrarDatosGenerales) {
  <ng-titulo titulo="Datos generales de la empresa" />
  <ng-container formGroupName="grupoEmpresa">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Nombre(s)</label>
        <input
          type="text"
          class="form-control"
          formControlName="nombre"
          id="nombre"
          (change)="
            setValoresStore(grupoEmpresa, 'nombre', 'setGrupoEmpresaNombre')
          "
        />
      </div>
      <div class="col-md-4 mb-3">
        <label>Primer apellido</label>
        <input
          type="text"
          class="form-control"
          formControlName="primerApellido"
          id="primerApellido"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'primerApellido',
              'setGrupoEmpresaPrimerApellido'
            )
          "
        />
      </div>
      <div class="col-md-4 mb-3">
        <label>Segundo apellido</label>
        <input
          type="text"
          class="form-control"
          formControlName="segundoApellido"
          id="segundoApellido"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'segundoApellido',
              'setGrupoEmpresaSegundoApellido'
            )
          "
        />
      </div>
    </div>

    <div class="row">
      <div class="col-md-12 mb-3">
        <label>Actividad económica preponderante</label>
        <input
          type="text"
          class="form-control"
          formControlName="actividadEconomica"
          id="actividadEconomica"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'actividadEconomica',
              'setGrupoEmpresaActividadEconomica'
            )
          "
        />
      </div>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label>RFC</label>
        <input
          type="text"
          class="form-control"
          formControlName="datosRfc"
          id="datosRfc"
          (change)="
            setValoresStore(grupoEmpresa, 'datosRfc', 'setGrupoEmpresaDatosRfc')
          "
        />
      </div>
      <div class="col-md-4 mb-3">
        <label>Clave Única de Registro de Población</label>
        <input
          type="text"
          class="form-control"
          formControlName="clave"
          id="clave"
          (change)="
            setValoresStore(grupoEmpresa, 'clave', 'setGrupoEmpresaClave')
          "
        />
      </div>

      <div class="col-md-4 mb-3">
        <label>Correo electrónico</label>
        <input
          type="text"
          class="form-control"
          formControlName="correo"
          id="correo"
          (change)="
            setValoresStore(grupoEmpresa, 'correo', 'setGrupoEmpresaCorreo')
          "
        />
      </div>
    </div>
  </ng-container>

  <ng-titulo titulo="Domicilio fiscal de la empresa" />
  <ng-container formGroupName="grupoEmpresa">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Calle</label>
        <input
          type="text"
          class="form-control"
          formControlName="calle"
          id="calle"
          (change)="
            setValoresStore(grupoEmpresa, 'calle', 'setGrupoEmpresaCalle')
          "
        />
      </div>
      <div class="col-md-2 mb-3">
        <label>Número exterior</label>
        <input
          type="text"
          class="form-control"
          formControlName="numeroExterior"
          id="numeroExterior"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'numeroExterior',
              'setGrupoEmpresaNumeroExterior'
            )
          "
        />
      </div>
      <div class="col-md-2 mb-3">
        <label>Número interior</label>
        <input
          type="text"
          class="form-control"
          formControlName="numeroInterior"
          id="numeroInterior"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'numeroInterior',
              'setGrupoEmpresaNumeroInterior'
            )
          "
        />
      </div>
      <div class="col-md-2 mb-3">
        <label>Código postal</label>
        <input
          type="text"
          class="form-control"
          formControlName="codigoPostal"
          id="codigoPostal"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'codigoPostal',
              'setGrupoEmpresaCodigoPostal'
            )
          "
        />
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Colonia</label>
        <input
          type="text"
          class="form-control"
          formControlName="colonia"
          id="colonia"
          (change)="
            setValoresStore(grupoEmpresa, 'colonia', 'setGrupoEmpresaColonia')
          "
        />
      </div>
      <div class="col-md-6 mb-3">
        <label>País</label>
        <input
          type="text"
          class="form-control"
          formControlName="pais"
          id="pais"
          (change)="
            setValoresStore(grupoEmpresa, 'pais', 'setGrupoEmpresaPais')
          "
        />
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Estado</label>
        <input
          type="text"
          class="form-control"
          formControlName="estado"
          id="estado"
          (change)="
            setValoresStore(grupoEmpresa, 'estado', 'setGrupoEmpresaEstado')
          "
        />
      </div>
      <div class="col-md-6 mb-3">
        <label>Localidad</label>
        <input
          type="text"
          class="form-control"
          formControlName="localidad"
          id="localidad"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'localidad',
              'setGrupoEmpresaLocalidad'
            )
          "
        />
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Municipio o alcaldía</label>
        <input
          type="text"
          class="form-control"
          formControlName="municipio"
          id="municipio"
          (change)="
            setValoresStore(
              grupoEmpresa,
              'municipio',
              'setGrupoEmpresaMunicipio'
            )
          "
        />
      </div>
      <div class="col-md-4 mb-3">
        <label>Teléfono</label>
        <input
          type="text"
          class="form-control"
          formControlName="telefono"
          id="telefono"
          (change)="
            setValoresStore(grupoEmpresa, 'telefono', 'setGrupoEmpresaTelefono')
          "
        />
      </div>
    </div>
  </ng-container>
  }
</form>
