<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Empresa</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Cancelación de Certificados de Cupo</a>
            </li>
        </ul>
        <ng-container>
            <datos-empresa [hidden]="indice !== 1" #Solicitante></datos-empresa>
                @if(esDatosRespuesta){
            <app-cancelacion-de-certificado [hidden]="indice !== 2"></app-cancelacion-de-certificado>
                }
        </ng-container>
    </div>
</div>
