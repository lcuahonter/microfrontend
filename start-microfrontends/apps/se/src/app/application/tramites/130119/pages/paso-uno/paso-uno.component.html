<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="1" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="2" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Datos de la
                    solicitud</a>
            </li>
        </ul>
        <ng-container>
            <solicitante [hidden]="indice !== 1"></solicitante>
            @if(datosRespuestaDisponibles) {
            <app-datos-de-la-solicitud [hidden]="indice !== 2"></app-datos-de-la-solicitud>
            }
        </ng-container>
    </div>
</div>
