  <form [formGroup]="datosDelTramiteForm">
    <ng-titulo [titulo]="'Datos del trámite a realizar'"></ng-titulo>
        <div class="row">
            <div class="col-md-4">
                <app-catalogo-select [catalogo]="opcionesDeRegimen" [label]="'Régimen'" [required]="true"
                    formControlName="regimen"
                    (change)="setValoresStore(datosDelTramiteForm,'regimen')" [tooltipQuestionCircle]="true" [tooltipQuestionCircleText]="'Régimen al que se destinará la mercancía'" [isDisabled]="esSoloLectura"></app-catalogo-select>
            </div>
            <div class="col-md-4">
                <app-catalogo-select [catalogo]="opcionesDeClasificacionDeRegimen" [label]="'Clasificación de régimen'"
                    [required]="true" formControlName="clasificacionDeRegimen"
                    (change)="setValoresStore(datosDelTramiteForm,'clasificacionDeRegimen')" [isDisabled]="esSoloLectura"></app-catalogo-select>
            </div>
        </div>
    </form>
