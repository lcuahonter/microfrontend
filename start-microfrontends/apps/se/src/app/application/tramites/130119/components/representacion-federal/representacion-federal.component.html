    <form [formGroup]="formularioRepresentacionFederalForm">
    <ng-titulo [titulo]="'Representación federal'"></ng-titulo>
        <div class="row">
            <div class="col-md-4">
                <app-catalogo-select (change)="setValoresStore(formularioRepresentacionFederalForm,'estado')" [catalogo]="opcionesEstado"
                    [label]="'Estado'" [required]="true"
                    formControlName="estado" [isDisabled]="esSoloLectura"></app-catalogo-select>
            </div>
            <div class="col-md-4">
                <app-catalogo-select [catalogo]="opcionesRepresentacionFederal" [label]="'Representación federal'"
                    [required]="true" formControlName="representacionFederal"
                    (change)="setValoresStore(formularioRepresentacionFederalForm,'representacionFederal')" [isDisabled]="esSoloLectura">
                </app-catalogo-select>
            </div>

        </div>
    </form>
