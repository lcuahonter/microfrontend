<form [formGroup]="datosDelDestinatarioForm">
    <ng-titulo [titulo]="'Datos del destinatario'"></ng-titulo>
        <div class="row">
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="nombre">Nombre(s):</label>
                    <input type="text" (change)="setValoresStore(datosDelDestinatarioForm,'nombre')"
                        class="form-control" id="nombre" formControlName="nombre" maxlength="25" />
                    <div
                        *ngIf="datosDelDestinatarioForm.get('nombre')?.touched && datosDelDestinatarioForm.get('nombre')?.invalid">
                        <small *ngIf="datosDelDestinatarioForm.get('nombre')?.errors?.['pattern']"
                            class="text-danger"> Por favor, corrija el nombre de la persona.</small>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="primerApellido">Primer apellido:</label>
                    <input type="text"
                        (change)="setValoresStore(datosDelDestinatarioForm,'primerApellido')"
                        class="form-control" id="primerApellido" formControlName="primerApellido" maxlength="20"/>
                    <div *ngIf="datosDelDestinatarioForm.get('primerApellido')?.invalid">
                        <small *ngIf="datosDelDestinatarioForm.get('primerApellido')?.errors?.['pattern']"
                            class="text-danger"> Por favor, corrija el nombre de la persona.</small>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="segundoApellido">Segundo apellido:</label>
                    <input type="text"
                        (change)="setValoresStore(datosDelDestinatarioForm,'segundoApellido')"
                        class="form-control" id="segundoApellido" formControlName="segundoApellido"
                        maxlength="20"
                        />
                    <div *ngIf="datosDelDestinatarioForm.get('segundoApellido')?.invalid">
                        <small *ngIf="datosDelDestinatarioForm.get('segundoApellido')?.errors?.['pattern']"
                            class="text-danger">  Por favor, corrija el nombre de la persona.</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">

            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="numeroDeRegistroFiscal">Número de registro
                        fiscal*:</label>
                    <input type="text"
                        (change)="setValoresStore(datosDelDestinatarioForm,'numeroDeRegistroFiscal')"
                        class="form-control" id="numeroDeRegistroFiscal" formControlName="numeroDeRegistroFiscal"
                        maxlength="30"
                        />
                    <div
                        *ngIf="datosDelDestinatarioForm.get('numeroDeRegistroFiscal')?.touched && datosDelDestinatarioForm.get('numeroDeRegistroFiscal')?.invalid">
                        <small *ngIf="datosDelDestinatarioForm.get('numeroDeRegistroFiscal')?.errors?.['pattern']"
                            class="text-danger">
                            Por favor, sólo escriba dígitos.</small>
                        <small *ngIf="datosDelDestinatarioForm.get('numeroDeRegistroFiscal')?.errors?.['required']"
                            class="text-danger">
                            Este campo es obligatorio.</small>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="form-group">
                    <label class="form-label width-unset" for="razonSocial">Razón social:</label>
                    <input type="text"
                        (change)="setValoresStore(datosDelDestinatarioForm,'razonSocial')"
                        class="form-control" id="razonSocial" formControlName="razonSocial"
                        maxlength="70"/>
                        <div *ngIf="datosDelDestinatarioForm.get('razonSocial')?.invalid">
                            <small *ngIf="datosDelDestinatarioForm.get('razonSocial')?.errors?.['pattern']"
                                class="text-danger"> Por favor, corrija la razón social.</small>
                        </div>
                </div>
            </div>

        </div>
    </form>
