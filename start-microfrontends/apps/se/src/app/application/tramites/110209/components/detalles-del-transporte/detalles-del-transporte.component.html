<form [formGroup]="detallesDelTransporteForm">
    <ng-titulo [titulo]="'Detalles del transporte'"></ng-titulo>
        <div class="row">
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="tratado">Tratado / Acuerdo:</label>
                    <input type="text" class="form-control" id="tratado" formControlName="tratado" readonly />
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="paisOBloque">País / Bloque:</label>
                    <input type="text" class="form-control" id="paisOBloque" formControlName="paisOBloque" readonly />
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="paisOOrigin">País de origen:</label>
                    <input type="text" class="form-control" id="paisOOrigin" formControlName="paisOOrigin" readonly />
                </div>
            </div>
        </div>

        <div class="row mt-4" >

            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label width-unset" for="tratado">País destino:</label>
                    <input type="text" class="form-control" id="tratado" formControlName="paisODestino" readonly />
                </div>
            </div>

            <div class="col-md-4" *ngIf="formularioCargado">
                <div class="form-group">
                    <input-fecha [setFecha]="detallesDelTransporteForm.get('fechaDeExpedicion')?.value" [datos]="fechaDeExpedicionInput"></input-fecha>
                </div>
            </div>

            <div class="col-md-4" *ngIf="formularioCargado">
                <div class="form-group">
                    <input-fecha [setFecha]="detallesDelTransporteForm.get('fechaDeVencimiento')?.value" [datos]="fechaDeVencimientoInput"></input-fecha>
                </div>
            </div>
        </div>
    </form>
