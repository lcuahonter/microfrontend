<form [formGroup]="mercanciaFrom">
        <div class="row mt-4">
            <div class="col-md-12">
                <div class="form-group">
                    <label for="nombreComercial" class="form-label">Nombre comercial:</label>
                    <input type="text" class="form-control" id="nombreComercial" formControlName="nombreComercial">
                </div>
            </div>
        </div>
        <div class="row mt-4">
            <div class="col-md-12">
            <div class="form-group">
                <label for="nombreIngles" class="form-label">Nombre en inglés:</label>
                <input type="text" class="form-control" id="nombreIngles" formControlName="nombreIngles">
            </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-12">
                <div class="form-group">
                    <label for="descripcion" class="form-label">Complemento de la descripción:</label>
                    <input type="text" class="form-control" id="descripcion" formControlName="descripcion"
                  placeholder="pruebas" (change)="setValoresStore(mercanciaFrom,'descripcion')">
                    <div *ngIf="mercanciaFrom.get('descripcion')?.touched && mercanciaFrom.get('descripcion')?.invalid">
                        <small *ngIf="mercanciaFrom.get('descripcion')?.errors?.['pattern']" class="text-danger">Por favor, corrija la descripcion.</small>
                      </div>
                </div>
                </div>
            </div>


        <div class="row mt-4">
            <div class="col-md-4">
                <div class="form-group">
                    <label for="marca"class="form-label">Marca:</label>
                    <input type="text" class="form-control" id="marca" formControlName="marca" placeholder="Pruebas de marca"
                    (change)="setValoresStore(mercanciaFrom,'marca')">
                    <div *ngIf="mercanciaFrom.get('marca')?.touched && mercanciaFrom.get('marca')?.invalid">
                        <small *ngIf="mercanciaFrom.get('marca')?.errors?.['pattern']" class="text-danger">Por favor, corrija el nombre.</small>
                      </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <label for="valorMercancia" class="form-label">Valor mercancía:</label>
                    <input type="text" class="form-control" id="valorMercancia" formControlName="valorMercancia" placeholder="12"
                    (change)="setValoresStore(mercanciaFrom,'valorMercancia')">
                    <div *ngIf="mercanciaFrom.get('valorMercancia')?.touched && mercanciaFrom.get('valorMercancia')?.invalid">
                        <small *ngIf="mercanciaFrom.get('valorMercancia')?.errors?.['pattern']" class="text-danger">El valor debe ser un número con hasta 15 dígitos enteros y hasta 4 dígitos decimales.</small>
                      </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <label for="cantidad" class="form-label">Cantidad:</label>
                    <input type="text" class="form-control" id="cantidad" formControlName="cantidad">
                    <div *ngIf="mercanciaFrom.get('cantidad')?.touched && mercanciaFrom.get('cantidad')?.invalid">
                        <small *ngIf="mercanciaFrom.get('cantidad')?.errors?.['pattern']" class="text-danger">El valor debe ser un número con hasta 15 dígitos enteros y hasta 4 dígitos decimales.</small>
                      </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-5">
                <div class="form-group">
                    <app-catalogo-select [label]="'Unidad de medida de comercialización'" [catalogo]="unidadOptions"  [required]="false" formControlName="unidadMedida"
                    (change)="setValoresStore(mercanciaFrom,'unidadMedida')"></app-catalogo-select>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="form-group">
                    <label for="numeroFactura" class="form-label">Número de factura:</label>
                    <input type="text" class="form-control" id="numeroFactura" formControlName="numeroFactura" placeholder="23432432"
                    (change)="setValoresStore(mercanciaFrom,'numeroFactura')">
                    <div *ngIf="mercanciaFrom.get('numeroFactura')?.touched && mercanciaFrom.get('numeroFactura')?.invalid">
                        <small *ngIf="mercanciaFrom.get('numeroFactura')?.errors?.['pattern']" class="text-danger">Por favor, corrija el número de factura.</small>
                      </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <app-catalogo-select [label]="'Tipo de factura'" [catalogo]="tipoFacturaOptions"  [required]="false" formControlName="tipoFactura"
                    (change)="setValoresStore(mercanciaFrom,'tipoFactura')"></app-catalogo-select>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-group">
                    <input-fecha [setFecha]="mercanciaFrom.get('fechaFactura')?.value" [datos]="fechaDeLaFacturaInput"></input-fecha>
                </div>
            </div>

        </div>

    </form>
