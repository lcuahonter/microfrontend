<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" tabindex="0" data-toggle="tab" >Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" tabindex="0" data-toggle="tab" >Tratados </a>
        </li>
        <li [ngClass]="indice === 3 ? 'active' : ''">
            <a (click)="seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" tabindex="0" data-toggle="tab" >Destinatario </a>
          </li>
          <li [ngClass]="indice === 4 ? 'active' : ''">
            <a (click)="seleccionaTab(4)" (keyup.enter)="seleccionaTab(4)" (keydown.space)="seleccionaTab(4)" tabindex="0" data-toggle="tab" >Transporte</a>
          </li>
          <li [ngClass]="indice === 5 ? 'active' : ''">
            <a (click)="seleccionaTab(5)" (keyup.enter)="seleccionaTab(5)" (keydown.space)="seleccionaTab(5)" tabindex="0" data-toggle="tab" >Datos certificado  </a>
          </li>
      </ul>
  
      <ng-container>
        <solicitante #solicitante [hidden]="indice !== 1"></solicitante>
        @if(esDatosRespuesta){
        <app-detalles-del-transporte #detallesDelTransporte [hidden]="indice !== 2"></app-detalles-del-transporte>
        <app-datos-del-destinatario #datosDelDestinatario [hidden]="indice !== 3"></app-datos-del-destinatario>
        <app-domicilio-del-destinatario #domicilioDelDestinatario [hidden]="indice !== 3"></app-domicilio-del-destinatario>
          <app-transporte #transporte [hidden]="indice !== 4"></app-transporte>
           <app-datos-del-certificado #datosDelCertificado [hidden]="indice !== 5" (modificarEventCertificado)="modificarEventCapturar.emit($event)"></app-datos-del-certificado>
          }
      </ng-container>
    </div>
  </div>
