<div class="page">
  <div class="container">

  @if(!showMercanciaForm){

    <div class="row">
      <div class="col-md-12">
        <h1>Validar por motivos técnicos el certificado SGP </h1>
      </div>
      @if(esFormaValido){
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
        }
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) {
      @case (1) {
        <app-capturar-solicitud #pasoUno [indice]="capturarTapIndice" (modificarEventCapturar)="showMercancia($event,0)"></app-capturar-solicitud>
      }
      @case (2) {
       <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="110209" [procedureUrl]="'certificado-sgp/solicitud-page'"></paso-firma>
      }
      }
      <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" [dePadre]="true"></btn-continuar>
    </div>
  }
  @else{

    <div>
      <app-registro-de-mercancia (modificarEventMercancia)="showMercancia($event,5)"></app-registro-de-mercancia>
    </div>
  }
  </div>
</div>
