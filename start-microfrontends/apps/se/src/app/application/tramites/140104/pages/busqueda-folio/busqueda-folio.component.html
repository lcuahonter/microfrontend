<div class="modal-dialog modal-xl">
    <div class="modal-content">
        <div class="modal-header d-flex justify-content-between">
            <h5 class="modal-title" id="exampleModalLabel">Detalle del permiso</h5>
        </div>
        <div class="modal-body">
            <form [formGroup]="detalleDelPermisoForm">
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label" for="numFolioTramite">Folio del permiso:
                        </label>
                        <input type="text" class="form-control" id="numFolioTramite" formControlName="numFolioTramite">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="tipoSolicitud">Tipo de solicitud:
                        </label>
                        <input type="text" class="form-control" id="tipoSolicitud" formControlName="tipoSolicitud">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="regimen">Régimen:
                        </label>
                        <input type="text" class="form-control" id="regimen" formControlName="regimen">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label" for="condicionMercancia">Condición de la mercancía:
                        </label>
                        <input type="text" class="form-control" id="condicionMercancia"
                            formControlName="condicionMercancia">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="unidadMedidaUMT">Unidad de medida de la tarifa (UMT):
                        </label>
                        <input type="text" class="form-control" id="unidadMedidaUMT" formControlName="unidadMedidaUMT">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="cantidadAutorizada">Cantidad:
                        </label>
                        <input type="text" class="form-control" id="cantidadAutorizada" formControlName="cantidadAutorizada">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label" for="clasificacionRegimen">Clasificación del régimen:
                        </label>
                        <input type="text" class="form-control" id="clasificacionRegimen" formControlName="clasificacionRegimen">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="usoEspecifico">Valor de factura USD:
                        </label>
                        <input type="text" class="form-control" id="usoEspecifico" formControlName="usoEspecifico">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label" for="valorSolicitado">último saldo:
                        </label>
                        <input type="text" class="form-control" id="valorSolicitado" formControlName="valorSolicitado">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label" for="fraccion">Fracción arancelaria:
                        </label>
                        <textarea rows="3" style="height: 80px" readonly class="form-control" id="fraccion"
                            formControlName="fraccion"></textarea>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label" for="descripcionMercancia">Descripción de la mercancía:
                        </label>
                        <textarea rows="3" style="height: 80px" readonly class="form-control"
                            id="descripcionMercancia" formControlName="descripcionMercancia"></textarea>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-10">
                        <label class="form-label" for="esquemaReglaOctava">Esquema regla 8va:
                        </label>
                        <textarea rows="3" style="height: 80px" readonly class="form-control" id="esquemaReglaOctava"
                            formControlName="esquemaReglaOctava"></textarea>
                    </div>

                </div>

                <div class="row">
                    <div class="col-md-10">
                        <label class="form-label" for="paises">País(es) de destino:
                        </label>
                        <textarea rows="3" style="height: 80px" readonly class="form-control" id="paises"
                            formControlName="paises"></textarea>
                    </div>
                </div>
            </form>
        </div>
        <div class="row">
            <div class="col-md-12 d-flex justify-content-end"></div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal"
                (click)="detalleCancelar()">Cancelar</button>
            <button type="button" class="btn btn-primary" (click)="agregar($event)">Agregar</button>
        </div>
    </div>
</div>
