<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>{{ tituloMensaje || null }}</h1>
      </div>
      <div class="col-12">
        @if (!esFormaValido) {
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="infoError"></ng-alert>
      }

      </div>
      <app-wizard #wizardRef [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
        <app-paso-uno  #pasoUnoRef></app-paso-uno>`
      } @case (2) {
      <paso-firma [idSolicitud]="idSolicitudState" [procedure]="140104" [procedureUrl]="'cancelacion-de-certificados-de-cupo/solicitante'"></paso-firma>
      } 
    }


      <div class="row">
      <div class="col-md-12">
        @if (indice !== 2) {  
          <btn-continuar
            [datos]="datosPasos"
            (continuarEvento)="getValorIndice($event)"
          ></btn-continuar>
        }
      </div>
    </div>
     
    </div>
  </div>
</div>
