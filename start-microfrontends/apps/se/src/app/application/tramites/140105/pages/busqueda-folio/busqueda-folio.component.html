
<div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header d-flex justify-content-between">
        <h5 class="modal-title" id="exampleModalLabel">Detalle del permiso</h5>
      </div>
        <div class="modal-body">
        <form [formGroup]="detalleDelPermisoForm">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="folioTramite">Folio trámite:
                    </label>
                    <input type="text" class="form-control" id="folioTramite" formControlName="folioTramite">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="tipoDeSolicitud">Tipo de solicitud:
                    </label>
                    <input type="text" class="form-control" id="tipoDeSolicitud" formControlName="tipoDeSolicitud">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="regimen">Régimen:
                    </label>
                    <input type="text" class="form-control" id="regimen" formControlName="regimen">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="condicionDeLaMercancia">Condición de la mercancía:
                    </label>
                    <input type="text" class="form-control" id="condicionDeLaMercancia" formControlName="condicionDeLaMercancia">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="umt">Unidad de medida de la tarifa (UMT):
                    </label>
                    <input type="text" class="form-control" id="umt" formControlName="umt">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="cantidad">Cantidad:
                    </label>
                    <input type="text" class="form-control" id="cantidad" formControlName="cantidad">
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label" for="cdr">Clasificación del régimen:
                    </label>
                    <input type="text" class="form-control" id="cdr" formControlName="cdr">
                </div>
                <div class="col-md-4">
                    <label class="form-label" for="usd">Valor de factura USD:
                    </label>
                    <input type="text" class="form-control" id="usd" formControlName="usd">
                </div>
            </div>


            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" for="fraccionArancelaria">Fracción arancelaria:
                    </label>
                    <textarea rows="3" style="height: 80px" readonly class="form-control" id="fraccionArancelaria" formControlName="fraccionArancelaria"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="descripcionDeLaMercancia">Descripción de la mercancía:
                    </label>
                    <textarea rows="3" style="height: 80px" readonly class="form-control" id="descripcionDeLaMercancia" formControlName="descripcionDeLaMercancia"></textarea>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label" for="procedencia">País(es) procedencia:
                    </label>
                    <textarea rows="3" style="height: 80px" readonly class="form-control" id="procedencia" formControlName="procedencia"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="mercancia">Uso(s) específico(s) de la mercancía:
                    </label>
                    <textarea rows="3" style="height: 80px" readonly class="form-control" id="mercancia" formControlName="mercancia"></textarea>
                </div>
            </div>

            <div class="row">
                <div class="col-md-10">
                    <label class="form-label" for="beneficioQueSeObtiene">Justificación de la importación o exportación y el beneficio que se obtiene:
                    </label>
                    <textarea rows="3" style="height: 80px" readonly class="form-control" id="beneficioQueSeObtiene" formControlName="beneficioQueSeObtiene"></textarea>
                </div>

            </div>
            <div class="row">
                <div class="col-md-10">
                    <label class="form-label" for="observaciones">Observaciones:
                    </label>
                    <textarea rows="3" style="height: 80px" readonly class="form-control" id="observaciones" formControlName="observaciones"></textarea>
                </div>

            </div>
        </form>
        </div>
        <div class="row">
            <div class="col-md-12 d-flex justify-content-end"></div>
        </div>
        <div class="modal-footer">
        
            <button type="button" class="btn btn-default" data-dismiss="modal" (click)="detalleCancelar()">Cancelar</button>
            <button type="button" class="btn btn-primary" (click)="agregar($event)">Agregar</button>
         
        
    </div>
    </div>
</div>
