<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12 mb-5">
        <h1>{{ tituloMensaje || null }}</h1>
      </div>
      <div class="col-12">
        @if (!esFormaValido && formularioIntentado) {
        <div
          class="alert alert-info alert-danger text-center"
          [innerHTML]="formErrorAlert"
        ></div>
        }
      </div>

      <app-wizard #wizardRef [listaPasos]="pasos"></app-wizard>
    </div>
    

    <div class="row">
      @switch (indice) {
        @case (1) {
          <app-paso-uno #pasoUnoRef></app-paso-uno>
        } @case (2) {
          <app-paso-carga-documento 
            [idSolicitud]="idSolicitudState"
            [idTipoTRamite]="idTipoTramite"
            [cargaArchivosEvento]="cargarArchivosEvento"
            (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
            (reenviarCargaRealizada)="cargaRealizada($event)"
            (cargaEnProgreso)="onCargaEnProgreso($event)"
            (enBlancoObligatoria)="onBlancoObligatoria($event)"
          ></app-paso-carga-documento>
        } @case (3) {
          <paso-firma [idSolicitud]="idSolicitudState" [procedure]="140105" [procedureUrl]="'desistimiento-de-permiso/solicitante'"></paso-firma>
        }
      }

      <div class="row">
        <div class="col-md-12">
          @if (indice !== 2) {
          <btn-continuar
            [datos]="datosPasos"
            (continuarEvento)="getValorIndice($event)"
            [dePadre]="true"
          ></btn-continuar>
          } @else {
          <div class="mt-5 mb-3 d-flex justify-content-end">
            <button
              type="button"
              class="btn btn-default"
              (click)="anterior()"
              *ngIf="seccionCargarDocumentos"
            >
              Anterior
            </button>

            @if(isSaltar) {
              <button
                type="button"
                class="btn btn-default ms-3"
                (click)="saltar()"
              >
                Saltar
              </button>
            }

            <button
              class="btn btn-primary ms-3"
              (click)="
                seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
              "
              [disabled]="!activarBotonCargaArchivos && seccionCargarDocumentos"
            >
              {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
            </button>
          </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>
