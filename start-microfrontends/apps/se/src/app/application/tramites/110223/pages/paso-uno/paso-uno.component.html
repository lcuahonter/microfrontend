<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Certificado de Origen</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a (click)="seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" tabindex="2" data-toggle="tab">Histórico productores</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)" (keydown.space)="seleccionaTab(4)" role="button" tabindex="4">Destinatario</a>
      </li>
      <li [ngClass]="indice === 5 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(5)" (keydown.enter)="seleccionaTab(5)" (keydown.space)="seleccionaTab(5)" role="button" tabindex="5">Datos Certificado</a>
      </li>
    </ul>
    <solicitante [hidden]="indice !== 1" #SolicitanteComponent></solicitante>
    <app-certificado-origen [hidden]="indice !== 2" #CertificadoOrigen></app-certificado-origen>
    <app-historico-productoress [hidden]="indice !== 3" #HistoricoProductores></app-historico-productoress>
    <app-destinatario-de-certificado [hidden]="indice !== 4" #Destinatario></app-destinatario-de-certificado>
    <app-datos-certificado [hidden]="indice !== 5" #DatosCertificado></app-datos-certificado>
  </div>
</div>
