<div class="row">
  <ul class="nav nav-tabs">
    <li [ngClass]="indice === 1 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(1)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="1"
        role="button"
        >Solicitante</a
      >
    </li>
    <li [ngClass]="indice === 2 ? 'active' : ''">
      <a
        data-toggle="tab"
        (click)="seleccionaTab(2)"
        (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)"
        tabindex="2"
        role="button"
        >Empresas terciarizadas</a
      >
    </li>
  </ul>

  <ng-container>
    @switch (indice) { @case (1) {
    <solicitante></solicitante>
    } @case (2) {
      @if(esDatosRespuesta){
      <app-empresas-terciarizadas></app-empresas-terciarizadas>
      }
    }
  }
  </ng-container>
</div>
