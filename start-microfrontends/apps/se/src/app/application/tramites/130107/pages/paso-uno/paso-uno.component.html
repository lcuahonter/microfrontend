<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (keyup)="seleccionaTab(1)"
          (click)="seleccionaTab(1)"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (keyup)="seleccionaTab(1)"
          (click)="seleccionaTab(2)"
          >Datos de la solicitud</a
        >
      </li>
    </ul>
    <ng-container>
      <solicitante [hidden]="indice !== 1"></solicitante>

      <app-solicitud [hidden]="indice !== 2"></app-solicitud>
    </ng-container>
  </div>
</div>
