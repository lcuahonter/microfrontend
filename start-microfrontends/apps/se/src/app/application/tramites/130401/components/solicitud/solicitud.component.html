<div class="container">
  <form [formGroup]="solicitudFormulario">
    <ng-titulo titulo="Datos del trámite original" />
    <div class="row">
      <div class="col-md-4">
        <label>Numero folio trámite Original:</label>
        <input
          type="text"
          class="form-control"
          id="numeroFolioTramiteOriginal"
          formControlName="numeroFolioTramiteOriginal"
        />
      </div>
    </div>
    <ng-titulo titulo="Datos del trámite a realizar" />
    <div class="row">
      <div class="col-md-4">
        <label>Solicitud:</label>
        <app-input-radio
          [radioOptions]="solicitudOpcionRadio"
          [isRequired]="true"
          [layout]="'vertical'"
          formControlName="tipoSolicitudPexim"
        ></app-input-radio>
      </div>
      <div class="col-md-8">
        <div>
          <label>Régimen:</label>
          <input
            type="text"
            class="form-control"
            id="regimen"
            formControlName="regimen"
          />
        </div>
        <div class="mt-5">
          <label>Clasificación del régimen:</label>
          <textarea
            class="form-control height-55"
            id="clasificacionRegimen"
            formControlName="clasificacionRegimen"
          ></textarea>
        </div>
      </div>
    </div>
    <ng-titulo titulo="Datos de la mercancía" />
    <div class="row">
      <div class="col-md-4">
        <label>Producto:</label>
        <app-input-radio
          [radioOptions]="productoOpcionRadio"
          [isRequired]="true"
          [layout]="'vertical'"
          formControlName="condicionMercancia"
        ></app-input-radio>
      </div>
      <div class="col-md-8">
        <div>
          <label>Descripción de la mercancía:</label>
          <textarea
            class="form-control height-80"
            id="mercanciaDescripcion"
            formControlName="mercanciaDescripcion"
          ></textarea>
        </div>
      </div>
      <div class="col-md-12 mt-4">
        <label>Fracción arancelaria:</label>
        <textarea
          class="form-control height-80"
          id="fraccionArancelaria"
          formControlName="fraccionArancelaria"
        ></textarea>
      </div>
      <div class="col-md-4 mt-4">
        <label for="unidadMedidaTarifaria">UMT:</label>
        <input
          type="text"
          id="unidadMedidaTarifaria"
          formControlName="unidadMedidaTarifaria"
          class="form-control"
        />
      </div>
      <div class="col-md-4 mt-4">
        <label>Cantidad:</label>
        <input
          type="text"
          class="form-control"
          id="unidadesAutorizadas"
          formControlName="unidadesAutorizadas"
        />
      </div>
      <div class="col-md-4 mt-4">
        <label>Valor de factura USD:</label>
        <input
          type="text"
          class="form-control"
          id="importeFacturaAutorizadoUSD"
          formControlName="importeFacturaAutorizadoUSD"
        />
      </div>
    </div>
    <ng-container class="mt-5">
      <ng-titulo titulo="Partidas de la mercancía" />
      <div class="table-container">
        <div class="row">
          <div class="col-md-8">
            <label class="mb-2">Partidas</label>
            <app-tabla-dinamica
              [configuracionTabla]="solicitudTablaEncabezados"
              [datos]="solicitudTablaDatos"
            ></app-tabla-dinamica>
          </div>
        </div>
      </div>
    </ng-container>

    <ng-container>
      <div class="row mt-5">
        <div class="col-md-8">
          <ng-titulo titulo="País(es) procedencia" />
          <label class="fc-7a7878">{{paises}}</label>
        </div>

      </div>
      <div class="row mt-5">
        <div class="col-md-8">
          <div class="form-group">
            <label for="usoEspecifico"
              >Uso(s) específico(s) de la mercancía:</label
            >
            <textarea
              id="usoEspecifico"
              formControlName="usoEspecifico"
              class="form-control h-80"
            ></textarea>
          </div>
        </div>
      </div>
      <div class="row mt-5">
        <div class="col-md-8">
          <label for="justificacionImportacionExportacion"
            >Justificación y beneficio que se obtiene<sup>1</sup>*:</label
          >
          <textarea
            id="justificacionImportacionExportacion"
            formControlName="justificacionImportacionExportacion"
            class="form-control h-80"
          ></textarea>
        </div>


      </div>
      <div class="row mt-5">
        <div class="col-md-8">
          <label for="observaciones">Observaciones:</label>
          <textarea
            id="observaciones"
            formControlName="observaciones"
            class="form-control h-80"
          ></textarea>
        </div>


      </div>
    </ng-container>
    <ng-container class="mt-5">
      <ng-titulo titulo="Representación federal" />
      <div class="row">
          <div class="col-md-4">
            <label for="representacionFederal">Representación federal:</label>
            <input
              type="text"
              id="representacionFederal"
              formControlName="representacionFederal"
              class="form-control"
            />
        </div>

      </div>
    </ng-container>
  </form>
</div>
