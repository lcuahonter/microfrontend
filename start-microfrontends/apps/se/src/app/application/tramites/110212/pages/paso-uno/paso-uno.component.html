<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" tabindex="0"
          data-toggle="tab">Solicitante</a>
      </li>
      @if(!consultaDatos.readonly){
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" tabindex="1"
          data-toggle="tab">Certificado de origen</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a (click)="seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" tabindex="2"
          data-toggle="tab">Destinatario</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a (click)="seleccionaTab(4)" (keyup.enter)="seleccionaTab(4)" (keydown.space)="seleccionaTab(4)" tabindex="3"
          data-toggle="tab">Datos certificado</a>
      </li>
      }
    </ul>
    <ng-container>

      <solicitante #solicitante [hidden]="indice !== 1"></solicitante>
      
      @if(!consultaDatos.readonly){
      @if(esDatosRespuesta){
      <app-certificado-origen #CertificadoOrigen [hidden]="indice !== 2 || !esDatosRespuesta"></app-certificado-origen>
      }
      

      @if(esDatosRespuesta){
      <app-destinatario-tramite #destinatarioComp [hidden]="indice !== 3 || !esDatosRespuesta "></app-destinatario-tramite>
      }
   
      @if(esDatosRespuesta){
      <app-datos-certificado #datosCertificadoComp [hidden]="indice !== 4 || !esDatosRespuesta"></app-datos-certificado>
      }
    }
    </ng-container>
  </div>
</div>
