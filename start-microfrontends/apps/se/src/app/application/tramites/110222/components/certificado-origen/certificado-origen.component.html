<app-certificado-de-origen #certificadoDeOrigen
    [operador]="operador"
    [tratadoAcuerdo]="estado || []"
    [paisBloqu]="pais || []"
    [idProcedimiento]="idProcedimiento"
    (formCertificadoEvent)="obtenerDatosFormulario($event)"
    (tipoEstadoSeleccionEvent)="tipoEstadoSeleccion($event)"
    (paisBloquEvent)="tipoSeleccion($event)"
    (setbuscarMercanciaEvent)="conseguirDisponiblesDatos()"
    [tableData]="(datosTablaUno$ | async) ||  []"
    (filaClicsMercanciaDisponibles)="abrirModificarModal($event, true)"
    (filaClicsMercanciaSelecction)="abrirModificarModal($event, false)"
    (filaClics)="abrirModificarModal($event, false)"
    [tablaSeleccionEvent]="tablaSeleccionEvent"
    [guardarClicado]="datosTabla$"
    (formaValida)="setFormValida($event)"
    (guardarClicadoEvent)="guardarClicado($event)"
    [datosForm]="formCertificadoValues"
    [cargaMercanciaConfiguracionTabla]="cargaMercanciaConfiguracionTabla"
    [mercanciasDisponibles]="mercanciasDisponibles"
    [tramiteState]="formCertificadoValues"
    [elementosRequeridos]="elementosRequeridos"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    (formCertificadoEvent)="setValoresStore($event)"
    [cargoDeMercancias]="cargoDeMercancias"
    [domicilio]="domicilio">
</app-certificado-de-origen>

<div class="modal fade" #modifyModal tabindex="-1" aria-labelledby="modifyModalLabel" aria-hidden="true">
    <app-datos-mercancia-model [esFormularioSoloLectura]="esFormularioSoloLectura" [datosSeleccionados]="datosSeleccionados" [idProcedimiento]="idProcedimiento" [fromMercanciasDisponibles]="fromMercanciasDisponibles" (guardarClicado)="abrirModificarModal($event, false)"
        (cerrarClicado)="cerrarModificarModal()" (EMITMERCANIAS)="emitmercaniasDatos($event)"></app-datos-mercancia-model>
</div>
