<ng-container>
  <form [formGroup]="validacionForm" (ngSubmit)="validarDestinatarioFormulario()">
    <ng-titulo titulo="Buscar certificado de origen" />
    <div class="row mt-5">
      <div class="col-md-4">
        <label>Número de certificado de origen<span
            [ngClass]="validacionForm.get('numeroCertificado')?.invalid && validacionForm.get('numeroCertificado')?.touched ? 'text-danger' : ''">*</span>:</label>
        <input type="text" required="true" class="form-control" formControlName="numeroCertificado" maxlength="50"
          (input)="onNumeroCertificadoChange($event)" [ngClass]=" validacionForm.get('numeroCertificado')?.invalid &&
            validacionForm.get('numeroCertificado')?.touched ? 'required' : ''"/>
        @if (validacionForm.get('numeroCertificado')?.hasError('required') && validacionForm.get('numeroCertificado')?.touched ) {
        <div class="text-danger">
          <small>Este campo es obligatorio</small>
        </div>
        }
      </div>
      <div class="col-md-4"></div>
      <div class="col-md-3 mt-5 d-flex justify-content-end buscar">
        <button type="button" class="btn btn-primary" (click)="getSolicitudesTabla()" [disabled]="validacionForm.get('numeroCertificado')?.invalid">
          Buscar Certificado
        </button>
      </div>
    </div>
    <ng-titulo titulo="" />
    <div class="row">
      <div class="col-md-4">
        <app-catalogo-select [catalogo]="paisCatalogo.catalogos" label="País / Bloque" [required]="false" formControlName="pais" (selectionChange)="onChangeEntidad($event)" (change)="setValoresStore(validacionForm, 'pais', 'setPais')" ></app-catalogo-select>
      </div>
    </div>
    <div class="row">
      <div class="col-md-4">
        <app-catalogo-select [catalogo]="tratadoCatalogo.catalogos" label="Tratado / Acuerdo" formControlName="tratado" (change)="setValoresStore(validacionForm, 'tratado', 'setTratado')"></app-catalogo-select>
      </div>
    </div>
    <div class="row mt-5">
      <div class="col-md-4">
        <input-fecha [setFecha]="validacionForm.get('fechaInicial')?.value" [datos]="fechaInicialInput"
          (valorCambiado)="cambioFechaInicial($event)"></input-fecha>
      </div>
      <div class="col-md-4">
        <input-fecha [setFecha]="validacionForm.get('fechaFinal')?.value" [datos]="fechaFinalInput"
          (valorCambiado)="cambioFechaFinal($event)"></input-fecha>
      </div>
      <div class="col-md-3 mt-5 d-flex justify-content-end">
        <button type="button" class="btn btn-primary ms-3" (click)="alBuscarClic()">
          Buscar Certificado
        </button>
      </div>
    </div>

    <div class="row mt-5 text-center">
      <h5>
        <ng-alert [CONTENIDO]="TEXTO_DE_ALERTA"></ng-alert>
      </h5>
    </div>
    <div class="table-container centered-table-wrapper mt-5">
      <app-tabla-dinamica (dblclick)="onTablaDblClick($event)" [tipoSeleccionTabla]="TablaSeleccion.UNDEFINED"
        [configuracionTabla]="headers" [datos]="certificadoDisponsiblesTablaDatos"></app-tabla-dinamica>
    </div>
  </form>
</ng-container>
