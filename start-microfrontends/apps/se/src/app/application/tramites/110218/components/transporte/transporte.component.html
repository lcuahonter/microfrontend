<div class="container">
    <div>
      <ng-titulo
        titulo="Detalles del transporte"
      ></ng-titulo>
      <form [formGroup]="detallestransporte" novalidate>
        <div class="row">
         
          <div class="col-md-4">
            <label class="form-label" for="puertodeEmbarque">Puerto de embarque:</label>
            <input 
              type="text" class="form-control" id="puertodeEmbarque" 
              placeholder="Veracruz" formControlName="puertodeEmbarque"
              (change)="setValorStore(detallestransporte,'puertodeEmbarque')"
              maxlength="40"
              [class.bg-white]="!detallestransporte.get('puertodeEmbarque')?.disabled">
        
          </div>
      
          <div class="col-md-4">
            <label class="form-label" for="puertodeDesembarque">Puerto de desembarque:</label>
            <input 
              type="text" class="form-control" id="puertodeDesembarque" 
              placeholder="Altamira" formControlName="puertodeDesembarque"
              (change)="setValorStore(detallestransporte,'puertodeDesembarque')"
              maxlength="40" 
              [class.bg-white]="!detallestransporte.get('puertodeDesembarque')?.disabled">
        
          </div>
      
          <div class="col-md-4">
            <label class="form-label" for="puertodeTransito">Puerto de tránsito:</label>
            <input 
              type="text" class="form-control" id="puertodeTransito" 
              placeholder="Dos Bocas" formControlName="puertodeTransito"
              (change)="setValorStore(detallestransporte,'puertodeTransito')"
              maxlength="30"
              [class.bg-white]="!detallestransporte.get('puertodeTransito')?.disabled">
        
          </div>
      
         
          <div class="col-md-4 mt-4">
            <label class="form-label" for="nombredelaEmbarcacion">Nombre de la embarcación:</label>
            <input 
              type="text" class="form-control" id="nombredelaEmbarcacion" 
              placeholder="Embarcación Prueba" formControlName="nombredelaEmbarcacion"
              (change)="setValorStore(detallestransporte,'nombredelaEmbarcacion')"
              maxlength="30"
              [class.bg-white]="!detallestransporte.get('nombredelaEmbarcacion')?.disabled">
        
          </div>
      
         <div class="col-md-4 mt-4">
            <label class="form-label" for="numerodeVuelo">Número de vuelo:</label>
            <input 
              type="text" class="form-control" id="numerodeVuelo" 
              placeholder="123456789012345" formControlName="numerodeVuelo"
              (change)="setValorStore(detallestransporte,'numerodeVuelo')"
              maxlength="15"
              [class.bg-white]="!detallestransporte.get('numerodeVuelo')?.disabled">
           
          </div>
      
        </div>
      </form>
     
    </div>
</div>
