<div class="page">
    <div class="container">
      @if(showMercanciaForm){
      <div class="row">
        <div class="col-md-12">
          <h1>Validar por motivos técnicos el certificado 
            Japón </h1>
        </div>
        <app-wizard [listaPasos]="pasosSolicitar"></app-wizard>
      </div>
  
      <div class="row">
        @switch(indice){
            @case(1){
                <app-solicitante-tabs #solicitanteTabs [indice]="capturarTapIndice"></app-solicitante-tabs>
            }@case(2){
              <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="110218" [procedureUrl]="'certificado-tecnico-japon/validar-certificado-tecnico-japon'"></paso-firma>
            }
        }
  <btn-continuar [datos]="datosPasos" [ocultabotonAnterior]="indice === 1" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>
  }
  @else{
    <app-mercancias-seleccionadas-form (modificarÉxitoBtn)="isModificar($event,6)"></app-mercancias-seleccionadas-form>
  }
  </div>
