<div class="container">
  <div>
    <ng-titulo titulo="Datos del representante legal del exportador"></ng-titulo>

    <form [formGroup]="datosdelexportador" novalidate>
      <div class="row">
        <div class="col-md-12">
          <label class="form-label" for="nombredelRepresentante">Nombre del representante legal del exportador*:</label>
          <input type="text" class="form-control" id="nombredelRepresentante"
            placeholder="Ingrese el nombre del representante" formControlName="nombredelRepresentante"
            [class.bg-white]="!datosdelexportador.get('nombredelRepresentante')?.disabled"
            maxlength="70"
            [class.is-invalid]="datosdelexportador.get('nombredelRepresentante')?.touched && datosdelexportador.get('nombredelRepresentante')?.invalid" 
            (change)="setValorStore(datosdelexportador,'nombredelRepresentante')"/>
          <div class="invalid-feedback"
            *ngIf="datosdelexportador.get('nombredelRepresentante')?.touched && datosdelexportador.get('nombredelRepresentante')?.invalid">
            <small *ngIf="datosdelexportador.get('nombredelRepresentante')?.hasError('required')">Este campo es
              obligatorio.</small>
            <small *ngIf="datosdelexportador.get('nombredelRepresentante')?.hasError('pattern')">Corrija el nombre de la
              persona.</small>
          </div>
        </div>

        <div class="col-md-8 mt-4">
          <label class="form-label" for="empresa">Empresa*:</label>
          <input type="text" class="form-control" id="empresa" formControlName="empresa" readonly>
        </div>

        <div class="col-md-4 mt-4">
          <label class="form-label" for="cargo">Cargo*:</label>
          <input type="text" class="form-control" id="cargo" placeholder="Ingrese el cargo"
            formControlName="cargo"
            [class.is-invalid]="datosdelexportador.get('cargo')?.touched && datosdelexportador.get('cargo')?.invalid"
            [class.bg-white]="!datosdelexportador.get('cargo')?.disabled" 
            maxlength="70"
            (change)="setValorStore(datosdelexportador,'cargo')"/>
          <div class="invalid-feedback"
            *ngIf="datosdelexportador.get('cargo')?.touched && datosdelexportador.get('cargo')?.invalid">
            <small>Este campo es obligatorio.</small>
          </div>
        </div>

        <div class="col-md-4 mt-4">
          <label class="form-label" for="telefonos">Teléfono*:</label>
          <input type="text" class="form-control" id="telefonos" placeholder="Ingrese el telefono"
            formControlName="telefonos"
            [class.is-invalid]="datosdelexportador.get('telefonos')?.touched && datosdelexportador.get('telefonos')?.invalid"
            [class.bg-white]="!datosdelexportador.get('telefonos')?.disabled"
            maxlength="20"
            (change)="setValorStore(datosdelexportador,'telefonos')" />
          <div class="invalid-feedback"
            *ngIf="datosdelexportador.get('telefonos')?.touched && datosdelexportador.get('telefonos')?.invalid">
            <small *ngIf="datosdelexportador.get('telefonos')?.hasError('required')">Este campo es obligatorio.</small>
            <small *ngIf="datosdelexportador.get('telefonos')?.hasError('pattern')">Ingrese solo dígitos.</small>
          </div>
        </div>

        <div class="col-md-4 mt-4">
          <label class="form-label" for="faxs">Fax*:</label>
          <input type="text" class="form-control" id="faxs" placeholder="Ingrese el fax" formControlName="faxs"
            [class.is-invalid]="datosdelexportador.get('faxs')?.touched && datosdelexportador.get('faxs')?.invalid" 
            (change)="setValorStore(datosdelexportador,'faxs')"
            maxlength="20"
            [class.bg-white]="!datosdelexportador.get('faxs')?.disabled" />
          <div class="invalid-feedback"
            *ngIf="datosdelexportador.get('faxs')?.touched && datosdelexportador.get('faxs')?.invalid">
            <small *ngIf="datosdelexportador.get('faxs')?.hasError('required')">Este campo es obligatorio.</small>
            <small *ngIf="datosdelexportador.get('faxs')?.hasError('pattern')">Ingrese solo dígitos.</small>
          </div>
        </div>

        <div class="col-md-4 mt-4">
          <label class="form-label" for="correoElectronicos">Correo electrónico*:</label>
          <input type="text" class="form-control" id="correoElectronicos"
            placeholder="Ingrese su correo electrónico" formControlName="correoElectronicos"
            [class.is-invalid]="datosdelexportador.get('correoElectronicos')?.touched && datosdelexportador.get('correoElectronicos')?.invalid"
            (change)="setValorStore(datosdelexportador,'correoElectronicos')" 
            maxlength="70"
            [class.bg-white]="!datosdelexportador.get('correoElectronicos')?.disabled"/>
          <div class="invalid-feedback"
            *ngIf="datosdelexportador.get('correoElectronicos')?.touched && datosdelexportador.get('correoElectronicos')?.invalid">
            <small *ngIf="datosdelexportador.get('correoElectronicos')?.hasError('required')">Este campo es
              obligatorio.</small>
            <small *ngIf="datosdelexportador.get('correoElectronicos')?.hasError('email')">Ingrese una dirección de
              correo válida.</small>
          </div>
        </div>

      </div>
    </form>

  </div>
</div>
