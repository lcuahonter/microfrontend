<div class="container">
  <div>
    <ng-titulo titulo="Detalles del transporte"></ng-titulo>
    <form [formGroup]="detallesdeltransporte">
      <div class="row">
        <div class="col-md-4">
          <label class="form-label" for="tratadoAcuerdo">Tratado / Acuerdo: </label>
          <input type="text" class="form-control" id="tratadoAcuerdo" formControlName="tratadoAcuerdo" readonly>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="paisBloque">País / Bloque:</label>
          <input type="text" class="form-control" id="paisBloque" formControlName="paisBloque" readonly>
        </div>
        <div class="col-md-4">
          <label class="form-label" for="paisdeOrigen">País de origen</label>
          <input type="text" class="form-control" id="paisdeOrigen" formControlName="paisdeOrigen" readonly>
        </div>
        <div class="col-md-4 mt-4">
          <label class="form-label" for="paisDestino">País destino: </label>
          <input type="text" class="form-control" id="paisDestino" formControlName="paisDestino" readonly>
        </div>
        <div class="col-md-4 mt-4">
          <input-fecha [setFecha]="detallesdeltransporte.get('fechadeExpedicion')?.value" [datos]="fechaFinalInput"
            (valorCambiado)="cambioFechaFinal($event)">
          </input-fecha>
        </div>

        <div class="col-md-4 mt-4">
          <input-fecha [setFecha]="detallesdeltransporte.get('fechadeVencimiento')?.value" [datos]="fechaFinalInputs"
            (valorCambiado)="cambioFechaFinal($event)">
          </input-fecha>
        </div>
      </div>
    </form>
  </div>
</div>
