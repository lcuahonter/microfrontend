<div class="container">
    <div>
        <ng-titulo titulo="Datos del destinatario"></ng-titulo>

        <form [formGroup]="datosDelDestinatario" novalidate>
            <div class="row">

                <div class="col-md-4">
                    <label class="form-label" for="nombre">Nombre(s):</label>
                    <input type="text" class="form-control" id="nombre" formControlName="nombre"
                        [class.bg-white]="!datosDelDestinatario.get('nombre')?.disabled" placeholder="Pedro"
                        maxlength="25" (change)="setValorStore(datosDelDestinatario,'nombre')">

                </div>

                <div class="col-md-4">
                    <label class="form-label" for="primerApellido">Primer apellido:</label>
                    <input type="text" class="form-control" id="primerApellido" formControlName="primerApellido"
                        [class.bg-white]="!datosDelDestinatario.get('primerApellido')?.disabled" placeholder="Juarez"
                        maxlength="20" (change)="setValorStore(datosDelDestinatario,'primerApellido')">

                </div>

                <div class="col-md-4">
                    <label class="form-label" for="segundoApellido">Segundo apellido:</label>
                    <input type="text" class="form-control" id="segundoApellido" formControlName="segundoApellido"
                        (change)="setValorStore(datosDelDestinatario,'segundoApellido')" placeholder="Hernández"
                        maxlength="20" [class.bg-white]="!datosDelDestinatario.get('segundoApellido')?.disabled">

                </div>

                <div class="col-md-4 mt-4">
                    <label class="form-label" for="numeroderegistroFiscal">Número de registro fiscal*:</label>
                    <input type="text" class="form-control" id="numeroderegistroFiscal"
                        formControlName="numeroderegistroFiscal" placeholder="OBAE800904L9" maxlength="30"
                        (change)="setValorStore(datosDelDestinatario,'numeroderegistroFiscal')"
                        [class.is-invalid]="datosDelDestinatario.get('numeroderegistroFiscal')?.touched && datosDelDestinatario.get('numeroderegistroFiscal')?.invalid"
                        [class.bg-white]="!datosDelDestinatario.get('numeroderegistroFiscal')?.disabled">
                    <div class="invalid-feedback">Este campo es obligatorio.</div>
                </div>

                <div class="col-md-8 mt-4">
                    <label class="form-label" for="razonSocial">Razón social:</label>
                    <input type="text" class="form-control" id="razonSocial" formControlName="razonSocial"
                        (change)="setValorStore(datosDelDestinatario,'razonSocial')" maxlength="70"
                        [class.bg-white]="!datosDelDestinatario.get('razonSocial')?.disabled">

                </div>

            </div>
        </form>

    </div>
</div>
<div class="container">
    <div>
        <ng-titulo titulo="Domicilio del destinatario"></ng-titulo>
        <form [formGroup]="domicilioDelDestinatario" novalidate>
            <div class="row">

                <div class="col-md-8">
                    <label class="form-label" for="calle">Calle*:</label>
                    <input type="text" class="form-control" id="calle" placeholder="" formControlName="calle"
                        [class.is-invalid]="domicilioDelDestinatario.get('calle')?.touched && domicilioDelDestinatario.get('calle')?.invalid"
                        (change)="setValorStore(domicilioDelDestinatario,'calle')" maxlength="100"
                        [class.bg-white]="!domicilioDelDestinatario.get('calle')?.disabled">
                    <div class="invalid-feedback">Este campo es obligatorio.</div>
                </div>

                <div class="col-md-4">
                    <label class="form-label" for="numeroLetra">Número y/o letra*:</label>
                    <input type="text" class="form-control" id="numeroLetra" placeholder=""
                        formControlName="numeroLetra"
                        [class.is-invalid]="domicilioDelDestinatario.get('numeroLetra')?.touched && domicilioDelDestinatario.get('numeroLetra')?.invalid"
                        (change)="setValorStore(domicilioDelDestinatario,'numeroLetra')"
                        [class.bg-white]="!domicilioDelDestinatario.get('numeroLetra')?.disabled" maxlength="30">
                    <div class="invalid-feedback">Este campo es obligatorio.</div>
                </div>

                <div class="col-md-8 mt-4">
                    <label class="form-label" for="ciudad">Ciudad (población, estado o provincia)*:</label>
                    <input type="text" class="form-control" id="ciudad" placeholder="" formControlName="ciudad"
                        [class.is-invalid]="domicilioDelDestinatario.get('ciudad')?.touched && domicilioDelDestinatario.get('ciudad')?.invalid"
                        (change)="setValorStore(domicilioDelDestinatario,'ciudad')"
                        [class.bg-white]="!domicilioDelDestinatario.get('ciudad')?.disabled" maxlength="50">
                    <div class="invalid-feedback">Este campo es obligatorio.</div>
                </div>

                <div class="col-md-4 mt-4">
                    <label class="form-label" for="correoElectronico">Correo electrónico*:</label>
                    <input type="email" class="form-control" id="correoElectronico" placeholder=""
                        formControlName="correoElectronico"
                        [class.is-invalid]="domicilioDelDestinatario.get('correoElectronico')?.touched && domicilioDelDestinatario.get('correoElectronico')?.invalid"
                        (change)="setValorStore(domicilioDelDestinatario,'correoElectronico')" maxlength="70"
                        [class.bg-white]="!domicilioDelDestinatario.get('correoElectronico')?.disabled">
                    <div class="invalid-feedback">Este campo es obligatorio.</div>
                </div>

                <div class="col-md-4 mt-4">
                    <label class="form-label" for="fax">Fax:</label>
                    <input type="text" class="form-control" id="fax" placeholder="" formControlName="fax"
                        (change)="setValorStore(domicilioDelDestinatario,'fax')" maxlength="30"
                        [class.bg-white]="!domicilioDelDestinatario.get('fax')?.disabled">
                </div>

                <div class="col-md-4 mt-4">
                    <label class="form-label" for="telefono">Teléfono:</label>
                    <input type="text" class="form-control" id="telefono" placeholder="" formControlName="telefono"
                        formControlName="telefono" (change)="setValorStore(domicilioDelDestinatario,'telefono')"
                        [class.bg-white]="!domicilioDelDestinatario.get('telefono')?.disabled" maxlength="30">

                </div>

            </div>
        </form>


    </div>
</div>
