<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          role="button"
          tabindex="0"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          role="button"
          tabindex="2"
          >Complementos</a
        >
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(3)"
          (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)"
          role="button"
          tabindex="2"
          >Anexo I</a
        >
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(4)"
          (keydown.enter)="seleccionaTab(4)"
          (keydown.space)="seleccionaTab(4)"
          role="button"
          tabindex="2"
          >Federatarios y plantas
        </a>
      </li>
      <li [ngClass]="indice === 5 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(5)"
          (keydown.enter)="seleccionaTab(5)"
          (keydown.space)="seleccionaTab(5)"
          role="button"
          tabindex="2"
        >
          Empresas submanufactureras</a
        >
      </li>
      <li [ngClass]="indice === 6 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(6)"
          (keydown.enter)="seleccionaTab(6)"
          (keydown.space)="seleccionaTab(6)"
          role="button"
          tabindex="2"
          >Anexo II y III</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante [tabindex]="1"></solicitante>
      } @case (2) {
      <app-aggregar-complimentos
        [formularioDeshabilitado]="formularioDeshabilitado"
        [consultaState]="consultaState"
      ></app-aggregar-complimentos>
      } @case (3) {
      <app-anexo-vista-uno
        [formularioDeshabilitado]="formularioDeshabilitado"
      ></app-anexo-vista-uno>
      } @case (4) {
      <app-federatarios-y-plantas-vista
        [formularioDeshabilitado]="formularioDeshabilitado"
        [esFormularioUpdate]="esFormularioUpdate"
      ></app-federatarios-y-plantas-vista>
      } @case (5){
      <app-empresas-subfabricante
        [formularioDeshabilitado]="formularioDeshabilitado"
      ></app-empresas-subfabricante>
      } @case (6){
      <app-anexo-vista-dos-y-tres
        [formularioDeshabilitado]="formularioDeshabilitado"
      ></app-anexo-vista-dos-y-tres>
      } }
    </ng-container>
  </div>
</div>
