<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h1>Registro de solicitud IMMEX modalidad controladora</h1>
    </div>

    @if (!esFormaValido && esFormaValido !== undefined) {
    <div class="col-md-12">
      <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
    </div>
    }

    <app-wizard [listaPasos]="pasos"></app-wizard>

  </div>

  <div class="row">
    @switch (indice) {
    @case (1) {
    <app-paso-uno-cs></app-paso-uno-cs>
    }
    @case (2) {
    <app-paso-carga-documento [idSolicitud]="solicitudState.idSolicitud" [idTipoTRamite]="'80104'"
      [cargaArchivosEvento]="cargarArchivosEvento" (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
      (reenviarCargaRealizada)="cargaRealizada($event)"
      (cargaEnProgreso)="onCargaEnProgreso($event)"></app-paso-carga-documento>
    }
    @case (3) {
    <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="80104"
      [procedureUrl]="'registro-solicitud-immex-modalidad-controladora/action'"></paso-firma>
    }
    }

    <div class="row">
      <div class="col-md-12">
        @if (indice !== 2) {
        <btn-continuar [datos]="datosPasos" [btnGuardar]="btnGuardar" [btnHabilitarContinuar]="true"
          [dePadre]="!consultaState.readonly ? true : false" [btnGuardarVisible]="btnGuardarVisible"
          (btnGuardarClicked)="obtenerDatosDelStore()" (continuarEvento)="getValorIndice($event)"></btn-continuar>
        } @else {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button type="button" class="btn btn-default" (click)="anterior()" *ngIf="seccionCargarDocumentos">
            Anterior
          </button>


          <button class="btn btn-primary ms-3" (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
            [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)">
            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
          </button>
        </div>
        }
      </div>
    </div>

  </div>
</div>
