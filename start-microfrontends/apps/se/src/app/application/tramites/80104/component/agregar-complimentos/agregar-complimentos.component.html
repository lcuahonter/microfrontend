<app-complimentos
  [datosFormaComplimentos]="datosComplimentos"
  (complimentosDatos)="modifierComplimentos($event)"
  [datosSocioAccionistas]="(tablaDatosComplimentos$ | async) || []"
  [datosSocioAccionistasExtrenjeros]="
    (tablaDatosComplimentosExtranjera$ | async) || []
  "
  (accionistasAgregados)="accionistasAgregados($event)"
  (accionistasEliminados)="accionistasEliminados($event)"
  (accionistasExtranjerosEliminado)="accionistasExtranjerosEliminado($event)"
  [consultaState]="consultaState"
></app-complimentos>
