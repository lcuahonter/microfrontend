<div class="container mt-5">
    <form [formGroup]="form">
      <div>
        <ng-titulo titulo="Cantidad solicitada y unidad de medida"></ng-titulo>
        <div class="row">
          <div class="col-md-4">
            <div class="form-group">
              <label class="form-label" for="cantidadSolicitada">Cantidad solicitada*:</label>
              <input
                class="form-control"
                type="text"
                id="cantidadSolicitada"
                formControlName="cantidadSolicitada"
                libUppercase
                aria-labelledby="cantidadSolicitada"
                (change)="getCantidadSolicitada()"
              />
              <div *ngIf="esInvalido('cantidadSolicitada')" class="text-danger">
                <small *ngIf="form.controls['cantidadSolicitada'].hasError('required')">La cantidad solicitada es un campo obligatorio.</small>
            </div>
            </div>
          </div>
        </div>
        <div>
            (Pieza)
        </div>
      </div>
    </form>
  </div>
