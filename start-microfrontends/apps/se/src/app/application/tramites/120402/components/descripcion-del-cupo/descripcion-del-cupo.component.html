<div class="container" >
  <form [formGroup]="form">
    <div>
      <ng-titulo titulo="Descripción del cupo"></ng-titulo>
      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="claveDelCupo">Clave del cupo:</label>
            <input
              class="form-control"
              type="text"
              id="claveDelCupo"
              formControlName="claveDelCupo"
              libUppercase
              aria-labelledby="claveDelCupo"
              readonly
            />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="mecanismoDeAsignacion"
              >Mecanismo de asignación:</label
            >
            <input
              class="form-control"
              type="text"
              id="mecanismoDeAsignacion"
              formControlName="mecanismoDeAsignacion"
              aria-labelledby="mecanismoDeAsignacion"
              readonly
            />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="descripcionDelProducto"
              >Descripción del producto:</label
            >
            <input
              class="form-control"
              type="text"
              id="descripcionDelProducto"
              formControlName="descripcionDelProducto"
              libUppercase
              aria-labelledby="descripcionDelProducto"
              readonly
            />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="unidadDeMedida"
              >Unidad de medida:</label
            >
            <input
              class="form-control"
              type="text"
              id="unidadDeMedida"
              formControlName="unidadDeMedida"
              libUppercase
              aria-labelledby="unidadDeMedida"
              readonly
            />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="regimenAduanero"
              >Régimen aduanero:</label
            >
            <input
              class="form-control"
              type="text"
              id="regimenAduanero"
              formControlName="regimenAduanero"
              aria-labelledby="regimenAduanero"
              readonly
            />
          </div>
        </div>
        <div class="col-md-4">
          <div class="form-group">
            <label for="fechaDeInicioDeVigenciaDelCupo"
              >Fecha de inicio de vigencia del cupo:</label
            >
            <input
              class="form-control"
              type="text"
              id="fechaDeInicioDeVigenciaDelCupo"
              formControlName="fechaDeInicioDeVigenciaDelCupo"
              libUppercase
              aria-labelledby="fechaDeInicioDeVigenciaDelCupo"
              readonly
            />
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-4">
          <div class="form-group">
            <label class="form-label" for="fechaDeFinDeVigenciaDelCupo"
              >Fecha de fin de vigencia del cupo:</label
            >
            <input
              class="form-control"
              type="text"
              id="fechaDeFinDeVigenciaDelCupo"
              formControlName="fechaDeFinDeVigenciaDelCupo"
              libUppercase
              aria-labelledby="fechaDeFinDeVigenciaDelCupo"
              readonly
            />
          </div>
        </div>
        <div class="col-md-4"></div>
        <div class="col-md-4"></div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="form-group">
            <label class="form-label" for="fraccionesArancelarias"
              >Fracciones arancelarias:</label
            >
            <textarea
              class="form-control height"
              rows="3"
              id="fraccionesArancelarias"
              formControlName="fraccionesArancelarias"
              aria-labelledby="fraccionesArancelarias" readonly
            ></textarea>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="form-group">
            <label class="form-label" for="tratadoAcuerdo"
              >Tratado / Acuerdo:</label
            >
            <textarea
              class="form-control height"
              rows="3"
              id="tratadoAcuerdo"
              formControlName="tratadoAcuerdo"
              aria-labelledby="tratadoAcuerdo" 
              readonly
            ></textarea>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-12">
          <div class="form-group">
            <label class="form-label" for="paises">Países:</label>
            <textarea
              class="form-control height"
              rows="3"
              id="paises"
              formControlName="paises"
              aria-labelledby="paises"
              readonly
            ></textarea>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>
