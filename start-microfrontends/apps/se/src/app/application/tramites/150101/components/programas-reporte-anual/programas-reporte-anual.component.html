  <form [formGroup]="periodoReporteAnual">
    <ng-titulo titulo="Periodo que cubre reporte anual" />

    <div class="row mb-5">
      <div class="col-md-4">
        <div class="form-group input-container">
          <label class="form-label" for="ideGenerica1">Inicio:</label>
          <input
            type="text"
            class="form-control input-date"
            formControlName="reporteAnualFechaInicio"
            id="ideGenerica1"
            bsDatepicker
            [bsConfig]="bsConfig"
          />
          <span class="bi icon bi-calendar2-fill"></span>
        </div>
      </div>
      <div class="col-md-4">
        <div class="form-group input-container">
          <label class="form-label" for="ideGenerica2">Fin:</label>
          <input
            type="text"
            class="form-control input-date"
            formControlName="reporteAnualFechaFin"
            id="ideGenerica2"
            bsDatepicker
            [bsConfig]="bsConfig"
          />
          <span class="bi icon bi-calendar2-fill"></span>
        </div>
      </div>
      <div class="col-md-4 mb-5"></div>
    </div>
    <div class="row mt-5 mb-5">
      <div class="col-md-12 mt-5">
        <app-tabla-dinamica
          [tipoSeleccionTabla]="solicitudSeleccionTabla"
          [datos]="solicitudDatos"
          [configuracionTabla]="solicitudConfiguracionTabla"
          [disableSeleccionTablaRadio]="formularioDeshabilitado"
          (filaSeleccionada)="actualizarProgramasReporte($event)"
        >
        </app-tabla-dinamica>
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-md-4">
        <label class="form-label" for="folioPrograma">Folio de programa:</label>
        <input
          type="text"
          id="folioPrograma"
          class="form-control"
          formControlName="folioPrograma"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label" for="modalidad"
          >Selecciona la modalidad:</label
        >
        <input
          type="text"
          id="modalidad"
          class="form-control"
          formControlName="modalidad"
        />
      </div>
    </div>
    <div class="row mt-3">
      <div class="col-md-4">
        <label class="form-label" for="tipoPrograma">Tipo programa:</label>
        <input
          type="text"
          id="tipoPrograma"
          class="form-control"
          formControlName="tipoPrograma"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label" for="estatus">Estatus:</label>
        <input
          type="text"
          id="estatus"
          class="form-control"
          formControlName="estatus"
        />
      </div>
    </div>
