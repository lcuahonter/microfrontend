<div class="page">
  <div class="container">
    <div class="row">
      @if (indice === 1){
      <div class="col-md-6">
        <h2>
          Registro de solicitud modificación Programa IMMEX (Baja de fracciones
          autorizadas)
        </h2>
      </div>
      }
      @if (indice === 2){
        <div class="col-md-12">
          <h2>Cargar archivos</h2>
        </div>
      }
      @if (indice === 3){
        <div class="col-md-12">
          <h2>Firmar</h2>
        </div>
      }  
      <app-wizard [listaPasos]="pasosSolicitar"></app-wizard>
      <div class="row">
        @switch(indice){ @case(1){
        <app-paso-uno></app-paso-uno>

        <div class="col-md-12">
          <div class="row mt-5">
            <app-complementaria-immex></app-complementaria-immex>
          </div>
        </div>
        }@case(2){
        <app-paso-carga-documento
          [idSolicitud]="idSolicitud"
          [idTipoTRamite]="'80301'"
          [cargaArchivosEvento]="cargarArchivosEvento"
          (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
          (reenviarCargaRealizada)="cargaRealizada($event)"
          (cargaEnProgreso)="onCargaEnProgreso($event)"
        ></app-paso-carga-documento>
        }@case(3){
        <paso-firma
          [idSolicitud]="idSolicitud"
          [procedure]="80301"
          [procedureUrl]="'registro-solicitud/registro-modificacion-page'"
        ></paso-firma>
        }}

        <div class="row">
          <div class="col-md-12"> 
            @if (indice !== 2) {
            <btn-continuar
              [datos]="datosPasos"
              [dePadre]="!consultaState.readonly ? true : false"
              (continuarEvento)="getValorIndice($event)"
              (anteriorEvento)="getValorIndice($event)"
            ></btn-continuar>
            } @else {
            <div class="mt-5 mb-3 d-flex justify-content-end">
              <button
                type="button"
                class="btn btn-default"
                (click)="anterior()"
                *ngIf="seccionCargarDocumentos"
              >
                Anterior
              </button>

              <button
                class="btn btn-primary ms-3"
                (click)="
                  seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
                "
                [disabled]="
                  (seccionCargarDocumentos && !activarBotonCargaArchivos) ||
                  (!seccionCargarDocumentos && cargaEnProgreso)
                "
              >
                {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
              </button>
            </div>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
