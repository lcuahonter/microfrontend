<div class="page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Registro de solicitud IMMEX modalidad ampliación cambio de modalidad</h1>
            </div>
            @if(cambioError){
            <div class="col-md-12">
            <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
            </div>
            }
            @if(serviciosImmxError){
            <div class="col-md-12">
            <ng-alert [CONTENIDO]="serviciosImmxAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
            </div>
            }
            <app-wizard #wizardRef [listaPasos]="pasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) { @case (1) {
            <app-paso-uno #pasoUno></app-paso-uno>
            } @case (2) {
            <app-paso-carga-documento [idSolicitud]="solicitudState.idSolicitud" [idTipoTRamite]="'80208'"
                [cargaArchivosEvento]="cargarArchivosEvento"
                (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
                (reenviarCargaRealizada)="cargaRealizada($event)"
                (cargaEnProgreso)="onCargaEnProgreso($event)"></app-paso-carga-documento>
            } @case (3) {
            <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="80208"
                [procedureUrl]="'solicitud-modalidad/modalidad'"></paso-firma>
            } }
            <div class="row">
                <div class="col-md-12">
                    @if (indice !== 2) {
                    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" ></btn-continuar>
                    } @else {
                    <div class="mt-5 mb-3 d-flex justify-content-end">
                        <button type="button" class="btn btn-default" (click)="anterior()"
                            *ngIf="seccionCargarDocumentos">
                            Anterior
                        </button>

                        <button class="btn btn-primary ms-3" (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            " [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)">
                            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
                        </button>
                    </div>
                    }
                </div>
            </div>

        </div>

        <ng-alert [CONTENIDO]="AVISO_PRIVACIDAD_ADJUNTAR"  *ngIf="indice === 1"></ng-alert>
    </div>
</div>
