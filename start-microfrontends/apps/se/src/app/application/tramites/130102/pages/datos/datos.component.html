<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Datos de la solicitud</a>
            </li>
          
        </ul>
        <ng-container>
            @switch (indice) {
            @case (1) {
           <app-solocitante-octava-temporal></app-solocitante-octava-temporal>

            }
            @case (2) {
                @if (esDatosRespuesta) {
                    <app-130102solicitante></app-130102solicitante>
                }
            }
          
            }
        </ng-container>
    </div>
</div>
