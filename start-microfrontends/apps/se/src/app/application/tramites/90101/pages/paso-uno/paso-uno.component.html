<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <ul class="nav nav-tabs">
                <li *ngFor="let tab of seccionesDeLaSolicitud" [ngClass]="indice === tab.index ? 'active' : ''">
                <a data-toggle="tab" (click)="seleccionaTab(tab.index)" (keydown.enter)="seleccionaTab(tab.index)"
                    tabindex="0">{{ tab.title }}</a>
            </li>
        </ul>
    </ul>

        <ng-container>
            <solicitante #solicitanteRef [hidden]="indice !== 1"></solicitante>
            <app-domicilios-de-plantas [loginRfc]="loginRfc" [tramiteId]="tramiteId" #domiciliosRef [hidden]="indice !== 2"></app-domicilios-de-plantas>
            <app-sectores-y-mercancias [loginRfc]="loginRfc" [tramiteId]="tramiteId" #sectoresRef [hidden]="indice !== 3"></app-sectores-y-mercancias>
            <app-productor-indirecto [loginRfc]="loginRfc" #productorIndirectoRef [hidden]="indice !== 4"></app-productor-indirecto>
        </ng-container>
    </div>
</div>
