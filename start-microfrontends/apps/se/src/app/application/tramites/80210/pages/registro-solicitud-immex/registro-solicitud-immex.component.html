<div class="container">
    <div class="row">
      <div class="col-md-12">
        <h4>Registro de solicitud IMMEX modalidad ampliación controladoras</h4>
      </div>

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno></app-paso-uno>
      } @case (2) {
    <app-paso-carga-documento 
    [idSolicitud]="solicitudState.idSolicitud"
    [idTipoTRamite]="idTipoTRamite"
    [cargaArchivosEvento]="cargarArchivosEvento"
    (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
    (reenviarCargaRealizada)="cargaRealizada($event)"
    (cargaEnProgreso)="onCargaEnProgreso($event)"
    ></app-paso-carga-documento>
      } @case (3) {
     <paso-firma [idSolicitud]="idSolicitudState" [procedure]="80210" [procedureUrl]="'registro-solicitud-immex/confirmacion'"></paso-firma>
      } }
     <div class="row">
      <div class="col-md-12">
        @if (indice !== 2) {
        <btn-continuar
          [datos]="datosPasos"
          (continuarEvento)="getValorIndice($event)"
        ></btn-continuar>
        <ng-alert [CONTENIDO]="AVISO_PRIVACIDAD_ADJUNTAR"  *ngIf="indice === 1"></ng-alert>
        } @else {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
            type="button"
            class="btn btn-default"
            (click)="anterior()"
            *ngIf="seccionCargarDocumentos"
          >
            Anterior
          </button>
          <button
            class="btn btn-primary ms-3"
            (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
            [disabled]="!activarBotonCargaArchivos && seccionCargarDocumentos"
          >
            {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
          </button>
        </div>
        }
      </div>
    </div>
    </div>
  </div>
