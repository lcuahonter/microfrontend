<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Certificado de origen</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(3)">Histórico productores</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(4)">Destinatario</a>
            </li>
            <li [ngClass]="indice === 5 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(5)">Datos certificado</a>
            </li>
        </ul>
        <ng-container>
            <solicitante #solicitante [hidden]="indice !== 1"></solicitante>
            <app-certificado-origen #certificadoOrigen [hidden]="indice !== 2"></app-certificado-origen>
            <app-peru-historico-productores #peruHistoricoProductores [hidden]="indice !== 3"></app-peru-historico-productores>
            <app-peru-destinatario #peruDestinatarioComponent [hidden]="indice !== 4"></app-peru-destinatario>
            <app-peru-datos-certificado #datosCertificado [hidden]="indice !== 5"></app-peru-datos-certificado>
        </ng-container>
    </div>
</div>
