<div class="page">
    <div class="container">
      <div class="row">
        <div *ngIf="indice === 1" class="col-md-12">
          <h1>Validar inicialmente el certificado de Perú</h1>
        </div>
        <div *ngIf="indice === 2" class="col-md-12">
          <h1>Firmar</h1>
          <ng-alert [CONTENIDO]="TERCEROS_TEXTO_DE_ALERTA"></ng-alert>
        </div>
        @if(esFormaValido){
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div> }
        <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno></app-paso-uno>
      }
      @case (2) {
      <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="110205" [procedureUrl]="'validar-certificado/peru'"></paso-firma>
      <div class="row mt-5">
        <app-acuse-ceror></app-acuse-ceror>
      </div>
      }
     }
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
        (anteriorEvento)="getValorIndice($event)"
      ></btn-continuar>
      @if(indice ===1){
        <ng-alert [CONTENIDO]="TEXTOS"></ng-alert>
        }
    </div>
  </div>
