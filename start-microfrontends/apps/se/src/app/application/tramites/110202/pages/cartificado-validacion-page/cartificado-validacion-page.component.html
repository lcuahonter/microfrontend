<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2 *ngIf="indice === 1">
          Validación a posteriori del certificado de circulación de mercancías
          EUR 1
        </h2>
         <h1 *ngIf="indice === 2">
          Firmar 
        </h1>
      </div>
      @if(esFormaValido){
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }
    <div class="row mt-5" *ngIf="indice === 2">
        <div class="col-md-12">
        <lib-notificaciones
          [notificacionInput]="alertaNotificacion"
        ></lib-notificaciones>
      </div>
      </div>
      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno (alertaEvento)="mostrarAlerta = $event"></app-paso-uno>
      } @case (2) {
      <paso-firma [idSolicitud]="solicitudState.idSolicitud ?? null" [procedure]="110202" [procedureUrl]="'certificado-validacion/validacion'"></paso-firma>
      } }

      <btn-continuar [datos]="datosPasos"  (anteriorEvento)="getValorIndice($event)" (continuarEvento)="getValorIndice($event)"></btn-continuar>
          @if(indice === 1) {
      <ng-alert [CONTENIDO]="TEXTOS" [CUSTOMECLASS]="infoAlert"></ng-alert>
      }
    </div>
  </div>
</div>
