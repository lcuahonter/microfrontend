<div class="page">
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-6">
        <h3>
          Registro de solicitud AMPLIACION - PROSEC productor indirecto
        </h3>
      </div>
      <div class="col-12">
        @if (esFormaValido) {
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="infoError"></ng-alert>
      }

      <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>

   <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno  [tramiteId]="idTipoTramite" #pasoUnoRef></app-paso-uno>
      }
    @case (2) {
    <paso-firma [idSolicitud]="idSolicitudState" [procedure]="90202" [procedureUrl]="'ampliacion-prosec-productor/prosec'"></paso-firma>

    }
     }

     <div class="row">
      <div class="col-md-12">
        @if (indice !== 2) {
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
        } @else {
        <div class="mt-5 mb-3 d-flex justify-content-end">
          <button
            type="button"
            class="btn btn-default"
            (click)="anterior()"
          >
            Anterior
          </button>
        </div>
        }
      </div>
    </div>
      
    </div>
  </div>
</div>
