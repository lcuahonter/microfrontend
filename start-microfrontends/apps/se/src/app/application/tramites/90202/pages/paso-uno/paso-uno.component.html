<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Domicilios de plantas</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Sectores y mercancías</a>
      </li>
    </ul>

    <ng-container>
      
      <solicitante #Solicitante [hidden]="indice !== 1"></solicitante>
      
      <app-domicilios-de-plantas #domiciliosRef [hidden]="indice !== 2"></app-domicilios-de-plantas>
      
     
      <app-sectores-y-mercancias #sectoresRef [hidden]="indice !== 3"></app-sectores-y-mercancias>
     
    </ng-container>
  </div>
</div>
