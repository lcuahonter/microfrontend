<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          role="button"
          tabindex="0"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          role="button"
          tabindex="2"
          >Servicios</a
        >
      </li>
    </ul>
    <ng-container>
        @if(esDatosRespuesta) {
      <solicitante [tabindex]="1" [hidden]="indice !== 1"></solicitante>
        }
        @if(esDatosRespuesta) {
      <app-ampliacion-servicios  #solicitudComponent [tabindex]="2" [hidden]="indice !== 2"></app-ampliacion-servicios>
      } 
    </ng-container>
  </div>
</div>
