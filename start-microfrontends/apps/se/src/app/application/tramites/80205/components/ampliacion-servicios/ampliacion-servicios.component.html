<div class="container my-4">

  <!-- Formulario dinamico de tipo de personas -->
  <form [formGroup]="formularioInfoRegistro">
    <div class="row">
        <div class="col-md-4">
            <div class="form-group">
                <label class="form-label clase-sin-ajuste">Selecciona la modalidad:</label>
                <input
                    type="text"
                    id="seleccionaLaModalidad"
                    name="seleccionaLaModalidad"
                    size="30"
                    maxlength="13"
                    class="form-control"
                    formControlName="seleccionaLaModalidad"
                />
            </div>
        </div>
    
        <div class="col-md-4">
            <div class="form-group">
                <label class="form-label">Folio:</label>
                <input
                    type="text"
                    id="folio"
                    name="folio"
                    size="30"
                    maxlength="13"
                    class="form-control"
                    formControlName="folio"
                />
            </div>
        </div>
    
        <div class="col-md-4">
            <div class="form-group">
                <label  class="form-label">Año:</label>
                <input
                    type="text"
                    id="Ano"
                    name="ano"
                    size="30"
                    maxlength="13"
                    class="form-control"
                    formControlName="ano"
                />
            </div>
        </div>
       
    </div>
    </form>
  <div class="row">
    <div class="col-md-12">
        <h3>
            <label for="solicitud.immex.serviciosImmex">Servicios IMMEX</label>
        </h3>
        <hr class="red" />
    </div>
</div>
<div class="row">
  <div class="col-md-8">
   
    <div class="form-group"  >
        <form [formGroup]="formulario">
       <app-catalogo-select
          [catalogo]="aduanaDeIngreso"
          [label]="'Servicios IMMEX'"
          [required]="false"
          id="clave"
          [primerOptionValue]="predeterminado"
          [hiddenPrimerOption]="false"
          [disabledPrimerOption]="false"
          [isDisabled]="esFormularioSoloLectura"
          formControlName="entidadFederativa"
          (change)="procesarDatosDelHijo()"
        ></app-catalogo-select> 
        </form>
      </div>
    
  </div>
  <div class="row">
    <div class="col-md-12">
        <div class="pull-right"> 
            <button name="eliminarServicio" (click)="doConfirmEliminar()" class="btn btn-danger"  [disabled]="esFormularioSoloLectura">
                Eliminar
            </button>
            <button name="agregarServicio" (click)="agregarServiciosAmpliacion($event)" class="btn btn-primary mx-2" [disabled]="esFormularioSoloLectura">
                Agregar
            </button> 
        </div>
    </div>
</div>
<div class="row">
    <div class="col-md-8">
        <div class="form-group">
            <label for="serviciosImmexServ">Servicios IMMEX:</label>
        </div>
    </div>  
</div>
<div class="my-4">

<app-tabla-dinamica #tablaA [tipoSeleccionTabla]="tablaSeleccion" (filaSeleccionada)="seleccionarDomicilios($event)" [filasSeleccionadas]="mercanciasSeleccionados" [configuracionTabla]="configuracionTablaServicio" [disableSeleccionTablaRadio]="esFormularioSoloLectura"
[datos]="datosImmex"></app-tabla-dinamica>
<div class="row">
    <div class="col-md-8">
        <div class="form-group">
            <label for="serviciosAutorizados">Servicios autorizados:</label>
        </div>
    </div>  
</div>
<div class="my-4">
 <app-tabla-dinamica #tablaB [tipoSeleccionTabla]="tablaSeleccion"   [configuracionTabla]="configuracionTablaServicioAutorizado" [datos]="datosAutorizados" [filasSeleccionadas]="tablaDosSeleccionados"(filaSeleccionada)="seleccionarAutorizados($event)" [disableSeleccionTablaRadio]="esFormularioSoloLectura"
    ></app-tabla-dinamica></div>

<div class="row">
  <div class="col-md-12">
      <h3>
          <label for="solicitud.immex.empresasNacionales">Empresas (Nacionales) a las que se les otorgaran servicios</label>
      </h3>
      <hr class="red" />
  </div>
</div>

<div class="row">
    <div class="col-md-4">
        <div class="form-group">
            <label for="rfdecontri">Registro federal de contribuyentes:</label>
            <input type="text" id="rfcEmpresa" [(ngModel)]="rfcEmpresa" [disabled]="esFormularioSoloLectura"name="rfdecontri" class="form-control"  (ngModelChange)="enCambioDeCampo('rfcEmpresa', $event)"/>
        </div>
    </div>
    <div class="col-md-4">
        <div class="form-group">
            <label for="numeroProgramaImmex">Número del Programa IMMEX:</label>
            <input type="text" id="numeroPrograma" [(ngModel)]="numeroPrograma" [disabled]="esFormularioSoloLectura" name="numeroProgramaImmex" class="form-control" (ngModelChange)="enCambioDeCampo('numeroPrograma', $event)" />
        </div>
    </div>
    <div class="col-md-4">
        <div class="form-group">
            <label for="tiempoPrograma">Año del Programa IMMEX:</label>
            <input type="text" id="tiempoPrograma" [(ngModel)]="tiempoPrograma" name="tiempoPrograma" [disabled]="esFormularioSoloLectura" class="form-control" (ngModelChange)="enCambioDeCampo('tiempoPrograma', $event)"  />
        </div>
    </div>
  </div>
  
  <div class="row my-4">
    <div class="col-md-12">    
        <div class="pull-right">
            <button name="eliminar" (click)="doEliminarDos()" class="btn btn-danger" [disabled]="esFormularioSoloLectura">
                Eliminar
            </button>
            <button name="agregar" (click)="doAgregarDos()" class="btn btn-primary mx-2" [disabled]="esFormularioSoloLectura">
                Agregar
            </button> 
        </div>
    </div>
  </div>
  
  
<div class="row">
    <div class="col-md-8">
        <div class="form-group">
            <label for="serviciosAutorizados">Empresas (Nacionales) a las que se les otorgaran servicios:</label>
        </div>
    </div>  
</div>

<app-tabla-dinamica  #tablaC [tipoSeleccionTabla]="tablaSeleccion" (filaSeleccionada)="seleccionarEmpresas($event)"  [configuracionTabla]="configuracionTabla" [disableSeleccionTablaRadio]="esFormularioSoloLectura"
[datos]="empresas"></app-tabla-dinamica>

</div>

@if(nuevaNotificacion){
    <lib-notificaciones *ngIf="esHabilitarElDialogo" [notificacionInput]="nuevaNotificacion" (confirmacionModal)="cerrarModal()"></lib-notificaciones>
    
    <lib-notificaciones *ngIf="esEliminar" [notificacionInput]="nuevaNotificacion" (confirmacionModal)="cerrarModalEliminar($event)"></lib-notificaciones>
    <lib-notificaciones *ngIf="noRowSelected" [notificacionInput]="nuevaNotificacion" (confirmacionModal)="cerrarNoRow()"></lib-notificaciones>

    <lib-notificaciones *ngIf="esAgregarDos" [notificacionInput]="nuevaNotificacion" (confirmacionModal)="cerrarModalAgregar()"></lib-notificaciones>
    <lib-notificaciones *ngIf="esEliminarDos" [notificacionInput]="nuevaNotificacion" (confirmacionModal)="cerrarEliminarDos($event)"></lib-notificaciones>
    <lib-notificaciones *ngIf="rowNotSeleccionada" [notificacionInput]="nuevaNotificacion" (confirmacionModal)="cerrarNotSeleccainda()"></lib-notificaciones>
    <lib-notificaciones *ngIf="noRowSelectedTablaC" [notificacionInput]="nuevaNotificacion" (confirmacionModal)="cerrarNoRowTablaC()"></lib-notificaciones>

    

}
