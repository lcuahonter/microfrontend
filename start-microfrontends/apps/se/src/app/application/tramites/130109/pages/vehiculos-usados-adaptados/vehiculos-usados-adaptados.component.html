<div class="page">
  <div class="container">
    <div class="row">
      @if(indice === 1){
      <div class="col-md-12">
          <h2>Solicitud importación neumáticos para recauchutar/neumáticos para pruebas de laboratorio</h2>
      </div>
      }
      @if(indice === 2){
        <div class="col-md-12">
          <h1>Cargar archivos</h1>
        </div>
      }
      @if(indice === 3){
        <div class="col-md-12">
          <h1>Firmar</h1>
        </div>
      }
      <div class="col-12">
        @if(esFormaValido){
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
        }
      </div>
    </div>
    <app-wizard [listaPasos]="pasosSolicitar"></app-wizard>
    <div class="row">
      @switch(indice){
      @case(1){
      <app-paso-uno></app-paso-uno>
      }@case(2){
      <app-paso-carga-documento 
        [idSolicitud]="folioTemporal" 
        [idTipoTRamite]="'130109'"
        [showTituloOpcional]="false"
        [cargaArchivosEvento]="cargarArchivosEvento" 
        (reenviarEventoCarga)="manejaEventoCargaDocumentos($event)"
        (reenviarCargaRealizada)="cargaRealizada($event)"
        (cargaEnProgreso)="onCargaEnProgreso($event)">
      </app-paso-carga-documento>
      }@case(3){
      <paso-firma 
        [idSolicitud]="folioTemporal" 
        [procedure]="130109"
        [procedureUrl]="'importacion-de/vehiculos-usados-adaptados'">
      </paso-firma>
      }
      }
      <div class="row">
        <div class="col-md-12">
          @if (indice !== 2) {
          <btn-continuar 
            [datos]="datosPasos" 
            (continuarEvento)="getValorIndice($event)"
            (anteriorEvento)="getValorIndice($event)"
          ></btn-continuar>
          } @else {
          <div class="mt-5 mb-3 d-flex justify-content-end">
            <button type="button" class="btn btn-default" (click)="anterior()" *ngIf="seccionCargarDocumentos">
              Anterior
            </button>

            <button class="btn btn-primary ms-3" (click)="
              seccionCargarDocumentos ? onClickCargaArchivos() : siguiente()
            "
              [disabled]="(seccionCargarDocumentos && !activarBotonCargaArchivos) || (!seccionCargarDocumentos && cargaEnProgreso)">
              {{ seccionCargarDocumentos ? 'Cargar archivos' : 'Continuar' }}
            </button>
          </div>
          }
        </div>
      </div>
      <ng-alert [CONTENIDO]="AVISO_PRIVACIDAD_ADJUNTAR" *ngIf="indice === 1"></ng-alert>
    </div>
  </div>
</div>
