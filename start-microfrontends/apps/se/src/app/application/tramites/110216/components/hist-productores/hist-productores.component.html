<app-historico-productores #HistoricoProductoresComponent
    (formHistoricoEvent)="setValoresStore($event)"
    (agregarDatosProductorFormularioEvent)="setValoresStoreAgregarForm($event)"
    [tramiteState]="tramiteState"
    [agregarDatosProductor]="agregarDatosProductor"
    [productoresExportador]="productoresExportador || []"
    [ocultarFax]="ocultarFax"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    (formaValida)="formaValida($event)"
    [mostrarMercanciasSeleccionadas]="false"
    [mercanciaDatos]="mercanciaProductores || []"
    (emitMercanciaDatos)="setMercanciaDatos($event)"
    [agregarProductoresExportador]="(agregarProductoresExportador$ | async) || []"
    (emitAgregarExportador)="emitAgregarExportador($event)" 
    (emitProductoresExportador)="emitProductoresExportador($event)"
    (eliminarEventoExportador)="eliminarEventoExportador($event)"
    ></app-historico-productores>
