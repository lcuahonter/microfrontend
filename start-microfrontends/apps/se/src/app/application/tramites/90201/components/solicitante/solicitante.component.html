
<div class="container">
    <ng-titulo titulo="Datos generales del solicitante" />
    <form [formGroup]="solicitudForm">
    <div class="row">
        <div class="col-md-4">
            <label class="form-label" for="rfc">RFC:<span 
                class="bi bi-question-circle-fill fs-4 m-1" title="Title" 
                ata-bs-toggle="tooltip"></span>
            </label>
            <input type="text" class="form-control" id="rfc" formControlName="rfc">
        </div>

        <div class="col-md-8">
            <label class="form-label" for="denominacion">Denominación o razón social:</label>
            <input type="text" class="form-control" id="denominacion" formControlName="denominacion">
        </div>

        <div class="col-md-12">
            <label class="form-label" for="actividad-economica">Actividad económica preponderante:</label>
            <input type="text" class="form-control" id="actividad-economica" formControlName="actividadEconomica">
        </div>

        <div class="col-md-4">
            <label class="form-label" for="correo-electronico">Correo electrónico:</label>
            <input type="text" class="form-control" id="correo-electronico" formControlName="correoElectronico">
        </div>
    </div>
</form>
</div>
