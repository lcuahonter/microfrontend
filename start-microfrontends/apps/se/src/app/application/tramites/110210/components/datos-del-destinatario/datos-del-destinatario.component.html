<div class="container">
    <ng-titulo titulo="Datos del destinatario"/>
    <form [formGroup]="solicitudForm">
    <div class="row">
        <div class="col-md-4 mb-4">
            <label class="form-label" for="nombres">Nombre(s):</label>
            <input type="text" class="form-control" id="nombres" formControlName="nombres" readonly>
        </div>

        <div class="col-md-4 mb-4">
            <label class="form-label" for="primer-apellido">Primer apellido:</label>
            <input type="text" class="form-control" id="primer-apellido" formControlName="primerApellido" readonly>
        </div>

        <div class="col-md-4 mb-4">
            <label class="form-label" for="segundo-apellido">Segundo apellido:</label>
            <input type="text" class="form-control" id="segundo-apellido" formControlName="segundoApellido" readonly>
        </div>
        <div class="col-md-12 mb-4">
            <label class="form-label" for="numero-registro-fiscal">Número de registro fiscal:</label>
            <input type="text" class="form-control" id="numero-registro-fiscal" formControlName="numeroRegistroFiscal" readonly>
        </div>
        <div class="col-md-12 mb-4">
            <label class="form-label" for="razon-social">Razón social:</label>
            <input type="text" class="form-control" id="razon-social" formControlName="razonSocial" readonly>
        </div>
    </div>
</form>
</div>
