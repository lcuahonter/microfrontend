<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" tabindex="0" data-toggle="tab" >Solicitante</a>
        </li>
        @if(showTabs){
          <li [ngClass]="indice === 2 ? 'active' : ''">
            <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" tabindex="0" data-toggle="tab" >Duplicado de Certificado de Origen</a>
          </li>
          <li [ngClass]="indice === 3 ? 'active' : ''" [class.disabled]="!certificadoTabEnabled">
            <a (click)="certificadoTabEnabled && seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" tabindex="0" data-toggle="tab" >Certificado de origen</a>
          </li>
        }
      </ul>
  
      <ng-container>
        <solicitante #Solicitante [hidden]="indice !== 1"></solicitante>
          @if(esDatosRespuesta){
        <app-duplicado-de-certificado #Duplicado [hidden]="indice !== 2" (rowClicked)="enableCertificadoTab($event)" (noDatosError)="noDatosError.emit()" (disableCertificado)="disableCertificado()"></app-duplicado-de-certificado>
        <app-certificado-de-origen #certificado [hidden]="indice !== 3" [certificadoDatos]="certificadoDatos"></app-certificado-de-origen>
        }
      </ng-container>
    </div>
  </div>
