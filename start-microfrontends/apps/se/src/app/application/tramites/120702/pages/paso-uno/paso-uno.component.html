<div class="page">
  <div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
            (keydown.space)="seleccionaTab(1)" role="button" tabindex="1">Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
            (keydown.space)="seleccionaTab(2)" role="button" tabindex="2"><span *ngIf="esFormularioSoloLectura">Datos de la solicitud</span><span *ngIf="!esFormularioSoloLectura">Expedición certificados asignación directa</span></a>
        </li>
      </ul>

      <ng-container>
        @switch (indice) {
        @case (1) {
        <solicitante></solicitante>
        }
        @case (2) { @if(esDatosRespuesta) {
        <app-expedicion-asignacion (TablaLength)="handleTablaLength($event)" [isContinuarTriggered]="isContinuarTriggered" (formaDatos)="handleFormaDatos($event)" 
         (emptyDatos)="handleEmptyDatos($event)"  #asignacionRef *ngIf="consultaState" 
         [consultaState]="consultaState" [formDatos]="asignacionFormDatos" (isMontoDisableLess)="handleIsMontoDisableLess($event)"></app-expedicion-asignacion>
        }
        }
        }
      </ng-container>
    </div>
  </div>
</div>
