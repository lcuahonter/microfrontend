<div class="Page">
  <div class="container mt-5">
    <div class="row">
      <div class="col-md-12">
        <h1>Expedición de certificados de la frontera personas morales</h1>
      </div>
      @if (esFormaValido) {
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }

      @if (isMontoDisableLessValue) {
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="montoAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }

      @if (noDatosBuscar) {
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="noDatosError" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }
      <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) {
      @case (1) {
      <app-paso-uno (TablaLength)="handleTablaLength($event)" [isContinuarTriggered]="isContinuarTriggered"
        (buscarDatos)="handleFormaDatos($event)" (emptyDatosBuscar)="handleEmptyDatos($event)"
        #pasoUnoComponent (isMontoDisableLessExpendir)="handleIsMontoDisableLess($event)"></app-paso-uno>
      }
      @case (2) {
      <paso-firma [idSolicitud]="idSolicitud" [procedure]="120702"
        [procedureUrl]="'expedicion-certificados-frontera/solicitante'"></paso-firma>
      }
      }
    </div>

    <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)" [dePadre]="true">
    </btn-continuar>

    <div class="row mt-5">
      <ng-alert [CONTENIDO]="avisoPrivacidadAlert"></ng-alert>
    </div>
  </div>
</div>
