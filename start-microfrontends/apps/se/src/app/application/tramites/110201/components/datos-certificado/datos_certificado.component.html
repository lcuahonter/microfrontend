<form [formGroup]="registroForm">
  <ng-container formGroupName="validacionForm">
    <ng-titulo titulo="Datos del certificado" />
    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Observaciones:</label>
        <div class="col-md-12 align-text-area">
          <textarea cols="80" rows="5" formControlName="observaciones" (change)=" setValoresStore( validacionForm, 'observaciones', 'setObservaciones' ) "></textarea>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Precisa*:</label>
        <div class="col-md-12 align-text-area">
          <textarea cols="80" rows="5" formControlName="presica" (change)="setValoresStore(validacionForm, 'presica', 'setPresica')"></textarea>
        </div>
        <div *ngIf="registroForm.get('validacionForm.presica')?.invalid && registroForm.get('validacionForm.presica')?.touched" class="text-danger">
          <small *ngIf="registroForm.get('validacionForm.presica')?.errors?.['required']">Este campo es obligatorio.</small>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="col-md-4 mb-3">
        <label>Presenta:</label>
        <div class="col-md-12 align-text-area">
          <textarea cols="80" rows="5" formControlName="presenta" (change)=" setValoresStore(validacionForm, 'presenta', 'setPresenta') "></textarea>
        </div>
      </div>
    </div>
    <div class="row">
     <div class="col-md-4 mb-3">
        <app-catalogo-select [catalogo]="optionsIdioma.catalogos" [label]="'Idioma'" [required]="true" id="idioma" formControlName="idioma" (change)="setValoresStore(validacionForm, 'idioma', 'setIdioma')" [isDisabled]="soloLectura" 
        (selectionChange)="onIdiomaChange($event)"
        [markTouched]="registroForm.get('validacionForm.idioma')?.touched??false"></app-catalogo-select>

      </div>
      <ng-container >
        <ng-titulo titulo="Justificación para obtención del certificado" />
        <div class="row">
          <label>¿Desea obtener el certificado de origen?:</label>
        </div>
        <div class="row">
          <label style="font-weight: bold">
            <input type="checkbox" formControlName="casillaVerificacion" (change)=" setValoresStore( validacionForm, 'casillaVerificacion', 'setCheckbox' ) " /> Sí </label>
        </div>
        <div *ngIf="registroForm.get('validacionForm.casillaVerificacion')?.invalid && registroForm.get('validacionForm.casillaVerificacion')?.touched" class="text-danger">
          <small *ngIf="registroForm.get('validacionForm.casillaVerificacion')?.errors?.['required']">Debe seleccionar esta opción.</small>
        </div>
        <div class="row">
          <div class="col-md-4 mb-3">
            <label>Justificación*:</label>
            <div class="col-md-12 align-text-area">
              <textarea cols="80" rows="5" formControlName="justificacion" (change)=" setValoresStore( validacionForm, 'justificacion', 'setJustificacion' ) "></textarea>
            </div>
            <div *ngIf="registroForm.get('validacionForm.justificacion')?.invalid && registroForm.get('validacionForm.justificacion')?.touched" class="text-danger">
              <small *ngIf="registroForm.get('validacionForm.justificacion')?.errors?.['required']">Este campo es obligatorio.</small>
            </div>
          </div>
        </div>
      </ng-container>
      <ng-titulo titulo="Representación federal" />
      <div class="row">
        <div class="col-md-4">
          <app-catalogo-select [catalogo]="optionsEntidad.catalogos" [label]="'Entidad federativa'" [required]="true" formControlName="entidad" (change)="setValoresStore(validacionForm, 'entidad', 'setEntidad')" [isDisabled]="soloLectura" [markTouched]="registroForm.get('validacionForm.entidad')?.touched??false"
          (selectionChange)="onChangeEntidad($event)"
          ></app-catalogo-select>
        </div>
        <div class="col-md-4">
          <app-catalogo-select [catalogo]="optionsRepresentacion.catalogos" [label]="'Representación federal'" [required]="true" formControlName="representacion" (selectionChange)="onRepresentacionChange($event)"
           (change)="setValoresStore( validacionForm, 'representacion', 'setRepresentacion' ) " [isDisabled]="soloLectura" [markTouched]="registroForm.get('validacionForm.representacion')?.touched??false"></app-catalogo-select>
        </div>
      </div>
    </div>
  </ng-container>
</form>
