<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          tabindex="0"
          (keyup)="seleccionaTab(1)"
          (click)="seleccionaTab(1)"
          >Solicitante</a
        >
      </li>
      @if(mostrarTab) {
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a
            data-toggle="tab"
            (click)="seleccionaTab(2)"
            (keydown.enter)="seleccionaTab(2)"
            (keydown.space)="seleccionaTab(2)"
            role="button"
            tabindex="2"
            >Programas presentados por reporte anual</a
          >
        </li>
      }
      @if(mostrarTab) {
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(3)"
          (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)"
          role="button"
          tabindex="3"
          [ngClass]="!estaHabilitado ? 'disabled-link' : ''"
          >Datos de reporte anual</a
        >
      </li>
      } @else {
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(3)"
          (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)"
          role="button"
          tabindex="3"
          [ngClass]="!estaHabilitado ? 'disabled-link' : ''"
          >Reporte anual</a
        >
      </li>
      }
    </ul>
    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante></solicitante>
      } @case (2) { @if(esDatosRespuesta){
      <app-programas-reporte-annual #programasDeComp
        [solicitudDatosGuardados]="tablaDatos"
        (filaDeInformeSeleccionada)="getFilaDeInformeSeleccionada($event)"
      >
      </app-programas-reporte-annual>
      } } @case (3) { @if(esDatosRespuesta){
      <app-datos-de-reporte-annual #datosDeComp [mostrarBienesProducidos]="mostrarBienesProducidos"> </app-datos-de-reporte-annual>
      } } }
    </ng-container>
  </div>
</div>
