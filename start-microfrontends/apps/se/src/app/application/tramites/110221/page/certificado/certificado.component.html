<div class="page">
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <h1>Validar inicialmente el certificado de Panamá</h1>
        </div>
          @if(esFormaValido){
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }
       @else if(esFormaEstadoValido){
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorEstadoAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }
        <app-wizard [listaPasos]="pasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-paso-uno #pasoUnoRef></app-paso-uno>
      }
      @case (2) {
      <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="110221" [procedureUrl]="'validador-certificado-cam'"></paso-firma>
      }
     }
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)" 
        [btnGuardar]="true"
        [dePadre]="true"
      ></btn-continuar>
    </div>
  </div>
