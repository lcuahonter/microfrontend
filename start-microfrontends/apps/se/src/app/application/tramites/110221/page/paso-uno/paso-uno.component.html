<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0"  (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0"  (click)="seleccionaTab(2)">Certificado de origen</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0"  (click)="seleccionaTab(3)">Histórico productores</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0"  (click)="seleccionaTab(4)">Destinatario</a>
            </li>
            <li [ngClass]="indice === 5 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0"  (click)="seleccionaTab(5)">Datos certificado</a>
            </li>
        </ul>
        <ng-container>
            <solicitante [hidden]="indice !== 1" #solicitanteRef></solicitante>
            <app-certificado-origen [hidden]="indice !== 2" #certificadoDeOrigenRef></app-certificado-origen>
            <app-historico-de-productores [hidden]="indice !== 3" #historicoDeProductoresRef></app-historico-de-productores>
            <app-destinatario-de-certificado [hidden]="indice !== 4" #destinatarioRef></app-destinatario-de-certificado>
            <app-datos-certificado [hidden]="indice !== 5" #datosCertificadoRef></app-datos-certificado>
        </ng-container>
    </div>
</div>
