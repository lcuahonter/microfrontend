<ng-titulo titulo="Datos de la certificación ante el SAT" />
<form [formGroup]="certificionForm" class="mb-5">
  <div class="row">
    <label class="form-label col-md-4 text-start" for="certificion"
      >Certificada (SI/NO)</label
    >
    <input
      class="form-control col-md-4"
      type="text"
      id="certificion"
      formControlName="certificion"
    
    />
  </div>
  <div class="row">
    <div class="col-md-4">
      <label class="form-label text-start" for="certificion"
        >Fecha inicio de vigencia</label
      >
      <input
        class="form-control"
        type="text"
        id="certificion"
        formControlName="fechaInicio"
      />
    </div>
    <div class="col-md-4">
      <label class="form-label text-start" for="certificion"
        >Fecha fin de vigencia</label
      >
      <input
        class="form-control"
        type="text"
        id="certificion"
        formControlName="fechaVigencia"
      />
    </div>
  </div>
</form>
