    <div class="row">
        <ng-titulo titulo="Datos de los socio y/o accionistas" />

    </div>

    <div class="row">
        <ng-titulo titulo="Datos de los federatarios" />
        <app-tabla-dinamica [configuracionTabla]="configuracionFederetios" [datos]="datosFederetarios"></app-tabla-dinamica>

    <div class="row">
