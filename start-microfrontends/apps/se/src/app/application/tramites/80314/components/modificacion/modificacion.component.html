<div class="container">
  <form [formGroup]="modificacionForm">
    <div>
      <div class="row" style="padding-top: 45px">
        <div class="col-md-4">
          <label class="form-label" for="rfc"
            >Registro Federal de Contribuyentes:</label
          >
          <input
            type="text"
            class="form-control"
            id="rfc"
            formControlName="rfc"
            readonly
          />
        </div>

        <div class="col-md-8">
          <label class="form-label" for="federal"
            >Representación federal:</label
          >
          <input
            type="text"
            class="form-control"
            id="federal"
            formControlName="federal"
            readonly
          />
        </div>
        <div class="col-md-4">
          <label class="form-label" for="tipo">Tipo de modificación:</label>
          <input
            type="text"
            class="form-control"
            id="tipo"
            formControlName="tipo"
            readonly
          />
        </div>

        <div class="col-md-8">
          <label class="form-label" for="programa"
            >Modificación de programa:</label
          >
          <input
            type="text"
            class="form-control"
            id="programa"
            formControlName="programa"
            readonly
          />
        </div>

        <div class="col-md-6">
          <label class="form-label" for="actividadProductivaActual"
            >Actividad productiva actual:</label
          >
          <input
            type="text"
            class="form-control"
            id="actividadProductivaActual"
            formControlName="actividadProductivaActual"
            readonly
          />
        </div>
        <div class="col-md-6">
          <app-catalogo-select
            [catalogo]="actividadProductiva.catalogos"
            [label]="actividadProductiva.labelNombre"
            [placeholder]="actividadProductiva.primerOpcion"
            id="actividadProductiva"
            formControlName="actividadProductiva"
            [isDisabled]="esFormularioSoloLectura"
            [required]="actividadProductiva.required"
          ></app-catalogo-select>
        </div>
      </div>
    </div>
  </form>
</div>
