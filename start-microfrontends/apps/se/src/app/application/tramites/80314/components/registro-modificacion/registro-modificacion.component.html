<div class="container">
    <div class="row">
        <div class="col-md-12 d-flex align-items-center justify-content-between">
            <h1 class="d-inline-block">
                Registro de solicitud modificación programa IMMEX (Cambio de sector)
            </h1>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12 d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <ng-titulo titulo="Lista de programas" class="d-inline-block"></ng-titulo>
            </div>
            <div>
                <button 
                    type="button" 
                    class="btn btn-link d-inline-block" 
                    (click)="toggleTableVisibility()">
                    <i [ngClass]="{'bi bi-chevron-down': !isTableCollapsed, 'bi bi-chevron-up': isTableCollapsed}"></i>
                </button>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
            <form>
                <div class="table-responsive" *ngIf="!isTableCollapsed">
                    <div class="innercontainer">
                        <app-tabla-dinamica 
                            [configuracionTabla]="encabezadoDeTabla" 
                            [datos]="datosDelContenedor" 
                            (alternarValor)="valorDeAlternancia()">
                        </app-tabla-dinamica>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
