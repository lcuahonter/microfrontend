<div class="container">
    <form [formGroup]="representacionForm">
      <div class="row mb-3">
        <ng-titulo titulo="Representación federal"></ng-titulo>
        <div class="col-md-4">
          <app-catalogo-select 
            [catalogo]="entidad" 
            [label]="'Entidad Federativa'"
            [required]="true"
            name="entidad" 
            formControlName="entidad"
            (change)="getEntidad()"
            [isDisabled]="esFormularioSoloLectura"
            [markTouched]="formTouched"
            >
          </app-catalogo-select>
        </div>
        <div class="col-md-4">
          <app-catalogo-select 
            [catalogo]="representacion" 
            [label]="'Representación federal'" 
            [required]="true"
            name="representacion" 
            formControlName="representacion"
            (change)="getRepresentacionValor()"
            [isDisabled]="esFormularioSoloLectura"
            [markTouched]="federal"
           >
          </app-catalogo-select>
        </div>
      </div>
    </form>
  </div>
