<ng-titulo titulo="Datos de certificación ante el SAT" />

<form [formGroup]="certificionForm" class="mb-5">
  <div class="row">
    <label class="form-label col-md-4 text-start" for="certificion">Certificada (Si/NO)</label>
    <input class="form-control col-md-4" type="text" id="certificion" formControlName="certificion" />
  </div>

  <div class="row">
    <div class="col-md-6">
      <label class="form-label text-start" for="fechaInicio">Fecha inicio de vigencia:</label>
      <input class="form-control" type="text" id="fechaInicio" formControlName="fechaInicio" />
    </div>

    <div class="col-md-6">
      <label class="form-label text-start" for="fechaVigencia">fecha fin de vigencia:</label>
      <input class="form-control" type="text" id="fechaVigencia" formControlName="fechaVigencia" />
    </div>
  </div>
</form>
