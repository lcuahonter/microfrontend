<div class="container">
    <form [formGroup]="tipoDePersonaForm" class="mt-5 mb-5">

        <div class="row mb-5">
            <div class="col-md-6">
                <app-catalogo-select [catalogo]="tipoDePersona" [label]="'Tipo de persona'" [required]="true"
                    formControlName="tipoDePersona" name="tipoDePersona" (change)="tipoDePersonaSeleccion()">
                </app-catalogo-select>
            </div>
        </div>
        <div class="row mb-5">
            <div class="col-md-4">
                <div class="form-group">
                    <label class="form-label" for="RFCImpExp">RFC*:</label>
                    <input class="form-control" id="RFCImpExp" placeholder="RFC" type="text" formControlName="RFCImpExp"
                        (change)="setValoresStore(tipoDePersonaForm,'RFCImpExp','setRFCImpExp')" />
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div class="pull-right row">
                    <button type="button" class="btn btn-primary" (click)="registroModificacion()">Siguiente</button>
                </div>
            </div>
        </div>
    </form>
</div>
