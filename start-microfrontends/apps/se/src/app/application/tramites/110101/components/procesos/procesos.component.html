<div class="container mt-4">
    <ng-titulo titulo="Procesos Productivos" />
    <ng-alert [CONTENIDO]="'Selecciona los procesos de producción que utilizas para realizar la mercancía.'"></ng-alert>

    <h6 class="fs-4">Procesos de Fabricación</h6>

    <div class="row">
        <div class="col-md-12">
            <div class="table-responsive table-wrapper">
            <table class="table table-striped table-bordered mb-2">
                <thead>
                <tr>
                    <th class="text-center">
                    <input  class="cursor-pointer"
                            type="checkbox"
                            (change)="alternarSeleccionTodo($event)" 
                            [checked]="todoSeleccionado()" />
                    </th>
            
                    <th class="text-center">Proceso</th>
                </tr>
                </thead>
            
                <tbody>
                <tr *ngIf="!procesosTablaDatos.length">
                    <td colspan="2" style="text-align: center">SIN DATOS</td>
                </tr>
            
                <tr *ngFor="let fila of procesosTablaDatos">
                    <td class="text-center">
                        <input
                        type="checkbox"
                        class="cursor-pointer"
                        [checked]="fila.cumple_proceso"
                        (change)="alternarFila(fila, $event)" />
                    </td>

                    <td>{{ fila.nombre }}</td>
                    </tr>
                </tbody>
            </table>
            </div>
        </div>
    </div>
</div>
