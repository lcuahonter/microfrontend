<div class="container my-4">

  <form [formGroup]="formularioInfoRegistro">
    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label class="form-label clase-sin-ajuste"
            >Registro Federal de Contribuyentes:</label
          >
          <input
            type="text"
            id="rfc"
            name="rfc"
            size="30"
            maxlength="13"
            class="form-control"
            formControlName="rfc"
          />
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group">
          <label class="form-label">Representación federal</label>
          <input
            type="text"
            id="representacionFederal"
            name="representacionFederal"
            size="30"
            maxlength="13"
            class="form-control"
            formControlName="representacionFederal"
          />
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="form-group">
          <label class="form-label">Tipo de modificación:</label>
          <input
            type="text"
            id="tipoModificacion"
            name="tipoModificacion"
            size="30"
            maxlength="13"
            class="form-control"
            formControlName="tipoModificacion"
          />
        </div>
      </div>

      <div class="col-md-6">
        <div class="form-group">
          <label class="form-label">Modificación de programa:</label>
          <input
            type="text"
            id="modificacionPrograma"
            name="modificacionPrograma"
            size="30"
            maxlength="13"
            class="form-control"
            formControlName="modificacionPrograma"
          />
        </div>
      </div>
    </div>
  </form>

  <div classs="row mt-3 mb-3">
    <ng-titulo titulo="Lista de domicilios" />
    <app-tabla-dinamica [tipoSeleccionTabla]="TablaSeleccion.BUTTON" [configuracionTabla]="encabezadoDeTabla" [datos]="datosTabla" (alternarValor)="valorDeAlternancia($event)"></app-tabla-dinamica>
    </div>
</div>
