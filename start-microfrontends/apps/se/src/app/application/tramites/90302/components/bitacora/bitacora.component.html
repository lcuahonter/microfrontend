<div class="container my-4">
    @if(!esDeSolicitante){
        <ng-titulo titulo="Bitácora "></ng-titulo>
    }
    

    <div class="my-4">
        <div>
            @if(!esDeSolicitante){
            <app-tabla-dinamica 
                
                [configuracionTabla]=" configuracionTablaBitacora" [datos]="datosBitacora"></app-tabla-dinamica>

            }
        </div>

        <div class="row">
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" >Complementaria</a>
                  </li>
            </ul>
        </div>
        <ng-titulo titulo="Plantas "></ng-titulo>

        <div class="my-4">
            <div>
                <app-tabla-dinamica 
                    [configuracionTabla]=" configuracionTablaPlantas" [datos]="datosPlantas"></app-tabla-dinamica>
            </div>

            <ng-titulo titulo="Sector"></ng-titulo>

            <div class="my-4">
                <div>
                    <app-tabla-dinamica 
                        [configuracionTabla]="configuracionTablaSector" [datos]="datosSector"></app-tabla-dinamica>
                </div>
                <ng-titulo titulo="Mercancías a producir"></ng-titulo>

                <div class="my-4">
                    <div>
                        <app-tabla-dinamica 
                            [configuracionTabla]="configuracionTablaMercancias" [datos]="datosMercancias"></app-tabla-dinamica>
                    </div>

                </div>
                <ng-titulo titulo="Productor indirecto  "></ng-titulo>

                <div class="my-4">
                    <div>
                        <app-tabla-dinamica 
                            [configuracionTabla]="configuracionTablaProductor" [datos]="datosProductor"></app-tabla-dinamica>
                    </div>

                </div>

            </div>
        </div>
    </div>
</div>
