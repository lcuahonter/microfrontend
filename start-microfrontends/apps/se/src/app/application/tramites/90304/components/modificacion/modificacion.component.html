<div [formGroup]="modificacionForm" class="container">
    <div class="row mt-5">
        <div class="col-md-6">
            <div class="form-group">
                <label class="form-label" for="registroFederalContribuyentes">Registro Federal de
                    Contribuyentes:</label>
                <input class="form-control" type="text" id="rfc" formControlName="registroFederalContribuyentes"
                    readonly>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group">
                <label class="form-label" for="representacionFederal">Representación federal:</label>
                <input class="form-control" type="text" id="representacionFederal"
                    formControlName="representacionFederal" readonly>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6">
            <div class="form-group">
                <label class="form-label" for="tipoModificacion">Tipo de modificación:</label>
                <input class="form-control" type="text" id="tipoModificacion" formControlName="tipoModificacion"
                    readonly>
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group">
                <label class="form-label" for="modificacionPrograma">Modificación de programa:</label>
                <input class="form-control" type="text" id="modificacionIMMEX" formControlName="modificacionPrograma"
                    readonly>
            </div>
        </div>
    </div>

    <!--Lista de empresas-->
    <ng-titulo titulo="Lista de empresas"></ng-titulo>

    <app-tabla-dinamica [configuracionTabla]="configuracionTabla" [datos]="empresasLista"
        [desactivarButton]="soloLectura" [tipoSeleccionTabla]="tablaSeleccion" (click)="onFilaClic($event)">
    </app-tabla-dinamica>
    
</div>
