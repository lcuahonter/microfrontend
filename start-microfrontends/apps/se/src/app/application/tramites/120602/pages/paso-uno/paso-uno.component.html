<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(1)"
          (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)"
          role="button"
          tabindex="0"
          >Solicitante</a
        >
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a
          data-toggle="tab"
          (click)="seleccionaTab(2)"
          (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)"
          role="button"
          tabindex="2"
          >Datos Empresa</a
        >
      </li>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante [tabindex]="1" #solicitanteRef></solicitante>
      } @case (2) { @if(esDatosRespuesta){
      <app-datos-empresa [tabindex]="2" #datosEmpresaRef></app-datos-empresa>
      } } }
    </ng-container>
  </div>
</div>
