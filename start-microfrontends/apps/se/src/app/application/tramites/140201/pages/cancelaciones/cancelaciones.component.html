
<div class="Page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1>Registro de solicitud de cancelacion IPC</h1>
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
            <app-datos></app-datos>
            }
            @case (2) {
           <app-datos-notification-recipients></app-datos-notification-recipients>
           <app-direccion-de-notificaciones></app-direccion-de-notificaciones>
            }
            @case (3) {
                <app-paso-dos></app-paso-dos>
            }
            @case(4){
                <app-paso-tres></app-paso-tres>
            }
        }
        </div>
        <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>

</div>
