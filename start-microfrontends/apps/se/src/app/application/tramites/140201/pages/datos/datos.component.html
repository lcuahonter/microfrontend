<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Cancelación de
                    autorizaciones</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Entidad
                    externa</a>
            </li>
        </ul>
        <ng-container>
            @switch (indice) {
            @case (1) {

            <solicitante #Solicitante></solicitante>
            }
            @case (2) {
                   @if(esDatosRespuesta){
            <app-cancelacion-de-autorizaciones> </app-cancelacion-de-autorizaciones>
                   }
            }
            @case (3) {
                    @if(esDatosRespuesta){
            <app-entidad-externa> </app-entidad-externa>
                    }
            }
            }
        </ng-container>
    </div>
</div>
