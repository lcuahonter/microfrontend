<ng-titulo
  titulo="Datos de las personas autorizadas para oír y recibir notificaciones"
></ng-titulo>

<form [formGroup]="formularioDeNotificacionesForm">
  <div class="row mt-5">
    <div class="col-md-4 form-group">
      <label class="form-label" for="nombre"><span class="require">* </span>Nombre(s):</label>
      <input
        class="form-control"
        id="nombre"
        placeholder=""
        type="text"
        formControlName="nombre"
        (input)="updateNombre()"
      />
      <div *ngIf="formularioDeNotificacionesForm.get('nombre')?.invalid && formularioDeNotificacionesForm.get('nombre')?.touched">
        <small class="text-danger" *ngIf="formularioDeNotificacionesForm.get('nombre')?.errors?.['required']">
          El nombre es obligatorio.
        </small>
        <small class="text-danger" *ngIf="formularioDeNotificacionesForm.get('nombre')?.errors?.['minlength']">
          Debe tener al menos 3 caracteres.
        </small>
      </div>
    </div>
    <div class="col-md-4 form-group">
      <label class="form-label" for="apellidoPaterno">  <span class="require">* </span>Apellido paterno:</label>
      <input
        class="form-control"
        id="apellidoPaterno"
        placeholder=""
        type="text"
        formControlName="apellidoPaterno"
        (input)="updateApellidoPaterno()"
      />
      <div *ngIf="formularioDeNotificacionesForm.get('apellidoPaterno')?.invalid && formularioDeNotificacionesForm.get('apellidoPaterno')?.touched">
        <small class="text-danger" *ngIf="formularioDeNotificacionesForm.get('apellidoPaterno')?.errors?.['required']">
          El apellido paterno es obligatorio.
        </small>
      </div>
    </div>
    <div class="col-md-4 form-group">
      <label class="form-label" for="apellidoMaterno">Apellido materno:</label>
      <input
        class="form-control"
        id="apellidoMaterno"
        placeholder=""
        type="text"
        formControlName="apellidoMaterno"
      />
    </div>
  </div>
  <div class="row">
    <div class="col-md-4 form-group">
      <label class="form-label" for="correoElectronico"
        >Correo electrónico:
      </label>
      <input
        class="form-control"
        id="correoElectronico"
        placeholder=""
        type="text"
        formControlName="correoElectronico"
        (input)="updateCorreoElectronico()"
      />
    </div>
  </div>
</form>
