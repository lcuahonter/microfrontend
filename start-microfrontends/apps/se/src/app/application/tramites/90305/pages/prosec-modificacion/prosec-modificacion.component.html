<div class="Page">
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1> Registro de solicitud modificación programa PROSEC (Modificación Alta a domicilio de una planta, bodega o almacén)</h1>
            </div>
            <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
        </div>
        <div class="row">
            @switch (indice) {
            @case (1) {
          <app-datos-90305></app-datos-90305>
            }
            @case (2) {
               <app-paso-dos></app-paso-dos>
            }
            @case (3) {
                 <app-paso-tres></app-paso-tres>
            }}
        </div>
        <btn-continuar [datos]="datosPasos" (continuarEvento)="getValorIndice($event)"></btn-continuar>
    </div>

</div>
