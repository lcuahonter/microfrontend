<ng-titulo titulo="Lista de domicilios"></ng-titulo>
<form >

  <app-tabla-dinamica
  [configuracionTabla]="configuracionTabla"
  [datos]="personaparas"
  [tipoSeleccionTabla]="TablaSeleccion.RADIO"
  [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"
  [styleCenter]="true"
> 
</app-tabla-dinamica>
<div class="d-flex justify-content-end align-items-center mt-5 mb-5">
<!-- Primer botón (inicialmente visible) -->
  <button
    *ngIf="!showSecondButton"
    type="button"
    class="btn btn-primary"
    name="Buscardomicilios"
    (click)="toggleButtons()"
     [disabled]="esFormularioSoloLectura" 
     >
    Agregar plantas
  </button>

<!-- Segundo botón (inicialmente oculto, aparece después de hacer clic en el primer botón) -->
  <button
    *ngIf="showSecondButton"
    type="button"
    class="btn btn-primary"
    (click)="toggleButtons()"
     [disabled]="esFormularioSoloLectura">
    Eliminar plantas
  </button>
</div>
</form>
<hr *ngIf="showSecondButton" />
