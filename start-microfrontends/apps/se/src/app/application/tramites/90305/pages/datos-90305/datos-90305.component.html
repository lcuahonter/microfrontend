<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(2)" (click)="seleccionaTab(2)">Modificación</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(3)" (click)="seleccionaTab(3)">Bitácora</a>
            </li>
        </ul>
        <ng-container>
            @switch (indice) {
            @case (1) {
        
<solicitante #Solicitante></solicitante>
            }
            @case (2) {@if (esDatosRespuesta) {
          <app-modificacion-90305></app-modificacion-90305>
            }}
          @case (3) {
            @if(esDatosRespuesta){
      <app-bitacora-90305></app-bitacora-90305>
         }
        }}
        </ng-container>
    </div>
</div>
