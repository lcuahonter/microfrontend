<form [formGroup]="modificationInfoForm">
<div class="row">
    <div class="col-md-6">
        <div class="form-group">
            <label class="form-label" for="registroFederalContribuyentes">Registro Federal de Contribuyentes:</label>
            <input class="form-control" type="text" id="registroFederalContribuyentes" formControlName="registroFederalContribuyentes"   (change)="onControlChange('registroFederalContribuyentes')" >
             
        </div>
    </div>
    <div class="col-md-6">
        <div class="form-group">
            <label class="form-label" for="representacionFederal">Representación federal:</label>
            <input class="form-control" type="text" id="representacionFederal" formControlName="representacionFederal" 
                (change)="onControlChange('representacionFederal')" >
             
        </div>
    </div>
</div>
<div class="row">
    <div class="col-md-6">
        <div class="form-group">
            <label class="form-label" for="tipoModificacion">Tipo de modificación:</label>
            <input class="form-control" type="text" id="tipoModificacion" formControlName="tipoModificacion" 
            (change)="onControlChange('tipoModificacion')" >
             
        </div>
    </div>
    <div class="col-md-6">
        <div class="form-group">
            <label class="form-label" for="modificacionPrograma">Modificación de programa:</label>
            <input class="form-control" type="text" id="modificacionPrograma" formControlName="modificacionPrograma" 
              (change)="onControlChange('modificacionPrograma')"  >
             
        </div>
    </div>
</div>


</form>
