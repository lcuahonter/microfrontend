<div class="container my-4">

    <form [formGroup]="formularioInfoRegistro">
        <div class="row">
            <div class="col-md-6">
                <div class="form-group">
                    <label class="form-label clase-sin-ajuste">Selecciona la modalidad</label>
                    <input type="text" id="seleccionaLaModalidad" name="seleccionaLaModalidad" size="30" maxlength="13"
                        class="form-control" formControlName="seleccionaLaModalidad" readonly/>
                </div>
            </div>
            <div class="col-md-6">

                <div class="form-group">
                    <!-- <label class="form-label">Seleccionar regla</label> -->
                    <app-catalogo-select [catalogo]="reglaSeleccionada" [label]="'Seleccionar regla'"
                        name="seleccionarRegla" formControlName="seleccionarRegla" [isDisabled]="esFormularioSoloLectura"
                         id="clave" [required]="true"
                        (change)="procesarDatosDelHijo()"
                        [mostrarErrores]="true"
                        [disabledPrimerOption]="false"
                        [hiddenPrimerOption]="false"
                        [placeholder]="'Seleccione una opción'"
                        [markTouched]="formularioInfoRegistro.get('seleccionarRegla')?.touched || false"></app-catalogo-select>

                </div>

            </div>
            <div class="col-md-6 mt-5" *ngIf="isSelectedRegla">

                <div class="form-group">

                    <app-catalogo-select [catalogo]="sectorDesplegable" [label]="'Sector'" [required]="false"
                        name="sector" formControlName="sector" [isDisabled]="esFormularioSoloLectura"
                        (change)="cambioDeSector()"
                        id="clave"
                        [required]="false"
                        [disabledPrimerOption]="false"
                        [hiddenPrimerOption]="false"
                        [placeholder]="'Seleccione una opción'"></app-catalogo-select>

                </div>

            </div>



        </div>
    </form>

    <div class="row" *ngIf="isSelectedRegla">
        <div class="col-md-12">
            <div class="pull-right">
                <button name="agregarServicio" (click)="agregarServiciosAmpliacion()" class="btn btn-primary mx-2" [disabled]="esFormularioSoloLectura">
                    Agregar
                </button>
                <button name="eliminarServicio" (click)="eliminarServiciosGrid()" class="btn btn-danger" [disabled]="esFormularioSoloLectura">
                    Eliminar
                </button>

            </div>
        </div>
    </div>
    <div class="row" *ngIf="isSelectedRegla">
        <div class="col-md-8">
            <div class="form-group">
                <label for="serviciosImmexServ">Sectores IMMEX:</label>
            </div>
        </div>
    </div>
    <div class="my-4">
        <div *ngIf="isSelectedRegla">
            <app-tabla-dinamica [tipoSeleccionTabla]="tablaSeleccion"
                (listaDeFilaSeleccionada)="seleccionarDomicilios($event)"
                [configuracionTabla]="configuracionTablaSector" [datos]="datosSector" [disableSeleccionTablaCheckBox]="esFormularioSoloLectura"></app-tabla-dinamica>
        </div>


    </div>

    <div class="modal" tabindex="-1" [ngClass]="{'show': mostrarAlerta, 'custom-backdrop': mostrarAlerta}"
        [ngStyle]="{'display': mostrarAlerta ? 'block' : 'none'}">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 350px;">
            <div class="modal-content">
                <div class="modal-header" style="height: 50px;">
                </div>
                <div class="modal-body">
                    <p>{{ mensajeDeAlerta }}</p>
                </div>
                <div class="modal-footer justify-content-center">
                    <button type="button" class="btn btn-primary" (click)="aceptar()">Aceptar</button>
                </div>
            </div>
        </div>
    </div>
