<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)">Datos de la solicitud</a>
      </li>
    </ul>

    <ng-container>
      @switch (indice) {
      @case (1) {
      @if(esDatosRespuesta){
      <solicitante></solicitante>
      }
      }
      @case (2) {
      @if(esDatosRespuesta){
      <app-tramite-realizer></app-tramite-realizer>
      <app-datos-mercancia></app-datos-mercancia>
      <app-documento-exportacion></app-documento-exportacion>
      <app-datos-productor></app-datos-productor>
      <app-datos-exportador></app-datos-exportador>
      <app-representacion-federal></app-representacion-federal>
      }
      }
      }
    </ng-container>
  </div>
</div>
