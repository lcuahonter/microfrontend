<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
          (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
      </li>
      <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
          (keydown.space)="seleccionaTab(2)" role="button" tabindex="2">Certificado de origen</a>
      </li>
      <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
          (keydown.space)="seleccionaTab(3)" role="button" tabindex="3">Destinatario</a>
      </li>
      <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)"
          (keydown.space)="seleccionaTab(4)" role="button" tabindex="4">Datos certificado</a>
      </li>
    </ul>

    <ng-container>
      <solicitante [tabindex]="1" [hidden]="indice !== 1"></solicitante>
      <app-certificado-origen #certificadoOrigen [tabIndex]="2" [hidden]="indice !== 2"></app-certificado-origen>
      <app-destinatario-de #destinatario [tabIndex]="3" [hidden]="indice !== 3"></app-destinatario-de>
      <app-datos-certificado #datosCertificado [tabIndex]="4" [hidden]="indice !== 4"></app-datos-certificado>
    </ng-container>
  </div>
</div>
