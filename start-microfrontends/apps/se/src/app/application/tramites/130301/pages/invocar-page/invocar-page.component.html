<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2>Solicitud prórroga para permisos de importación/exportación</h2>
      </div>
    </div>
    <div class="row">
      <form [formGroup]="folioFormulario">
        <div class="row mt-5 mb-5">
          <div class="col-md-4 mb-3">
            <label> Folio del permiso*:</label>
            <input
              type="text"
              class="form-control"
              formControlName="folioPermiso"
              id="folioPermiso"
              [ngClass]="
                isValid(folioFormulario, 'folioPermiso') ? 'required' : ''
              "
              (change)="
                setValoresStore(
                  folioFormulario,
                  'folioPermiso',
                  'setFolioPermiso'
                )
              "
            />
          </div>
        </div>
      </form>
      <div class="row my-5">
        <div class="col-md-8">
          <p>* Campos obligatorios</p>
        </div>
        <div class="col-md-4 d-flex justify-content-end">
          <button type="button" class="btn btn-default" (click)="cancelar()">
            Cancelar
          </button>
          <button type="button" class="btn btn-primary ms-3" (click)="buscar()">
            Buscar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
