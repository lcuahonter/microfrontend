<ng-titulo titulo="Partidas de la mercancía" />
<h6 class="mt-5">Partidas</h6>
<div class="row">
    <div class="col-md-8">
        <app-tabla-dinamica [configuracionTabla]="partidasTabla"
        [datos]="partidasTablaDatos"></app-tabla-dinamica>
    </div>
</div>
<ng-titulo titulo="País(es) procedencia" />
<p class="fc-7a7878"> {{ pais }} </p>
<form [formGroup]="partidas">
    <div class="row mt-5">
        <div class="col-md-8">
            <div class="form-group">
                <label for="usoEspecificoMercancia">Uso(s) específico(s) de la mercancía:</label>
                <textarea id="usoEspecificoMercancia" formControlName="usoEspecificoMercancia" class="form-control h-80"></textarea>
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-8">
            <div class="form-group">
                <label for="justificacionBeneficio">Justificación y beneficio que se obtiene<sup>1</sup><span [ngClass]="{'text-danger': partidas.get('justificacionBeneficio')?.invalid && (partidas.get('justificacionBeneficio')?.touched || partidas.get('justificacionBeneficio')?.dirty)}">*</span>:</label>
                <textarea id="justificacionBeneficio" formControlName="justificacionBeneficio" class="form-control h-80"></textarea>
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-8">
            <div class="form-group">
                <label for="observaciones">Observaciones:</label>
                <textarea id="observaciones" formControlName="observaciones" class="form-control h-80"></textarea>
            </div>
        </div>
    </div>
    <ng-titulo titulo="Representación federal" />
    <div class="row">
        <div class="col-md-4">
            <div class="form-group">
                <label for="representacionFederal">Representación federal:</label>
                <input type="text" id="representacionFederal" formControlName="representacionFederal" class="form-control">
            </div>
        </div>
    </div>
</form>
