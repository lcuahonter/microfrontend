<ng-titulo titulo="Datos del trámite original" />
<form [formGroup]="datosDelTramite">

    <div class="row">
        <div class="col-md-4">
            <div class="form-group">
                <label for="numeroFolioTramiteOriginal">Numero folio trámite original:</label>
                <input type="text" id="numeroFolioTramiteOriginal" formControlName="numeroFolioTramiteOriginal" class="form-control">
            </div>
        </div>
    </div>
    <ng-titulo titulo="Datos del trámite a realizar" />
    <div class="row">
        <div class="col-md-4">
            <label for="solicitud">Solicitud:</label>
            <app-input-radio
                [radioOptions]="radioOpcions"
                id="solicitudOpcion"
                formControlName="solicitudOpcion"
                [layout]="'vertical'"
            >
          </app-input-radio>
        </div>
        <div class="col-md-8">
            <div class="form-group">
                <label for="regimen">Régimen:</label>
                <input type="text" id="regimen" formControlName="regimen" class="form-control">
            </div>
        </div>
    </div>
    <div class="row mt-3">
        <div class="col-md-4">

        </div>
        <div class="col-md-8">
            <div class="form-group">
                <label for="clasificacionDelRegimen">Clasificación del régimen:</label>
                <input type="text" id="clasificacionDelRegimen" formControlName="clasificacionDelRegimen" class="form-control h-60">
            </div>
        </div>
    </div>
    <ng-titulo titulo="Datos de la mercancía" />
    <div class="row">
        <div class="col-md-4">
            <label for="solicitud">Producto:</label>
            <app-input-radio
                [radioOptions]="productoRadioOpcions"
                id="productoOpcion"
                formControlName="productoOpcion"
                [layout]="'vertical'"
            >
          </app-input-radio>
        </div>
        <div class="col-md-8">
            <div class="form-group">
                <label for="descripcionMercancia">Descripción de la mercancía:</label>
                <textarea id="descripcionMercancia" formControlName="descripcionMercancia" class="form-control h-80 f-14"></textarea>
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-12">
            <div class="form-group">
                <label for="fraccionArancelaria">Fracción arancelaria:</label>
                <textarea id="fraccionArancelaria" formControlName="fraccionArancelaria" class="form-control h-80"></textarea>
            </div>
        </div>
    </div>
    <div class="row mt-3">
        <div class="col-md-4">
            <div class="form-group">
                <label for="umt">UMT:</label>
                <input type="text" id="umt" formControlName="umt" class="form-control">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group">
                <label for="cantidad">Cantidad:</label>
                <input type="text" id="cantidad" formControlName="cantidad" class="form-control">
            </div>
        </div>
        <div class="col-md-4">
            <div class="form-group">
                <label for="valorFactura">Valor de factura USD:</label>
                <input type="text" id="valorFactura" formControlName="valorFactura" class="form-control">
            </div>
        </div>
    </div>
</form>
