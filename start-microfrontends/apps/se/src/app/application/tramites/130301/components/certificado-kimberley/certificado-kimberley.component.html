<ng-titulo titulo="Capturar certificado Kimberley" />
<form [formGroup]="certificadoKimberley">
    <div class="row">
        <div class="col-md-4">
            <div class="form-group">
                <label for="certificadosEmitidos">Certificados Emitidos:</label>
                <input type="text" id="certificadosEmitidos" formControlName="certificadosEmitidos" class="form-control">
            </div>
        </div>
    </div>
    <ng-titulo titulo="Datos generales del certificado Kimberley" />
    <div class="row">
        <div class="col-md-6">
            <div class="form-group">
                <label for="numeroCertificadokimberley">Número del certificado Kimberley:</label>
                <input type="text" id="numeroCertificadokimberley" formControlName="numeroCertificadokimberley" class="form-control">
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-6">
            <div class="form-group">
                <app-catalogo-select [catalogo]="estado" [label]="'País emisor del certificado Kimberley'"
                [required]="false" name="paisEmisorCertificado" [isDisabled]="esFormularioSoloLectura || isPaisEmisorCertificadoDisabled" formControlName="paisEmisorCertificado"
                (change)="setValoresStore(certificadoKimberley,'paisEmisorCertificado', 'setPaisEmisorCertificado')"></app-catalogo-select>
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-12">
            <div class="form-group">
                <label for="nombreIngles">Nombre en inglés del país emisor del certificado Kimberley:</label>
                <input type="text" id="nombreIngles" formControlName="nombreIngles" class="form-control">
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-6 align-centre">
            <input class="form-check-input" type="checkbox" id="mixed"
                formControlName="mixed" (change)="setValoresStore(certificadoKimberley,'mixed', 'setMixed')"/> &nbsp;Mixed:
        </div>
        <div class="col-md-6">
            <div class="form-group">
                <app-catalogo-select [catalogo]="estado" [label]="'País de origen'"
                [required]="false" name="paisDeOrigen" formControlName="paisDeOrigen" [isDisabled]="esFormularioSoloLectura || isPaisDeOrigenDisabled" (change)="setValoresStore(certificadoKimberley,'paisDeOrigen', 'setPaisDeOrigen')"
                ></app-catalogo-select>
            </div>
        </div>
    </div>
    <ng-titulo titulo="Datos del exportador" />
    <div class="row">
        <div class="col-md-12">
            <div class="form-group">
                <label for="nombreExportador">Nombre exportador:</label>
                <input type="text" id="nombreExportador" formControlName="nombreExportador" class="form-control">
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-12">
            <div class="form-group">
                <label for="direccionExportador">Dirección exportador:</label>
                <textarea id="direccionExportador" formControlName="direccionExportador" class="form-control h-80"></textarea>
            </div>
        </div>
    </div>
    <ng-titulo titulo="Datos del importador" />
    <div class="row">
        <div class="col-md-12">
            <div class="form-group">
                <label for="nombreImportador">Nombre importador<span [ngClass]="{'text-danger': certificadoKimberley.get('nombreImportador')?.invalid && (certificadoKimberley.get('nombreImportador')?.touched || certificadoKimberley.get('nombreImportador')?.dirty)}">*</span>:</label>
                <textarea id="nombreImportador" formControlName="nombreImportador" class="form-control h-80"></textarea>
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-12">
            <div class="form-group">
                <label for="direccionImportador">Dirección importador<span [ngClass]="{'text-danger': certificadoKimberley.get('direccionImportador')?.invalid && (certificadoKimberley.get('direccionImportador')?.touched || certificadoKimberley.get('direccionImportador')?.dirty)}">*</span>:</label>
                <textarea id="direccionImportador" formControlName="direccionImportador" class="form-control h-80"></textarea>
            </div>
        </div>
    </div>
    <ng-titulo titulo="Datos de la remesa" />
    <div class="row">
        <div class="col-md-12">
            <div class="form-group">
                <label for="numeroEnLetra">Número en letra de los lotes<span [ngClass]="{'text-danger': certificadoKimberley.get('numeroEnLetra')?.invalid && (certificadoKimberley.get('numeroEnLetra')?.touched || certificadoKimberley.get('numeroEnLetra')?.dirty)}">*</span>:</label>
                <textarea id="numeroEnLetra" formControlName="numeroEnLetra" class="form-control h-100"></textarea>
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-12">
            <div class="form-group">
                <label for="numeroEnLetraIngles">Número en letra de los lotes en ingles<span [ngClass]="{'text-danger': certificadoKimberley.get('numeroEnLetraIngles')?.invalid && (certificadoKimberley.get('numeroEnLetraIngles')?.touched || certificadoKimberley.get('numeroEnLetraIngles')?.dirty)}">*</span>:</label>
                <textarea id="numeroEnLetraIngles" formControlName="numeroEnLetraIngles" class="form-control h-100"></textarea>
            </div>
        </div>
    </div>
    <div class="row mt-5">
        <div class="col-md-12">
            <div class="form-group">
                <label for="numeroFactura">Número de factura<span [ngClass]="{'text-danger': certificadoKimberley.get('numeroFactura')?.invalid && (certificadoKimberley.get('numeroFactura')?.touched || certificadoKimberley.get('numeroFactura')?.dirty)}">*</span>:</label>
                <input type="text" id="numeroFactura" formControlName="numeroFactura" class="form-control">
            </div>
        </div>
    </div>
    <ng-titulo titulo="Datos de los diamantes" />
    <div class="row">
        <div class="col-md-6">
            <div class="form-group">
                <label for="cantidadQuilates">Cantidad en Quilates<span [ngClass]="{'text-danger': certificadoKimberley.get('cantidadQuilates')?.invalid && (certificadoKimberley.get('cantidadQuilates')?.touched || certificadoKimberley.get('cantidadQuilates')?.dirty)}">*</span>:</label>
                <input type="text" id="cantidadQuilates" formControlName="cantidadQuilates" class="form-control">
            </div>
        </div>
        <div class="col-md-6">
            <div class="form-group">
                <label for="valorDiamantes">Valor de los diamantes<span [ngClass]="{'text-danger': certificadoKimberley.get('valorDiamantes')?.invalid && (certificadoKimberley.get('valorDiamantes')?.touched || certificadoKimberley.get('valorDiamantes')?.dirty)}">*</span>:</label>
                <input type="text" id="valorDiamantes" formControlName="valorDiamantes" class="form-control">
            </div>
        </div>
    </div>
    
</form>
