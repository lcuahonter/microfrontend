<div class="anexo">
  <ng-titulo titulo="Anexo I - Fracciones de exportación" />
  <app-tabla-dinamica
    [configuracionTabla]="configuracionTablaAnexo"
    [datos]="datosExportacion"
  ></app-tabla-dinamica>
  <ng-titulo titulo="Anexo I - Fracción de importación" />
  <app-tabla-dinamica
    [configuracionTabla]="configuracionTablaImportacion"
    [datos]="datosImportacion"
  ></app-tabla-dinamica>
  @if(showTabs){
    <ng-titulo titulo="Fracciones sensibles" />
    <app-tabla-dinamica
      [configuracionTabla]="configuracionTablaSensibles"
      [datos]="datosFraccion"
    ></app-tabla-dinamica>
  }
</div>
