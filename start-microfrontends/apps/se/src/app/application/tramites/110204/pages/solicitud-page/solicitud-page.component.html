<div class="page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h2>Validar inicialmente el certificado de origen para los países miembros de la ALADI</h2>
      </div>
      @if(esFormaValido){
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
        }
        @else if(esFormaEstadoValido){
        <div class="col-md-12">
          <ng-alert [CONTENIDO]="formErrorEstadoAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
        </div>
         <div class="row mt-5" *ngIf="indice === 2">
        <div class="col-md-12">
        <lib-notificaciones
          [notificacionInput]="alertaNotificacion"
        ></lib-notificaciones>
      </div>
      </div>
        } 
      <app-wizard [listaPasos]="pasos"></app-wizard>

    </div>

    <div class="row">
      @switch (indice) {
      @case (1) {
      <app-paso-uno #pasoUnoRef></app-paso-uno>
      }
      @case (2) {
      <paso-firma [idSolicitud]="solicitudState.idSolicitud" [procedure]="110204" [procedureUrl]="'pexim/certificado-origen'"></paso-firma>
      }
      }

      <btn-continuar [datos]="datosPasos" (anteriorEvento)="getValorIndice($event)" (continuarEvento)="getValorIndice($event)"
      ></btn-continuar>
    </div>
    @if(indice === 1) {
      <div class="mt-5">
        <div class="row">
      <ng-alert [CONTENIDO]="avisoContrnido"></ng-alert>
    </div>
      </div>
      }
  </div>
</div>
