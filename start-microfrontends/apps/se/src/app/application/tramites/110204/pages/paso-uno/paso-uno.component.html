<div class="container">
    <div class="row">
      <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
          <a (click)="seleccionaTab(1)" (keyup.enter)="seleccionaTab(1)" (keydown.space)="seleccionaTab(1)" tabindex="0" data-toggle="tab" >Solicitante</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
          <a (click)="seleccionaTab(2)" (keyup.enter)="seleccionaTab(2)" (keydown.space)="seleccionaTab(2)" tabindex="0" data-toggle="tab" >Certificado de origen</a>
        </li>

        <li [ngClass]="indice === 3 ? 'active' : ''">
          <a (click)="seleccionaTab(3)" (keyup.enter)="seleccionaTab(3)" (keydown.space)="seleccionaTab(3)" tabindex="0" data-toggle="tab" >Datos certificado</a>
        </li>
      </ul>
  
      <ng-container>
        <solicitante #Solicitante [hidden]="indice !== 1"></solicitante>
        @if(esDatosRespuesta){
          <app-certificado-origen #CertificadoOrigen [formularioDeshabilitado]="formularioDeshabilitado" [hidden]="indice !== 2 || !esDatosRespuesta"></app-certificado-origen>
        }
        @if(esDatosRespuesta){
          <app-datos-certificado #DatosCertificado [hidden]="indice !== 3 ||  !esDatosRespuesta"></app-datos-certificado>
        }
      </ng-container>
    </div>
  </div>
