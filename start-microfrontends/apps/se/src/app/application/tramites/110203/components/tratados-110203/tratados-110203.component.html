
<ng-titulo titulo="Detalles del transporte" />
  <div class="container" [formGroup]="tratadosForm">
    <div>
        <div class="row">
            <div class="col-md-4">          

                <div class="form-group">
                    <label class="form-label" for="tratado">Tratado / Acuerdo:</label>
                    <input class="form-control" id="tratado" formControlName="tratado"  type="text" (change)="setValoresStore(tratadosForm,'tratado', 'setTratado')">
                  </div>

          </div>
          <div class="col-md-4">
          
            <div class="form-group">
                <label class="form-label" for="bloque">País / Bloque:</label>
                <input class="form-control" id="bloque" formControlName="bloque"  type="text" (change)="setValoresStore(tratadosForm,'bloque', 'setBloque')">
              </div>
         </div>
         <div class="col-md-4">
          
            <div class="form-group">
                <label class="form-label" for="origen">País de origen:</label>
                <input class="form-control" id="origen" formControlName="origen"  type="text" (change)="setValoresStore(tratadosForm,'origen', 'setOrigen')">
              </div>
         </div>
  </div>
  <div class="row">
   <div class="col-md-4 mt-3">
 
    <div class="form-group">
        <label class="form-label" for="destino">País destino:</label>
        <input class="form-control" id="destino" formControlName="destino"  type="text" (change)="setValoresStore(tratadosForm,'destino', 'setDestino')">
      </div>
 </div>
 <div class="col-md-4 mt-3">
      <div class="form-group">
        <input-fecha [setFecha]="tratadosForm.get('expedicion')?.value" [datos]="fechaDeExpedicionInput"></input-fecha>
      </div>
</div>
<div class="col-md-4 mt-3">
      <div class="form-group">
          <input-fecha [setFecha]="tratadosForm.get('vencimiento')?.value" [datos]="fechaDeVencimientoInput"></input-fecha>
      </div>

</div>
</div>
</div>
</div>
