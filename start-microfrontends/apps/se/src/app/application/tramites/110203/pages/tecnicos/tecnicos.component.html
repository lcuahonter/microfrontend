<div class="Page">
  <div class="container">
    <div class="row">
      <div class="col-md-12">
        <h1>Validar por motivos técnicos el certificado EUR</h1>
      </div>
      @if(esFormaValido){
      <div class="col-md-12">
        <ng-alert [CONTENIDO]="formErrorAlert" [CUSTOMECLASS]="'alert-danger'"></ng-alert>
      </div>
      }

      <app-wizard [listaPasos]="pantallasPasos"></app-wizard>
    </div>
    <div class="row">
      @switch (indice) { @case (1) {
      <app-datos #pasoUnoRef></app-datos>
      } @case (2) {
      <paso-firma
        [idSolicitud]="solicitudState.idSolicitud"
        [procedure]="110203"
        [procedureUrl]="'tecnicos/tecnicosdatos'"
      ></paso-firma>
      } }
      <btn-continuar
        [datos]="datosPasos"
        (continuarEvento)="getValorIndice($event)"
        [dePadre]="true"
      >
      </btn-continuar>
    </div>
  </div>
</div>
