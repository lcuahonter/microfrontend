<div class="container">
    <div class="row">
        <ul class="nav nav-tabs">
            <li [ngClass]="indice === 1 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(1)">Solicitante</a>
            </li>
            @if (!consultaState.readonly) {
            <li [ngClass]="indice === 2 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(2)">Certificado de
                    origen</a>
            </li>
            <li [ngClass]="indice === 3 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(3)">Destinatario</a>
            </li>
            <li [ngClass]="indice === 4 ? 'active' : ''">
                <a data-toggle="tab" tabindex="0" (keyup)="seleccionaTab(1)" (click)="seleccionaTab(4)">Datos
                    certificado</a>
            </li>
            }
        </ul>
        <ng-container>
            <solicitante [hidden]="indice !== 1" #solicitanteRef></solicitante>
            @if (!consultaState.readonly) {
            <app-certificado-origen [hidden]="indice !== 2" #certificadoOrigenRef></app-certificado-origen>
            <app-cam-destinatario [hidden]="indice !== 3" #camDestinatarioRef></app-cam-destinatario>
            <app-cam-datos-certificado [hidden]="indice !== 4" #camDatosCertificadoRef></app-cam-datos-certificado>
            }
        </ng-container>
    </div>
</div>
