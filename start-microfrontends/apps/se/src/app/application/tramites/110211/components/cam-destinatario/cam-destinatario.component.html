<div class="container">
  <app-datos-del-destinatario
    (formDatosDelDestinatarioEvent)="setValoresStoreDatos($event)"
    (formaValida)="setFormValida($event)"
    [idProcedimiento]="idProcedimiento"
    [datosForm]="formDatosDelDestinatarioValues"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    [razonSocialEditable]="razonSocialEditable"
    #datosDelDestinatarioComponent
  ></app-datos-del-destinatario>

  <app-destinatario
    (formaValida)="setFormValidaDestinatario($event)"
    [datosForm]="formDestinatarioValues"
    [idProcedimiento]="idProcedimiento"
    (formDestinatarioEvent)="setValoresStoreDe($event)"
    [esFormularioSoloLectura]="esFormularioSoloLectura"
    #destinatarioRef
  ></app-destinatario>

  <app-representante-legal-exportador
    [procedimiento]="'110211'"
    [datosForm]="grupoRepresentativo"
    (formDatosDelDestinatarioEvent)="setValoresStoreRepresentante($event)"
    #representanteLegalExportadorComponent
  ></app-representante-legal-exportador>
