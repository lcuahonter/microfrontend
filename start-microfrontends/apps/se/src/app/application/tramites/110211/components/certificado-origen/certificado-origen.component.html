<app-certificado-de-origen [operador]="operador" [tratadoAcuerdo]="estado || []" [paisBloqu]="pais || []"
    (tipoEstadoSeleccionEvent)="tipoEstadoSeleccion($event)" (paisBloquEvent)="tipoSeleccion($event)"
    (setbuscarMercanciaEvent)="conseguirDisponiblesDatos()" [tableData]="datosTablaUno$"
    (filaClicsMercanciaDisponibles)="abrirModificarModal($event, true)"
    (filaClicsMercanciaSelecction)="abrirModificarModal($event, false)" [tablaSeleccionEvent]="tablaSeleccionEvent"
    [guardarClicado]="datosTabla$" (guardarClicadoEvent)="guardarClicado($event)" (formaValida)="setFormValida($event)"
    [datosForm]="formCertificadoValues" [cargoDeMercancias]="cargoDeMercancias"
    [mercanciasDisponibles]="mercanciasDisponibles" [esFormularioSoloLectura]="esFormularioSoloLectura"
    (formCertificadoEvent)="setValoresStore($event)" [domicilio]="false" [domicilioTercer]="true"
    [cargaMercanciaConfiguracionTabla]="cargaMercanciaConfiguracionTabla" [idProcedimiento]="idProcedimiento"
    #certificadoDeOrigenRef>
</app-certificado-de-origen>

<div class="modal fade" #modifyModal tabindex="-1" aria-labelledby="modifyModalLabel" aria-hidden="true">
    @if(isEnableMercancia){
    <app-datos-mercancia-model [esFormularioSoloLectura]="esFormularioSoloLectura"
        [datosSeleccionados]="datosSeleccionados" [fromMercanciasDisponibles]="fromMercanciasDisponibles"
        (guardarClicado)="updatedModificarModal($event, false)" (cerrarClicado)="cerrarModificarModal()"
        [idProcedimiento]="idProcedimiento" (EMITMERCANIAS)="emitmercaniasDatos($event)"></app-datos-mercancia-model>
    }
</div>
