<div class="container mb-5">
  <div [formGroup]="modificacionForm">
    <div class="row" style="padding-top: 45px">
      <div class="col-md-4">
        <label class="form-label" for="rfc"
          >Registro Federal de Contribuyentes:</label
        >
        <input
          type="text"
          class="form-control"
          id="rfc"
          formControlName="rfc"
        />
      </div>

      <div class="col-md-8">
        <label class="form-label" for="federal">Representación federal:</label>
        <input
          type="text"
          class="form-control"
          id="federal"
          formControlName="representacionFederal"
        />
      </div>
      <div class="col-md-4">
        <label class="form-label" for="tipo">Tipo de modificación:</label>
        <input
          type="text"
          class="form-control"
          id="tipo"
          formControlName="tipo"
        />
      </div>

      <div class="col-md-8">
        <label class="form-label" for="programa"
          >Modificación de programa:</label
        >
        <input
          type="text"
          class="form-control"
          id="programa"
          formControlName="programa"
        />
      </div>
    </div>
  </div>
  @if (procedimiento === 80301) {
  <div class="row mt-4">
    <ng-titulo titulo="Lista de fracciones de exportación" />

    <app-tabla-dinamica
      [tipoSeleccionTabla]="TablaSeleccion.BUTTON"
      [configuracionTabla]="exportacionTablaConfiguracion"
      [datos]="exportacionDatosTabla"
      (alternarValor)="onAlternarExportacionValor($event)"
      [desactivarButton]="soloLectura"
    ></app-tabla-dinamica>
  </div>

  <div class="row mt-4">
    <ng-titulo titulo="Lista de fracciones de importación" />

    <app-tabla-dinamica
      [tipoSeleccionTabla]="TablaSeleccion.BUTTON"
      [configuracionTabla]="importacionTablaConfiguracion"
      [datos]="importacionDatosTabla"
      (alternarValor)="onAlternarImportacionValor($event)"
      [desactivarButton]="soloLectura"
    ></app-tabla-dinamica>
  </div>
  } @if (procedimiento === 80302) {
  <div class="row mt-4">
    <ng-titulo titulo="Lista de domicilios" />

    <app-tabla-dinamica
      [tipoSeleccionTabla]="TablaSeleccion.BUTTON"
      [configuracionTabla]="domiciliosTablaConfiguracion"
      [datos]="domiciliosDatosTabla"
      (alternarValor)="onAlternarValor($event)"
      [desactivarButton]="soloLectura"
    ></app-tabla-dinamica>
  </div>
  } @if (procedimiento === 80303) {
  <div class="row mt-4">
    <ng-titulo titulo="Empresas submanufactureras"></ng-titulo>

    <app-tabla-dinamica
      [configuracionTabla]="submanufacturerasTablaConfiguracion"
      [tipoSeleccionTabla]="TablaSeleccion.BUTTON"
      [datos]="submanufacturerasTablaDatos"
      (alternarValor)="onAlternarValor($event)"
    ></app-tabla-dinamica>
  </div>
  }
</div>
