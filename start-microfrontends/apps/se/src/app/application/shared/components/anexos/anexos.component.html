<div class="anexo">
  <ng-titulo titulo="Anexo I - Fracciones de exportación" />

  <app-tabla-dinamica
    [configuracionTabla]="configuracionTablaExportacion"
    [datos]="datosExportacion"
  ></app-tabla-dinamica>

  <ng-titulo titulo="Anexo I - Fracciones de importación" />

  <app-tabla-dinamica
    [configuracionTabla]="configuracionTablaImportacion"
    [datos]="datosImportacion"
  ></app-tabla-dinamica>

  @if (procedimiento === 80302 || procedimiento === 80303 || procedimiento ===
  80308) {
  <ng-titulo titulo="Fracciones sensibles" />

  <app-tabla-dinamica
    [configuracionTabla]="configuracionTablaSensibles"
    [datos]="datosSensibles"
  ></app-tabla-dinamica>
  }
</div>
