<div class="container">
  <div class="row">
    <ul class="nav nav-tabs">
      <ul class="nav nav-tabs">
        <li *ngFor="let tab of seccionesDeLaSolicitud" [ngClass]="indice === tab.index ? 'active' : ''">
          <a data-toggle="tab" (click)="seleccionaTab(tab.index)" (keydown.enter)="seleccionaTab(tab.index)"
            tabindex="0">{{ tab.title }}</a>
        </li>
      </ul>
    </ul>

    <ng-container>
      @switch (indice) { @case (1) {
      <solicitante></solicitante>
      } @case (2) {
      <app-datos-del-tramite-contenedora
        [formularioDeshabilitado]="formularioDeshabilitado"></app-datos-del-tramite-contenedora>
      }
      @case (3) {
      <app-terceros-relacionados-contenedora
        [formularioDeshabilitado]="formularioDeshabilitado"></app-terceros-relacionados-contenedora>
      }
      @case (4) {
      <app-pago-de-derechoc [formularioDeshabilitado]="formularioDeshabilitado"></app-pago-de-derechoc>
      }
      @default {
      <solicitante></solicitante>
      }
      }
    </ng-container>
  </div>
</div>
