services:
#----------------------------------------------------------------
  modulefederation-dashboard:
    image: ghcr.io/vucem30/dockerized-modulefederation-dashboard:1.2.69
    build: 
      context: ../../
      dockerfile: apps/dashboard/Dockerfile.dev
      args:
        - NODE_ENV=production
    container_name: modulefederation-dashboard
    restart: unless-stopped
    expose:
      - '4200'
    ports:
      - "4200:80"
    networks:
      - modulefederation-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - NODE_ENV=production
    volumes:
      - nginx_logs:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

