services:
#----------------------------------------------------------------
  modulefederation-profepa-microfront:
    image: ghcr.io/vucem30/dockerized-modulefederation-profepa-microfront:1.2.69
    build: 
      context: ../../
      dockerfile: apps/profepa/Dockerfile.dev
      args:
        - NODE_ENV=production
    container_name: modulefederation-profepa-microfront
    restart: unless-stopped
    expose:
      - '4220'
    ports:
      - "4220:80"
    networks:
      - modulefederation-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - NODE_ENV=production
    volumes:
      - nginx_logs:/var/log/nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
#----------------------------------------------------------------
networks:
  modulefederation-network:
    driver: bridge

volumes:
  nginx_logs:
