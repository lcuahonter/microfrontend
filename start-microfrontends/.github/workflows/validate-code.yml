name: Quality Lint and Test Affected Projects
on:
  pull_request:
    branches: [ "develop" ]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'package.json'
      - 'nx.json'
      - '.eslintrc.json'
  push:
    branches: [ "develop" ]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'package.json'
      - 'nx.json'
      - '.eslintrc.json'
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      NX_SKIP_POSTINSTALL: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # 👈 Importante: necesario para acceder a origin/develop
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.14.0'
      - name: Instalar NX globalmente
        run: npm install -g nx@19.3.1
      - name: Install native binding for Nx on Linux
        run: npm install @nx/nx-linux-x64-gnu
      - name: Install SWC native binding for Linux
        run: npm install @swc/core-linux-x64-gnu
      - name: Install dependencies
        run: npm install --force
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
      - name: Get affected projects
        id: affected
        run: |
          BASE_BRANCH="develop"
          echo "Base branch: $BASE_BRANCH"
          echo "🔍 Detectando proyectos afectados con base en origin/$BASE_BRANCH ..."
          npx nx show projects --affected --base=origin/$BASE_BRANCH --head=HEAD > affected.txt
          if [ ! -s affected.txt ]; then
            echo "✅ No hay proyectos afectados. Finalizando job."
            echo "HAS_AFFECTED=false" >> $GITHUB_ENV
          else
            cat affected.txt
            echo "HAS_AFFECTED=true" >> $GITHUB_ENV
            echo "AFFECTED_PROJECTS<<EOF" >> $GITHUB_ENV
            cat affected.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi
      - name: Run lint for affected projects
        if: env.HAS_AFFECTED == 'true'
        run: |
          echo "🔍 Ejecutando lint..."
          for project in $AFFECTED_PROJECTS; do
            if npx nx run $project:lint 2>/dev/null; then
              echo "✅ Lint passed for $project"
            else
              echo -e "\033[0;31m❌ Lint failed for $project\033[0m"
            fi
          done
      - name: Check if test files exist
        id: check_tests
        if: env.HAS_AFFECTED == 'true'
        run: |
          has_tests=false
          for project in $AFFECTED_PROJECTS; do
            if npx nx run $project:test --list-spec-json 2>/dev/null | jq -e 'length > 0'; then
              has_tests=true
              break
            fi
          done
          echo "has_tests=$has_tests" >> $GITHUB_OUTPUT
          
      - name: Run unit tests for affected projects
        if: env.HAS_AFFECTED == 'true' && steps.check_tests.outputs.has_tests == 'true'
        run: |
          echo "🧪 Ejecutando tests..."
          for project in $AFFECTED_PROJECTS; do
            if npx nx run $project:test --watch=false --browsers=ChromeHeadless 2>/dev/null; then
              echo "✅ Tests passed for $project"
            else
              echo -e "\033[0;31m❌ Tests failed for $project\033[0m"
            fi
          done
