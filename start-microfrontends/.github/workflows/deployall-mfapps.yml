name: Deploy All Microfront Apps

on:
  workflow_dispatch:

jobs:
  discover-apps:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.set-matrix.outputs.apps }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find microfrontend apps in apps/ (excluding dashboard)
        id: set-matrix
        run: |
          APPS=$(find apps -maxdepth 1 -mindepth 1 -type d -exec basename {} \; \
            | grep -v '^dashboard$' \
            | jq -R -s -c 'split("\n")[:-1]')
          echo "apps=$APPS" >> $GITHUB_OUTPUT

  build-push-deploy:
    needs: discover-apps
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app_name: ${{ fromJson(needs.discover-apps.outputs.apps) }}
    continue-on-error: true
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Node.js memory limit
        run: echo "NODE_OPTIONS=--max-old-space-size=10096"

      - name: Install dependencies
        run: npm install

      - name: Build microfront app
        run: npx nx build ${{ matrix.app_name }}
        

      - name: Reset Nx cache
        run: npx nx reset

      - name: Get version from package.json
        id: get-version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Ensure Docker Compose file exists
        run: |
          if [ ! -f docker/modulefederation-${{ matrix.app_name }}-microfront.yml ]; then
            echo "ERROR: docker/modulefederation-${{ matrix.app_name }}-microfront.yml does not exist!"
            exit 1
          fi

      - name: Update Docker Compose image tag
        run: |
          sed -i "s|image: ghcr.io/vucem30/dockerized-modulefederation-${{ matrix.app_name }}-microfront:.*|image: ghcr.io/vucem30/dockerized-modulefederation-${{ matrix.app_name }}-microfront:${{ steps.get-version.outputs.VERSION }}|" docker/modulefederation-${{ matrix.app_name }}-microfront.yml

      - name: Build Docker image for microfront app
        run: |
          docker compose -f docker/modulefederation-${{ matrix.app_name }}-microfront.yml build --no-cache

      - name: Push Docker image
        run: |
          docker push ghcr.io/vucem30/dockerized-modulefederation-${{ matrix.app_name }}-microfront:${{ steps.get-version.outputs.VERSION }}

      - name: Ensure k8s deployment folder exists
        run: |
          if [ ! -d k8s/${{ matrix.app_name }}-microfront ]; then
            echo "ERROR: k8s/${{ matrix.app_name }}-microfront does not exist!"
            exit 1
          fi

      - name: List yaml files before copy
        run: |
          echo "Showing YAML files in k8s/${{ matrix.app_name }}-microfront/"
          ls -l k8s/${{ matrix.app_name }}-microfront/ || echo "Directory does not exist"
          find k8s/${{ matrix.app_name }}-microfront/ || echo "Directory does not exist"

      - name: Update deployment YAML image tag
        run: |
          sed -i "s|image: ghcr.io/vucem30/dockerized-modulefederation-${{ matrix.app_name }}-microfront:.*|image: ghcr.io/vucem30/dockerized-modulefederation-${{ matrix.app_name }}-microfront:${{ steps.get-version.outputs.VERSION }}|" k8s/${{ matrix.app_name }}-microfront/*-deployment-dev.yaml

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_SRV_IP }}
          username: ${{ secrets.REMOTE_SRV_USER }}
          key: ${{ secrets.REMOTE_SRV_PRIV_KEY }}
          source: k8s/${{ matrix.app_name }}-microfront/*.yaml
          target: ~/deployments/${{ matrix.app_name }}-microfront/
          strip_components: 2

      - name: List files on remote after copy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_SRV_IP }}
          username: ${{ secrets.REMOTE_SRV_USER }}
          key: ${{ secrets.REMOTE_SRV_PRIV_KEY }}
          script: |
            ls -l ~/deployments/${{ matrix.app_name }}-microfront/

      - name: SSH Deploy and Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_SRV_IP }}
          username: ${{ secrets.REMOTE_SRV_USER }}
          key: ${{ secrets.REMOTE_SRV_PRIV_KEY }}
          script: |
            set -e
            APP_NAME="${{ matrix.app_name }}-microfront"
            IMAGE_TAG="${{ steps.get-version.outputs.VERSION }}"
            DEPLOY_DIR=~/deployments/$APP_NAME
            DEPLOYMENT_FILE="${APP_NAME}-deployment-dev.yaml"
            SERVICE_FILE="${APP_NAME}-service-dev.yaml"
            INGRESS_FILE="${APP_NAME}-ingress-dev.yaml"
            cd "$DEPLOY_DIR"
            for FILE in "$DEPLOYMENT_FILE" "$SERVICE_FILE" "$INGRESS_FILE"; do
              if [ ! -f "$FILE" ]; then
                echo "ERROR: $FILE not found in $(pwd)"
                ls -l
                exit 1
              fi
            done
            docker login --username ${{ secrets.DOCKER_USERNAME }} --password ${{ secrets.DOCKER_PASSWORD }} ghcr.io

            docker ps -a --filter "ancestor=ghcr.io/vucem30/dockerized-modulefederation-$APP_NAME:$IMAGE_TAG" -q | xargs -r docker rm -f
            docker rmi -f ghcr.io/vucem30/dockerized-modulefederation-$APP_NAME:$IMAGE_TAG || true
            docker image prune -af || true
            docker container prune -f || true
            docker system prune -af || true

            docker pull ghcr.io/vucem30/dockerized-modulefederation-$APP_NAME:$IMAGE_TAG
            grep "image: ghcr.io/vucem30/dockerized-modulefederation-$APP_NAME:$IMAGE_TAG" "$DEPLOYMENT_FILE"
            microk8s kubectl apply -f "$DEPLOYMENT_FILE"
            microk8s kubectl apply -f "$SERVICE_FILE"
            microk8s kubectl apply -f "$INGRESS_FILE"
            microk8s kubectl rollout restart deployment modulefederation-$APP_NAME-deployment-dev -n default
            microk8s kubectl get pods | grep $APP_NAME
