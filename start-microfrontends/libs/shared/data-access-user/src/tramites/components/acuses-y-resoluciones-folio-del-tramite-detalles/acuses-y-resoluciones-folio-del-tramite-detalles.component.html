<div class="container">
  <div class="container1">
    <ng-titulo titulo="Acuses y resoluciones" />
    <form [formGroup]="acusesYResolucionesFormGroup">
      <div class="row">
        <div class="col-md-6">
          <label class="form-label" for="folio">Folio:
          </label>
          <input type="text" class="form-control" id="folio" formControlName="folio" readonly />
        </div>

        <div class="col-md-6">
          <label class="form-label" for="fechaInicial">Fecha inicio tr&aacute;mite:</label>
          <div class="position-relative">
            <input type="text" class="form-control input-fecha" id="fechaInicial" formControlName="fechaInicial"
              readonly />
            <span class="position-absolute top-50 end-0 translate-middle-y me-3">
              <i class="bi bi-calendar-event disabled"></i>
            </span>
          </div>

        </div>

        <div class="col-md-12">
          <label class="form-label" for="dependencia">Dependencia:</label>
          <input type="text" class="form-control" id="dependecia" formControlName="dependencia" readonly />
        </div>

        <div class="col-md-12">
          <label class="form-label" for="unidadAdministrativaORepresentacionFederal">Unidad administrativa o
            representación federal:</label>
          <input type="text" class="form-control" id="unidadAdministrativaORepresentacionFederal"
            formControlName="unidadAdministrativaORepresentacionFederal" readonly />
        </div>
        <div class="col-md-6">
          <label class="form-label" for="tipoDeSolicitud">Tipo de solicitud:</label>
          <input type="text" class="form-control" id="tipoDeSolicitud" formControlName="tipoDeSolicitud" readonly />
        </div>
        <div class="col-md-6">
          <label class="form-label" for="estatusDeLaSolicitud">Estatus de la solicitud:</label>
          <input type="text" class="form-control" id="estatusDeLaSolicitud" formControlName="estatusDeLaSolicitud"
            readonly />
        </div>

        <div class="col-md-6">
          <label class="form-label" for="diasHabilesTranscurridos">Días hábiles transcurridos:</label>
          <input type="text" class="form-control" id="diasHabilesTranscurridos"
            formControlName="diasHabilesTranscurridos" readonly />
        </div>

        <div class="row mt-5">
          <div class="col-md-12 mt-5 d-flex justify-content-end gapped">
            <button (click)="regresar()" class="btn btn-secondary">
              Regresar
            </button>
            @for (btn of botonesDeAccion; track btn.id) {
            <button type="button" [class]="btn.id === 'cancelarButton' ? clasesDeBoton.danger : clasesDeBoton.primary"
              (click)="alHacerClickEnBoton(btn.url)" type="button">
              {{ btn.label }}
            </button>
            }
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
