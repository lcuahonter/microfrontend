<nav class="bg-light d-flex flex-column align-items-center py-3" style="width: 120px; min-height: 100vh;">
  <h6 class="text-primary text-center mb-4 w-100">Menú</h6>
  <ul class="nav flex-column align-items-center w-100">
    <li *ngFor="let item of listaElementosMenu" class="nav-item mb-4 w-100 d-flex flex-column align-items-center" (click)="irADetalle(item.route)" style="cursor:pointer;">
      <a class="nav-link text-center p-0" >
        <div  [ngClass]="item.classbutton + ' rounded-circle d-flex align-items-center justify-content-center mx-auto'" style="width:48px; height:48px;">
          <i [ngClass]="item.icon" class="fs-3"></i>
        </div>
        <span class="small text-primary fw-bold d-block mt-1" [title]="item.label">{{ item.label }}</span>
      </a>
    </li>
  </ul>
</nav>
