<div class="d-flex justify-content-between align-items-center">
  @if (showCurrentPage) {
    <div class="d-flex justify-content-center w-100">
      <button class="currentPageBtn">{{currentPage}}</button>
    </div>
  } @else {
    <div class="d-flex flex-row align-items-center">
      <strong class="me-2">Registros por página</strong>
      <select class="form-select w-auto" (change)="onItemsPerPageChange($event)">
        <option
          *ngFor="let option of [5, 10, 20, 50]"
          [selected]="option === itemsPerPage"
        >
          {{ option }}
        </option>
      </select>
    </div>
  <nav *ngIf="totalPages > 1">
    <ul class="pagination justify-content-center d-flex">
      <!-- Anterior 10 -->
      <li class="page-item"
          [class.disabled]="((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) === 1)">
        <button
          class="page-link"
          (click)="onPageChange(((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) - 10) < 1 ? 1 : ((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) - 10))"
          [disabled]="((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) === 1)"
        >
          «
        </button>
      </li>

      <!-- Anterior simple -->
      <li class="page-item" [class.disabled]="currentPage === 1">
        <button
          class="page-link"
          (click)="onPageChange(currentPage - 1)"
          [disabled]="currentPage === 1"
        >
          Anterior
        </button>
      </li>

      <!-- Números (bloque de 10) -->
      <ng-container *ngFor="let _ of [].constructor(totalPages); let i = index">
        <li
          class="page-item"
          *ngIf="(i + 1) >= (((currentPage - 1) - ((currentPage - 1) % 10)) + 1) && (i + 1) <= ((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) + 9)"
        >
          <button
            class="page-link"
            (click)="onPageChange(i + 1)"
            [class.active]="currentPage === i + 1"
          >
            {{ i + 1 }}
          </button>
        </li>
      </ng-container>

      <!-- Siguiente simple -->
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <button
          class="page-link"
          (click)="onPageChange(currentPage + 1)"
          [disabled]="currentPage === totalPages"
        >
          Siguiente
        </button>
      </li>

      <!-- Siguiente 10 -->
      <li class="page-item"
          [class.disabled]="((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) + 10) > totalPages">
        <button
          class="page-link"
          (click)="onPageChange(((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) + 10) > totalPages ? totalPages : (((currentPage - 1) - ((currentPage - 1) % 10)) + 1) + 10)"
          [disabled]="((((currentPage - 1) - ((currentPage - 1) % 10)) + 1) + 10) > totalPages"
        >
          »
        </button>
      </li>
    </ul>
  </nav>
  }
</div>
