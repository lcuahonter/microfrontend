<section class="box-select-combo py-3">
    <section class="bloque-disponible">
        <label class="form-label">{{tituloDisponibles}}</label>
        <select multiple size="12" (change)="onSelectDisponibles($event)">
            @for (item of listaDisponibles(); track track(item)) {
            <option [value]="track(item)">
                {{ display(item) }}
            </option>
            }
        </select>
    </section>
    <section class="bloque-acciones">
        <button class="btn btn-primary" (click)="Agregar()">Agregar</button>
        <button class="btn btn-primary" (click)="AgregarTodos()">Agregar todos</button>
        <button class="btn btn-danger" (click)="Eliminar()">Eliminar</button>
        <button class="btn btn-danger" (click)="EliminarTodos()">Eliminar Todos</button>
    </section>
    <section class="bloque-seleccionados">
        <label class="form-label">{{tituloSeleccionados}}</label>
        <select multiple size="12" (change)="onSelectSeleccionados($event)">
            @for (item of listaSeleccionados(); track track(item)) {
            <option [value]="track(item)">
                {{ display(item) }}
            </option>
            }
        </select>

    </section>
</section>
