<div class="page page-funcionario">
    <div class="container">
        <div class="bg-primary"></div>
        <div class="col-md-12">
            <div class="row">
                <h2 class="fw-bold my-5 titulo-tasks">Consulta de trámites</h2>
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex bg-light rounded m-xxl-3 p-4">
                    <div class="col-md-12">
                        <form [formGroup]="FormBuscaTramite">
                            <div class="row">
                                <div class="col-md-2"> 
                                    <strong class="text-title">
                                        Funcionario: 
                                    </strong>
                                </div>
                                <div class="col-md-6">
                                    <label class="text-title font-weight-titulo">
                                        EUROFOODS DE MEXICO GONZALEZ PINAL
                                    </label>
                                </div>
                                <div class="col-md-2"> 
                                    <strong class="text-title">
                                        RFC:
                                    </strong>
                                </div>
                                <div class="col-md-2">
                                    <label class="text-title font-weight-titulo">
                                        AAL0409235E6
                                    </label>
                                </div>
                                <div class="col-md-2"> 
                                    <strong class="text-title">
                                        *Folio tr&aacute;mite
                                    </strong>
                                </div>
                                <div class="col-md-10"> 
                                    <input type="text" name="idTramite" id="idTramite"
                                        formControlName="idTramite" 
                                        class="form-control font-weight-titulo text-title"
                                        placeholder="Folio tramite"
                                        (change)="tramiteSeleccionado(FormBuscaTramite,'idTramite', 'setTramiteValue')">

                                        <div *ngIf="esInvalido('idTramite')" class="text-danger">
                                            <small *ngIf="FormBuscaTramite.controls['idTramite'].hasError('required')">
                                                Este campo es obligatorio.
                                            </small>
                                            <small *ngIf="FormBuscaTramite.controls['idTramite'].hasError('pattern')">
                                                Solo se permiten números.
                                            </small>
                                        </div>
                                </div>
                                <div class="col-md-12">
                                    <div class="d-flex justify-content-end m-lg-5">
                                        <button class="btn  btn-primary ms-2 btn-size-1 color-back" type="button"
                                            (click)="buscarTramite()">Buscar</button>
                                    </div>
                                </div>
                            </div>
                        </form>
                        @if(tieneConfiguracionTablaDatos) {
                        <div class="row mt-2">
                            <div class="col-md">
                            <app-tabla-dinamica
                                [configuracionTabla]="configuracionTabla"
                                [datos]="configuracionTablaDatos"
                                [acciones]="tablaAcciones"
                                (filaClic)="onFilaClic($event)"
                            >
                            </app-tabla-dinamica>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end">
                            <app-table-pagination
                            [totalItems]="totalItems"
                            [itemsPerPage]="itemsPerPage"
                            [currentPage]="currentPage"
                            (pageChange)="onPageChange($event)"
                            (itemsPerPageChange)="onItemsPerPageChange($event)"
                            >
                            </app-table-pagination>
                        </div>
                    } @else if(!tieneConfiguracionTablaDatos) {
                        <div class="row mt-5">
                            <div class="col-md-12">
                                <h4 class="mb-4 text-center">No se encontraron datos</h4>
                            </div>
                        </div>
                    }
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
