<div [formGroup]="forma">
  <div [ngClass]="reverse ? 'form-check-custome' : 'form-check'">
    <label class="form-check-label" [ngClass]="fontWeight ? 'font-weight-light' : ''" [for]="id">
      {{ label }}@if(reverse){: }
      <ng-content></ng-content>
    </label>
    <input class="form-check-input" type="checkbox" title="Checkbox" value="" [id]="id" formControlName="check"
      [ngClass]="{ 'bordered-checkbox': fontWeight }" (change)="handleChange($event)" />
  </div>
</div>
