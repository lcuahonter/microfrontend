<div class="row my-5">
  <div class="col-md-8">
    <p [style.visibility]="btnTextVisible ? 'visible' : 'hidden'">* Campos obligatorios</p>
  </div>
  <div class="col-md-4 d-flex justify-content-end">

    <button
      type="button"
      class="btn btn-default"
      (click)="anterior()"
      [hidden]="ocultabotonAnterior"
      [style.visibility]="btnAntVisible"
    >
      {{ datos.txtBtnAnt }}
    </button>
    @if (btnGuardar && this.btnHabilitarContinuar) {
    <button
      type="button"
      class="btn btn-default ms-3"
      (click)="guardar()"
      [style.visibility]="btnGuardarVisible"
    >
      Guardar
    </button>
    }
    @if (btnContVisible) {
    <button
      type="button"
      class="btn btn-primary ms-3"
      [disabled]="!habilitarBoton"
      (click)="continuar()"
    >
      {{ datos.txtBtnSig }}
    </button>
    }
    @if (btnGuardar && this.btnHabilitarContinuar === false) {
    <button
      type="button"
      class="btn btn-default ms-3"
      (click)="guardar()"
      [style.visibility]="btnGuardarVisible"
    >
      Guardar
    </button>
    }
  </div>
  <div>
    @if(moduloEmergente){
        <lib-notificaciones
          [notificacionInput]="notificacion"
          (confirmacionModal)="eliminarPedimento($event)"
        ></lib-notificaciones>
    }
    </div>
</div>
