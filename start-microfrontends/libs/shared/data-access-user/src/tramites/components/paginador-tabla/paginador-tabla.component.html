<div class="paginador">
  <span> Filas por página </span>
  <div class="select-personalizado position-relative d-inline-block me-4">
    <select
      name="items"
      id=""
      class="form-select form-select-sm select-estilizado"
      [formControl]="itemsPorPaginaControl"
      (change)="cambiarItemsPorPagina()"
    >
      <option *ngFor="let item of ITEMS_POR_PAGINA" [value]="item">
        {{ item }}
      </option>
    </select>
    <i class="bi bi-caret-down-fill flecha"></i>
  </div>
  <nav aria-label="...">
    <ul class="pagination">
      <li class="page-item" *ngIf="totalPaginas > 1">
        <a class="page-link">Anterior</a>
      </li>
      @for (item of paginas; let i = $index; track i) {
      <li class="page-item">
        <a class="page-link">{{ i + 1 }}</a>
      </li>
      }

      <li class="page-item" *ngIf="totalPaginas > 1">
        <a class="page-link">Siguiente</a>
      </li>
    </ul>
  </nav>
</div>
