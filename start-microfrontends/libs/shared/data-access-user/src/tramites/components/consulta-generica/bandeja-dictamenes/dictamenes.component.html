<div class="row mt-4 mb-4">
    <div class="col-md-12">
    <table class="table table-container">
        <thead>
          <tr class="table-header">
            @for (item of encabezadoTablaDictamen; track $index) {
              <th>{{ item.valor }}</th>
              }
            <th class="center">Detalle</th>
          </tr>
        </thead>
        <tbody>
          @for (row of datosTablaDictamen; track $index) {
          <tr class="table-row">
            @for (item of encabezadoTablaDictamen;  let i = $index; track $index) {
            <td>{{ row[item.key] }}</td>
            }
            <td class="center">
              <button type="button" class="btn btn-link me-2" id="verDetalle" data-bs-toggle="button"
                data-bs-placement="top" title="Detalle del dictamen" (click)="verDetalle(row.id)">
                <i class="bi bi-eye bi-c text-gold"></i>
              </button>
            </td>
          </tr>
          }
        </tbody>
      </table>
</div>
</div>
