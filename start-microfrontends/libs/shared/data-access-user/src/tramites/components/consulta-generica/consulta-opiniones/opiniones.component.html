<div class="row">
    <ul class="nav nav-tabs">
        <li [ngClass]="indice === 1 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
            (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Opinión</a>
        </li>
        <li [ngClass]="indice === 2 ? 'active' : ''">
            <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
            (keydown.space)="seleccionaTab(2)" role="button" tabindex="1">Detalle</a>
        </li>    
    </ul>

    <ng-container>
        @switch (indice) {
            @case (1) {
                <lib-opinion [tabindex]="1"></lib-opinion>
            }
            @case (2) {
                <lib-detalle-opinion [tabindex]="2"></lib-detalle-opinion>
            }
        }
        </ng-container>
</div>
