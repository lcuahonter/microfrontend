<div class="row mt-4 mb-4">

    <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Requerimientos</a>
    </li>
    <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
        (keydown.space)="seleccionaTab(2)" role="button" tabindex="1">Detalle</a>
    </li>
    <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
        (keydown.space)="seleccionaTab(3)" role="button" tabindex="2">Observación</a>
    </li>      
    </ul>

    <ng-container>
    @switch (indice) {
        @case (1) {
            <lib-consultarequerimientos [tabindex]="1"></lib-consultarequerimientos>
        }
        @case (2) {
        }
        @case (3) {
        }
    }
    </ng-container>
</div>
