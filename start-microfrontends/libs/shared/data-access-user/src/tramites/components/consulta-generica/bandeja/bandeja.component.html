<ul class="nav nav-tabs">
  <li [ngClass]="indice === 1 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
      (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitud</a>
  </li>
  <li [ngClass]="indice === 2 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
      (keydown.space)="seleccionaTab(2)" role="button" tabindex="1">Documentos</a>
  </li>
  <li [ngClass]="indice === 3 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
      (keydown.space)="seleccionaTab(3)" role="button" tabindex="2">Dictámen</a>
  </li>
  <li [ngClass]="indice === 4 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)"
      (keydown.space)="seleccionaTab(4)" role="button" tabindex="3">Requerimientos</a>
  </li>
  <li [ngClass]="indice === 5 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(5)" (keydown.enter)="seleccionaTab(5)"
      (keydown.space)="seleccionaTab(5)" role="button" tabindex="4">Opiniones</a>
  </li>
  <li [ngClass]="indice === 6 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(6)" (keydown.enter)="seleccionaTab(6)"
      (keydown.space)="seleccionaTab(6)" role="button" tabindex="5">Acuses y resoluciones</a>
  </li>
  <li [ngClass]="indice === 7 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(7)" (keydown.enter)="seleccionaTab(7)"
      (keydown.space)="seleccionaTab(7)" role="button" tabindex="6">Tareas del trámite</a>
  </li>
  <li [ngClass]="indice === 8 ? 'active' : ''">
    <a data-toggle="tab" (click)="seleccionaTab(8)" (keydown.enter)="seleccionaTab(8)"
      (keydown.space)="seleccionaTab(8)" role="button" tabindex="7">Envío digital</a>
  </li>
</ul>
<ng-container>
  @switch (indice) {
    @case (1) {
      <div class="row rounded p-3 bg-light">
          <lib-bandeja-paso1></lib-bandeja-paso1>
      </div>            
    }
    @case (2) {
      <div class="row rounded p-3 bg-light">
          <lib-documentos></lib-documentos>
      </div>
    }
    @case (3) {
      <div class="row rounded p-3 bg-light">
          <lib-detallesdictamen></lib-detallesdictamen>
      </div>
    }
    @case (4) {
      <div class="row rounded p-3 bg-light">
          <lib-requerimientospaso1></lib-requerimientospaso1>
      </div>            
    }
    @case (5) {
      <div class="row rounded p-3 bg-light">
          <lib-opiniones></lib-opiniones>
      </div>            
    }            
    @case (6) {
      <div class="row rounded p-3 bg-light">
        <lib-acuses-resoluciones 
            titulo="Acuse (s)"
            [txtAlerta]="txtAlerta"
            [subtitulo]="subtitulo"></lib-acuses-resoluciones>
      </div>
    }
    @case (7) {
      <div class="row rounded p-3 bg-light">
          <lib-tareas-tramite></lib-tareas-tramite>
      </div>
    }
    @case (8) {
      <div class="row rounded p-3 bg-light">
          <lib-envio-digital></lib-envio-digital>
      </div>
    }
  }
</ng-container>
