<div class="row">
    <ul class="nav nav-tabs">
    <li [ngClass]="indice === 1 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(1)" (keydown.enter)="seleccionaTab(1)"
        (keydown.space)="seleccionaTab(1)" role="button" tabindex="0">Solicitante</a>
    </li>        
    <li [ngClass]="indice === 4 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(4)" (keydown.enter)="seleccionaTab(4)"
        (keydown.space)="seleccionaTab(4)" role="button" tabindex="1">Datos comunes</a>
    </li>

    <li [ngClass]="indice === 3 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(3)" (keydown.enter)="seleccionaTab(3)"
        (keydown.space)="seleccionaTab(3)" role="button" tabindex="2">Terceros relacionados</a>
    </li>      

    <li [ngClass]="indice === 6 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(6)" (keydown.enter)="seleccionaTab(6)"
        (keydown.space)="seleccionaTab(6)" role="button" tabindex="3">Datos por Régimen</a>
    </li>

    <li [ngClass]="indice === 5 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(5)" (keydown.enter)="seleccionaTab(5)"
        (keydown.space)="seleccionaTab(5)" role="button" tabindex="4">Rubro A.</a>
    </li>
    <li [ngClass]="indice === 2 ? 'active' : ''">
        <a data-toggle="tab" (click)="seleccionaTab(2)" (keydown.enter)="seleccionaTab(2)"
        (keydown.space)="seleccionaTab(2)" role="button" tabindex="5">Datos de la solicitud</a>
    </li>
    </ul>

    <ng-container>
    @switch (indice) {
    @case (1) {
        <solicitante [tabindex]="1"></solicitante>
    }
    @case (3) {
        <lib-terceros [tabindex]="3"></lib-terceros>
    }
    }
    </ng-container>
</div>
