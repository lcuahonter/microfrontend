<div [formGroup]="forma">
  <input
    class="form-control"
    type="text"
    name="hora"
    [id]="inputId"
    formControlName="hora"
    placeholder="HH:mm (24 hrs)"
    HoraFormato
    maxlength="5"
    [ngClass]="isValid ? 'required' : ''"
    readonly="{{ disabled ? true : null }}"
    (change)="handleChange($event)"
  />
  <div *ngIf="getTipoError('pattern')" class="mensaje-error">
    La hora indicada no es válida.
  </div>

  <div *ngIf="getTipoError('required')" class="mensaje-error">
    Este campo es obligatorio.
  </div>
</div>
