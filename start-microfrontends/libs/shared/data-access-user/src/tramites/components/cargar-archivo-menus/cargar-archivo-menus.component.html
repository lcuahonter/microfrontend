<div class="container-fluid">
  <div class="row mb-3">
    <label for="archivoInput" class="col-sm-4 col-form-label fw-bold">{{ titulo }}</label>
    <div class="col-sm-8">
      <input type="file" class="form-control" id="archivoInput" (change)="onFileSelected($event)">
    </div>
  </div>
  <div class="row mt-4">
    <div class="col-md-12 d-flex justify-content-end gap-2">
      <button type="button" class="btn btn-primary me-2" (click)="onCargar()">
        Cargar
      </button>
      <button type="button" class="btn btn-default" (click)="onCancelar()">
        Cancelar
      </button>
    </div>
  </div>
</div>
