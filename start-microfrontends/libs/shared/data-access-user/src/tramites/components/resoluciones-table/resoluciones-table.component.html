<div class="mt-4">
  <h5 class="fw-bold mb-3">Resolucion(es)</h5>
  <div class="table-responsive">
    <table class="table table-striped table-bordered align-middle text-center">
      <thead class="table-light">
        <tr>
          <th scope="col" style="width: 10%;">No.</th>
          <th scope="col" style="width: 70%;">Documento</th>
          <th scope="col" style="width: 20%;">Descargar</th>
        </tr>
      </thead>
      <tbody>
        @for (item of data; track item.no) {
          <tr>
            <td>{{ item.no }}</td>
            <td>{{ item.documento }}</td>
            <td>
              <i class="bi bi-file-earmark-pdf text-danger fs-4 cursor-pointer" 
                 (click)="onDescargar(item)" 
                 title="Descargar"></i>
            </td>
          </tr>
        }
        @if (data.length === 0) {
          <tr>
            <td colspan="3">No hay resoluciones disponibles.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
