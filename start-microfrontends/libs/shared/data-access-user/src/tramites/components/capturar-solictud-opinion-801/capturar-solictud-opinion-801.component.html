<div class="container">
    <div class="row">
        <form [formGroup]="formCapturaOpinion">
            <div class="row ">
                <div class="col-md-12 mt-5">
                    <label>Información de la visita por parte de la Secretaría de Economía</label>
                </div>
                <div class="col-md-4 mt-5">
                    <div class="form-group datepicker-group">
                        <input-fecha [datos]="fechaIngreso" formControlName="fechaIngreso" (valorCambiado)="cambioFechaIngreso($event)"></input-fecha>
                    </div>
                </div>
                
            </div>
        </form>
        <div class="d-flex justify-content-lg-end h1">
            <button type="button" class="btn btn-default ms-2" (click)="limpiarFormulario()">Cancelar</button>
            <button class="btn btn-primary ms-2" type="button" (click)="guardarOpinion()">Guardar</button>
        </div>
    </div>
</div>

@if (nuevaNotificacion) {
<section>
    <lib-notificaciones [notificacionInput]="nuevaNotificacion">
    </lib-notificaciones>
</section>
}
