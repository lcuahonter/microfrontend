<div class="table-responsive table-wrapper">
    <table class="table table-striped table-bordered mb-2" id="{{ tableId }}">
        <thead>
            <tr>
                <th *ngIf="expandible" style="width: 50px"></th>
                <th *ngFor="let col of columns" [style.width]="col.width">{{col.encabezado}}</th>
            </tr>
        </thead>
        <tbody>
            <ng-container *ngFor="let item of paginatedDatos; let i = index">
                <tr>
                    <td *ngIf="expandible">
                        <button class="btn btn-link p-0" (click)="toggleRow(i)"
                            [attr.aria-expanded]="expandedIndex === i">
                            <i class="bi" [ngClass]="{
                            'bi-dash': expandedIndex === i,
                            'bi-plus': expandedIndex !== i
                        }"></i>
                        </button> 
                    </td>
                    <td *ngFor="let col of columns" class="">{{item[col.clave]}}</td>
                    
                </tr>
                <tr *ngIf="expandedIndex === i && expandible">
                    <td [attr.colspan]="columns.length + 1">
                        <div class="nested-table p-3" [@expandCollapse]>
                            <ng-container *ngTemplateOutlet="nestedContent; context: { $implicit: item }">
                            </ng-container>
                        </div>
                    </td>
                </tr>
            </ng-container>
        </tbody>
    </table>
</div>
<app-table-pagination *ngIf="showPagination" [totalItems]="totalItems" [itemsPerPage]="itemsPerPage"
    [currentPage]="currentPage" (pageChange)="onPageChange($event)" (itemsPerPageChange)="onItemsPerPageChange($event)">
</app-table-pagination>
