@if (catalogosDatos) {
<label for="itemSeleccionado" class="form-label">
  {{catalogosDatos.labelNombre}}
  @if (catalogosDatos.required) {*}:
</label>
<select class="form-select" id="tipo-solicitud" [formControl]="itemSeleccionado" (change)="seleccion()"
  [ngClass]="isValid() ? 'required' : ''">
  <option value=0 disabled>Seleccione una opción</option>
  @for (item of catalogosDatos.catalogos; track $index)
  {
  <option value={{item.id}}>{{item.descripcion}}</option>
  }
</select>
}
