<form [formGroup]="observacionForm">
    <div class="row">
        @if (mostrarTitulo) {
        <div class="col-md-12">
            <h3 class="titulo-observacion">Autorizar dictamen</h3>
        </div>
        }
    </div>
    <div class="row mt-3">
        <div class="col-md-12">
            <label for="justificacionObservacion" class="form-label">*Justificación de la observación:</label>
            <textarea id="justificacionObservacion" class="form-control text-height"
                formControlName="justificacionObservacion" placeholder="" maxlength="2000" rows="6"
                [ngClass]="isValid('justificacionObservacion') ? 'required' : ''"></textarea>
            @if (observacionForm.get('justificacionObservacion')?.invalid &&
            observacionForm.get('justificacionObservacion')?.touched) {
            <div class="text-danger">
                Este campo es obligatorio.
            </div>
            }
            <div class="text-muted mt-1">
                Máximo 2000 caracteres
            </div>
        </div>
    </div>

    <div class="row mt-5 mb-5">
        <div class="col-md-12 d-flex justify-content-end">
            <button type="button" class="btn btn-default me-3" (click)="regresar()">{{botonRegresar}}</button>
            <button type="button" class="btn btn-primary" (click)="generarObservacion()">{{botonGenerar}}</button>
        </div>
    </div>
</form>
