<div
  [config]="{ show: true, backdrop: 'static' }"
  (onHidden)="onHidden()"
  bsModal
  #modal="bs-modal"
  class="modal fade"
  tabindex="-1"
  role="dialog"
  aria-labelledby="dialog-auto-name"
>
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h4 id="dialog-auto-name" class="modal-title pull-left">
          {{ titulo }}
        </h4>
      </div>
      <div class="modal-body">
        <p [innerHTML]="descripcion"></p>
        <label for="archivo">Complementario:</label>
        <input type="file" (change)="onArchivoChange($event)" accept=".pdf" />
        <span *ngIf="archivo"> {{ archivo.name }} </span>
        <p class="mt-2 small text-muted">
          La carga del documento puede tardar varios segundos, este tiempo dependera del tamano de tu archivo y de
tu velocidad de conexion.
        </p>
      </div>
      <div class="modal-footer center">
        <button type="button" class="btn btn-primary" (click)="anexar()">
          Anexar
        </button>
        <button type="button" class="btn btn-default" (click)="cerrarModal()">
          Cerrar
        </button>
      </div>
    </div>
  </div>
</div>
