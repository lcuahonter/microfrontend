<div class="row mt-3">
  <div class="col-md-12">
    <div *ngIf="errors.length > 0" class="error-container p-3 mb-3">
      <div class="d-flex align-items-center mb-2">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span class="fw-bold">Corrija los siguientes errores:</span>
      </div>
      <ol class="mb-0 ps-3">
        <li *ngFor="let error of errors">{{ error }}</li>
      </ol>
    </div>
    <div *ngIf="successMessage" class="d-flex justify-content-center mb-3">
      <div class="success-container px-4 py-2">
        <span class="success-text fw-bold">{{ successMessage }}</span>
      </div>
    </div>
  </div>
</div>
