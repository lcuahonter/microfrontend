<div class="row">
    <div class="col-12">
        <div class="menu-usuario">
            <div class="list-group">
                <div *ngFor="let item of menu">
                    <ng-template [ngTemplateOutlet]="renderItem"
                        [ngTemplateOutletContext]="{ item: item, level: 0 }"></ng-template>
                </div>
            </div>
        </div>
        <ng-template #renderItem let-item="item" let-level="level">
            <button class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                [ngClass]="'level-' + level" [ngStyle]="{ 'padding-left': (level * 3) + 'rem' }"
                (click)="item.children ? toggleAll(item) : navegar(item.path)">
                {{ item.label }}
                <span *ngIf="item.children" class="bi" [ngClass]="item.expanded ? 'bi-dash' : 'bi-plus'"></span>
            </button>
            <div *ngIf="item.expanded && item.children">
                <ng-container *ngFor="let child of item.children">
                    <ng-template [ngTemplateOutlet]="renderItem"
                        [ngTemplateOutletContext]="{ item: child, level: level + 1 }">
                    </ng-template>
                </ng-container>
            </div>
        </ng-template>
    </div>
</div>
