<div class="expand-container mb-3">
  <div class="expand-header" (click)="toggle()">
    <h5>{{ title }}</h5>
    <div class="expand-icon">
      <i class="bi" [ngClass]="isExpanded ? 'bi-caret-up-fill' : 'bi-caret-down-fill'"></i>
    </div>
  </div>
  <div class="expand-content" [hidden]="!isExpanded">
    <ng-content></ng-content>
  </div>
</div>
