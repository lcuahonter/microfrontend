<div class="container">
  <div class="row">
    <div class="col-md-12">
      <label for="folioTramite">  Atender requerimiento</label>
    </div>
  </div>

  <div class="row">
    <div class="col-md-12">
      <div class="row">
        <div class="col-md-4">
          <label class="form-label" for="">Fecha de generación:</label>
          <input
            class="form-control"
            type="text"
            name=""
            id=""
            [value]='fechaRequerimiento'
            title="Fecha de generación"
            disabled
          />
        </div>
        <div class="col-md-8">
          <label class="form-label" for=""
            >Justificación del requerimiento:
          </label>
          <textarea class="form-control" name="" id=""   style="height: 120px;" [value]="justificacionRequerimiento" title="Justificación" disabled></textarea>
        </div>
      </div>
    </div>
  </div>  
</div>
