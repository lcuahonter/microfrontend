<div class="libs-modal bg-light" [attr.ancho]="anchoModal">
    <div class="contenedor" id="general" #modalContainer>
        <div class="subcontenedor" [attr.end-possition]="tituloModal.length === 0" id="titulo" #dragHandle>
            {{tituloModal}}
            <button (click)="close()">X</button>
        </div>

        <div class="subcontenedor" id="header">
            <ng-content select="modal-header"></ng-content>
        </div>

        <div class="subcontenedor" id="body">
            <ng-content select="modal-body"></ng-content>
        </div>

        <div class="subcontenedor" id="footer">
            <ng-content select="modal-footer">
            </ng-content>
            @if(showCloseButton){
                <button class="btn btn-danger" (click)="close()">
                    {{textoBotonCerrar}}
                </button>
            }
        </div>
    </div>
</div>
