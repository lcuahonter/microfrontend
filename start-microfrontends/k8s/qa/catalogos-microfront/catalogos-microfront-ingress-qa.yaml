# Create Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modulefederation-catalogos-microfront-ingress-qa
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: frontqa.v30.cloud-ultrasist.net
    http:
      paths:
      - path: /catalogos(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: modulefederation-catalogos-microfront-service-qa
            port:
              number: 4227
  tls:
  - hosts:
    - frontqa.v30.cloud-ultrasist.net
    secretName: v30certs-qa
