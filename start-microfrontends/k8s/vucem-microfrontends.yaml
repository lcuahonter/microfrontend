# Ingress for VUCEM Microfrontends
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modulefederation-vucem-frontend-ingress-${ENV}
  namespace: default
  annotations:
    ingressClassName: "public"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "180"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "180"
    # Add Cache-Control headers for Module Federation - CRITICAL FOR MODULE FEDERATION
    nginx.ingress.kubernetes.io/configuration-snippet: |
      # Add CORS headers
      add_header 'Access-Control-Allow-Origin' '*' always;
      add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
      add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
      add_header 'Access-Control-Max-Age' 1728000;
      
      # Ensure remoteAppEntry.js files are never cached - THIS IS CRITICAL FOR MODULE FEDERATION
      if ($request_uri ~* \/remoteAppEntry\.js$) {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
      }
      
      # Handle OPTIONS preflight requests
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE';
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain charset=UTF-8';
        add_header 'Content-Length' 0;
        return 204;
      }
spec:
  ingressClassName: public
  tls:
  - hosts:
    - front.v30.ultrasist.net
    secretName: vucem-tls-cert
  rules:
  - host: front.v30.ultrasist.net
    http:
      paths:
      # Dashboard app (Shell)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: modulefederation-dashboard-service-${ENV}
            port:
              number: 80
      # Login microfrontend
      - path: /login
        pathType: Prefix
        backend:
          service:
            name: modulefederation-login-microfront-service-${ENV}
            port:
              number: 80
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: modulefederation-login-microfront-service-${ENV}
            port:
              number: 80
      # Aga microfrontend
      - path: /aga
        pathType: Prefix
        backend:
          service:
            name: modulefederation-aga-microfront-service-${ENV}
            port:
              number: 80
      # agricultura microfrontend
      - path: /agricultura
        pathType: Prefix
        backend:
          service:
            name: modulefederation-agricultura-microfront-service-${ENV}
            port:
              number: 80
      # SE microfrontend
      - path: /se
        pathType: Prefix
        backend:
          service:
            name: modulefederation-se-microfront-service-${ENV}
            port:
              number: 80
      # Semarnat microfrontend  
      - path: /semarnat
        pathType: Prefix
        backend:
          service:
            name: modulefederation-semarnat-microfront-service-${ENV}
            port:
              number: 80
      # Agace microfrontend
      - path: /agace
        pathType: Prefix
        backend:
          service:
            name: modulefederation-agace-microfront-service-${ENV}
            port:
              number: 80
      # Funcionario microfrontend
      - path: /funcionario
        pathType: Prefix
        backend:
          service:
            name: modulefederation-funcionario-microfront-service-${ENV}
            port:
              number: 80
      # Cofepris microfrontend
      - path: /cofepris
        pathType: Prefix
        backend:
          service:
            name: modulefederation-cofepris-microfront-service-${ENV}
            port:
              number: 80
      # Amecafe microfrontend
      - path: /amecafe
        pathType: Prefix
        backend:
          service:
            name: modulefederation-amecafe-microfront-service-${ENV}
            port:
              number: 80
      # Sener microfrontend
      - path: /sener
        pathType: Prefix
        backend:
          service:
            name: modulefederation-sener-microfront-service-${ENV}
            port:
              number: 80
      # Inbal microfrontend
      - path: /inbal
        pathType: Prefix
        backend:
          service:
            name: modulefederation-inbal-microfront-service-${ENV}
            port:
              number: 80
      # Sedena microfrontend
      - path: /sedena
        pathType: Prefix
        backend:
          service:
            name: modulefederation-sedena-microfront-service-${ENV}
            port:
              number: 80
      # Profepa microfrontend
      - path: /profepa
        pathType: Prefix
        backend:
          service:
            name: modulefederation-profepa-microfront-service-${ENV}
            port:
              number: 80
      # CRT microfrontend
      - path: /crt
        pathType: Prefix
        backend:
          service:
            name: modulefederation-crt-microfront-service-${ENV}
            port:
              number: 80
      # INAH microfrontend
      - path: /inah
        pathType: Prefix
        backend:
          service:
            name: modulefederation-inah-microfront-service-${ENV}
            port:
              number: 80
      # Bandejas microfrontend
      - path: /bandejas
        pathType: Prefix
        backend:
          service:
            name: modulefederation-bandejas-microfront-service-${ENV}
            port:
              number: 80
      # STPS microfrontend
      - path: /stps
        pathType: Prefix
        backend:
          service:
            name: modulefederation-stps-microfront-service-${ENV}
            port:
              number: 80
      # Module Federation specific paths - IMPORTANT FOR FEDERATION TO WORK
      - path: /remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-dashboard-service-${ENV}
            port:
              number: 80
      - path: /assets/module-federation.manifest.json
        pathType: Exact
        backend:
          service:
            name: modulefederation-dashboard-service-${ENV}
            port:
              number: 80
      - path: /login/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-login-microfront-service-${ENV}
            port:
              number: 80
      - path: /aga/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-aga-microfront-service-${ENV}
            port:
              number: 80
      - path: /agricultura/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-agricultura-microfront-service-${ENV}
            port:
              number: 80
      - path: /se/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-se-microfront-service-${ENV}
            port:
              number: 80
      - path: /semarnat/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-semarnat-microfront-service-${ENV}
            port:
              number: 80
      - path: /agace/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-agace-microfront-service-${ENV}
            port:
              number: 80
      - path: /funcionario/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-funcionario-microfront-service-${ENV}
            port:
              number: 80
      - path: /cofepris/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-cofepris-microfront-service-${ENV}
            port:
              number: 80
      - path: /amecafe/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-amecafe-microfront-service-${ENV}
            port:
              number: 80
      - path: /sener/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-sener-microfront-service-${ENV}
            port:
              number: 80
      - path: /inbal/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-inbal-microfront-service-${ENV}
            port:
              number: 80
      - path: /sedena/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-sedena-microfront-service-${ENV}
            port:
              number: 80
      - path: /profepa/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-profepa-microfront-service-${ENV}
            port:
              number: 80
      - path: /crt/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-crt-microfront-service-${ENV}
            port:
              number: 80
      - path: /inah/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-inah-microfront-service-${ENV}
            port:
              number: 80
      - path: /bandejas/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-bandejas-microfront-service-${ENV}
            port:
              number: 80
      - path: /stps/remoteAppEntry.js
        pathType: Exact
        backend:
          service:
            name: modulefederation-stps-microfront-service-${ENV}
            port:
              number: 80
