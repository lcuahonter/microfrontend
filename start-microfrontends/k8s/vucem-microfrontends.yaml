# HorizontalPodAutoscaler for VUCEM Microfrontends
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vucem-dashboard-hpa-${ENV}
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: modulefederation-dashboard-deployment-${ENV}
  minReplicas: ${MIN_REPLICAS}
  maxReplicas: ${MAX_REPLICAS}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80