# Services for each microfrontend
apiVersion: v1
kind: Service
metadata:
  name: modulefederation-dashboard-service-${ENV}
  namespace: default
  labels:
    app: dashboard
    env: ${ENV}
spec:
  selector:
    app: dashboard
    env: ${ENV}
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 32126
  type: NodePort
---
apiVersion: v1
