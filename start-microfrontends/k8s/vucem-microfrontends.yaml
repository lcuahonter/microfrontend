---
# Namespace for VUCEM Microfrontends
apiVersion: v1
kind: Namespace
metadata:
  name: default
---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: vucem-frontend-config
  namespace: default
data:
  NODE_ENV: "production"
  API_URL: "https://api-vucem-dev.example.com"
---
# ConfigMap for Module Federation Manifest
apiVersion: v1
kind: ConfigMap
metadata:
  name: module-federation-manifest
  namespace: default
data:
  module-federation.manifest.json: |
    {
      "login": "https://front.v30.ultrasist.net/login/remoteAppEntry.js",
      "aga": "https://front.v30.ultrasist.net/aga/remoteAppEntry.js", 
      "agricultura": "https://front.v30.ultrasist.net/agricultura/remoteAppEntry.js",
      "se": "https://front.v30.ultrasist.net/se/remoteAppEntry.js",
      "semarnat": "https://front.v30.ultrasist.net/semarnat/remoteAppEntry.js",
      "agace": "https://front.v30.ultrasist.net/agace/remoteAppEntry.js",
      "funcionario": "https://front.v30.ultrasist.net/funcionario/remoteAppEntry.js",
      "cofepris": "https://front.v30.ultrasist.net/cofepris/remoteAppEntry.js",
      "amecafe": "https://front.v30.ultrasist.net/amecafe/remoteAppEntry.js",
      "sener": "https://front.v30.ultrasist.net/sener/remoteAppEntry.js",
      "inbal": "https://front.v30.ultrasist.net/inbal/remoteAppEntry.js",
      "sedena": "https://front.v30.ultrasist.net/sedena/remoteAppEntry.js",
      "profepa": "https://front.v30.ultrasist.net/profepa/remoteAppEntry.js",
      "crt": "https://front.v30.ultrasist.net/crt/remoteAppEntry.js",
      "inah": "https://front.v30.ultrasist.net/inah/remoteAppEntry.js",
      "bandejas": "https://front.v30.ultrasist.net/bandejas/remoteAppEntry.js",
      "stps": "https://front.v30.ultrasist.net/stps/remoteAppEntry.js"
    }
---
# Deployment for dashboard
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modulefederation-dashboard-deployment-${ENV}
  namespace: default
  labels:
    app: dashboard
    env: ${ENV}
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: dashboard
      env: ${ENV}
  template:
    metadata:
      labels:
        app: dashboard
        env: ${ENV}
    spec:
      imagePullSecrets:
        - name: vucem30registrykey
      volumes:
        - name: module-federation-manifest
          configMap:
            name: module-federation-manifest
      containers:
        - name: dashboard
          image: ${REGISTRY}/vucem-front-dashboard:${TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: module-federation-manifest
              mountPath: /usr/share/nginx/html/assets/module-federation.manifest.json
              subPath: module-federation.manifest.json
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health.txt
              port: 80
            initialDelaySeconds: 30
            timeoutSeconds: 3
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health.txt
              port: 80
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
